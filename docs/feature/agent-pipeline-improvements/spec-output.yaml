agent_output:
  agent: "spec"
  instance: "spec"
  step: "step-2"
  started_at: "2026-03-05T13:00:00Z"
  completed_at: "2026-03-05T13:45:00Z"
  schema_version: "1.0"
  payload:
    feature_name: "Agent Pipeline Improvements"
    directions:
      - id: "A"
        name: "Incremental In-Place Edits"
        summary: "Modify all 12 affected files in-place, adding new logic directly to existing agent definitions and reference documents. Simplest approach but risks exceeding orchestrator line budget (539/550)."
      - id: "B"
        name: "Reference-Doc Extraction"
        summary: "Extract all new capabilities into new or expanded reference documents (e.g., fast-track-pipeline.md, web-fetching-integration.md). Keeps agent files lean but adds more cross-references."
      - id: "C"
        name: "Hybrid — Extract Complex, Inline Simple"
        summary: "Use reference-doc extraction for complex changes (E2E gating, fast-track pipeline) and in-place edits for simple changes (approval mode, no-redirect, pushback). Balances line budgets with minimal new files."

    common_requirements:
      - id: "CR-1"
        text: "All changes MUST comply with global-operating-rules.md §9 immutable safety rules. No immutable rule may be weakened, removed, or bypassed."
        priority: "must"
      - id: "CR-2"
        text: "All changes MUST preserve the existing typed YAML completion contract pattern (DONE/NEEDS_REVISION/ERROR) across all 9 agents."
        priority: "must"
      - id: "CR-3"
        text: "The orchestrator.agent.md MUST remain within its NFR-1 line budget exception (≤550 lines). New logic exceeding budget MUST be extracted to reference documents."
        priority: "must"
      - id: "CR-4"
        text: "tool-access-matrix.md §1 master matrix MUST remain the single source of truth for all tool access decisions. Per-agent sections (§2–§10) MUST stay in sync with §1."
        priority: "must"
      - id: "CR-5"
        text: "All 8 issues MUST be addressed. None may be deferred or dropped without explicit user consent."
        priority: "must"
      - id: "CR-6"
        text: "Changes MUST NOT break the existing full pipeline (Steps 0–9) for users who continue to use feature-workflow.prompt.md."
        priority: "must"
      - id: "CR-7"
        text: "All modified agent files MUST update their self-verification checklists to cover new behaviors."
        priority: "should"
      - id: "CR-8"
        text: "Anti-drift anchors in modified agents SHOULD be updated to reflect new capabilities and constraints."
        priority: "should"

    functional_requirements:
      - id: "FR-1"
        text: "E2E testing available for all risk levels (Issue #1)"
        sub_requirements:
          - id: "FR-1.1"
            text: "The planner MUST decouple e2e_required from workflow_lane. e2e_required MUST become an independent boolean determined by: (a) presence of an e2e-contract.yaml in the project, AND (b) planner assessment that E2E adds verification value for this task. Risk level (🟢/🟡/🔴) no longer gates e2e_required."
          - id: "FR-1.2"
            text: "The workflow_lane derivation table in planner.agent.md MUST be updated: 🟢→unit-only, 🟡→unit-integration, 🔴→full-tdd-e2e remain as lane assignments, but e2e_required is set independently of lane."
          - id: "FR-1.3"
            text: "The verifier Tier 5 conditional gate MUST change from 'e2e_required=true AND workflow_lane=full-tdd-e2e' to 'e2e_required=true' only. The workflow_lane condition is removed."
          - id: "FR-1.4"
            text: "The orchestrator E2E contract discovery in Step 0 MUST remove the 🔴-risk precondition. Contract discovery applies whenever an e2e-contract.yaml exists or in interactive mode for any risk level."
          - id: "FR-1.5"
            text: "sql-templates.md EG-10 MUST be restructured: the e2e-test-execution check becomes an additive check gated on e2e_required=true, independent of workflow_lane. EG-9 (existing independent E2E gate) remains as-is."
          - id: "FR-1.6"
            text: "schemas.md task.e2e_required field definition MUST be updated to reflect the new derivation rule (independent of risk level)."
          - id: "FR-1.7"
            text: "E2E MUST remain optional, not mandatory, for 🟢/🟡 tasks. The planner MAY set e2e_required=false for trivial tasks even when a contract exists. E2E MUST be mandatory for 🔴 tasks when a contract exists (preserving existing behavior)."
          - id: "FR-1.8"
            text: "The planner self-verification check #11 MUST be updated from '🔴 tasks have full-tdd-e2e' to 'e2e_required is explicitly set for every task based on contract presence and verification value assessment'."
          - id: "FR-1.9"
            text: "e2e-integration.md §0 Per-Agent Reading Guide MUST be updated to reflect that E2E sections are relevant to all risk levels, not just 🔴."
          - id: "FR-1.10"
            text: "dispatch-patterns.md E2E dispatch constraints MUST apply whenever e2e_required=true, regardless of risk level."

      - id: "FR-2"
        text: "Approval mode clarity and enforcement (Issue #2)"
        sub_requirements:
          - id: "FR-2.1"
            text: "The orchestrator Step 0 approval mode logic MUST be rewritten to remove all 'default to autonomous' language. The new language MUST state: 'The user''s selected APPROVAL_MODE is authoritative. If APPROVAL_MODE is present in the initial request, use it without re-prompting. If absent, prompt via ask_questions with no default bias.'"
          - id: "FR-2.2"
            text: "The orchestrator MUST explicitly pass approval_mode as a named parameter in every subagent dispatch context. The parameter MUST be documented in each agent''s Orchestrator-Provided Parameters table."
          - id: "FR-2.3"
            text: "The phrase 'default to autonomous' MUST NOT appear anywhere in the agent system. Replace all fallback language with 'If approval_mode is undetermined after user prompt, treat as interactive (the safer default)'."
          - id: "FR-2.4"
            text: "feature-workflow.prompt.md MUST clarify that APPROVAL_MODE from the user''s initial request takes absolute priority."
          - id: "FR-2.5"
            text: "Typos in orchestrator.agent.md line 24 ('presetnt', 'stoping') MUST be corrected."

      - id: "FR-3"
        text: "Web fetching capability for agents (Issue #3)"
        sub_requirements:
          - id: "FR-3.1"
            text: "fetch_webpage MUST be added to tool-access-matrix.md §1 master matrix as a new row. Access: Researcher=🔒, Designer=🔒, Spec=🔒, all other agents=❌."
          - id: "FR-3.2"
            text: "The 🔒 scope restriction for fetch_webpage MUST be: 'Interactive mode only. Requires user approval per invocation in VS Code. Used for researching architecture patterns, stack updates, best practices, and current documentation. NOT for fetching arbitrary URLs or scraping.'"
          - id: "FR-3.3"
            text: "researcher.agent.md MUST be updated: add fetch_webpage to tool summary, add a workflow step for web research in interactive mode, update tool count."
          - id: "FR-3.4"
            text: "designer.agent.md MUST be updated: add fetch_webpage to tool summary, document when to use fetch_webpage (stack research, design pattern lookup) vs. Context7 (library API docs), update tool count."
          - id: "FR-3.5"
            text: "spec.agent.md MUST be updated: add fetch_webpage to tool summary, document usage for researching requirement feasibility. Update tool count."
          - id: "FR-3.6"
            text: "In autonomous mode, agents MUST NOT attempt to use fetch_webpage. The self-verification checklist SHOULD include a check that fetch_webpage was only used in interactive mode."

      - id: "FR-4"
        text: "No terminal-to-file redirection enforcement (Issue #4)"
        sub_requirements:
          - id: "FR-4.1"
            text: "implementer.agent.md Operating Rules section MUST add an explicit rule: 'NEVER redirect terminal output to files. Do not use >, >>, | tee, 2>&1 > or any output redirection in run_in_terminal commands. Read output directly from the terminal.'"
          - id: "FR-4.2"
            text: "verifier.agent.md Operating Rules section MUST add the same explicit no-redirect rule as FR-4.1."
          - id: "FR-4.3"
            text: "implementer.agent.md anti-drift anchor MUST include 'NEVER redirect terminal output to files.'"
          - id: "FR-4.4"
            text: "verifier.agent.md anti-drift anchor MUST include 'NEVER redirect terminal output to files.'"

      - id: "FR-5"
        text: "Spec pushback with per-concern granularity (Issue #5)"
        sub_requirements:
          - id: "FR-5.1"
            text: "In interactive mode, the spec agent MUST present each pushback concern as a separate question in the ask_questions call, using the questions[] array. Each question includes the concern severity, title, and description."
          - id: "FR-5.2"
            text: "Each per-concern question MUST offer options: (a) 'Accept as known risk — proceed with this concern noted', (b) 'Modify scope to address — provide direction for how to address this concern', (c) 'Dismiss — this is not a real concern for this feature'. The 'Modify' option MUST set allowFreeformInput=true."
          - id: "FR-5.3"
            text: "After collecting per-concern responses, the spec agent MUST aggregate results: if ALL concerns are accepted or dismissed, proceed to specification. If ANY concern has 'modify', incorporate the user''s direction into the specification."
          - id: "FR-5.4"
            text: "In autonomous mode, each concern MUST be auto-resolved as 'Accept as known risk' and logged individually in the pushback_log."
          - id: "FR-5.5"
            text: "The pushback_log in spec-output.yaml MUST record per-concern responses (user_response per concern, not a single aggregate response)."

      - id: "FR-6"
        text: "E2E via GitHub Copilot Skills integration (Issue #6)"
        sub_requirements:
          - id: "FR-6.1"
            text: "e2e-integration.md §2 Skills Schema MUST be extended to support a new skill_format field with values 'playwright-yaml' (existing) and 'copilot-skill' (new). The Copilot skill format uses .md files with structured interaction descriptions."
          - id: "FR-6.2"
            text: "The researcher agent (Step 1.5 E2E Skill File Generation) MUST check for existing GitHub Copilot skill files in .github/copilot/skills/ and .github/agents/ SKILL.md files. If found, these SHOULD be referenced in the e2e-contract.yaml."
          - id: "FR-6.3"
            text: "The verifier Tier 5 MUST be able to load and execute both skill formats: (a) existing playwright-yaml skills via Playwright CLI translation, (b) Copilot skill .md files by reading them as interaction guides and converting interaction steps to Playwright CLI commands."
          - id: "FR-6.4"
            text: "The designer and researcher agents SHOULD use fetch_webpage (when available in interactive mode) to research the current GitHub Copilot Skills format and API."
          - id: "FR-6.5"
            text: "The Copilot skill integration MUST be layered on top of the existing Playwright CLI infrastructure, not replace it. Copilot skills describe WHAT to test; Playwright CLI remains HOW to execute browser interactions."

      - id: "FR-7"
        text: "SQLite DB auto-archive on new pipeline run (Issue #7)"
        sub_requirements:
          - id: "FR-7.1"
            text: "The orchestrator Step 0 MUST add an archive check BEFORE the existing DDL execution sequence. The check: if verification-ledger.db exists AND contains data from a different run_id than the current run, rename it to verification-ledger-{ISO8601-timestamp}.db."
          - id: "FR-7.2"
            text: "The archive check MUST query: SELECT DISTINCT run_id FROM pipeline_telemetry LIMIT 1. If the result is non-empty and differs from the current run_id, archive. If the query fails (table doesn''t exist or DB is corrupt), archive unconditionally."
          - id: "FR-7.3"
            text: "After archiving (renaming), the orchestrator MUST create a fresh verification-ledger.db and execute the standard DDL sequence from sql-templates.md §1."
          - id: "FR-7.4"
            text: "The orchestrator run_in_terminal scope restriction (DR-1) MUST be expanded to include 'verification-ledger.db archive rename' as a permitted filesystem operation, alongside existing SQLite queries and git operations."
          - id: "FR-7.5"
            text: "tool-access-matrix.md §2 MUST document the expanded orchestrator run_in_terminal scope."
          - id: "FR-7.6"
            text: "The archive strategy MUST NOT use migration plans. No schema_meta version comparison is needed. The decision is purely based on run_id mismatch."

      - id: "FR-8"
        text: "Fast-track pipeline prompt starting at planning (Issue #8)"
        sub_requirements:
          - id: "FR-8.1"
            text: "A new prompt file MUST be created: NewAgents/.github/prompts/plan-and-implement.prompt.md. This prompt invokes the orchestrator with instructions to execute a shortened pipeline: Step 0 (setup) → Step 4 (planning) → Steps 5–6 (implementation/verification loop) → Step 7 (code review) → Step 9 (auto-commit). Steps 1–3b (research, spec, design, design review) are skipped."
          - id: "FR-8.2"
            text: "The fast-track prompt MUST pass a pipeline_mode variable ('fast-track') that the orchestrator detects in Step 0. The orchestrator uses this to skip Steps 1–3b."
          - id: "FR-8.3"
            text: "In fast-track mode, the planner MUST use ask_questions to ask the user clarifying questions about scope, requirements, and constraints since no research/spec/design outputs exist. The planner MUST be granted ask_questions access (🔒 fast-track mode only) in tool-access-matrix.md."
          - id: "FR-8.4"
            text: "planner.agent.md Minimum Viable Input section MUST define a fast-track fallback: when spec-output.yaml and design-output.yaml are absent, the planner works from initial-request.md combined with ask_questions user responses."
          - id: "FR-8.5"
            text: "The orchestrator anti-drift anchor phrase 'You NEVER skip pipeline steps' MUST be amended to: 'You NEVER skip pipeline steps unless the active prompt explicitly defines a reduced step set. In fast-track mode, only the steps listed in the fast-track prompt are executed.'"
          - id: "FR-8.6"
            text: "The existing feature-workflow.prompt.md MUST NOT be modified. The fast-track prompt is a separate, additive entry point."
          - id: "FR-8.7"
            text: "Fast-track mode SHOULD still perform Step 8 (knowledge capture) if the pipeline completes successfully."

    acceptance_criteria:
      - id: "AC-1"
        text: "E2E decoupled from risk: A 🟢-risk task with e2e-contract.yaml present can have e2e_required=true set by the planner. The verifier Tier 5 executes for this task."
        test_method: "inspection"
      - id: "AC-2"
        text: "E2E optional for low risk: A 🟢-risk task in a project with e2e-contract.yaml can have e2e_required=false if the planner determines E2E adds no verification value."
        test_method: "inspection"
      - id: "AC-3"
        text: "E2E mandatory for high risk: A 🔴-risk task with e2e-contract.yaml present always has e2e_required=true (backward compatible)."
        test_method: "inspection"
      - id: "AC-4"
        text: "Approval mode authoritative: When initial-request.md contains 'APPROVAL_MODE: interactive', the orchestrator uses interactive mode without re-prompting. No agent defaults to autonomous."
        test_method: "inspection"
      - id: "AC-5"
        text: "No 'default to autonomous' phrase exists anywhere in the agent system files after modification."
        test_method: "test"
      - id: "AC-6"
        text: "fetch_webpage present in tool-access-matrix.md §1 master matrix with 🔒 access for Researcher, Designer, and Spec agents."
        test_method: "inspection"
      - id: "AC-7"
        text: "fetch_webpage usage documentation exists in researcher.agent.md, designer.agent.md, and spec.agent.md."
        test_method: "inspection"
      - id: "AC-8"
        text: "implementer.agent.md Operating Rules section contains an explicit no-file-redirect prohibition with example patterns (>, >>, | tee, 2>&1 >)."
        test_method: "inspection"
      - id: "AC-9"
        text: "verifier.agent.md Operating Rules section contains an explicit no-file-redirect prohibition with example patterns."
        test_method: "inspection"
      - id: "AC-10"
        text: "implementer.agent.md and verifier.agent.md anti-drift anchors contain 'NEVER redirect terminal output to files.'"
        test_method: "inspection"
      - id: "AC-11"
        text: "Spec pushback in interactive mode presents separate ask_questions entries per concern, each with accept/modify/dismiss options."
        test_method: "inspection"
      - id: "AC-12"
        text: "Spec pushback_log in spec-output.yaml records per-concern user_response fields."
        test_method: "inspection"
      - id: "AC-13"
        text: "e2e-integration.md §2 supports a skill_format field distinguishing 'playwright-yaml' and 'copilot-skill' formats."
        test_method: "inspection"
      - id: "AC-14"
        text: "Orchestrator Step 0 archives existing verification-ledger.db (renames with timestamp) when it contains data from a different run_id."
        test_method: "inspection"
      - id: "AC-15"
        text: "Orchestrator run_in_terminal scope (DR-1) explicitly includes 'verification-ledger.db archive rename' as permitted."
        test_method: "inspection"
      - id: "AC-16"
        text: "A new prompt file plan-and-implement.prompt.md exists in NewAgents/.github/prompts/ with fast-track pipeline instructions."
        test_method: "inspection"
      - id: "AC-17"
        text: "The planner has ask_questions access (🔒 fast-track mode only) in tool-access-matrix.md §1 and §6."
        test_method: "inspection"
      - id: "AC-18"
        text: "planner.agent.md defines a fast-track fallback input path that works from initial-request.md + ask_questions when spec/design outputs are absent."
        test_method: "inspection"
      - id: "AC-19"
        text: "The orchestrator anti-drift anchor no longer contains an absolute 'NEVER skip pipeline steps' but instead conditions step-skipping on prompt-defined reduced step sets."
        test_method: "inspection"
      - id: "AC-20"
        text: "The existing feature-workflow.prompt.md is unmodified in structure. The full 10-step pipeline continues to work as before."
        test_method: "inspection"
      - id: "AC-21"
        text: "orchestrator.agent.md remains ≤550 lines after all changes."
        test_method: "test"
      - id: "AC-22"
        text: "All modified agent files have updated self-verification checklists covering new behaviors."
        test_method: "inspection"

    edge_cases:
      - id: "EC-1"
        text: "E2E contract exists but task is trivial (🟢, doc-only change). The planner MUST be able to set e2e_required=false even when a contract exists, to avoid wasting pipeline time on E2E for documentation changes."
      - id: "EC-2"
        text: "No e2e-contract.yaml and risk is 🔴. The orchestrator MUST prompt for contract creation in interactive mode (existing behavior preserved). In autonomous mode, e2e_required=false and a warning is logged."
      - id: "EC-3"
        text: "User provides APPROVAL_MODE in initial-request.md AND the orchestrator ask_questions prompt returns a different mode. The initial-request.md APPROVAL_MODE takes priority."
      - id: "EC-4"
        text: "fetch_webpage called in autonomous mode. The agent MUST NOT invoke fetch_webpage. Self-verification MUST catch this violation."
      - id: "EC-5"
        text: "fetch_webpage returns an error or times out. The agent MUST degrade gracefully — proceed without web research, noting the gap in output."
      - id: "EC-6"
        text: "Spec pushback has 0 concerns. The ask_questions prompt MUST be skipped entirely. The pushback_log records concerns_identified=0."
      - id: "EC-7"
        text: "Spec pushback has >5 concerns. Each concern still gets its own question. The ask_questions call may be long but must be complete."
      - id: "EC-8"
        text: "verification-ledger.db does not exist at pipeline start. No archive needed — proceed directly to CREATE TABLE IF NOT EXISTS. This is the normal first-run case."
      - id: "EC-9"
        text: "verification-ledger.db exists but is corrupt (PRAGMA integrity_check fails). Archive the corrupt file (rename with timestamp + '-corrupt' suffix) and create fresh."
      - id: "EC-10"
        text: "Fast-track prompt used but user expects research/spec/design outputs. The planner MUST ask clarifying questions that compensate for missing upstream artifacts. The ask_questions prompt MUST explain that research/spec/design were skipped."
      - id: "EC-11"
        text: "Fast-track mode with 🔴-risk task. If the planner classifies the task as 🔴, E2E is still triggered normally if a contract exists. Fast-track skips research/spec/design but does NOT skip E2E."
      - id: "EC-12"
        text: "Copilot skill file exists but Playwright CLI is not available. Tier 5 MUST degrade gracefully — report skill found but execution unavailable, set e2e verification to 'deferred'."
      - id: "EC-13"
        text: "Orchestrator line budget exceeded after changes. Content MUST be extracted to a reference document (e.g., fast-track-pipeline.md) to stay within 550 lines."

    constraints:
      - "All changes are to markdown instruction files and YAML schemas only. No runtime code, no executables, no build artifacts."
      - "Windows environment, VS Code GitHub Copilot agent framework."
      - "Agent line budgets: standard ≤350 lines, orchestrator ≤550 lines (NFR-1 exception)."
      - "Tool access enforcement is instruction-based only (no runtime enforcement). See tool-access-matrix.md §11."
      - "Global immutable safety rules (global-operating-rules.md §9) cannot be weakened."
      - "Protected phrases (MUST NOT, NEVER, RESTRICTED, PROHIBITED) cannot be removed from existing rules, only from being reworded where the intent is preserved or strengthened."
      - "The existing feature-workflow.prompt.md and full 10-step pipeline MUST remain functional."

    pushback_log:
      concerns_identified: 4
      mode: "autonomous"
      auto_selected: true
      selected_option: "proceed"
      concerns:
        - severity: "Major"
          title: "E2E for all risk levels may increase pipeline duration for simple tasks"
          description: "Making E2E available for 🟢/🟡 tasks could cause the pipeline to run E2E for trivial bug fixes or doc changes, significantly increasing completion time. The user stated they want 'even small features and bug fixes to be confirmed working' but may not realize the time cost."
          recommendation: "Make E2E opt-in (planner decides) for 🟢/🟡 rather than mandatory. This is reflected in FR-1.7."
          user_response: "auto-accepted"
        - severity: "Major"
          title: "GitHub Copilot Skills format requires web research with uncertain scope"
          description: "Issue #6 asks for Copilot Skills integration, but the current skill system is a custom YAML format. The Copilot Skills format (SKILL.md with copilot-skill:// URIs) is different. Full integration scope is unclear without web research."
          recommendation: "Define the Copilot Skills integration as a layered enhancement on existing Playwright infrastructure. The designer should research the format before committing to deep integration."
          user_response: "auto-accepted"
        - severity: "Major"
          title: "Fast-track prompt conflicts with orchestrator anti-drift anchor"
          description: "The orchestrator anti-drift anchor states 'You NEVER skip pipeline steps.' A fast-track prompt that skips Steps 1-3b directly contradicts this rule. The anchor must be carefully amended without weakening the general no-skip guarantee."
          recommendation: "Amend the anti-drift anchor to condition step-skipping on prompt-defined reduced step sets. A separate prompt file is cleaner than dynamic scope detection because it preserves the 'prompt defines what to execute' pattern. This is reflected in FR-8.5."
          user_response: "auto-accepted"
        - severity: "Minor"
          title: "Three issues converge on tool-access-matrix.md"
          description: "Issues #3 (fetch_webpage), #7 (orchestrator scope), and #8 (planner ask_questions) all modify tool-access-matrix.md. Concurrent modifications in separate tasks risk merge conflicts."
          recommendation: "Batch all tool-access-matrix.md changes into a single implementation task."
          user_response: "auto-accepted"

completion:
  status: "DONE"
  summary: "Spec complete: 8 FR groups (38 sub-reqs), 22 AC, 13 edge cases, 4 pushback concerns logged"
  severity: null
  findings_count: 0
  risk_level: null
  output_paths:
    - "spec-output.yaml"
    - "feature.md"
