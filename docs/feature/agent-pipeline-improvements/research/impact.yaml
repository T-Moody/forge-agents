      # ═══════════════════════════════════════════════════════════
      # Issue #1: E2E for all risk levels (not just 🔴)
      # ═══════════════════════════════════════════════════════════
      - id: "F-1"
        title: "E2E gating is hardcoded to 🔴-risk-only across 6 files"
        category: "risk"
        detail: |
          E2E testing is currently gated behind workflow_lane='full-tdd-e2e' which is deterministically
          derived from 🔴 risk classification only. The derivation chain is:
          1. planner.agent.md (lines ~178-185): Workflow Lane Derivation table maps 🟢→unit-only,
             🟡→unit-integration, 🔴→full-tdd-e2e. e2e_required is only true for full-tdd-e2e.
          2. schemas.md (line ~483-484): task.workflow_lane and task.e2e_required field definitions
             encode the same 🔴-only derivation rule.
          3. verifier.agent.md (line ~266): Tier 5 conditional gate: "Execute ONLY when
             e2e_required=true AND workflow_lane='full-tdd-e2e'".
          4. orchestrator.agent.md (lines ~294-296): EG-10 and EG-9 evidence gates reference
             full-tdd-e2e lane and e2e_required=true.
          5. sql-templates.md (lines ~629-690): EG-10 has 3 lane variants; only full-tdd-e2e
             includes e2e-test-execution check.
          6. e2e-integration.md (§0 Per-Agent Reading Guide): Planner reads §1 only for
             "lane derivation" — implies E2E contract fields only matter for 🔴.
          7. dispatch-patterns.md (lines ~183-189): E2E dispatch constraints only apply
             when e2e_required=true.

          Changing this to allow E2E for 🟢/🟡 would require either:
          (a) Decoupling e2e_required from risk level entirely (user/planner choice), or
          (b) Adding a new workflow_lane like 'unit-e2e' or making e2e_required an independent boolean.
          Either approach touches the derivation logic in planner, the conditional gate in verifier,
          the EG-10 SQL variants, and the schema field definitions.
        evidence:
          - "NewAgents/.github/agents/planner.agent.md lines 178-185 (Workflow Lane Derivation table)"
          - "NewAgents/.github/agents/schemas.md line 483-484 (task.workflow_lane, task.e2e_required)"
          - "NewAgents/.github/agents/verifier.agent.md line 266 (Tier 5 conditional gate)"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 294-296 (EG-10, EG-9 gates)"
          - "NewAgents/.github/agents/sql-templates.md lines 629-690 (three EG-10 variants)"
          - "NewAgents/.github/agents/dispatch-patterns.md lines 183-189 (E2E dispatch constraints)"
          - "NewAgents/.github/agents/e2e-integration.md §0 (Per-Agent Reading Guide)"
        relevance: "HIGH BLAST RADIUS — This is the highest-risk change. It touches the core derivation chain from planner through verifier to orchestrator evidence gates. Every file in the E2E subsystem assumes e2e_required correlates with 🔴 risk. Decoupling this requires careful redesign of the lane model."

      - id: "F-2"
        title: "EG-10 SQL templates need new lane variants or restructuring"
        category: "risk"
        detail: |
          sql-templates.md §6 defines three EG-10 variants — EG-10(unit-only), EG-10(unit-integration),
          EG-10(full-tdd-e2e). If E2E becomes available for 🟢/🟡 tasks, these variants must be
          restructured. Options: (a) add new combined variants like EG-10(unit-only-e2e), or (b) make
          e2e-test-execution an independent additive check that EG-9 handles regardless of lane.
          Current EG-9 is already an independent gate ("BLOCKING when e2e_required=true") so option (b)
          may be simpler — keep EG-10 as-is and rely on EG-9 for all E2E tasks regardless of risk.
        evidence:
          - "NewAgents/.github/agents/sql-templates.md lines 640-690 (EG-10 three variants)"
          - "NewAgents/.github/agents/orchestrator.agent.md line 437 (EG-9 independent gate)"
        relevance: "SQL template and orchestrator evidence gate logic must be updated consistently. EG-9 being already independent reduces the blast radius if approach (b) is chosen."

      - id: "F-3"
        title: "Planner self-verification check #11 enforces 🔴-only E2E"
        category: "risk"
        detail: |
          planner.agent.md self-verification item 11 reads: 'Every 🔴 task has
          workflow_lane=full-tdd-e2e and e2e_required is explicitly set'. This couples
