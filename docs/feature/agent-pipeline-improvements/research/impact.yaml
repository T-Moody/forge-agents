      # ═══════════════════════════════════════════════════════════
      # Issue #4: Terminal output redirect to files
      # ═══════════════════════════════════════════════════════════
      - id: "F-7"
        title: "No-file-redirect rule exists but agents still redirect in practice"
        category: "risk"
        detail: |
          The no-file-redirect rule is already stated in two places:
          1. .github/copilot-instructions.md (global): "NEVER redirect terminal command output
             to a file (e.g., command > output.txt, command | tee output.txt, command 2>&1 > log.txt)."
          2. global-operating-rules.md §9 line 128: "No-file-redirect — Never redirect terminal
             output to files" (listed as immutable rule).
          3. global-operating-rules.md §9 line 139: Protected phrase "NEVER redirect".

          Despite these rules, the user reports implementers/verifiers still redirect output.
          This suggests the rules are not emphatic enough in the agent-specific files. The
          implementer.agent.md and verifier.agent.md do NOT explicitly restate the no-redirect
          rule in their operating rules sections — they rely on the global reference.

          Fix: Add explicit no-redirect rules to implementer.agent.md operating rules and
          verifier.agent.md operating rules, with concrete examples of what NOT to do.
        evidence:
          - ".github/copilot-instructions.md lines 10-11 (No File-Redirect)"
          - "NewAgents/.github/agents/global-operating-rules.md lines 127-128 (immutable rule)"
          - "NewAgents/.github/agents/global-operating-rules.md line 139 (protected phrase)"
          - "NewAgents/.github/agents/implementer.agent.md operating rules section (no explicit redirect mention)"
          - "NewAgents/.github/agents/verifier.agent.md (no explicit redirect mention in operating rules)"
        relevance: "LOW RISK — Text additions only. Add 2-3 lines to implementer and verifier operating rules. No structural changes. The rule already exists globally; this makes it more prominent."

      - id: "F-8"
        title: "Anti-drift anchors in implementer/verifier could reinforce no-redirect"
        category: "pattern"
        detail: |
          Both implementer.agent.md and verifier.agent.md have anti-drift anchor sections at
          the end that summarize critical constraints. Adding 'NEVER redirect terminal output
          to files' to these anchors would reinforce the rule at the most visible location.
          The orchestrator anti-drift anchor (line ~530-540) already references tool constraints
          but not the redirect rule specifically.
        evidence:
          - "NewAgents/.github/agents/implementer.agent.md (anti-drift anchor section)"
          - "NewAgents/.github/agents/verifier.agent.md line ~520 (anti-drift anchor section)"
        relevance: "Complements F-7. Anti-drift anchors are the last thing agents read before acting — high-impact location for behavioral enforcement."

      # ═══════════════════════════════════════════════════════════
      # Issue #5: Spec pushback needs per-concern ask_questions
      # ═══════════════════════════════════════════════════════════
      - id: "F-9"
        title: "Spec pushback uses single aggregate question instead of per-concern choices"
        category: "risk"
        detail: |
          spec.agent.md lines 144-170 define the interactive pushback prompt. Currently it
          uses a single ask_questions call with three aggregate options (proceed / modify / abandon).
          The user wants per-concern granularity: each concern should be its own multiple-choice
          question so the user can respond to each independently (e.g., accept concern 1, modify
          scope for concern 2, dismiss concern 3).

          The current structure (lines 146-166):
          - question: "The Spec agent identified [N] concerns..."
          - options: proceed | modify | abandon
          - All concerns listed in context, not individually actionable.

          Change: Restructure to emit one ask_questions call per concern (or a single call
          with multiple questions), each with its own options like:
          - "Accept as known risk"
          - "Modify scope to address"
          - "This is not a real concern"

          This impacts:
          1. spec.agent.md Pushback System section (lines 112-185)
          2. spec.agent.md Workflow step 2 (lines 216-220)
          3. spec.agent.md Response handling logic (lines 168-173)
          4. Autonomous mode auto-selection (lines 175-185) — must still work per-concern
        evidence:
          - "NewAgents/.github/agents/spec.agent.md lines 112-185 (Pushback System)"
          - "NewAgents/.github/agents/spec.agent.md lines 144-170 (Interactive Mode ask_questions)"
          - "NewAgents/.github/agents/spec.agent.md lines 216-220 (Workflow step 2)"
        relevance: "MEDIUM RISK — Changes are contained within spec.agent.md only. The spec agent already has ask_questions access (tool-access-matrix.md §4). No other agents are affected. The change is behavioral (how the tool is called), not structural."

      # ═══════════════════════════════════════════════════════════
      # Issue #6: E2E via GitHub Copilot Skills
      # ═══════════════════════════════════════════════════════════
      - id: "F-10"
        title: "E2E currently uses Playwright CLI — Copilot Skills is a different paradigm"
        category: "risk"
        detail: |
          The current E2E system is built around Playwright CLI for browser interaction
          (e2e-integration.md §3, verifier.agent.md Tier 5 Phases 1-5, tool-access-matrix.md
          §8.1-§8.4). The user wants to use GitHub Copilot Skills for app interaction instead.

          GitHub Copilot Skills are .md files in .github/copilot/skills/ that teach Copilot
          agent how to interact with an application. This is fundamentally different from the
          current Playwright CLI approach:
          - Playwright CLI: Agent sends CLI commands to drive a real browser session
          - Copilot Skills: Agent reads skill files that describe how to interact with the app,
            then uses appropriate tools (possibly including Playwright CLI) guided by the skill

          The current e2e-integration.md is ~700 lines defining the Playwright-centric protocol.
          Adding Copilot Skills would mean:
          1. e2e-integration.md: Add a new skill format section or replace §2 Skills Schema
          2. verifier.agent.md Tier 5: Modify to read .github/copilot/skills/*.md files
          3. researcher.agent.md: May need web research step to understand Copilot Skills format
          4. e2e-contract.yaml: May need new fields for skill discovery paths

          This is NOT a replacement of Playwright CLI — it is complementary. Skills describe
          WHAT to do; Playwright CLI is HOW to do it for browser interactions. The design
          should layer skills on top of the existing Playwright infrastructure.
        evidence:
          - "NewAgents/.github/agents/e2e-integration.md §2 (Skills Schema & Storage)"
          - "NewAgents/.github/agents/e2e-integration.md §3 (Playwright CLI protocol)"
          - "NewAgents/.github/agents/verifier.agent.md lines 264-460 (Tier 5 E2E)"
          - "NewAgents/.github/agents/tool-access-matrix.md §8.1-§8.4 (Tier 5 expansion)"
        relevance: "MEDIUM-HIGH RISK — Requires understanding the Copilot Skills format via web research. The e2e-integration.md skills schema may need revision. The Playwright CLI infrastructure can remain as the execution engine. This is an enhancement, not a replacement."

      # ═══════════════════════════════════════════════════════════
      # Issue #7: SQLite DB archive-on-new-run
      # ═══════════════════════════════════════════════════════════
      - id: "F-11"
        title: "SQLite archive strategy impacts Step 0 initialization only"
        category: "structure"
        detail: |
          orchestrator.agent.md Step 0 (lines 96-127) handles SQLite initialization. Currently:
          - Line 112: Execute DDL from sql-templates.md §1 on verification-ledger.db
          - Line 113: Sets PRAGMA journal_mode=WAL and busy_timeout=5000
          - Line 114: Runs PRAGMA integrity_check

          The user wants: before creating/reusing the DB, check if it contains data from a
          previous run. If so, rename it to an archive (e.g., verification-ledger-{timestamp}.db)
          and create a fresh DB.

          Files affected:
          1. orchestrator.agent.md Step 0: Add archive check logic before DDL execution
          2. sql-templates.md §1: May add an archive check query (e.g., SELECT run_id FROM
             pipeline_telemetry LIMIT 1) or this could be handled purely by the orchestrator.
          3. No other agents are affected — they all reference verification-ledger.db by name,
             which would always point to the fresh DB.

          The archive rename is a simple filesystem operation (mv or rename via run_in_terminal).
          The orchestrator already has run_in_terminal access for SQLite and git operations.
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md lines 112-114 (Step 0 SQLite init)"
          - "NewAgents/.github/agents/sql-templates.md §1 (DDL templates)"
          - "NewAgents/.github/agents/orchestrator.agent.md line 43 (run_in_terminal constraint)"
        relevance: "LOW RISK — Isolated to orchestrator Step 0. Simple filesystem operation. No downstream agent changes needed. The run_in_terminal scope restriction may need a small expansion to allow file rename (currently limited to SQLite queries, git, telemetry INSERT)."

      - id: "F-12"
        title: "Orchestrator run_in_terminal scope needs expansion for DB rename"
        category: "dependency"
        detail: |
          orchestrator.agent.md line 43 and tool-access-matrix.md §2 restrict run_in_terminal to
          'SQLite queries (SELECT, DDL) + git operations only. No builds, tests, or code execution.'
          Renaming a file (mv/rename) is not currently in scope. The DR-1 constraint would need
          a small expansion: 'SQLite queries + git operations + verification-ledger.db archive
          rename'. This is a low-risk scope expansion since it is a single, specific file operation.
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md line 43 (DR-1 constraint)"
          - "NewAgents/.github/agents/tool-access-matrix.md §2 (orchestrator scope)"
        relevance: "Must be addressed in design — the scope expansion is minimal and well-bounded but must be explicitly documented to avoid self-verification failures."

      # ═══════════════════════════════════════════════════════════
      # Issue #8: Shorter pipeline prompt starting at planning
      # ═══════════════════════════════════════════════════════════
      - id: "F-13"
        title: "New prompt file needs orchestrator dispatch logic changes"
        category: "structure"
        detail: |
          Currently there is exactly one prompt: feature-workflow.prompt.md (lines 1-17).
          It triggers the full pipeline (Steps 0-9) via orchestrator.agent.md.

          The user wants a second prompt that starts at planning (Step 4), skipping
          research (Step 1), spec (Step 2), and design (Step 3/3b). This 'fast-track' prompt
          would need:

          1. A new prompt file: e.g., plan-and-implement.prompt.md in NewAgents/.github/prompts/
          2. The prompt must reference the orchestrator agent (same agent definition).
          3. The orchestrator must detect which prompt was used and skip Steps 1-3b accordingly.
          4. The planner in fast-track mode should use ask_questions to ask clarifying questions
             (since there are no research/spec/design outputs to guide it).

          Impact on orchestrator.agent.md:
          - Step 0: Must detect the prompt mode (full vs fast-track). Could use a prompt
            variable like {{PIPELINE_MODE}} or infer from the presence/absence of upstream
            outputs.
          - Steps 1-3b: Must be skippable when in fast-track mode.
          - Step 4: Planner dispatch must include instruction to use ask_questions for
            clarification when no upstream research/spec/design exist.

          Impact on planner.agent.md:
          - Minimum Viable Input section: Currently requires design-output.yaml and spec-output.yaml.
            In fast-track mode, these won't exist. The planner needs a fallback path that
            works from initial-request.md alone + user Q&A via ask_questions.
          - Tool access: planner.agent.md does NOT currently have ask_questions access
            (tool-access-matrix.md §6 lists 7 tools, ask_questions not among them).
            Adding ask_questions to the planner requires a tool-access-matrix update.
        evidence:
          - "NewAgents/.github/prompts/feature-workflow.prompt.md (current only prompt)"
          - "NewAgents/.github/agents/orchestrator.agent.md Step 0 (initialization)"
          - "NewAgents/.github/agents/orchestrator.agent.md Steps 1-3b (skippable steps)"
          - "NewAgents/.github/agents/planner.agent.md Input Schema (requires design+spec)"
          - "NewAgents/.github/agents/tool-access-matrix.md §6 (planner: 7 tools, no ask_questions)"
        relevance: "MEDIUM-HIGH RISK — Requires a new prompt file, orchestrator logic changes for mode detection, planner input flexibility, and a tool-access-matrix update. Cross-cutting but well-scoped."

      - id: "F-14"
        title: "Planner ask_questions access requires tool-access-matrix update"
        category: "dependency"
        detail: |
          tool-access-matrix.md §1 master matrix shows ask_questions access: Orch=✅, Spec=🔒,
