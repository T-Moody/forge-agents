      # ═══════════════════════════════════════════════════════════
      # Issue #2: Approval mode 'default to auto' confusion
      # ═══════════════════════════════════════════════════════════
      - id: "F-4"
        title: "Approval mode language is ambiguous in orchestrator Step 0"
        category: "risk"
        detail: |
          orchestrator.agent.md lines 101-109 contain the approval mode selection logic.
          Key problematic phrases:
          - Line 105: "If the user does not respond in the interactive gate, default to autonomous."
          - Line 109: "If the user does not respond, default to autonomous."
          - Line 107: "autonomous is faster but may not yield results as good as interactive"
          The double-default language ("default to autonomous" appearing twice) and the framing
          of autonomous as the fallback may cause agents to favor autonomous even when the user
          explicitly chose interactive. The prompt file (feature-workflow.prompt.md line 15) also
          says "autonomous skips approval gates" without clarifying that the user's APPROVAL_MODE
          from initial-request.md takes priority.

          Additionally, line 24 of orchestrator.agent.md has typos: "presetnt" and "stoping".
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md lines 101-109 (Step 0 approval mode)"
          - "NewAgents/.github/agents/orchestrator.agent.md line 24 (typos in responsibility 2)"
          - "NewAgents/.github/prompts/feature-workflow.prompt.md line 15 (APPROVAL_MODE reference)"
        relevance: "LOW RISK — Text-only changes in 2-3 files. No structural refactoring needed. Fix by making language unambiguous: remove 'default' framing, make user-selected mode authoritative."

      # ═══════════════════════════════════════════════════════════
      # Issue #3: Adding fetch_webpage for research
      # ═══════════════════════════════════════════════════════════
      - id: "F-5"
        title: "fetch_webpage not in any agent's tool access — requires matrix update"
        category: "dependency"
        detail: |
          tool-access-matrix.md §1 master matrix contains 14 tools. fetch_webpage is not listed.
          Adding it requires:
          1. A new row in the §1 master matrix (all 9 agents get a column value).
          2. Section updates for each agent that gains access (likely researcher §3, designer §5,
             possibly spec §4).
          3. Each agent's .agent.md tool summary lines updated to reflect the new tool count.
          4. Interactive-mode gating: fetch_webpage requires user approval in VS Code, so it
             should only be used in interactive mode. This is a new constraint type not currently
             in the matrix — tool-access-matrix.md has no concept of mode-gated tools currently.
             The closest precedent is ask_questions (§4 Spec agent: "interactive mode only").
          5. The global copilot-instructions.md (.github/copilot-instructions.md) does not
             mention fetch_webpage restrictions.
        evidence:
          - "NewAgents/.github/agents/tool-access-matrix.md §1 (14 tools, no fetch_webpage)"
          - "NewAgents/.github/agents/tool-access-matrix.md §3 (researcher: 6 tools)"
          - "NewAgents/.github/agents/tool-access-matrix.md §5 (designer: 7 tools)"
          - "NewAgents/.github/agents/researcher.agent.md (no web fetching capability)"
          - "NewAgents/.github/agents/designer.agent.md (no web fetching capability)"
        relevance: "MEDIUM RISK — Adding a tool to the matrix is structural but well-contained. The interactive-mode gating is a new pattern that needs a clean design. Affects tool-access-matrix.md + each agent gaining the tool."

