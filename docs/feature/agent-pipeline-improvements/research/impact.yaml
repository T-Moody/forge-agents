          - "NewAgents/.github/agents/tool-access-matrix.md §6 (7 tools listed)"
          - "NewAgents/.github/agents/planner.agent.md Tool Access section"
        relevance: "Required dependency for issue #8. Without this, the planner cannot ask clarifying questions in fast-track mode."

