      - id: "F-17"
        title: "Breaking change risk assessment across all 8 issues"
        category: "risk"
        detail: |
          Breaking change analysis per issue:
          1. E2E for all risks: BREAKING for existing pipeline behavior — tasks that previously
             had no E2E will now potentially have E2E. Could increase pipeline duration significantly.
             Mitigation: make E2E opt-in or recommended-not-required for 🟢/🟡.
          2. Approval mode language: NON-BREAKING — text clarification only. Existing pipelines
             continue to work; behavior becomes more predictable.
          3. fetch_webpage: NON-BREAKING — additive tool access. Existing agents without the tool
             continue to work. New capability is opt-in by agents that use it.
          4. No-redirect enforcement: NON-BREAKING — reinforces existing rule. Agents that already
             comply are unaffected. Agents that violate will now be explicitly told not to.
          5. Spec per-concern pushback: NON-BREAKING in autonomous mode (auto-proceed per concern).
             BEHAVIOR CHANGE in interactive mode — users will see more granular questions instead
             of one aggregate. This is the desired outcome, not a breaking change.
