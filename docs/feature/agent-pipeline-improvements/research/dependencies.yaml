      - id: "F-2"
        title: "Tool access dependencies: tool-access-matrix.md as single authority, 2 agents use ask_questions"
        category: "dependency"
        detail: |
          tool-access-matrix.md (§1) is the single-source-of-truth master matrix for all 9 agents.
          Current tool assignments relevant to the 8 issues:

          ask_questions: Orchestrator (✅), Spec (🔒 interactive-only). All other agents ❌.
          fetch_webpage: NOT listed in the matrix at all — not assigned to any agent.
          run_in_terminal: Orchestrator (🔒 SQLite+git only), Implementer (✅ full),
            Verifier (✅ with Tier 5 expansion), Adversarial Reviewer (🔒 git diff + SQL INSERT),
            Knowledge Agent (🔒 SELECT + INSERT instruction_updates).
          memory: Orchestrator (✅), Knowledge Agent (✅). All others ❌.

          For Issue 3 (add fetch_webpage): The tool does not exist anywhere in tool-access-matrix.md.
          Adding it requires a new row in §1 master matrix AND per-agent section updates.

          For Issue 5 (spec pushback via ask_questions): Spec already has ask_questions 🔒 (§4),
          restricted to interactive mode only. The mechanism exists but the pushback prompt needs
          restructuring to per-concern multiple-choice rather than aggregate.

          For Issue 4 (file redirect): No agent definition explicitly prohibits file redirect.
          copilot-instructions.md (global) has "No File-Redirect" rule but it must be reinforced
          in implementer.agent.md and verifier.agent.md since they have run_in_terminal access.
        evidence:
          - "NewAgents/.github/agents/tool-access-matrix.md §1 master matrix (lines 8-22)"
          - "NewAgents/.github/agents/tool-access-matrix.md §4 Spec (lines 38-39)"
          - "NewAgents/.github/agents/tool-access-matrix.md §7 Implementer (lines 50-51)"
          - "NewAgents/.github/agents/tool-access-matrix.md §8 Verifier (lines 54-55)"
          - ".github/copilot-instructions.md — No File-Redirect rule"
        relevance: "Adding fetch_webpage creates a new tool dependency. The tool-access-matrix is the authoritative file — all per-agent section citations (§2–§10) must be updated in sync with §1. Issue 4 fix requires both copilot-instructions.md enforcement AND per-agent reinforcement."

      - id: "F-3"
        title: "Schema dependency chain: schemas.md consumed by all 9 agents through producer/consumer table"
        category: "dependency"
        detail: |
          schemas.md defines 14 schemas. The producer/consumer dependency table (Schema reference §Producer/Consumer):

          Schema 1 (completion-contract): ALL agents produce → Orchestrator consumes
          Schema 2 (research-output): Researcher → Spec, Designer
          Schema 3 (spec-output): Spec → Designer, Planner, Implementer, Verifier
          Schema 4 (design-output): Designer → Planner, Implementer, Adversarial Reviewer
          Schema 5 (plan-output): Planner → Orchestrator (risk summary), Implementer, Verifier
          Schema 6 (task-schema): Planner → Implementer, Verifier
          Schema 7 (implementation-report): Implementer → Verifier
          Schema 8 (verification-report): Verifier → Orchestrator, Adversarial Reviewer
          Schema 9 (review-findings): Adversarial Reviewer → Orchestrator, Knowledge Agent
          Schema 10 (knowledge-output): Knowledge Agent → (terminal, no consumers)
          Schema 13 (e2e-contract): Project author/Researcher → Orchestrator, Planner, Verifier
          Schema 14 (e2e-skill): Project author/Researcher → Verifier

          Key for proposed changes: Issue 1 (E2E for all risk levels) would change who produces/consumes
          Schema 13 and 14. Currently only 🔴 tasks reach Verifier Tier 5 E2E. Expanding means Planner's
          workflow_lane derivation table must change (F-5), and Schema 6 (task-schema) field e2e_required
          would need new derivation logic.
        evidence:
          - "NewAgents/.github/agents/schemas.md — Producer/Consumer Dependency Table (lines ~50-78)"
          - "NewAgents/.github/agents/schemas.md — Schema 2 definition (lines ~100-170)"
          - "NewAgents/.github/agents/schemas.md — Schema 6 referenced from planner task output"
        relevance: "Schema changes cascade through the producer/consumer chain. Modifying Schema 6 (task-schema) to change e2e_required derivation affects Planner, Implementer, and Verifier. The designer must trace full impact."

      - id: "F-4"
        title: "SQLite dependency map: 6 agents write/read verification-ledger.db across 4 tables"
        category: "dependency"
        detail: |
          verification-ledger.db has 4 tables. Writer/reader map per sql-templates.md:

          anvil_checks (Table 1):
            Writers: Orchestrator (DDL+contract checks), Implementer (baseline+after), Verifier (all tiers),
              Adversarial Reviewer (review verdicts — 3 INSERTs per reviewer per round)
            Readers: Orchestrator (evidence gates EG-1 through EG-10), Knowledge Agent (analysis)

          pipeline_telemetry (Table 2):
            Writer: Orchestrator only (INSERT after each dispatch, §3)
            Reader: Knowledge Agent (post-mortem queries, §7)

          artifact_evaluations (Table 3):
            Writers: Implementer, Verifier, Adversarial Reviewer (Phase 1 agents, §4)
            Reader: Knowledge Agent (quality analysis, §7)

          instruction_updates (Table 4):
            Writer: Knowledge Agent only (§5)
            Reader: Orchestrator (audit query)

          For Issue 7 (SQLite staleness/archive): The archive-on-new-run strategy must be implemented
          in the Orchestrator's Step 0 before DDL execution. This affects only the Orchestrator since
          it owns DB initialization. However, all agents that read/write must handle the case where
          the DB was just recreated (fresh schema, no historical data). Verifier's "safety net
          initialization" (line 108) already handles missing DB — but archive logic is new.
        evidence:
          - "NewAgents/.github/agents/sql-templates.md §1 DDL (Table comments: Writers lines)"
          - "NewAgents/.github/agents/sql-templates.md §2 anvil_checks INSERT"
          - "NewAgents/.github/agents/sql-templates.md §3 pipeline_telemetry INSERT"
          - "NewAgents/.github/agents/sql-templates.md §4 artifact_evaluations INSERT"
          - "NewAgents/.github/agents/sql-templates.md §5 instruction_updates INSERT"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 112-113 (Step 0 SQLite init)"
          - "NewAgents/.github/agents/verifier.agent.md line 108 (safety net DB init)"
        relevance: "SQLite archive strategy (Issue 7) is a Step 0 orchestrator change with downstream impact on all DB-writing agents. The designer must ensure archive-then-recreate doesn't break the safety net pattern in verifier.agent.md."

      - id: "F-5"
        title: "E2E dependency chain: 5-file cascade from risk gating to execution"
        category: "dependency"
        detail: |
          The current E2E dependency chain for Issue 1 (E2E for all risk levels):

          1. planner.agent.md — Workflow Lane Derivation (lines 160-172):
             🟢 → unit-only (e2e_required=false)
             🟡 → unit-integration (e2e_required=false)
             🔴 → full-tdd-e2e (e2e_required=true IF contract exists)
             THIS IS THE GATING POINT. Only 🔴 tasks can get e2e_required=true.

          2. orchestrator.agent.md — Step 0 E2E contract discovery (line 118-122):
             "Not found + interactive mode + 🔴 risk tasks" → prompt for contract.
             The 🔴 condition is hardcoded in Step 0 E2E discovery too.

          3. orchestrator.agent.md — Evidence gate EG-10 (lines in Evidence Gate Logic section):
             EG-10 has 3 lane variants; full-tdd-e2e variant requires ≥4 passed checks
             including e2e-test-execution. Unit-only and unit-integration lanes never check E2E.

          4. verifier.agent.md — Tier 5 conditional gate (line 266):
             "Execute this section ONLY when e2e_required=true AND workflow_lane='full-tdd-e2e'"
             Verifier completely skips E2E for non-🔴 tasks.

          5. sql-templates.md — EG-10 lane variants (§6):
             Three separate SQL queries for unit-only, unit-integration, full-tdd-e2e.
             Only full-tdd-e2e variant checks for e2e-test-execution.

          6. e2e-integration.md — §0 Per-Agent Reading Guide:
             Only Orchestrator, Verifier, Planner, and Adversarial Reviewer are listed.

          7. tool-access-matrix.md — §8.1 Tier 5 expansion:
             "When e2e_required=true in the task definition" — gated on task field.

          To allow E2E for all risk levels: ALL 7 files above must be modified consistently.
          The planner derivation table is the root dependency — changes cascade downward.
        evidence:
          - "NewAgents/.github/agents/planner.agent.md lines 160-172 (Workflow Lane Derivation table)"
          - "NewAgents/.github/agents/orchestrator.agent.md line 122 (🔴 risk gating for E2E prompt)"
          - "NewAgents/.github/agents/verifier.agent.md line 266 (Tier 5 conditional gate)"
          - "NewAgents/.github/agents/sql-templates.md §6 EG-10 lane variants"
          - "NewAgents/.github/agents/e2e-integration.md §0 Per-Agent Reading Guide"
          - "NewAgents/.github/agents/tool-access-matrix.md §8.1 (e2e_required gate)"
        relevance: "Issue 1 requires coordinated changes across 7 files. The planner's lane derivation table is the root — downstream files must be updated in dependency order. This is the highest-impact change in the feature request."

      - id: "F-6"
        title: "Approval mode dependency chain: orchestrator sets, 3 files consume"
        category: "dependency"
        detail: |
          Approval mode (autonomous|interactive) flows through the system:

          1. SOURCE: feature-workflow.prompt.md — references APPROVAL_MODE but does NOT set it.
             The prompt tells the orchestrator to "Follow APPROVAL_MODE for gate behavior."

          2. SETTER: orchestrator.agent.md — Step 0, sub-step 2.a:
             Uses ask_questions to prompt user. Stores in pipeline_state.approval_mode.
             Current language: "default to autonomous" if user doesn't respond.

          3. CONSUMER: orchestrator.agent.md — Steps 1a, 4a, and all gate management:
             "If interactive mode selected in Step 0 show multiple choice, else Autonomous: auto-select"

          4. CONSUMER: spec.agent.md — Pushback system (lines 142-198):
             Reads approval mode to choose between ask_questions (interactive) and auto-proceed (autonomous).

          5. CONSUMER: e2e-integration.md — §1 Trust Levels:
             "Contracts generated in interactive mode are pipeline-generated and require user approval
             via ask_questions before commands execute."

          For Issue 2 (approval mode confusion): The orchestrator is the single setter.
          The phrase "default to autonomous" at line 107 is the problematic language.
          However, the approval mode also appears in spec.agent.md and e2e-integration.md.
          A clean fix must define the exact phrase used system-wide.

          The mode value propagates ONLY through dispatch context (orchestrator passes it
          as parameter to subagents). It is NOT stored in any file — it's in-context only.
        evidence:
          - "NewAgents/.github/prompts/feature-workflow.prompt.md (full file, line 8)"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 55, 99-109, 157, 235"
          - "NewAgents/.github/agents/spec.agent.md lines 142-198 (pushback interactive/autonomous)"
          - "NewAgents/.github/agents/e2e-integration.md line 39 (interactive mode trust)"
        relevance: "Issue 2 fix is localized to orchestrator.agent.md Step 0 language, but the designer should audit all 3 consumers to ensure consistent terminology. The mode is in-context only — no schema or SQL change needed."

