          - "NewAgents/.github/prompts/feature-workflow.prompt.md (full file)"
          - "NewAgents/.github/agents/orchestrator.agent.md Steps 0-9 dispatch sequence"
          - "NewAgents/.github/agents/tool-access-matrix.md §6 Planner — 7 tools, no ask_questions"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 68-73 (EC-5 resume)"
