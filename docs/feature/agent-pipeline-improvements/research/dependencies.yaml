      - id: "F-8"
        title: "Prompt → orchestrator → agent dispatch dependency chain"
        category: "dependency"
        detail: |
          The pipeline entry point dependency chain:

          feature-workflow.prompt.md:
            - References: orchestrator.agent.md (via agent: orchestrator)
            - Passes: {{USER_FEATURE}} variable, APPROVAL_MODE instructions
            - Contains 4 execution rules referencing: orchestrator.agent.md, schemas.md

          orchestrator.agent.md dispatches in order:
            Step 0: Self (initialization)
            Step 1: researcher.agent.md ×4 parallel
            Step 1a: Self (approval gate)
            Step 2: spec.agent.md ×1
            Step 3: designer.agent.md ×1
            Step 3b: adversarial-reviewer.agent.md ×3 parallel
            Step 4: planner.agent.md ×1
            Step 4a: Self (approval gate)
            Steps 5-6: implementer.agent.md ≤4, verifier.agent.md ≤4 (loop)
            Step 6a: Self (runtime smoke test)
            Step 7: adversarial-reviewer.agent.md ×3 parallel
            Step 8: knowledge-agent.agent.md ×1
            Step 9: Self (auto-commit)

          For Issue 8 (shorter pipeline prompt): A new prompt file must be created that
          references the same orchestrator.agent.md but instructs it to start at Step 4
          (planning). This requires:
          1. New prompt file (e.g., quick-plan.prompt.md)
          2. Orchestrator must support a "start_step" parameter or recognize the prompt context
          3. Planner must handle ask_questions for clarifying questions (currently not in its tool set)
          4. The orchestrator's Pipeline State Recovery (EC-5) already supports resume — but
             starting at Step 4 means no research/spec/design outputs exist.

          The planner currently has NO ask_questions access (tool-access-matrix.md §6: 7 tools,
          none is ask_questions). Issue 8 would require adding ask_questions to the planner
          OR having the orchestrator ask questions before dispatching the planner.
