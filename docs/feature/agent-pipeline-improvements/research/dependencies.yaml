      - id: "F-9"
        title: "File redirect prohibition: copilot-instructions.md rule vs. agent enforcement gap"
        category: "dependency"
        detail: |
          The no-file-redirect rule exists in .github/copilot-instructions.md:
          "NEVER redirect terminal command output to a file (e.g., command > output.txt,
          command | tee output.txt, command 2>&1 > log.txt)"

          However, this rule is NOT explicitly referenced or reinforced in:
          - implementer.agent.md (has full run_in_terminal access, §7)
          - verifier.agent.md (has run_in_terminal access, §8)

          The copilot-instructions.md is a global instruction file loaded by VS Code for all agents,
          but agents may not always follow global rules when their own instructions don't mention them.

          For Issue 4: Reinforcement needed in both implementer.agent.md and verifier.agent.md.
          The fix should add an explicit prohibition in the Operating Rules section of each agent.
          Additionally, tool-access-matrix.md could add a note under §7 and §8.
        evidence:
          - ".github/copilot-instructions.md — 'No File-Redirect' section"
          - "NewAgents/.github/agents/implementer.agent.md — no mention of redirect prohibition"
          - "NewAgents/.github/agents/verifier.agent.md — no mention of redirect prohibition"
          - "NewAgents/.github/agents/tool-access-matrix.md §7, §8 — no redirect restriction noted"
        relevance: "Issue 4 is about behavioral compliance. The dependency chain is copilot-instructions.md → agent-specific reinforcement → tool-access-matrix documentation. All three layers should be consistent."

      - id: "F-10"
        title: "Spec pushback → ask_questions dependency: already wired but structure is aggregate"
        category: "dependency"
        detail: |
          The spec agent's current pushback system (spec.agent.md lines 111-199):
          1. Evaluates pushback criteria (implementation + requirements concerns)
          2. Classifies concerns by severity (Blocker/Critical/Major/Minor)
          3. Interactive mode: presents ALL concerns in ONE ask_questions call with 3 options
             (proceed/modify/abandon)
          4. Autonomous mode: logs concerns and auto-proceeds

          Current prompt structure (lines 147-168):
          ```
          question: "The Spec agent identified [N] concerns..."
          options: proceed | modify | abandon
          ```

          For Issue 5 (per-concern multiple-choice): The ask_questions tool supports
          multiple questions in a single call (verified from the tool schema — it accepts
          a questions[] array with per-question options). The change would restructure
          the single aggregate question into N separate questions, one per concern.

          Dependencies: spec.agent.md only. No cascade to other files needed because:
          - The spec's tool access (ask_questions 🔒) is already granted
          - The pushback_log schema in spec-output.yaml would need to record per-concern
            user responses instead of a single overall response
          - schemas.md Schema 3 (spec-output) does not formally define pushback_log fields,
            so schema changes may not be needed (it's an optional section)
        evidence:
          - "NewAgents/.github/agents/spec.agent.md lines 111-199 (pushback system)"
          - "NewAgents/.github/agents/spec.agent.md lines 147-168 (current prompt structure)"
          - "NewAgents/.github/agents/tool-access-matrix.md §4 (ask_questions 🔒 in Spec)"
          - "VS Code ask_questions tool schema — supports questions[] array with per-question options"
        relevance: "Issue 5 is well-contained to spec.agent.md with minimal cascade. The ask_questions tool already supports the required multi-question pattern."

      - id: "F-11"
        title: "E2E skills dependency: Copilot skills infrastructure for Issue 6"
        category: "dependency"
        detail: |
          For Issue 6 (E2E via Copilot Skills), the current system references:

          1. e2e-integration.md §2 — Skills Schema & Storage: defines skill YAML structure
             with fields (id, name, type, interaction, steps[], expected_outcomes[], etc.)
          2. researcher.agent.md Step 1.5 — E2E Skill File Generation:
             Researcher generates skill files in .e2e/skills/ when e2e_required=true.
          3. verifier.agent.md Tier 5 — Executes skills during E2E verification phases.
          4. tool-access-matrix.md §8.2 — tier5_command_allowlist includes playwright-cli.
          5. tool-access-matrix.md §8.4 — Playwright CLI Session Management protocol.

          The system already has a skill-based E2E framework, but it uses Playwright CLI
          commands rather than GitHub Copilot built-in skills. Issue 6 asks about using
          "GitHub Copilot skills" which are a different concept — VS Code extension skills
          (.skill.yaml files) that agents can discover and use.

          Dependencies for adding Copilot skill support:
          - e2e-integration.md §2 (skill schema may need updating)
          - researcher.agent.md Step 1.5 (skill generation)
          - verifier.agent.md Tier 5 (skill execution)
          - The pipeline already generates skills; the question is whether to use
            Copilot's native skill discovery vs. custom skill execution.
        evidence:
          - "NewAgents/.github/agents/e2e-integration.md §2 Skills Schema (lines 102-160)"
          - "NewAgents/.github/agents/researcher.agent.md Step 1.5 (lines 98-130)"
          - "NewAgents/.github/agents/verifier.agent.md lines 264-350 (Tier 5)"
          - "NewAgents/.github/agents/tool-access-matrix.md §8.2, §8.4"
        relevance: "Issue 6 may require updating the skill generation and execution pipeline. The existing Playwright CLI skill infrastructure is comprehensive — the designer must evaluate whether to extend it or replace it with native Copilot skills."

      - id: "F-12"
        title: "Ordering constraints for implementing all 8 issues"
        category: "dependency"
        detail: |
          Based on the dependency analysis, the 8 issues have the following ordering constraints:

          INDEPENDENT (can be done in any order, minimal cross-deps):
          - Issue 2 (approval mode) — localized to orchestrator.agent.md Step 0 language
          - Issue 4 (file redirect) — additive to implementer/verifier + tool-access-matrix
          - Issue 5 (spec pushback) — localized to spec.agent.md
          - Issue 7 (SQLite archive) — localized to orchestrator.agent.md Step 0

          MUST PRECEDE Issue 1:
          - Issue 7 (SQLite archive) should be done before Issue 1 because E2E expansion
            will increase DB usage and staleness risk

          HIGHEST CASCADE (do last or in dedicated wave):
          - Issue 1 (E2E for all risk levels) — requires 7 file changes, most complex cascade
          - Issue 6 (Copilot skills) — overlaps with Issue 1's E2E chain
          - Issues 1+6 should be designed together as they both affect the E2E pipeline

          REQUIRES NEW FILE:
          - Issue 3 (fetch_webpage) — new tool, new row in matrix, new agent instructions
          - Issue 8 (shorter pipeline) — new prompt file, possible new orchestrator mode

          DEPENDENCY PAIRS:
          - Issue 1 + Issue 6 — both modify E2E chain, must be coordinated
          - Issue 2 + Issue 3 — both involve approval_mode (fetch_webpage is interactive-only)
          - Issue 7 + Issue 1 — DB freshness supports heavier E2E usage
        evidence:
          - "Cross-file impact analysis from F-1 through F-11"
          - "NewAgents/.github/agents/planner.agent.md — workflow lane derivation (root of E2E chain)"
          - "NewAgents/.github/agents/orchestrator.agent.md — Step 0 is foundation for Issues 2, 7"
        relevance: "The designer and planner must respect these ordering constraints to avoid breaking partial implementations. Wave decomposition should group independent issues early and cascading issues late."

      - id: "F-13"
        title: "Global operating rules and safety constraints form an immutable dependency layer"
        category: "dependency"
        detail: |
          global-operating-rules.md contains several immutable rules that constrain all 8 issues:

          §9 Safety Constraint Filter — Immutable Rules:
          1. Terminal-only testing (constrains Issue 4 fix options)
          2. No-file-redirect (IS the rule Issue 4 wants to enforce better)
          3. Agent boundary integrity (constrains Issue 8 — new prompt can't modify agents at runtime)
          4. Bounded loop invariants (constrains any E2E retry additions for Issue 1)
          5. Evidence-first principle (constrains Issue 7 — archive must not lose evidence)
          6. Mandatory TDD for code tasks (constrains E2E expansion — TDD still required)

          §9 Protected Phrase Patterns — constrains how text can be modified:
          - MUST NOT, NEVER, RESTRICTED, PROHIBITED phrases cannot be removed
          - This constrains how the designer can reword approval mode (Issue 2)
          - This constrains any tool-access-matrix changes (RESTRICTED → ALLOWED rejected)

          All 8 issues must comply with these immutable rules. The Knowledge Agent's
          Safety Constraint Filter (§9) would block any change that weakens them.
        evidence:
          - "NewAgents/.github/agents/global-operating-rules.md §9 (lines 100-175)"
