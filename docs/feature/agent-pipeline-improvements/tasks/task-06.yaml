task:
  id: "task-06"
  title: "Update verifier.agent.md for Tier 5 gate, no-redirect, Copilot skill support, and approval_mode"
  description: >
    Four changes to verifier.agent.md: (1) Tier 5 conditional gate — change from
    'e2e_required=true AND workflow_lane=full-tdd-e2e' to 'e2e_required=true' only. The
    workflow_lane condition is removed. (2) Add no-file-redirect rule to Operating Rules
    section with banned pattern examples (>, >>, | tee, 2>&1 >). (3) Add 'NEVER redirect
    terminal output to files' to anti-drift anchor. (4) Extend Tier 5 to support copilot-skill
    format alongside existing playwright-yaml — the verifier reads copilot-skill .md files as
    interaction guides and converts steps to Playwright CLI commands. (5) Add approval_mode to
    Orchestrator-Provided Parameters table.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on:
    - "task-03"
  acceptance_criteria:
    - id: "AC-9"
      text: "verifier.agent.md Operating Rules section contains an explicit no-file-redirect prohibition with example patterns (>, >>, | tee, 2>&1 >)."
      test_method: "inspection"
    - id: "AC-10"
      text: "verifier.agent.md anti-drift anchor contains the phrase 'NEVER redirect terminal output to files.'"
      test_method: "inspection"
    - id: "FR-1.3"
      text: "Verifier Tier 5 conditional gate changed to 'e2e_required=true' only. The workflow_lane=full-tdd-e2e condition is removed."
      test_method: "inspection"
    - id: "FR-6.3"
      text: "Verifier Tier 5 can load both skill formats: (a) playwright-yaml via existing Playwright CLI translation, (b) copilot-skill .md files by reading them as interaction guides and converting to Playwright CLI commands."
      test_method: "inspection"
    - id: "FR-2.2"
      text: "approval_mode is documented in verifier.agent.md Orchestrator-Provided Parameters table."
      test_method: "inspection"
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-2']"
      - "design-output.yaml#payload.decisions[id='D-6']"
      - "design-output.yaml#payload.decisions[id='D-8']"
      - "design-output.yaml#payload.file_inventory[path='NewAgents/.github/agents/verifier.agent.md']"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-1'][sub_requirements.id='FR-1.3']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-2'][sub_requirements.id='FR-2.2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-4'][sub_requirements.id='FR-4.2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-4'][sub_requirements.id='FR-4.4']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-6'][sub_requirements.id='FR-6.3']"
    files_to_modify:
      - path: "NewAgents/.github/agents/verifier.agent.md"
        risk: "🟡"
  workflow_lane: "unit-integration"
  e2e_required: false
  e2e_contract_path: null
