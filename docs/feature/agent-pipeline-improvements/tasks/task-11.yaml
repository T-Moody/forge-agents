task:
  id: "task-11"
  title: "Create plan-and-implement.prompt.md fast-track pipeline prompt"
  description: >
    Create new file NewAgents/.github/prompts/plan-and-implement.prompt.md. This prompt invokes
    the orchestrator with pipeline_mode=fast-track, defining a reduced step set: Step 0 (setup) →
    Step 4 (planning) → Steps 5-6 (implementation/verification loop) → Step 7 (code review) →
    Step 8 (knowledge capture) → Step 9 (auto-commit). Steps 1-3b (research, spec, design,
    design review) are skipped. The prompt must set the pipeline_mode variable to 'fast-track'
    for orchestrator detection. The prompt must NOT modify feature-workflow.prompt.md (FR-8.6).
    Per DR-3, Step 8 is included following FR-8.7's recommendation.
  agent: "implementer"
  size: "Standard"
  risk: "🟢"
  depends_on:
    - "task-04"
  acceptance_criteria:
    - id: "AC-16"
      text: "plan-and-implement.prompt.md exists in NewAgents/.github/prompts/ with fast-track pipeline instructions defining steps: 0 → 4 → 5-6 → 7 → 8 → 9."
      test_method: "inspection"
    - id: "AC-20"
      text: "feature-workflow.prompt.md is not modified. The fast-track prompt is a separate, additive entry point."
      test_method: "inspection"
    - id: "FR-8.2"
      text: "The prompt sets pipeline_mode='fast-track' as a variable that the orchestrator detects in Step 0."
      test_method: "inspection"
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-10']"
      - "design-output.yaml#payload.decisions[id='D-13']"
      - "design-output.yaml#payload.decisions[id='D-14']"
      - "design-output.yaml#payload.deviation_records[id='DR-3']"
      - "design-output.yaml#payload.file_inventory[path='NewAgents/.github/prompts/plan-and-implement.prompt.md']"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-8'][sub_requirements.id='FR-8.1']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-8'][sub_requirements.id='FR-8.2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-8'][sub_requirements.id='FR-8.6']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-8'][sub_requirements.id='FR-8.7']"
    files_to_modify:
      - path: "NewAgents/.github/prompts/plan-and-implement.prompt.md"
        risk: "🟢"
  workflow_lane: "unit-only"
  e2e_required: false
  e2e_contract_path: null
