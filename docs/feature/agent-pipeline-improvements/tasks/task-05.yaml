task:
  id: "task-05"
  title: "Update planner.agent.md for E2E decoupling, fast-track fallback, and self-verification"
  description: >
    Three changes to planner.agent.md: (1) Workflow Lane Derivation table — decouple e2e_required
    from workflow_lane. e2e_required becomes an independent boolean based on contract presence +
    planner assessment. Lanes remain risk-based for test tier selection only. For 🔴 tasks with
    contract, e2e_required=true (mandatory). For 🟢/🟡, planner MAY set e2e_required=true if
    contract exists AND E2E adds verification value. (2) Add fast-track fallback input path —
    when spec-output.yaml and design-output.yaml are absent (fast-track mode), the planner works
    from initial-request.md + ask_questions user responses. Document that ask_questions is
    available in fast-track + interactive mode only. (3) Update self-verification check #11
    from '🔴 tasks have full-tdd-e2e' to 'e2e_required is explicitly set for every task based
    on contract presence and verification value assessment'. Also add approval_mode to
    Orchestrator-Provided Parameters table.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on:
    - "task-01"
    - "task-02"
  acceptance_criteria:
    - id: "AC-1"
      text: "Workflow lane derivation table shows e2e_required as independent of workflow_lane. Risk determines lane (🟢→unit-only, 🟡→unit-integration, 🔴→full-tdd-e2e). e2e_required is set independently based on contract presence + planner assessment."
      test_method: "inspection"
    - id: "AC-2"
      text: "Planner can set e2e_required=false for 🟢/🟡 tasks even when an e2e-contract.yaml exists, if the task is trivial (e.g., doc-only change)."
      test_method: "inspection"
    - id: "AC-3"
      text: "For 🔴 tasks with e2e-contract.yaml present, e2e_required=true is mandatory (backward compatible behavior preserved)."
      test_method: "inspection"
    - id: "AC-18"
      text: "Planner defines a fast-track fallback input path: when spec-output.yaml and design-output.yaml are absent, planner works from initial-request.md combined with ask_questions user responses."
      test_method: "inspection"
    - id: "FR-1.8"
      text: "Self-verification check #11 updated to: 'e2e_required is explicitly set for every task based on contract presence and verification value assessment'."
      test_method: "inspection"
    - id: "FR-2.2"
      text: "approval_mode is documented in planner.agent.md Orchestrator-Provided Parameters table."
      test_method: "inspection"
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-2']"
      - "design-output.yaml#payload.decisions[id='D-3']"
      - "design-output.yaml#payload.decisions[id='D-12']"
      - "design-output.yaml#payload.file_inventory[path='NewAgents/.github/agents/planner.agent.md']"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-1'][sub_requirements.id='FR-1.1']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-1'][sub_requirements.id='FR-1.2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-1'][sub_requirements.id='FR-1.7']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-1'][sub_requirements.id='FR-1.8']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-2'][sub_requirements.id='FR-2.2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-8'][sub_requirements.id='FR-8.3']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-8'][sub_requirements.id='FR-8.4']"
    files_to_modify:
      - path: "NewAgents/.github/agents/planner.agent.md"
        risk: "🟡"
  workflow_lane: "unit-integration"
  e2e_required: false
  e2e_contract_path: null
