    - id: "FR-1.9"
      text: "e2e-integration.md §0 Per-Agent Reading Guide states E2E sections are relevant to all risk levels, not restricted to 🔴 tasks."
      test_method: "inspection"
    - id: "FR-1.10"
      text: "dispatch-patterns.md E2E dispatch constraints apply when e2e_required=true, regardless of risk level or workflow_lane."
      test_method: "inspection"
    - id: "FR-6.5"
