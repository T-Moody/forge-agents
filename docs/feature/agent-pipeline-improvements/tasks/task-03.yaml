task:
  id: "task-03"
  title: "Update e2e-integration.md and dispatch-patterns.md for risk-independent E2E and Copilot Skills"
  description: >
    Two files updated: (1) e2e-integration.md — Update §0 Per-Agent Reading Guide to reflect
    E2E applicability for all risk levels (not just 🔴). Extend §2 Skills Schema with skill_format
    field supporting 'copilot-skill' format alongside existing 'playwright-yaml'. Add guidance
    for Copilot skill discovery in .github/copilot/skills/ and .github/agents/ SKILL.md files,
    and conversion of interaction steps to Playwright CLI commands. (2) dispatch-patterns.md —
    Update E2E dispatch constraints to apply when e2e_required=true regardless of risk level
    or workflow_lane.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on: []
  acceptance_criteria:
