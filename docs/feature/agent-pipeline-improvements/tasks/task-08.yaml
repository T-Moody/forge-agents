      - "spec-output.yaml#payload.functional_requirements[id='FR-4'][sub_requirements.id='FR-4.3']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-2'][sub_requirements.id='FR-2.2']"
    files_to_modify:
