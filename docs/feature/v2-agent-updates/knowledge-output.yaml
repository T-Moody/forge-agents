      - id: "L-3"
        lesson: "tools: arrays are the most impactful single change for multi-agent security. Without them, the entire 3-tier trust model was unenforced — every agent had access to every tool."
        evidence: "Research F-1; security review trust tier audit (all 9 agents verified compliant post-change)"
        recommendation: "Any future agent file must include tools: array in YAML frontmatter at creation time. Never ship an agent file without explicit tool restrictions."

      - id: "L-4"
        lesson: "Tool name correctness is critical and VS Code gives zero feedback on incorrect names. ask_questions→vscodeAskQuestions rename was necessary because the old name would have been silently ignored in tools: arrays."
        evidence: "Research F-2; architecture decision D-1; 0 stale ask_questions references after implementation"
        recommendation: "Maintain a verified tool name reference list. Before any tools: array modification, cross-check all tool names against the official VS Code built-in tools documentation."

      - id: "L-5"
        lesson: "Pre-existing issues in out-of-scope files generate recurring review noise. tourneypal-qa.agent.md was flagged by 2 of 3 reviewers despite being explicitly out of scope."
        evidence: "Security review major finding + architecture review minor finding, both on tourneypal-qa"
        recommendation: "Future features targeting v2/.github/agents/ should either scope in all files in the directory or add an explicit exclusion note in the architecture output to reduce reviewer overhead."

      - id: "L-6"
        lesson: "Batch build approach for implementer GREEN phase is a clear efficiency win. Changing from per-edit builds to batch builds reduces worst-case from N+6 to ~4 builds without sacrificing correctness."
        evidence: "Architecture decision D-5; implementer task-04 DONE; tester AC-11 PASS"
        recommendation: "Extend batch approach to other build-heavy phases if similar patterns emerge."

      - id: "L-7"
        lesson: "Quick-fix always dispatching planner (instead of inline plan generation) enforces subagent-only discipline at the cost of one additional dispatch (~seconds). The tradeoff is clearly worth it for architecture consistency."
        evidence: "Architecture decision D-4; task-07 AC-24 and AC-24b both PASS"
        recommendation: "No change needed — this is now the standard quick-fix behavior."

      - id: "L-8"
        lesson: "Completion-contract-only reads (D-10) are a practical context management strategy. The orchestrator no longer needs to read full research reports or architecture analysis — it routes based on status, summary, and output_paths."
        evidence: "Task-02 AC-9 and AC-10 PASS; orchestrator Context Management section verified"
        recommendation: "Monitor whether orchestrator routing degrades due to insufficient information from completion contracts. If so, add specific routing fields rather than reverting to full file reads."

