    text: "orchestrator.agent.md YAML frontmatter contains tools: array with ONLY routing tools (no textSearch, codebase, editFiles, fileSearch)"
    test_method: "inspection"
  - id: "AC-22"
    text: "Orchestrator tools: array is exactly: vscodeAskQuestions, runSubagent, runInTerminal, getTerminalOutput, listDirectory, readFile, createFile, createDirectory"
    test_method: "inspection"
  - id: "AC-16"
    text: "All occurrences of 'ask_questions' in orchestrator.agent.md replaced with 'vscodeAskQuestions'"
    test_method: "inspection"
  - id: "AC-13"
    text: "orchestrator.agent.md Step 1 does not contain 'create feature branch' or branch creation language"
    test_method: "inspection"
  - id: "AC-14"
    text: "orchestrator.agent.md Constraints git allowlist is 'status, add, commit, tag, diff' (no 'branch')"
    test_method: "inspection"
  - id: "AC-7"
    text: "orchestrator.agent.md Step 1 does not contain inline plan-output.yaml or task-01.yaml generation"
    test_method: "inspection"
  - id: "AC-8"
    text: "orchestrator.agent.md anti-drift anchor includes 'never read source code directly'"
    test_method: "inspection"
  - id: "AC-9"
    text: "orchestrator.agent.md contains context management rule: 'Read ONLY completion contracts from subagent outputs'"
    test_method: "inspection"
  - id: "AC-10"
    text: "orchestrator.agent.md mediation steps reference 'completion contract' instead of full file reads"
    test_method: "inspection"

relevant_context:
