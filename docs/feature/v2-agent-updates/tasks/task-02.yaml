    - "D-7: Branch prohibition — remove from orchestrator git allowlist and Step 1"
    - "D-10: Completion-contract-only reads"
  functional_requirements:
    - "FR-3: Orchestrator subagent-only enforcement (tools: array + anti-drift)"
    - "FR-4: Context management — completion-contract-only reads"
    - "FR-6.1: Remove 'create feature branch if needed' from Step 1"
    - "FR-6.2: Remove 'branch' from git allowlist"
    - "FR-7.1: Replace ask_questions with vscodeAskQuestions"
    - "FR-8.1: Orchestrator tools: array"
  files_to_read:
    - "v2/.github/agents/orchestrator.agent.md"
    - "docs/feature/v2-agent-updates/architecture-output.yaml"
