task:
  id: "task-08"
  title: "adversarial-reviewer.agent.md — Correctness analysis guidance expansion"
  description: >
    Update the adversarial-reviewer.agent.md Correctness Analysis section (Step 3c, ~line 177)
    with expanded guidance for behavioral correctness detection:

    Add explicit instructions within the Correctness Analysis section for reviewers to verify:
    (a) Tests invoke production code — check that test files import production modules and
        assertions reference values from calling production code, not local variable replications.
        Flag self-referential tests (tests asserting on locally-declared state without production
        invocation) as Major severity per severity-taxonomy.md.
    (b) AC-to-test coverage — for every acceptance criterion with test_method='test', verify
        a corresponding automated test exists. Flag missing coverage as Major severity.
    (c) Runtime wiring — for tasks creating new files, verify new files are referenced from
        at least one existing code path. Flag isolated abstractions as Major severity.

    Additionally, add guidance to flag suspicious tdd_red_green patterns: if
    tdd_red_green.tests_written_first is true AND initial_run_failures is 0, this is a
    suspicious combination suggesting tests were NOT written before production code.
    Flag for deeper test code review. This addresses Correctness Minor 6 review finding
    about unverified TDD ordering.

    Total estimated addition: ~15 lines.
  agent: "implementer"
