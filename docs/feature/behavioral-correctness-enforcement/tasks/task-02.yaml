      - "spec-output.yaml#payload.functional_requirements[id='FR-10']"
      - "spec-output.yaml#payload.acceptance_criteria[id='AC-6']"
      - "spec-output.yaml#payload.acceptance_criteria[id='AC-16']"
    files_to_modify:
