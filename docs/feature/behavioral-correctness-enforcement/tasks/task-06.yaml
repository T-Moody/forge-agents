      - "spec-output.yaml#payload.acceptance_criteria[id='AC-4']"
      - "spec-output.yaml#payload.acceptance_criteria[id='AC-5']"
      - "spec-output.yaml#payload.acceptance_criteria[id='AC-11']"
      - "spec-output.yaml#payload.acceptance_criteria[id='AC-15']"
      - "spec-output.yaml#payload.edge_cases[id='EC-1']"
      - "spec-output.yaml#payload.edge_cases[id='EC-2']"
      - "spec-output.yaml#payload.edge_cases[id='EC-3']"
