      - type: "convention"
        key: "schema-6-acceptance-criteria-v2"
        value: >
          Schema 6 acceptance_criteria is now list-of-objects {id, text, test_method},
          not list-of-strings. This is a v2.0 breaking change. All producers (Planner) and
          consumers (Implementer, Verifier) must use the structured format. test_method
          defaults to 'test' if omitted.
        stored_via: "store_memory_unavailable"

      - type: "convention"
        key: "behavioral-coverage-check-names"
        value: >
          Two new check_name values exist in the verifier cascade: 'behavioral-coverage'
          (Tier 2, unconditional for code tasks) and 'runtime-wiring' (Tier 2, conditional
          on new-file tasks only). Both are registered in schemas.md check_name Naming
          Patterns, verifier.agent.md Quick Reference, and EG-7 query.
        stored_via: "store_memory_unavailable"

      - type: "convention"
        key: "behavioral-tier2-always-run"
        value: >
          Behavioral checks (behavioral-coverage Step 3e, runtime-wiring Step 3f) are
          unconditional Tier 2 checks using always-available workspace tools (grep_search,
          read_file). They are placed under a distinct 'Always-Run Behavioral Checks (Code
          Tasks)' sub-heading in verifier.agent.md, separate from the tooling-dependent
          Tier 2 checks (3a-3d). Do NOT gate them behind external tooling detection.
        stored_via: "store_memory_unavailable"

      - type: "convention"
        key: "severity-taxonomy-behavioral-majors"
        value: >
          Three behavioral correctness issues are classified as Major severity in
          severity-taxonomy.md: (1) tests that do not invoke production code (self-referential),
          (2) business logic code changes with zero test coverage, (3) test_method='test'
          acceptance criteria lacking automated tests. These trigger needs_revision routing.
        stored_via: "store_memory_unavailable"

      - type: "lesson"
        key: "eg7-gap-detection-broken"
        value: >
          EG-7 gap-detection companion query in sql-templates.md references non-existent
          pipeline_telemetry.task_id column. The pipeline_telemetry table has no task_id
          column — use instance column with pattern matching or anvil_checks self-join
          instead. Must be fixed before EG-7 promotion to required gate.
        stored_via: "store_memory_unavailable"

      - type: "lesson"
        key: "unplanned-file-modifications"
        value: >
          Unplanned modifications to files outside task scope (e.g., orchestrator.agent.md)
          bypass the pipeline's own verification mechanisms (baseline capture, evidence
          gating, verification cascade). Any out-of-scope change should either be reverted
          or tracked as a separate task with proper verification.
        stored_via: "store_memory_unavailable"

      - type: "lesson"
        key: "yaml-schema-versioning-gap"
        value: >
          No YAML schema versioning framework exists. sql-templates.md §9 covers only SQLite
          table evolution. The common header schema_version: '1.0' does not change when
          individual schemas bump versions. Future work needed to define how per-schema
          versions relate to the common header version.
        stored_via: "store_memory_unavailable"

      - type: "pattern"
        key: "ddl-deduplication-cross-reference"
        value: >
          schemas.md DDL was deduplicated by replacing ~260 lines of inline SQLite DDL with
          cross-references to sql-templates.md §1. Reduces schemas.md from 1422 to ~1218
          lines. Creates cross-reference coupling — when sql-templates.md sections change,
          schemas.md references must be verified. The EG range reference ('EG-1 through EG-6')
          became stale within the same pipeline run when EG-7 was added.
        stored_via: "store_memory_unavailable"

      - type: "pattern"
        key: "design-review-issue-resolution"
        value: >
          Design review correctness issues (Tier 2 conditional framing, TDD Fallback enum,
          D-1 overclaim) were addressed during implementation without a formal design revision
          loop. The implementer made corrective adjustments: added 'Always-Run' sub-heading,
          documented not_applicable for TDD Fallback with EC-2 note, included honest caveat
          about F-3 gap narrowing. This demonstrates that a single design review iteration
          (max 1 per bounded loop) can be effective when implementers have visibility into
          review findings.
        stored_via: "store_memory_unavailable"

      - type: "lesson"
        key: "cross-reference-staleness-risk"
        value: >
          Section-number cross-references (e.g., 'sql-templates.md §6') become stale when
          target documents are modified. Within this run, schemas.md referenced 'EG-1 through
          EG-6' while EG-7 was added to sql-templates.md by a concurrent task. Consider using
          range-free references ('all canonical evidence gate queries') or adding a verifier
          self-check for cross-reference consistency.
        stored_via: "store_memory_unavailable"

    decision_log_entries:
      - id: "DL-001"
        title: "Schema 6 acceptance_criteria changed from string list to object list (breaking change v2.0)"
        rationale: >
