agent_output:
  agent: "knowledge-agent"
  instance: "knowledge-agent"
  step: "step-8"
  started_at: "2026-03-04T21:10:00Z"
  completed_at: "2026-03-04T21:45:00Z"
  schema_version: "1.0"
  run_id: "2026-03-04T00:00:00Z"
  feature_slug: "tdd-e2e-enforcement"

  payload:
    # ═══════════════════════════════════════════════════════
    # KNOWLEDGE UPDATES
    # ═══════════════════════════════════════════════════════
    knowledge_updates:
      - type: "convention"
        key: "check-name-producer-consumer-traceability"
        value: >
          All SQL evidence gate queries (EG-*) MUST reference check_names that are
          actually produced by a specific agent. Maintain a producer/consumer cross-reference
          table in sql-templates.md to prevent phantom check_name references. This was the
          Critical C-1 finding that required Round 2 code review.
        stored_via: "store_memory"

      - type: "convention"
        key: "concurrency-cap-single-source-of-truth"
        value: >
          E2E concurrency caps and resource limits must be stated in exactly ONE
          authoritative location, with other files referencing that source. Contradictions
          between orchestrator.agent.md, dispatch-patterns.md, and e2e-integration.md
          (cap 2-4 vs cap 1) required code review fix. Use dispatch-patterns.md as the
          single source for concurrency rules.
        stored_via: "store_memory"

      - type: "convention"
        key: "command-allowlist-regex-tightening"
        value: >
          Verifier Tier 5 command allowlist regexes must be narrowly scoped. Patterns
          like ^node .+ and ^curl -s .+ allow arbitrary code execution and HTTP
          exfiltration respectively. Tighten to specific subcommands/paths. This was
          the Critical S-1/S-2 finding from security-sentinel in code review Round 1.
        stored_via: "store_memory"

      - type: "lesson"
        key: "line-count-self-report-unreliable"
        value: >
          Implementer self-reported line counts are unreliable — TASK-004 claimed 546 lines
          but actual was 697 lines (28% discrepancy). Verifier baseline-discrepancy checks
          should always independently measure line counts rather than trusting self-reports.
        stored_via: "store_memory"

      - type: "pattern"
        key: "reference-document-extraction-for-line-budget"
        value: >
          When an agent file approaches its line budget (e.g., orchestrator at 528/550),
          extract coordination rules into a separate reference document (e.g., e2e-integration.md).
          This pattern successfully kept orchestrator at 539/550 while adding significant
          E2E coordination capability (~697 lines extracted).
        stored_via: "store_memory"

      - type: "lesson"
        key: "design-review-reveals-execution-model-gaps"
        value: >
          Design review (Step 3b) identified that the original Direction C design did not
          specify HOW Playwright CLI would perform step-by-step interaction (its CLI cannot
          do interactive commands natively). This forced a design revision to add a
          script-generation execution model. Early architectural review prevents implementation
          dead-ends.
        stored_via: "store_memory"

      - type: "pattern"
        key: "wave-decomposition-for-large-agent-changes"
        value: >
          For features touching 14+ files across the agent system, decompose into 4 waves:
          (1) Foundation schemas/rules, (2) Core agent modifications, (3) Extended agent
          integrations, (4) Supplemental docs. This ordering ensures dependencies flow
          forward and enables per-wave verification. All 16 tasks passed verification.
        stored_via: "store_memory"

      - type: "command"
        key: "verification-ledger-check-query"
        value: >
          Per-task verification summary: SELECT task_id, COUNT(*) as checks,
          SUM(passed) as passed, COUNT(*)-SUM(passed) as failed FROM anvil_checks
          WHERE run_id='{run_id}' AND phase IN ('baseline','after')
          GROUP BY task_id ORDER BY task_id;
        stored_via: "store_memory"

      - type: "lesson"
        key: "two-round-review-cycle-sufficient"
        value: >
          For this 🔴 risk feature, both design review and code review converged in
          exactly 2 rounds. Round 1 identified 3 Critical + 18 Major findings across
          design; code review Round 1 found 3 Critical + 9 Major. All resolved in
          Round 2 with 0 blockers. Two-round budget is sufficient for complex features.
        stored_via: "store_memory"

    # ═══════════════════════════════════════════════════════
    # DECISION LOG ENTRIES
    # ═══════════════════════════════════════════════════════
    decision_log_entries:
      - id: "DL-001"
        title: "Direction C — Hybrid Extended Verifier + Reference Document"
        rationale: >
          Chosen over Direction A (extend verifier only — too complex) and Direction B
          (dedicated E2E agent — adds 10th agent). Direction C extends the existing verifier
          with Tier 5 E2E while extracting coordination rules into e2e-integration.md,
          keeping agent count at 9 and managing complexity through reference documents.
        confidence: "High"

      - id: "DL-002"
        title: "Playwright CLI as primary E2E tool"
        rationale: >
          Selected over @playwright/mcp and generic script-generation. Playwright CLI
          provides session isolation (-s=name), built-in skills system, and 16+ interaction
          commands. Design revision R2 addressed the execution model gap identified by
          architecture-guardian (Critical finding in design review R1).
        confidence: "High"

      - id: "DL-003"
        title: "Max 1 E2E task per wave for resource isolation"
        rationale: >
          E2E tests require exclusive browser/port/process resources. Concurrency cap of 1
          prevents port collisions, browser session interference, and resource exhaustion.
          Originally specified as 2-4 in orchestrator — code review R1 identified the
          contradiction and aligned to 1 across all 3 governing documents.
        confidence: "High"

      - id: "DL-004"
        title: "TDD RED-GREEN-VERIFY as mandatory cycle"
        rationale: >
          Every implementation task must demonstrate: RED (failing test first), GREEN (make
          it pass), VERIFY (IDE diagnostics clean). Fallback allowed only with documented
          override (tdd_fallback_reason field in Schema 7). This is now an immutable rule
          in global-operating-rules.md §9.
        confidence: "High"

      - id: "DL-005"
        title: "TDD compliance as BLOCKING evidence gate (EG-7)"
        rationale: >
          TDD compliance check was promoted from advisory to blocking. Verifier must verify
          test-before-code evidence in implementation reports. Non-compliance blocks the
          pipeline unless a documented fallback reason is provided. Prevents regression
          to code-first development.
        confidence: "High"

      - id: "DL-006"
        title: "3 workflow lanes (unit-only, unit-integration, full-tdd-e2e)"
        rationale: >
          Risk-based lane derivation ensures only High Risk tasks pay E2E verification cost.
          unit-only for 🟢 documentation tasks, unit-integration for 🟡 standard tasks,
          full-tdd-e2e for 🔴 tasks or those with e2e_required=true. Reduces pipeline
          wall-clock time by 60-80% for non-E2E tasks.
        confidence: "High"

      - id: "DL-007"
        title: "Script-generation execution model for E2E interaction"
        rationale: >
          Playwright CLI lacks step-by-step interactive commands directly. Design revision
          added script-generation model: skill steps are translated into temporary framework
          scripts executed via run_in_terminal. This was the Critical architecture-guardian
          finding that forced design R2 revision.
        confidence: "Medium"

      - id: "DL-008"
        title: "E2E contract structured command format ({executable, args})"
        rationale: >
          Prevents shell injection by separating executable from arguments. The contract
          start_command uses {executable, args[], env{}} format instead of shell strings.
          Validation rules prohibit path separators, spaces, and shell metacharacters in
          executable field. Security-sentinel Critical finding from design review R1.
        confidence: "High"

      - id: "DL-009"
        title: "Evidence sanitization pipeline for E2E artifacts"
        rationale: >
          E2E verification generates sensitive artifacts (HAR files, screenshots, console
          logs). Pipeline: sql_escape() → HAR body stripping → 10KB body limit → 5KB
          console cap → secret pattern scrubbing → SHA-256 manifest hash. Prevents
          credential leakage and manages artifact size.
        confidence: "High"

      - id: "DL-010"
        title: "Accept TASK-004 line count overage (697 vs 550 target) as cosmetic"
        rationale: >
          e2e-integration.md exceeded the 500±50 line target by 147 lines. All 9 sections
          have valid content. The extra lines come from §8 timeout budget, parallel isolation,
          and API/CLI app testing subsections. Accepted as cosmetic by all 3 code reviewers
          in Round 2. Content quality outweighs line count compliance.
        confidence: "High"

