  description: |
    Modify the orchestrator with surgical precision — the line budget is 543/550 with a
    7-line margin. Every line counts.

    **CRITICAL CONSTRAINT:** Current orchestrator is ~528 lines. Target after changes: ≤545 lines.
    Net addition: ~15 lines. This means consolidating EG-2 into EG-10 MUST save ≥5 lines to
    offset the new additions. If budget is exceeded, move EG-9 sub-phase checks to verifier
    output (saves ~3 lines).

    **1. Add E2E Contract Discovery to Step 0 (D-23):**

    In "### Step 0: Setup & Initialization", add after existing initialization:
    - Check for e2e-contract.yaml at project root OR .e2e/contract.yaml
    - If found: perform structural validation (required fields, port range [1024, 65535],
      max_concurrent_instances ≤ 4, referenced skill files exist, executable in allowlist)
    - Record check_name='e2e-contract-found' and 'e2e-contract-validation'
    - Propagate contract path to downstream agents via dispatch context
    - If not found in interactive mode with High Risk tasks: prompt user via ask_questions
    - If not found in autonomous mode: skip E2E, record in pipeline_telemetry

    Reference e2e-integration.md §1 for contract specification details (don't inline).
    ~5-6 lines.

    **2. Consolidate EG-2 into Parameterized EG-10 (D-16):**

    In the Step 6 verification section, REPLACE the existing EG-2 (Verification Sufficient)
    block with parameterized EG-10:
    - Read workflow_lane from task definition
    - EG-10(unit-only): ≥2 passed, baseline + tdd-compliance
    - EG-10(unit-integration): ≥3 passed, + Tier 3
    - EG-10(full-tdd-e2e): ≥4 passed, + e2e-test-execution
    Reference sql-templates.md for exact queries.
    This should be ~same or fewer lines than EG-2 since it references the template.

    **3. Add EG-8 (TDD Compliance) and EG-9 (E2E Completion):**

    Add brief gate checks:
    - EG-8: check_name='tdd-compliance' passed=1 required for code tasks
    - EG-9: check_name='e2e-test-execution' passed=1 when e2e_required=true
    - EG-7 promotion: behavioral-coverage blocking for code tasks
    ~6 lines total.

    **4. Add E2E Concurrency Management (D-17):**

    In the dispatch section, add reference to e2e-integration.md and dispatch-patterns.md
    for E2E concurrency rules. Don't inline — just reference:
    "When dispatching E2E verifiers, enforce max_concurrent_instances from contract.
    See dispatch-patterns.md §E2E Concurrency and e2e-integration.md §1."
    ~2-3 lines.

    **5. Add reference to e2e-integration.md:**

    In the reference documents section (if exists) or Step 0, add:
    "Reference: e2e-integration.md for E2E coordination rules, contract schema, and safety rules."
    ~1 line.

    **LINE BUDGET ANALYSIS:**
    - Step 0 contract discovery: +6 lines
    - EG-2→EG-10 replacement: -5 lines (consolidation) +8 lines (parameterized) = +3 net
    - EG-8 + EG-9: +6 lines
    - EG-7 promotion: +1 line (change annotation)
    - Concurrency reference: +2 lines
    - e2e-integration.md reference: +1 line
    - Total: +19 lines, -5 from consolidation = +14 net → 528+14 = 542 ≤ 545 ✅

