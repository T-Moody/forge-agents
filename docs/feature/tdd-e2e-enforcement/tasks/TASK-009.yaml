      - Verify no 'playwright-cli' or 'playwright-cli -s=' text → expect absent
    green_phase: |
      Add the entire Tier 5 section after existing Tier 4 / before Evidence Gate Summary:
      1. Conditional gate preamble
      2. Phase 1 Setup with playwright-cli session creation (~35 lines)
      3. Phase 2 Suite Execution (~15 lines)
      4. Phase 3 Exploratory Interaction with playwright-cli commands (~45 lines)
      5. Phase 4 Adversarial Interaction with playwright-cli overrides (~30 lines)
      6. Phase 5 Teardown with playwright-cli close/close-all/kill-all (~30 lines)
      7. Evidence sanitization rules (~15 lines)
      8. Retry policy + timeout budget (~10 lines)
      9. Interaction log structure (~15 lines)
      Reference e2e-integration.md for detailed protocol — don't duplicate
    verify_phase: |
      - grep for 'Tier 5' section with all 5 phases
      - grep for 'playwright-cli -s=verify-{task-id}' session pattern
      - grep for playwright-cli commands: 'open', 'goto', 'click', 'fill', 'screenshot', 'snapshot'
      - grep for 'playwright-cli close', 'close-all', 'kill-all' in Phase 5
