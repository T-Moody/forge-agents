      test_method: "inspection"
    - id: "AC-22"
      text: "Phase 5 teardown closes Playwright CLI session (playwright-cli -s=verify-{task-id} close), shuts down app, uses close-all/kill-all as fallback, verifies playwright-cli list shows no active sessions, verifies all app PIDs terminated"
      test_method: "inspection"
    - id: "AC-28"
      text: "Evidence sanitization pipeline applied: sql_escape(), HAR stripping, response masking, 500-char output_snippet limit"
      test_method: "inspection"
    - id: "AC-32"
      text: "Evidence manifest (evidence-manifest.yaml) written at teardown listing all artifacts with SHA-256 hash"
      test_method: "inspection"
    - id: "AC-35"
