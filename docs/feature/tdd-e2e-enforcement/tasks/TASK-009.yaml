      test_method: "inspection"
    - id: "AC-36"
      text: "Retry policy: max 1 retry of entire Tier 5 on transient failure (including playwright-cli session crash). Assertion failures are non-retryable"
      test_method: "inspection"
    - id: "AC-T9-12"
