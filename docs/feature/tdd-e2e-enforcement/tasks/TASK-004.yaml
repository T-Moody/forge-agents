  description: |
    Create the new E2E coordination reference document (~500 lines). This is the foundational
    reference consumed by multiple agents. Must include a per-agent reading guide at the top.

    **CRITICAL SECURITY CONTENT:** This file contains command sanitization rules, command
    allowlist patterns, and evidence sanitization pipeline — errors here create injection
    vulnerabilities. Follow D-21, D-22, D-25 precisely.

    **Document Structure (per D-2):**

    **§0 Per-Agent Reading Guide:**
    - Orchestrator: read §1, §6
    - Verifier: read §2, §3, §4, §5
    - Planner: read §1 only
    - Adversarial Reviewer: read §4, §5
    This enables conditional loading — agents read only relevant sections.

    **§1 E2E Contract Specification:**
    - Contract file location: e2e-contract.yaml at project root OR .e2e/contract.yaml (D-3)
    - Trust levels: project-trusted (same trust as source code) vs pipeline-generated (D-3)
    - Complete contract field reference (matching schemas.md E2E contract schema)
    - Structured command format: {executable, args, env} — NOT raw shell (D-21)
    - Port allocation: port = port_range_start + task_ordinal_index (D-6)
    - Port validation: range [1024, 65535], privileged ports rejected at Step 0
    - DB isolation strategies: per-instance-db, transaction-rollback, shared-with-locking (D-17)
    - Contract validation: structural at Step 0, runtime at Tier 5 (D-23)
    - **Playwright CLI browser tool configuration (@playwright/cli):**
      - Installation: `npm install -g @playwright/cli@latest`
      - Skills installation: `playwright-cli install --skills` (installs agent-discoverable skill guides)
      - Per-project config: `.playwright/cli.config.json`
      - Session isolation: `-s=verify-{task-id}` (named sessions per verifier instance)
      - Token efficiency: CLI commands are purpose-built, avoid dumping page data into LLM context
      - Explicitly recommended by Microsoft for coding agents (over MCP)

    **§2 Skills Schema & Storage:**
    - Complete skills field reference (matching schemas.md E2E skills schema)
    - Skill types: test-suite, exploratory, adversarial — interaction modes
    - Step action reference: navigate, click, fill, submit, http_request, run_command, etc.
    - Assertion types: status_code, text_contains, element_visible, url_matches, etc.
    - Adversarial variations: step overrides, severity_if_missed, expected_behavior
    - Storage: inline in contract OR separate files in skill_discovery_path (D-4)
    - Organization: test-suite/, exploratory/, adversarial/ directories

    **§3 Playwright CLI Interaction Protocol (D-20, revised):**
    - **Primary browser interaction tool:** `@playwright/cli` (`playwright-cli` binary)
    - Installation: `npm install -g @playwright/cli@latest`
    - Skills installation: `playwright-cli install --skills` — installs skill guides into
      `skills/playwright-cli/` and `.claude/skills/dev/` (also read by GitHub Copilot)
    - Configuration: `.playwright/cli.config.json` per project
    - **Session isolation:** `playwright-cli -s=verify-{task-id} <command>` — named sessions per verifier
    - **CLI command reference for browser interaction:**
      - Open: `playwright-cli -s=<session> open [url]` — launch browser
      - Navigate: `playwright-cli -s=<session> goto <url>`
      - Click: `playwright-cli -s=<session> click <ref>` — click element by accessibility ref
      - Fill: `playwright-cli -s=<session> fill <ref> <text>` — fill form field
      - Type: `playwright-cli -s=<session> type <text>` — type text
      - Press: `playwright-cli -s=<session> press <key>` — press keyboard key
      - Check: `playwright-cli -s=<session> check <ref>` — check checkbox
      - Select: `playwright-cli -s=<session> select <ref> <value>` — select dropdown
      - Screenshot: `playwright-cli -s=<session> screenshot` — capture screenshot evidence
      - Snapshot: `playwright-cli -s=<session> snapshot` — capture accessibility snapshot
      - Console: `playwright-cli -s=<session> console [min-level]` — get console messages
      - Network: `playwright-cli -s=<session> network` — get network requests
      - Tracing: `playwright-cli -s=<session> tracing-start` / `tracing-stop` — record traces
      - Video: `playwright-cli -s=<session> video-start` / `video-stop` — record video
    - **Session management:**
      - List: `playwright-cli list` — show active sessions
      - Close: `playwright-cli -s=<session> close` — close specific session
      - Close all: `playwright-cli close-all` — close all sessions
      - Kill all: `playwright-cli kill-all` — force-kill all sessions
      - Show: `playwright-cli show` — visual dashboard for observing agents
    - **Skill step → CLI command mapping:**
      navigate→goto, click→click {ref}, fill→fill {ref} {text}, submit→click {ref},
      assert→snapshot + verify element presence, evidence→screenshot
    - **Fallback for complex test suites (retained from D-20):**
      skill YAML → generated .spec.ts → `npx playwright test <path> --reporter=json`
      (used for test-suite type skills requiring full Playwright Test runner)
    - Interaction determinism (D-18): follow steps exactly, no agent improvisation
    - Token efficiency: CLI commands avoid dumping page/accessibility data into LLM context
    - All commands executed via `run_in_terminal`, validated against command allowlist

    **§4 Command Sanitization Rules (D-21):**
    - Structured command format: executable matched against allowlist, args as array, env validated
    - Executable validation: no path separators, spaces, or shell metacharacters
    - Env value pattern: alphanumeric + common path chars, no shell metacharacters ;|&`$
    - {port} placeholder: validated as integer in [1024, 65535] before substitution
    - Secret pattern list for env scrubbing: API_KEY, SECRET, TOKEN, PASSWORD, CREDENTIAL

    **§5 Command Allowlist (canonical copy, D-22):**
    - tier5_command_allowlist regex patterns (8 patterns):
      ^playwright-cli .+, ^npx playwright test .+, ^npm (run|start|test), ^node .+,
      ^dotnet (run|test), ^python -m (pytest|uvicorn|flask), ^curl -s .+, ^(kill|taskkill)
    - `^playwright-cli .+` matches all Playwright CLI commands (open, goto, click, fill, screenshot, etc.)
    - Commands not matching → REJECTED with error in interaction_log
    - Audit trail: command_text, matched_pattern, timestamp, exit_code

    **§6 Evidence Sanitization Pipeline (D-25):**
    - SQL escaping: all strings use sql_escape() before INSERT (mandatory)
    - HAR stripping: Authorization, Cookie, Set-Cookie → [REDACTED]; body > 10KB → [TRUNCATED]
    - Response masking: screenshot paths validated (within .e2e/evidence/, no path traversal)
    - Console output cap: 5KB per step
    - start_env scrubbing: values matching secret patterns → [REDACTED]
    - Evidence manifest SHA-256 hash for integrity verification

    **§7 Reference Examples (FR-3.9):**
    - Browser login flow skill (exploratory) with 5 steps using playwright-cli commands
      (goto login page, fill username, fill password, click submit, screenshot result)
      and 3 adversarial variations
    - API CRUD probe skill (exploratory) with POST/GET/PUT/DELETE steps
    - CLI input testing skill with valid/invalid input scenarios
    - Adversarial SQL injection variation example
    - Playwright CLI session lifecycle example: open → goto → interact → screenshot → close

    **§8 E2E Timeout Budget (D-9):**
    - Total: 600s per task
    - Per-phase: startup 60s, suite 300s, exploratory 180s/skill, adversarial 120s/skill, shutdown 30s
    - Realistic budget example: 30s + 180s + 2×90s + 1×60s + 10s = 460s
    - Timeout triggers force-kill of app + playwright-cli sessions via tracked PIDs and `playwright-cli kill-all`

