  description: |
    Add E2E evidence INSERT templates and new evidence gate queries to sql-templates.md:

    1. **New INSERT templates for E2E check_names:**
       Add INSERT template examples for all new check_names:
       - check_name='tdd-compliance' — TDD verification result with output_snippet containing
         structural analysis results (tests_exist, imports_valid, red_phase_plausible)
       - check_name='tdd-fallback' — TDD skip record with reason in output_snippet
       - check_name='e2e-contract-found' — Contract discovery result
       - check_name='e2e-contract-validation' — Structural validation result
       - check_name='e2e-instance-start' — App startup with PID in output_snippet
       - check_name='e2e-readiness' — Health check result
       - check_name='e2e-suite-execution' — Test suite pass/fail
       - check_name='e2e-exploratory' — Exploratory interaction result per skill
       - check_name='e2e-adversarial' — Per-variation adversarial result (D-26):
         Each variation produces its own INSERT with variation_id in output_snippet.
         Variation names validated: alphanumeric + hyphens only, max 50 chars.
       - check_name='e2e-adversarial-composite' — Aggregate adversarial summary
       - check_name='e2e-instance-shutdown' — Graceful shutdown confirmation
       - check_name='e2e-test-execution' — Composite E2E result (passed=1 only when ALL sub-phases pass)
       All output_snippet values MUST use sql_escape() (D-25). Max 500 chars per output_snippet (FR-7.3).

    2. **Consolidate EG-2 into parameterized EG-10 (D-16):**
       Replace existing EG-2 (Verification Sufficient) with three EG-10 lane variants:
       - EG-10(unit-only): baseline_verified=1 AND tdd_compliance=1. Minimum 2 passed checks.
       - EG-10(unit-integration): baseline_verified=1 AND tdd_compliance=1 AND Tier 3 integration pass. Minimum 3 passed checks.
       - EG-10(full-tdd-e2e): baseline_verified=1 AND tdd_compliance=1 AND integration=1 AND e2e_completed=1. Minimum 4 passed checks including e2e-test-execution.
       Document the gate evaluation order: EG-1 → EG-10 → EG-7 → EG-8 → EG-9 → EG-3..EG-6.

    3. **Add EG-8 (TDD Compliance Gate):**
       Query: check_name='tdd-compliance' with passed=1 for the task. Blocking for code tasks.

    4. **Add EG-9 (E2E Completion Gate):**
       Query: check_name='e2e-test-execution' with passed=1 (composite). Cross-check sub-phases:
       suite_run_verified, exploratory_coverage_verified, adversarial_records_inserted.
       Required only when e2e_required=true.

    5. **Promote EG-7 from INFORMATIONAL to BLOCKING for code tasks:**
       Update EG-7 (Behavioral Coverage Evidence) header and query to indicate blocking status
       for tasks with task_type='code'. Document promotion rationale.

    6. **Add composite index recommendation:**
       Document recommended index: CREATE INDEX idx_anvil_checks_lookup ON
       anvil_checks(run_id, task_id, check_name, passed) — per architecture-guardian A-6.

