  description: |
    Expand the verifier's tool access in tool-access-matrix.md to support Tier 5 E2E
    verification while maintaining security boundaries.

    **1. Expand §8 Verifier tool access:**

    Add Tier 5 tool access scope to the existing §8 Verifier section. Document that:
    - run_in_terminal is expanded for Tier 5 ONLY when e2e_required=true
    - Commands MUST match the tier5_command_allowlist regex patterns
    - Commands not matching any pattern are REJECTED (logged in interaction_log)
    - Phase gating: Tier 5 commands allowed only during E2E verification phases

    **2. Add tier5_command_allowlist (D-22):**

    Add the regex command allowlist patterns (reference e2e-integration.md §5 as canonical):
    | Pattern | Purpose |
    |---------|---------|
    | `^npx playwright test .+` | Execute generated E2E test scripts |
    | `^playwright-cli .+` | Playwright CLI browser interaction (open, goto, click, fill, screenshot, snapshot, close, etc.) |
    | `^npm (run\|start\|test)` | Application lifecycle management |
    | `^node .+` | Direct Node.js script execution |
    | `^dotnet (run\|test)` | .NET application lifecycle |
    | `^python -m (pytest\|uvicorn\|flask)` | Python application lifecycle |
    | `^curl -s .+` | Health check HTTP requests |
    | `^(kill\|taskkill)` | Process cleanup during teardown |

    Note: This follows the Knowledge Agent §10 precedent for command-restricted tool access.

    **3. Add audit trail requirement:**

    Document that every Tier 5 run_in_terminal execution must be logged:
    - command_text, matched_pattern (or 'REJECTED'), timestamp, exit_code
    - This provides a complete audit trail for adversarial review

    **4. Add Playwright CLI session management commands:**

    Document the session management patterns for the verifier:
    - Session creation: `playwright-cli -s=verify-{task-id} open {base_url}`
    - Session interaction: `playwright-cli -s=verify-{task-id} <command>` (goto, click, fill, screenshot, etc.)
    - Session cleanup: `playwright-cli -s=verify-{task-id} close`
    - Emergency cleanup: `playwright-cli close-all` or `playwright-cli kill-all`
    - Session listing: `playwright-cli list` (for audit/debugging)
    - All session commands match the `^playwright-cli .+` allowlist pattern

  acceptance_criteria:
