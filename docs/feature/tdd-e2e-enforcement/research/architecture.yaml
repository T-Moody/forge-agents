      - id: "F-11"
        title: "SQL Evidence Infrastructure — Well-Designed but Missing E2E Tables"
        category: "structure"
        detail: |
          The current verification-ledger.db has 4 tables:
          1. anvil_checks — verification evidence (writers: Orchestrator, Implementer, Verifier, Adversarial Reviewer)
             Columns: id, run_id, task_id, phase (baseline/after/review), check_name, tool, command, exit_code, output_snippet (≤500 chars), passed (0/1), verdict, severity, round, instance, ts
          2. pipeline_telemetry — execution tracking (writer: Orchestrator)
             Columns: id, run_id, step, agent, instance, started_at, completed_at, status, dispatch_count, retry_count, notes, ts
          3. artifact_evaluations — quality feedback (writers: Implementer, Verifier, Adversarial Reviewer)
          4. instruction_updates — governed update tracking (writer: Knowledge Agent)

          The anvil_checks table already supports a rich set of check_names including ide-diagnostics, syntax-check, build, type-check, lint, tests, behavioral-coverage, runtime-wiring, import-check, smoke-execution, readiness-*, review-*-security/architecture/correctness. But there are NO E2E-specific check_names.

          Evidence gates (EG-1 through EG-6) use SQL queries filtered by run_id, task_id, and round:
          - EG-1: Baseline exists (≥1 baseline record)
          - EG-2: Verification sufficient (≥2 Standard, ≥3 Large)
          - EG-3: All reviewers submitted (3 distinct instances)
          - EG-4: Zero blockers
          - EG-5: Category coverage (3 rows per reviewer)
          - EG-6: Majority approval (≥2 of 3)

          GAPS: No e2e-test, e2e-contract-validation, e2e-startup, e2e-shutdown check_names.
          No E2E-specific evidence gate (e.g., EG-7 for E2E pass requirement on High-risk tasks).
        evidence:
          - "NewAgents/.github/agents/sql-templates.md — §1 Database Initialization DDL"
          - "NewAgents/.github/agents/verifier.agent.md — check_name Quick Reference table"
          - "NewAgents/.github/agents/orchestrator.agent.md — Evidence Gate Logic section"
        relevance: "E2E enforcement requires new check_names in anvil_checks (e2e-contract-valid, e2e-startup, e2e-test, e2e-shutdown) and a new evidence gate (EG-7 or equivalent) requiring E2E passage for high-risk tasks."

      - id: "F-12"
        title: "Industry Patterns — Evaluator-Optimizer and Orchestrator-Workers Align with Current Architecture"
        category: "pattern"
        detail: |
          Anthropic's 'Building Effective Agents' guide (Dec 2024) identifies 5 workflow patterns:
          1. Prompt Chaining — sequential steps with gates (≈ Steps 2→3→4 in current pipeline)
          2. Routing — classify and route to specialized tasks (≈ risk-based workflow lanes needed)
          3. Parallelization — sectioning or voting (≈ existing researcher ×4, reviewer ×3)
          4. Orchestrator-Workers — dynamic task decomposition and delegation (≈ existing pipeline)
          5. Evaluator-Optimizer — one generates, another evaluates in a loop (≈ implementer-verifier loop)

          Key insights for TDD/E2E enforcement:
          - 'Code solutions are verifiable through automated tests; Agents can iterate on solutions
            using test results as feedback' — validates the TDD-first approach
          - 'Extensive testing in sandboxed environments, along with appropriate guardrails' — supports
            E2E isolation requirements
          - AutoGen parallel tool calls must be disabled for stateful agents to avoid concurrency issues —
            validates the parallel safety constraints
          - CrewAI uses iteration-based testing with performance metrics per agent — aligns with
            pipeline telemetry and evaluation scoring

          The existing system already implements most of these patterns. The main gap is that
          testing (TDD and E2E) is not treated as a GATE or ENFORCEMENT MECHANISM — it's advisory
          and self-reported rather than independently verified and mandatory.
        evidence:
          - "https://www.anthropic.com/engineering/building-effective-agents — Anthropic, Dec 2024"
          - "https://docs.crewai.com/concepts/testing — CrewAI testing framework"
          - "https://microsoft.github.io/autogen/stable/ — AutoGen parallel tool call constraints"
        relevance: "The current architecture already follows industry best practices for multi-agent workflows. The key enhancement is making testing an enforcement mechanism rather than an advisory process. The evaluator-optimizer pattern should be strengthened with mandatory test passage as a gate condition."

      - id: "F-13"
        title: "Orchestrator Tool Restrictions Limit E2E Management Capability"
        category: "risk"
        detail: |
          The orchestrator has strict tool restrictions (tool-access-matrix.md §2):
          - 7 tools allowed: runSubagent, read_file, list_dir, run_in_terminal (🔒), get_terminal_output, memory, ask_questions
          - run_in_terminal is ONLY for SQLite queries, telemetry INSERT, git operations
          - MUST NOT use for builds, tests, code execution, or file modification
          - Cannot use: create_file, replace_string_in_file, grep_search, semantic_search, file_search, get_errors

          This means the orchestrator CANNOT directly:
          - Start or stop application instances for E2E testing
          - Execute E2E tests
          - Validate E2E contracts
          - Manage ports or containers

          E2E management must be delegated to subagents (verifier or a new E2E agent).
          The orchestrator can only coordinate via dispatch and SQL evidence gate checks.
        evidence:
          - "NewAgents/.github/agents/tool-access-matrix.md — §2 Orchestrator"
          - "NewAgents/.github/agents/orchestrator.agent.md — Tool Access section"
        relevance: "E2E lifecycle management (start app, run tests, stop app) must be delegated to the verifier or a new dedicated agent. The orchestrator's role is limited to dispatching and checking SQL evidence gates for E2E passage."

      - id: "F-14"
        title: "Implementer-Verifier Separation Already Enforces TDD Responsibility Boundary"
        category: "pattern"
        detail: |
          The current architecture enforces a clean separation between implementation and verification:
          - Implementer: Read-WRITE access. Captures baseline, writes tests (TDD), writes code, self-fixes, stages with git. Reports tdd_red_green and behavioral_coverage data. DOES NOT run live E2E tests.
          - Verifier: Read-ONLY for source code. Executes builds, tests, linters via run_in_terminal. Cannot modify source files. Records all checks as SQL INSERTs. HAS runtime smoke test capability (bugfix only).

          This separation aligns perfectly with the initial request's requirement:
          'Implementers write unit + integration tests (TDD). DO NOT run live E2E tests.'
          'Verifiers spin up isolated app instances. Execute E2E tests. Attempt adversarial workflows.'

          The initial request's live app testing architecture maps cleanly:
          - Implementer scope: unit + integration tests (TDD) — ALREADY in place
          - Verifier scope: E2E tests, live app testing — NEEDS to be added
          - Never allow both to run live app instances — ALREADY enforced by tool restrictions

          The existing boundary is architecturally correct for the TDD/E2E split.
        evidence:
          - "NewAgents/.github/agents/implementer.agent.md — Role & Purpose, Tool Access"
          - "NewAgents/.github/agents/verifier.agent.md — Role & Purpose ('read-only for source code')"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md — Section 3 (Live App Testing Architecture)"
        relevance: "The implementer-verifier boundary is the right architecture for TDD/E2E separation. E2E testing should be added to the verifier (or a new agent dispatched by the verifier/orchestrator), not to the implementer."

      - id: "F-15"
        title: "Schema System Is the Key Integration Point"
        category: "structure"
        detail: |
          schemas.md (1220 lines) is the single source of truth for all typed YAML schemas. It defines
          12 schemas covering all agent inputs/outputs. The Producer/Consumer Dependency Table maps
          which agents produce and consume each schema.

          Adding TDD/E2E enforcement requires schema changes at multiple levels:
          1. Schema 6 (task-schema): Add required_test_types field (unit/integration/e2e), workflow_lane
          2. Schema 7 (implementation-report): Strengthen tdd_red_green to be MANDATORY (not just for code tasks), add e2e_awareness field
          3. Schema 8 (verification-report): Add e2e_results section with app_startup, test_execution, app_shutdown evidence
