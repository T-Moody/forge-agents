      - id: "F-3"
        title: "Current TDD Implementation in Implementer — Existing but Incomplete"
        category: "pattern"
        detail: |
          The implementer already has TDD steps in its workflow (implementer.agent.md Steps 4-6):
          Step 4: Write Failing Tests — write tests that verify acceptance criteria, confirm they FAIL before
          writing production code, record tdd_red_green data.
          Step 5: Write Production Code — minimal code to pass tests (YAGNI).
          Step 6: Self-Fix Loop — max 2 attempts, then proceed with failures documented.

          TDD Structural Rules already exist:
          - Test files MUST import production modules
          - Assertions MUST reference values from production code
          - Each test MUST trace to at least one AC with test_method='test'
          - Tests that pass before production code must be rewritten

          CRITICAL GAPS:
          1. TDD Fallback allows skipping TDD entirely when no test framework exists, or for doc/config tasks
          2. No enforcement mechanism beyond self-attestation — the implementer reports tdd_red_green data
             but nothing independently verifies the tests actually failed first
          3. No E2E tests — only unit/integration tests are in scope
          4. behavioral_coverage mapping is self-reported by implementer, cross-checked by verifier only
             at the file-existence level (verifier checks test file exists, not that it meaningfully tests)
          5. The adversarial reviewer checks for suspicious TDD patterns (initial_run_failures=0) but this
             is after-the-fact review, not enforcement
        evidence:
          - "NewAgents/.github/agents/implementer.agent.md — Steps 4-6 (lines ~120-200)"
          - "NewAgents/.github/agents/implementer.agent.md — TDD Fallback section (lines ~340-380)"
          - "NewAgents/.github/agents/implementer.agent.md — TDD Structural Rules (lines ~140-155)"
          - "NewAgents/.github/agents/adversarial-reviewer.agent.md — Suspicious TDD patterns detection"
        relevance: "TDD enforcement requires: (1) making TDD Fallback stricter with clear gates, (2) adding independent TDD verification in the verifier cascade, (3) extending tdd_red_green schema to capture more evidence, (4) adding E2E test execution capability."

      - id: "F-4"
        title: "Current Verification Cascade — 4-Tier with No E2E Tier"
        category: "structure"
        detail: |
          The verifier executes a 4-tier cascade per task (verifier.agent.md):
          Tier 1 (Always): IDE diagnostics (get_errors), syntax/parse check
          Tier 2 (If Tooling Exists): Build, type-check, lint, tests, behavioral coverage, runtime wiring
          Tier 3 (If No Runtime Evidence): Import/load test, smoke execution, or infeasible documentation
          Tier 4 (Large Tasks Only): Observability, degradation, secrets scan

          Special: Runtime Smoke Test (Step 4.5) — MANDATORY for bugfix tasks only — starts the app,
          exercises the bug scenario, verifies fix. This is the closest the system gets to E2E testing.

          The verifier is READ-ONLY for source code. It can execute builds, tests, linters via
          run_in_terminal but MUST NOT modify source files. Output: verification-reports/<task-id>.yaml +
          SQL INSERTs into anvil_checks.

          Minimum signals: 2 checks for Standard tasks, 3 for Large tasks.

          CRITICAL GAPS for E2E:
          1. No E2E tier in the cascade — the 4 tiers focus on static analysis and unit testing
          2. Runtime smoke test is bugfix-only, not generalized for all features
          3. No app lifecycle management (start, wait for ready, test, shutdown)
          4. No E2E contract consumption mechanism
          5. No port isolation or parallel safety for multiple verifiers testing live apps
          6. The verifier has no mechanism to coordinate with other verifiers on shared resources
        evidence:
          - "NewAgents/.github/agents/verifier.agent.md — 4-tier cascade (lines ~100-200)"
          - "NewAgents/.github/agents/verifier.agent.md — Runtime Smoke Test (lines ~200-225)"
          - "NewAgents/.github/agents/verifier.agent.md — Minimum Signal Requirements"
        relevance: "Adding E2E to the verification cascade requires: a new E2E tier (or extending the runtime smoke test), E2E contract consumption, app lifecycle management, parallel test isolation, and updated minimum signal requirements for risk-based lanes."

      - id: "F-5"
        title: "E2E Testing Infrastructure — Completely Absent"
        category: "risk"
        detail: |
          The current system has NO E2E testing infrastructure whatsoever:
          - No E2E contract schema (the initial-request.md proposes one with app_type, start_command,
            ready_check, base_url, e2e_runner, e2e_command, etc.)
          - No app startup/shutdown management across the pipeline
          - No browser automation integration (Playwright or otherwise)
          - No port isolation or container-based isolation for parallel E2E execution
          - No mechanism for agents to detect what type of application is being built
          - No E2E test execution framework detection
          - The only runtime interaction is the bugfix-specific smoke test in the verifier

          The initial request specifies a rich E2E contract with:
          - app_type, start_command, ready_check, base_url
          - e2e_runner, e2e_command, supports_parallel, requires_isolated_instance
          - Interactive mode: set up reusable skills stored in the contract
          - Automatic mode: may skip E2E setup
          - Dynamic and framework-agnostic design

          This is marked as a fundamental architectural gap requiring new schemas, new agent
          capabilities, and possibly a new agent role.
        evidence:
          - "docs/feature/tdd-e2e-enforcement/initial-request.md — Section 2 (E2E Testing as First-Class Citizen)"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md — Section 3 (Live App Testing Architecture)"
          - "Absence of any E2E-related schema in NewAgents/.github/agents/schemas.md"
          - "Absence of any E2E-related SQL tables in NewAgents/.github/agents/sql-templates.md"
        relevance: "E2E infrastructure must be designed from scratch. All agent files need updates to E2E-aware behavior. New schemas and SQL tables are required. The E2E contract must be dynamic, discoverable, and framework-agnostic."

      - id: "F-6"
        title: "Risk Classification Exists but No Workflow Lanes"
        category: "risk"
        detail: |
          The current system has per-file risk classification (planner.agent.md):
          - 🟢 Additive: new tests, docs, config, comments
          - 🟡 Business Logic: modifying existing logic, function signatures, DB queries
          - 🔴 Critical: auth/crypto/payments, data deletion, migrations, public API

          Per-task escalation: any 🔴 file → task is Large. overall_risk_summary is the highest
          risk across all tasks. Risk drives verification depth (Standard=2 checks min, Large=3 checks min)
          and Tier 4 enablement.

          GAPS for workflow lanes:
          1. No Low/Medium/High workflow lanes as specified in the initial request
          2. Risk classification drives VERIFICATION DEPTH but not TESTING TYPE selection
          3. The orchestrator does not route to different test strategies based on risk
          4. No mapping: Low Risk → unit tests only, Medium → unit + integration,
             High → full TDD + E2E verification
          5. The planner classifies risk but doesn't output lane assignments
          6. No E2E requirement flag per task based on risk level
        evidence:
          - "NewAgents/.github/agents/planner.agent.md — Risk Classification System section"
          - "NewAgents/.github/agents/orchestrator.agent.md — Step 6 evidence gates (EG-1, EG-2)"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md — Section 5 (Risk-Based Workflow Lanes)"
        relevance: "Workflow lanes require: (1) extending risk classification to include lane assignment, (2) updating the planner to output required test types per task, (3) updating the orchestrator to enforce lane-appropriate verification, (4) updating the verifier to check lane compliance."

      - id: "F-7"
        title: "Parallel Agent Safety — Database Only, No Resource Isolation"
        category: "risk"
        detail: |
          Current parallel safety mechanisms:
          - SQLite WAL mode + busy_timeout=5000 for database concurrency (global-operating-rules.md §3)
          - SQLITE_BUSY retry: 3 attempts with exponential backoff (1s, 2s, 4s)
          - Concurrency cap: max 4 agents per wave (dispatch-patterns.md)
          - Sub-wave partitioning for >4 tasks
          - Per-task dispatch for verifiers (1 verifier per task)

          GAPS for parallel E2E safety:
          1. No instance isolation — no unique ports, containers, or process namespaces
          2. No file locks on shared artifacts beyond SQLite WAL
          3. No max concurrent E2E limit separate from the general concurrency cap
          4. No resource throttling mechanism
          5. No deterministic test seeds
          6. No timeout mechanism on external calls (only bounded feedback loops)
          7. No queuing system for E2E test execution
          8. No mechanism to prevent two verifiers from starting the same app on the same port
          9. The verifier's runtime smoke test has no port allocation strategy

          The initial request specifies:
          - Instance isolation (unique ports or containers)
          - File locks on shared artifacts
          - Max concurrent E2E limit
          - Resource throttling
          - Deterministic test seeds
          - Timeouts on all external calls
          - Queue or spawn isolated instances for multiple verifiers
        evidence:
          - "NewAgents/.github/agents/global-operating-rules.md — §3 SQLITE_BUSY Handling"
          - "NewAgents/.github/agents/dispatch-patterns.md — Concurrency Rules section"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md — Section 4 (Parallel Agent Safety)"
        relevance: "Parallel E2E safety requires new infrastructure: port allocation/management, process isolation, E2E concurrency limits, and coordination between parallel verifiers. This is a cross-cutting concern affecting dispatch-patterns.md, verifier.agent.md, and orchestrator.agent.md."

      - id: "F-8"
        title: "Context Governance — Partially Implemented via relevant_context"
        category: "pattern"
        detail: |
          Current context governance:
          - relevant_context pointers in task definitions (planner.agent.md) direct implementers to read
            only specific design_sections, spec_requirements, and files_to_modify
          - Tool-access matrix restricts tools per agent (14 tools × 9 agents)
          - Read-only access for verifiers, researchers, adversarial-reviewers
          - Scoped create_file restrictions (e.g., researcher can only create research/*.yaml)
          - Implementer reads ONLY what relevant_context specifies

          GAPS:
          1. No max-lines-per-read enforcement — the ~200 lines per call guidance is advisory only
          2. No structured summarization or context compaction mechanisms
          3. No measurement of context window usage per agent
          4. No enforcement that agents actually follow relevant_context bounds (honor system)
          5. No mechanism to detect or prevent context overflow
        evidence:
          - "NewAgents/.github/agents/planner.agent.md — Relevant Context Mechanism section"
          - "NewAgents/.github/agents/tool-access-matrix.md — Full matrix"
          - "NewAgents/.github/agents/implementer.agent.md — Relevant Context Consumption section"
        relevance: "The initial request requires bounded context windows, max lines per read, structured summarization, and context compaction. This cross-cuts all agents and may require new enforcement rules in global-operating-rules.md."

      - id: "F-9"
        title: "Agent Dependency Graph and Data Flow"
        category: "structure"
        detail: |
          Complete data flow through the pipeline:

          Step 0: Orchestrator creates initial-request.md, initializes SQLite, generates run_id
          Step 1: 4× Researcher → research/{architecture,impact,dependencies,patterns}.yaml
          Step 2: Spec ← research/*.yaml + initial-request.md → spec-output.yaml + feature.md
          Step 3: Designer ← spec-output.yaml + research/*.yaml → design-output.yaml + design.md
          Step 3b: 3× Adversarial-Reviewer ← design artifacts → review-findings/design-*.md + review-verdicts/design-*.yaml + 9 SQL INSERTs
          Step 4: Planner ← design-output.yaml + spec-output.yaml → plan-output.yaml + plan.md + tasks/*.yaml
          Step 5: ≤4× Implementer ← tasks/<task-id>.yaml → code/tests + implementation-reports/<task-id>.yaml + SQL INSERTs
          Step 6: ≤4× Verifier ← implementation-reports/ → verification-reports/<task-id>.yaml + SQL INSERTs
          Step 7: 3× Adversarial-Reviewer ← staged code → review-findings/code-*.md + review-verdicts/code-*.yaml + 9 SQL INSERTs
          Step 8: Knowledge-Agent ← all outputs → knowledge-output.yaml + decisions.yaml + evidence-bundle.md + post-mortems/ + agent-metrics/ + store_memory calls
          Step 9: Orchestrator → git add -A && git commit

          Cross-cutting: verification-ledger.db has 4 tables: anvil_checks, pipeline_telemetry, artifact_evaluations, instruction_updates.

          Feedback loops:
          - Design review → Designer revision (max 1 iteration)
          - Implementation → Verification → Planner replan (max 3 iterations, Pattern B)
          - Code review → Implementer fix (max 2 rounds)
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md — full pipeline steps"
          - "NewAgents/.github/agents/schemas.md — Producer/Consumer Dependency Table"
          - "NewAgents/.github/agents/dispatch-patterns.md — Pattern B replan loop"
        relevance: "E2E testing must plug into this data flow at specific points. The E2E contract needs to be available by Step 4 (planning) so the planner can assign E2E tasks. E2E execution happens at Step 6 (verification). E2E evidence needs to flow into the evidence bundle at Step 8."

