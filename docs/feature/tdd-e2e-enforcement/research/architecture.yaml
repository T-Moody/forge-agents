      - id: "F-1"
        title: "10-Step Deterministic Pipeline Architecture"
        category: "structure"
        detail: |
          The agent system operates as a deterministic 10-step pipeline (Steps 0-9) orchestrated by a single
          Orchestrator agent that dispatches 8 other agent types via runSubagent calls. The pipeline steps are:
          Step 0 (Setup/Init), Step 1 (Research ×4 parallel), Step 1a (Approval Gate), Step 2 (Spec),
          Step 3 (Design), Step 3b (Design Review ×3 parallel), Step 4 (Planning), Step 4a (Approval Gate),
          Steps 5-6 (Implementation-Verification Loop, max 3 iterations), Step 6a (Runtime Smoke Test for bugfixes),
          Step 7 (Code Review ×3 parallel), Step 8 (Knowledge Capture), Step 8b (Evidence Bundle), Step 9 (Auto-Commit).
          The orchestrator maintains state in-context only (no files), uses typed YAML completion contracts for
          routing decisions, and SQL evidence gates on verification-ledger.db for approval decisions.
          Maximum 4 concurrent agents per wave (dispatch-patterns.md concurrency cap).
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md — 528 lines, full pipeline definition"
          - "NewAgents/.github/agents/dispatch-patterns.md — Pattern A (parallel), Pattern B (sequential with replan loop)"
        relevance: "TDD/E2E enforcement must integrate at specific pipeline steps without disrupting the existing dispatch flow. The implementation-verification loop (Steps 5-6) is the primary insertion point for mandatory TDD. E2E testing needs a new step or extension to the verification cascade."

