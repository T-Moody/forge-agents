    summary: |
      The agent system at NewAgents/.github/agents/ is a well-architected 10-step deterministic pipeline
      with 9 agent types, typed YAML schemas, SQL-based evidence gating, and parallel dispatch capabilities.
      The system already has TDD built into the implementer (write failing tests → minimal code → self-fix),
      a 4-tier verification cascade in the verifier, and clean implementer-verifier separation.

      However, critical gaps exist for the TDD/E2E enforcement feature:
      1. TDD is advisory, not enforced — the TDD Fallback allows skipping, and compliance is self-attested
      2. E2E testing infrastructure is completely absent — no contract schema, no app lifecycle management,
         no browser automation, no port isolation
      3. Risk-based workflow lanes do not exist — risk classification drives verification depth but not
         test type selection
      4. Parallel E2E safety is absent — only SQLite WAL mode provides concurrency protection
      5. Context governance is advisory — no enforcement of read limits or context compaction

      The modification surface is broad: nearly all 18 files need some level of change, with the
      heaviest modifications needed in implementer.agent.md, verifier.agent.md, orchestrator.agent.md,
      schemas.md, and sql-templates.md. The existing implementer-verifier boundary is architecturally
      correct for TDD/E2E separation (implementer = unit/integration TDD, verifier = E2E).

      Industry patterns (Anthropic, CrewAI, AutoGen) confirm the architecture is sound; the key
      enhancement is elevating testing from advisory process to mandatory enforcement mechanism.

