  payload:
    focus: "patterns"
    findings:
      - id: "F-1"
        title: "Existing TDD pattern in implementer uses baseline-capture → red → green → self-fix → report pipeline"
        category: "pattern"
        detail: |
          The implementer agent already enforces a structured TDD workflow:
          1. Baseline Capture: Records IDE diagnostics, build status, and test results before any changes via SQL INSERTs (check_name: baseline-ide-diagnostics, baseline-build, baseline-tests).
          2. Write Failing Tests (Red): Creates test files first, runs them, confirms failure.
          3. Write Production Code (Green): Implements minimal code to pass tests.
          4. Self-Fix Loop: Max 2 attempts to fix remaining errors. If still failing after 2 attempts, returns what it has.
          5. Git Stage + Report: Stages changes and produces implementation-reports/<task-id>.yaml.
          The report includes behavioral_coverage mapping (requirement_id → test function) and tdd_red_green boolean.
          A TDD Fallback exists for docs/config tasks (task_type != 'code') that skips test writing.
          The implementer is scoped to exactly one task per dispatch (single-task scope).
        evidence:
          - "NewAgents/.github/agents/implementer.agent.md (lines 17-19): TDD role description, baseline capture, self-fix loop max 2"
          - "NewAgents/.github/agents/implementer.agent.md (lines 71-106): baseline records schema, behavioral_coverage mapping"
          - "NewAgents/.github/agents/implementer.agent.md (line 85): self_fix_attempts: <0-2>"
        relevance: "This is the foundation to extend. The TDD workflow is already structured but needs enforcement mechanisms (mandatory test failure verification, red-green gate evidence in SQL). E2E testing is not part of the current implementer scope."

      - id: "F-2"
        title: "Verifier uses a 4-tier cascade with SQL-recorded evidence gates"
        category: "pattern"
        detail: |
          The verifier agent runs a 4-tier verification cascade per task:
          - Tier 1 (Always Run): IDE diagnostics via get_errors, syntax validation.
          - Tier 2 (Run If Tooling Exists): Build, typecheck, lint, unit tests, behavioral coverage verification, runtime wiring. All Tier 2 checks MUST use run_in_terminal with standard CLI commands — never VS Code Testing API.
          - Tier 3 (Import/Smoke): Import/load verification, smoke execution for testable modules.
          - Tier 4 (Large Tasks Only): Operational readiness checks.
          Every check is recorded as a SQL INSERT into anvil_checks. The mantra is: "If the INSERT didn't happen, the verification didn't happen."
          The verifier has a mandatory runtime smoke test (Section 4.5) for bugfix tasks: start app → exercise bug scenario → verify success → shut down.
          Minimum verification signals: 2 for Standard tasks, 3 for Large tasks.
          The verifier reads source code in read-only mode and cross-checks against baselines via git show.
        evidence:
          - "NewAgents/.github/agents/verifier.agent.md (lines 3, 17): 4-tier cascade description"
          - "NewAgents/.github/agents/verifier.agent.md (lines 103-124): SQL INSERT mandate, check_name table (Tier 1-4)"
          - "NewAgents/.github/agents/verifier.agent.md (lines 155-190): Tier-by-tier detailed workflow"
          - "NewAgents/.github/agents/verifier.agent.md (line 178): Terminal-only testing mandate for Tier 2"
        relevance: "E2E testing must be added as a new tier or check within this cascade. The existing runtime smoke test for bugfixes provides a template for live app testing. The SQL evidence pattern must be extended for E2E checks."

      - id: "F-3"
        title: "SQL evidence ledger pattern provides auditable, queryable verification records"
        category: "pattern"
        detail: |
          The pipeline uses a centralized SQLite database (verification-ledger.db) in WAL mode with busy_timeout=5000.
          Tables include: anvil_checks, pipeline_telemetry, artifact_evaluations, instruction_updates.
          Every verification step produces a SQL INSERT. Evidence gates (EG-1 through EG-6) use COUNT/SELECT queries against anvil_checks to determine pass/fail.
          Key evidence gates:
          - EG-1: Baseline existence (check_name LIKE 'baseline-%')
          - EG-2: Verification sufficiency (min signals per task)
          - EG-3: Reviewer submission
          - EG-4: Zero blockers (no verdict='blocker')
          - EG-5: Category coverage
          - EG-6: Majority approval
          SQL Safety: All free-text values must have single quotes escaped (replace ' with ''). Stdin piping used for injection prevention.
          SQLITE_BUSY handling: WAL mode + busy_timeout + 3 retries with exponential backoff.
        evidence:
          - "NewAgents/.github/agents/global-operating-rules.md §3: SQLITE_BUSY handling with WAL mode"
          - "NewAgents/.github/agents/orchestrator.agent.md: Evidence gate logic EG-1 through EG-6"
          - ".github/copilot-instructions.md: SQL safety rules, stdin piping for injection prevention"
        relevance: "E2E test results must be recorded in this same ledger. New check_names like 'e2e-contract-validation', 'e2e-instance-startup', 'e2e-test-execution', 'e2e-shutdown' should follow the existing convention. New evidence gates may be needed for E2E pass/fail."

      - id: "F-4"
        title: "Dispatch patterns support parallel (≤4) and sequential-with-replan execution"
        category: "pattern"
        detail: |
          Two dispatch patterns exist:
          - Pattern A (Fully Parallel): Up to 4 concurrent subagents. Used for research (4 parallel researchers), design review (3 parallel reviewers), code review (3 parallel reviewers).
          - Pattern B (Sequential with Replan Loop): Implementation → Verification → Replan cycle. Max 3 iterations for impl+verify. Used for Step 6 (implementation + verification).
          Sub-wave partitioning handles >4 tasks by splitting into waves of ≤4.
          Phase 2 enhancement path exists for model diversity layered on prompt diversity.
          Concurrency cap is strictly 4 agents per wave.
        evidence:
          - "NewAgents/.github/agents/dispatch-patterns.md: Pattern A (parallel ≤4), Pattern B (sequential with replan loop, max 3 iterations)"
          - "NewAgents/.github/agents/dispatch-patterns.md: Sub-wave partitioning for >4 tasks"
        relevance: "E2E testing with live app instances introduces resource contention that the current dispatch patterns don't account for. Pattern B's sequential model is better suited for E2E (one instance at a time), while Pattern A needs resource isolation mechanisms (ports, containers) for parallel E2E."

      - id: "F-5"
        title: "Risk classification system uses 3-tier model but lacks automated lane selection"
        category: "pattern"
        detail: |
          The existing system uses a 3-tier risk classification:
          - 🟢 Low Risk: Standard tasks with minimal verification (2 signals).
          - 🟡 Medium Risk: Implicit in task sizing but not formally classified.
          - 🔴 High Risk: Large tasks requiring 3+ verification signals and Tier 4 checks.
          The initial request defines explicit risk lanes:
          - Low: Config/docs/non-runtime → unit tests only
          - Medium: Business logic → unit + integration
          - High: UI flow/API contract/state/security → full TDD + E2E
          Currently, risk classification is done by the planner during task decomposition (Standard vs Large sizing) but there is no formal workflow lane selection mechanism that maps risk to testing requirements. The orchestrator enforces evidence gates but does not route tasks to different testing workflows based on risk.
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md: Risk classification via task sizing (Standard/Large)"
          - "NewAgents/.github/agents/verifier.agent.md: Min signals 2 (Standard), 3 (Large)"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §5: Risk-Based Workflow Lanes definition"
        relevance: "A formal risk classification enum must be added to the task schema. The orchestrator needs a risk→lane mapping rule that determines which verification tiers and E2E requirements apply. This is a new pattern to introduce."

      - id: "F-6"
        title: "Playwright CLI+SKILLS is the recommended E2E tool for coding agents over Playwright MCP"
        category: "pattern"
        detail: |
          Microsoft provides two Playwright integration approaches:
          1. Playwright CLI (github.com/microsoft/playwright-cli, v0.1.1, 4.7k stars): CLI-based interface with SKILLS. Preferred for coding agents because CLI invocations are more token-efficient — they avoid loading large tool schemas and verbose accessibility trees into model context. Commands include: open, goto, click, fill, type, snapshot, screenshot, eval, console, network, tracing-start/stop, video-start/stop. Supports sessions (named browser instances), persistent profiles, headed/headless mode.
          2. Playwright MCP (github.com/microsoft/playwright-mcp, v0.0.68, 28.1k stars): MCP server for browser automation. Better for exploratory automation, self-healing tests, and long-running autonomous workflows where maintaining continuous browser context outweighs token cost.
          Key CLI+SKILLS features for agent E2E testing:
          - Session management: Named sessions with -s=name flag, PLAYWRIGHT_CLI_SESSION env var
          - Network mocking: route command for intercepting/mocking requests
          - State persistence: state-save/state-load for cookies and localStorage
          - Tracing and video: tracing-start/stop and video-start/stop for evidence capture
          - Monitoring dashboard: playwright-cli show for visual oversight of running sessions
          - Snapshot-based element references: Elements referenced by stable ref IDs from accessibility tree
        evidence:
          - "github.com/microsoft/playwright-cli README: CLI vs MCP comparison, session management, commands"
          - "github.com/microsoft/playwright-mcp README: MCP server for browser automation, --isolated mode, --save-trace"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §2: Dynamic E2E Contract, Playwright CLI recommendation"
        relevance: "Playwright CLI+SKILLS should be the default E2E runner for web apps. The E2E contract should specify e2e_runner: playwright-cli. Session management enables isolated browser instances per verifier. Tracing/video capture integrates with the test replay log requirement."

      - id: "F-7"
        title: "AWS Generative AI Toolkit provides comprehensive agent testing patterns with traces, cases, and assertions"
        category: "pattern"
        detail: |
          The AWS Generative AI Toolkit (github.com/awslabs/generative-ai-toolkit, v0.23.0, 44 stars) implements several testing patterns directly relevant to multi-agent systems:
          1. Trace-Based Testing: Every agent action (LLM invocations, tool invocations, memory access) produces OpenTelemetry-compatible traces. Traces are the foundation for all testing and evaluation.
          2. Expect() Assertion Class: Concise assertions against collected traces — Expect(traces).tool_invocations.to_include("tool_name").with_input({...}).with_output("..."). Works across multi-agent hierarchies.
          3. Repeatable Cases: Defined as sequences of user inputs with expected outcomes. Cases support dynamic expectations via validator functions. Cases can be run in bulk (parallelized) with generate_traces().
          4. MockBedrockConverse: LLM mock for deterministic testing. Supports prepared responses, tool use simulation, mixed mock+real responses, and dynamic response generation.
          5. Evaluation Metrics Pipeline: Custom metrics (latency, token count, cost, similarity, conciseness) measured against traces. Pass/fail thresholds on metrics. Results visible in web UI.
          6. Multi-Agent Tracing: Supervisor agent traces include subagent traces recursively. Each subagent runs in its own subcontext with independent conversational memory. Parallel subagent invocations supported.
          7. Subcontext Isolation: Subcontexts allow parallel subagent invocations with separate memory. Sequential invocations can use the same subcontext ID to maintain state across calls.
          8. AgentContext for Tool Security: Tools access auth context, conversation ID, and stop events via AgentContext.current(). Enables per-user data isolation (e.g., row-level security).
          These patterns provide a reference architecture for how our pipeline's agents could be tested and evaluated.
        evidence:
          - "github.com/awslabs/generative-ai-toolkit README §2.10: MockBedrockConverse, Expect class, Cases, Pytest fixtures"
          - "github.com/awslabs/generative-ai-toolkit README §2.2.5: Multi-agent support with subcontexts"
          - "github.com/awslabs/generative-ai-toolkit README §2.2.6: OpenTelemetry tracing, multi-agent trace aggregation"
          - "github.com/awslabs/generative-ai-toolkit README §2.4-2.6: Repeatable Cases, dynamic expectations, bulk trace generation"
        relevance: "The trace-based testing pattern parallels our SQL evidence ledger. The Expect assertion pattern could inspire structured verification assertions. The subcontext isolation pattern is directly applicable to parallel agent safety. The mock pattern enables testing agents without real LLM calls."

      - id: "F-8"
        title: "Academic research identifies contract-aware verification, adversarial refinement, and formal monitoring as emerging multi-agent testing patterns"
        category: "pattern"
        detail: |
          Recent academic work (2025-2026) identifies several patterns for ensuring correctness in multi-agent code generation systems:
          1. Veri-Sure (Jan 2026): Contract-aware multi-agent framework with temporal tracing and formal verification. Uses contracts between agents to define expectations, traces execution temporally, and applies formal verification methods. Key insight: inter-agent contracts prevent specification drift.
          2. CodeX-Verify (Nov 2025): Multi-agent code verification via information theory. Uses information-theoretic measures to verify code across multiple agents. Key insight: cross-agent mutual information as a verification signal.
          3. InfCode (Nov 2025): Adversarial iterative refinement of tests and patches. One agent writes tests, another writes patches, they iteratively challenge each other. Key insight: adversarial test/code co-evolution produces higher quality outcomes than single-agent TDD.
          4. SABER (Nov 2025): Safeguarding mutating steps in LLM agents. Identifies that steps which mutate state (file writes, API calls) are the highest-risk actions. Key insight: mutation-aware safety gates before destructive operations.
          5. FASTRIC (Dec 2025): Prompt Specification Language using finite state machines (FSMs) in prompts. Enforces verifiable interaction patterns. Key insight: encoding expected agent behavior as FSMs enables formal compliance checking.
          6. Saarthi for AGI (Mar 2026): Agentic AI framework for formal verification. Uses multi-agent system specifically for verification tasks.
          7. AWE (Mar 2026): Adaptive agents for dynamic web penetration testing. Memory-augmented multi-agent system that learns from past test runs. Key insight: persistent memory across test runs improves coverage over time.
          8. UnitTenX (Oct 2025): Generating tests for legacy packages with AI agents powered by formal verification. Key insight: formal verification can bootstrap test suites for untested codebases.
        evidence:
          - "arxiv.org search 'multi-agent testing verification': 82 results, 50 reviewed"
          - "Veri-Sure: Contract-Aware Multi-Agent Framework with Temporal Tracing and Formal Verification (Jan 2026)"
          - "CodeX-Verify: Multi-Agent Code Verification via Information Theory (Nov 2025)"
          - "InfCode: Adversarial Iterative Refinement of Tests and Patches (Nov 2025)"
          - "SABER: Small Actions, Big Errors — Safeguarding Mutating Steps in LLM Agents (Nov 2025)"
          - "FASTRIC: Prompt Specification Language for Verifiable LLM Interactions (Dec 2025)"
        relevance: "The adversarial refinement pattern (InfCode) maps directly to the existing implementer→verifier→adversarial-reviewer pipeline. Contract-aware verification (Veri-Sure) validates the E2E contract approach. SABER's mutation-aware safety gates support the requirement for file locks and resource isolation."

      - id: "F-9"
        title: "Error handling follows two-tiered retry with strict deterministic failure boundary"
        category: "pattern"
        detail: |
          The global operating rules define a comprehensive error handling pattern:
          1. Agent-Internal Retry: Max 2 retries for transient errors (network timeout, tool unavailable, database locked). NEVER retry deterministic failures (file not found, permission denied).
          2. Orchestrator-Level Retry: Max 1 re-dispatch for NEEDS_REVISION (verifier/reviewer only). Implementer never returns NEEDS_REVISION — only DONE or ERROR.
          3. Error Categories: Transient (retryable), Deterministic (fail-fast), Security (immediate escalation), Scope (out-of-bounds detection).
          4. SQLITE_BUSY: WAL mode + busy_timeout=5000 + 3 retries with exponential backoff (100ms, 400ms, 1600ms).
          5. Completion Contract Routing: DONE → next step, NEEDS_REVISION → back to implementer, ERROR → orchestrator decides (replan or abort).
          6. Security Blocker Policy: Any verdict='blocker' stops the entire pipeline with ERROR.
          7. Bounded Feedback Loops: Design revision max 1, implementation-verification max 3, code review max 2 rounds. No unbounded retry loops.
        evidence:
          - "NewAgents/.github/agents/global-operating-rules.md §1: Two-tiered retry policy"
          - "NewAgents/.github/agents/global-operating-rules.md §2: Error categories"
          - "NewAgents/.github/agents/global-operating-rules.md §3: SQLITE_BUSY handling"
          - "NewAgents/.github/agents/global-operating-rules.md §5: Completion contract routing matrix"
          - ".github/copilot-instructions.md: Bounded feedback loops, retry policy"
        relevance: "E2E testing introduces new transient failure modes (port conflicts, app startup timeouts, browser crashes). These need to be classified within the existing error taxonomy. E2E-specific retry logic (e.g., app restart attempt) must respect the bounded feedback loop limits."

      - id: "F-10"
        title: "Review system uses 3-perspective parallel review with severity-based outcome determination"
        category: "pattern"
        detail: |
          The adversarial review system dispatches 3 parallel reviewers, each with a distinct perspective:
          1. Security Sentinel: Focuses on security vulnerabilities, injection risks, data exposure.
          2. Architecture Guardian: Focuses on structural integrity, pattern compliance, coupling.
          3. Pragmatic Verifier: Focuses on correctness, test coverage, practical reliability.
          Each reviewer produces 3 SQL INSERTs (one per review category: security, architecture, correctness) + 1 verdict YAML.
          This creates a 3×3 matrix: 3 perspectives × 3 categories = 9 review dimensions.
          Severity taxonomy: Blocker > Critical > Major > Minor. Security Blocker triggers immediate pipeline ERROR.
          Evidence gates EG-3 through EG-6 control review outcomes: submission check, zero blockers, category coverage, majority approval.
        evidence:
          - "NewAgents/.github/agents/review-perspectives.md: 3 perspectives, 3×3 matrix"
          - "NewAgents/.github/agents/severity-taxonomy.md: 4 severity levels, Security Blocker Policy"
        relevance: "E2E test failures should map to this severity taxonomy. A failing E2E test for a security-sensitive flow should be severity=Blocker. Reviewers should verify E2E coverage as part of their correctness review dimension."

      - id: "F-11"
        title: "Dynamic E2E contract pattern enables framework-agnostic app testing"
        category: "pattern"
        detail: |
          The initial request specifies a machine-readable E2E contract that each application must define:
          - app_type: web | api | cli
          - start_command: How to start the application
          - ready_check: Health endpoint or readiness probe URL
          - base_url: Application base URL
          - e2e_runner: Test runner tool (e.g., playwright-cli)
          - e2e_command: Command to execute E2E tests
          - supports_parallel: Whether the app supports parallel test execution
          - requires_isolated_instance: Whether each test needs its own app instance
          - Required environment variables
          - Shutdown mechanism
          - Isolation requirements
          This contract pattern is framework-agnostic — agents consult the contract rather than assuming any specific stack.
          Interactive mode requirement: Agents should do web searches for latest stack info and work with users to set up reusable skills.
          Automatic mode: E2E setup may be skipped.
          Implementers write unit+integration (TDD) but NOT live E2E. Verifiers spin up isolated instances and run E2E.
        evidence:
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §2: Dynamic E2E Contract YAML example"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §3: Live App Testing Architecture (implementer vs verifier responsibilities)"
        relevance: "The contract pattern must be formalized as a schema. Verifiers need contract-aware startup/shutdown logic. Port allocation and readiness polling are new operational concerns. The contract should be stored alongside the codebase being tested."

      - id: "F-12"
        title: "Context governance pattern enforces bounded resource usage per agent"
        category: "pattern"
        detail: |
          Several existing patterns control agent resource usage:
          1. Single-Task Scope: Each implementer/verifier dispatch handles exactly one task. No cross-task state leakage.
          2. Context-Efficient Reading: read_file with targeted line ranges (~200 lines per call). Discovery-first approach using semantic_search and grep_search before read_file.
          3. Tool Access Matrix: Per-agent tool restrictions enforced via prompts + self-verification + regex patterns. Implementer has 12 tools (max), orchestrator has 7.
          4. Bounded Output: All agents produce structured YAML (no prose except interactive mode). Output path restrictions enforced per agent.
          5. Self-Verification Checklists: Each agent runs schema compliance + citation integrity checks before returning.
          6. Anti-Drift Anchors: Role reminders at the end of each agent definition prevent agents from exceeding their scope.
          The initial request adds requirements for:
          - Max lines per read (already ~200)
          - Structured summarization
          - Context compaction
          - Subagents reading only necessary files
        evidence:
          - "NewAgents/.github/agents/tool-access-matrix.md: 9 agents × 14 tools matrix"
          - "NewAgents/.github/agents/implementer.agent.md (line 19): Single-task scope, never modify outside assigned scope"
          - "NewAgents/.github/agents/researcher.agent.md: Context-efficient reading (~200 lines), discovery-first investigation"
          - ".github/copilot-instructions.md: Bounded feedback loops"
        relevance: "E2E testing increases context load (stdout from app startup, test output, screenshots). Context compaction strategies are needed for E2E evidence. The tool access matrix must be updated if agents get new E2E-related tools."

      - id: "F-13"
        title: "Parallel agent safety requires port isolation, resource locks, and deterministic scheduling"
        category: "pattern"
        detail: |
          The initial request identifies critical parallel safety requirements:
          1. Instance Isolation: Unique ports or containers per agent running live apps.
          2. File Locks: Shared artifacts must be protected from concurrent modification.
          3. Max Concurrent E2E Limit: Bounded number of simultaneous live app instances.
          4. Resource Throttling: Prevent resource exhaustion from parallel app instances.
          5. Deterministic Test Seeds: Reproducible randomness across test runs.
          6. Timeouts on External Calls: All app startup, test, and shutdown operations bounded.
          Existing mitigation: Pattern B (sequential) naturally prevents parallel E2E contention. Pattern A (parallel ≤4) needs extension.
          Current concurrency cap of 4 agents per wave provides a natural bound.
          The dynamic port allocation strategy (base_port + task_index offset) is a common pattern from CI/CD systems.
          Queue-based E2E scheduling (when multiple verifiers need live testing) can leverage the existing sequential dispatch in Pattern B.
          AWS Generative AI Toolkit pattern: subcontext isolation per parallel subagent (separate conversational memory, no state cross-contamination).
        evidence:
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §4: Parallel Agent Safety requirements"
          - "NewAgents/.github/agents/dispatch-patterns.md: Pattern A (parallel ≤4), Pattern B (sequential)"
          - "github.com/awslabs/generative-ai-toolkit §2.2.2: Subcontext isolation for parallel subagent invocations"
        relevance: "Port allocation and instance isolation are the primary new infrastructure concerns. The existing ≤4 concurrency cap becomes a hard constraint for E2E — likely need max 1-2 concurrent E2E instances. Queue-based scheduling maps to Pattern B's sequential dispatch."

      - id: "F-14"
        title: "Test replay logs and evidence artifacts require structured capture for traceability"
        category: "pattern"
        detail: |
          The initial request specifies test replay logs must store: inputs, seeds, browser traces, screenshots, console logs.
          Relevant existing patterns:
          1. Playwright CLI provides native support: tracing-start/stop (generates .zip trace file), video-start/stop, screenshot command, console command for capturing console messages, network command for request logs.
          2. The implementation report already captures structured evidence (baseline records, self_fix_attempts, behavioral_coverage).
          3. The verification report records checks with pass/fail status and evidence descriptions.
          4. AWS Generative AI Toolkit captures OpenTelemetry-compatible traces with span attributes for every operation.
          New patterns needed:
          - E2E evidence artifacts directory (per-task screenshots, traces, videos)
          - Structured E2E result schema in SQL (check_name, artifact_path, duration_ms, error_summary)
          - Artifact retention policy (keep last N runs, or keep failures only)
        evidence:
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §10A: Test Replay Logs requirements"
          - "github.com/microsoft/playwright-cli: tracing-start/stop, video-start/stop, screenshot, console, network commands"
          - "NewAgents/.github/agents/implementer.agent.md: implementation-reports schema with baseline records"
          - "NewAgents/.github/agents/verifier.agent.md: verification-reports schema with check results"
        relevance: "Playwright CLI's built-in tracing and video capture provides the infrastructure for test replay logs. The evidence must be stored alongside SQL records with artifact_path references. This creates a hybrid SQL+filesystem evidence model."

      - id: "F-15"
        title: "Workflow completion gate pattern requires multi-signal aggregation with E2E as a mandatory signal"
        category: "pattern"
        detail: |
          The initial request defines a strict completion gate:
          - Unit tests pass
          - Verification checks pass
          - Required E2E passes (new)
          - No security issues
          - No lint violations
          Existing evidence gates (EG-1 through EG-6) already aggregate multiple signals. The current model:
          - EG-1: Baseline exists
          - EG-2: Min verification signals (2 Standard, 3 Large)
          - EG-3: Review submitted
          - EG-4: Zero blockers
          - EG-5: Category coverage
          - EG-6: Majority approval
          New gates needed for E2E:
          - E2E contract exists and is valid (for tasks classified as High risk)
          - E2E tests executed (check_name LIKE 'e2e-%')
          - E2E tests passed (result='pass' for all e2e checks)
          The completion gate is essentially an AND of all required evidence gates, with E2E being conditionally required based on risk lane.
        evidence:
          - "docs/feature/tdd-e2e-enforcement/initial-request.md §10B: Workflow Completion Gate"
          - "NewAgents/.github/agents/orchestrator.agent.md: Evidence gate logic (EG-1 through EG-6)"
        relevance: "The existing evidence gate pattern easily extends to include E2E. The risk lane determines whether E2E gates are required. This is the enforcement mechanism that ensures E2E is not skipped for high-risk tasks."

    summary: |
      The codebase already has robust patterns for TDD (implementer's red-green-refactor with baseline capture), verification (verifier's 4-tier cascade with SQL evidence), error handling (two-tiered retry with bounded loops), and parallel dispatch (Pattern A/B with ≤4 concurrency). These patterns form a solid foundation for extending to mandatory TDD enforcement and E2E testing.

      Key gaps to fill: (1) No formal risk-based lane selection mapping risk classification to testing requirements. (2) No E2E infrastructure — verifier's runtime smoke test is the closest analog but only applies to bugfixes. (3) No port isolation or resource management for parallel live app testing. (4) No structured E2E contract schema. (5) No E2E-specific evidence gates in the completion workflow.

      External patterns to adopt: Playwright CLI+SKILLS (token-efficient browser automation for coding agents), contract-aware verification (Veri-Sure pattern), adversarial test/code refinement (InfCode pattern), trace-based assertion testing (AWS Gen AI Toolkit's Expect pattern), and subcontext isolation for parallel safety.

      The existing SQL evidence ledger, bounded feedback loops, and structured output schemas provide the enforcement backbone. Extending them with E2E check_names, risk lane enums, and E2E contract validation is architecturally consistent with the current system design.

