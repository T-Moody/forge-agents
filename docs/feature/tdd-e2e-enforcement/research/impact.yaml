      # ─────────────────────────────────────────────
      # PERFORMANCE IMPLICATIONS
      # ─────────────────────────────────────────────
      - id: "F-8"
        title: "E2E testing adds 2-5x wall-clock time to the verification stage"
        category: "performance"
        detail: |
          CURRENT VERIFICATION TIMING:
          The existing verification cascade (Tiers 1-4) involves static analysis, builds,
          tests, and code inspection — all fast operations completed in seconds to low minutes.
          Runtime Smoke Test (Step 6a) for bugfix tasks adds 30-120 seconds for app startup,
          request, and shutdown.

          PROJECTED E2E TIMING per task (High Risk lane):
          - App startup: 5-60 seconds (depends on app type; web apps with DB need more)
          - E2E test suite execution: 30-300 seconds (Playwright tests, API tests, etc.)
          - Adversarial workflow testing: 60-180 seconds (simulating developer trying to break)
          - App shutdown and cleanup: 5-15 seconds
          - TOTAL per task: 100-555 seconds (~2-9 minutes)

          PIPELINE-LEVEL IMPACT:
          - With 4 concurrent verifiers each running E2E: resource contention increases
          - If E2E is sequential (supports_parallel=false in contract), verifiers must queue
          - For a feature with 5+ High Risk tasks, E2E adds 10-45 minutes to pipeline
          - Current pipeline target is roughly 15-30 minutes end-to-end; E2E could double this

          PARALLELISM CONSTRAINTS:
          - Section 4 requires instance isolation (unique ports or containers)
          - Max concurrent E2E limit must be enforced
          - If app requires isolated database, each instance needs separate DB
          - Port conflicts between multiple app instances must be managed

          MITIGATION FROM TEST PYRAMID LITERATURE (Fowler/Cohn):
          - "End-to-end tests require a lot of maintenance and run pretty slowly"
          - "You should aim to reduce the number of end-to-end tests to a bare minimum"
          - "Write lots of unit tests. Write some more coarse-grained tests and very few
            high-level end-to-end tests"
          - Risk-based lanes (Section 5) align with this: only High Risk gets E2E
        evidence:
          - "NewAgents/.github/agents/verifier.agent.md lines 202-215 (Runtime Smoke timing reference)"
          - "NewAgents/.github/agents/dispatch-patterns.md lines 200-230 (concurrency cap: 4)"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md Section 4 (parallel safety)"
          - "Martin Fowler: The Practical Test Pyramid — E2E tests section on maintenance cost and speed"
        relevance: "Performance impact is the primary risk to pipeline usability. Designer must define hard timeouts for E2E stages and implement the risk-based lane system to limit E2E scope."

      - id: "F-9"
