      # ─────────────────────────────────────────────
      # ONLINE RESEARCH INSIGHTS
      # ─────────────────────────────────────────────
      - id: "F-13"
        title: "Test Pyramid principles strongly favor risk-based E2E scoping over blanket enforcement"
        category: "external-research"
        detail: |
          Research from Martin Fowler's 'The Practical Test Pyramid' (widely cited in industry)
          provides key principles that directly impact this feature's design:

          1. TEST PYRAMID SHAPE: Write lots of unit tests, some integration tests, very few E2E
             tests. An inverted pyramid (many E2E, few unit) is an anti-pattern called the
             'test ice-cream cone' that is a nightmare to maintain and takes way too long to run.

          2. E2E FLAKINESS: "End-to-end tests are notoriously flaky and often fail for unexpected
             and unforeseeable reasons. Browser quirks, timing issues, animations and unexpected
             popup dialogs" are common failure sources. This directly impacts the verifier's
             adversarial testing capability.

          3. MAINTENANCE COST: "End-to-end tests require a lot of maintenance and run pretty
             slowly." Each E2E test is additional baggage — writing, maintaining, debugging.

          4. PUSH TESTS DOWN: "Push your tests as far down the test pyramid as you can." If
             something can be tested with a unit test, don't also test it with an E2E test.
             This principle validates Section 5's risk-based approach (only High Risk gets E2E).

          5. DEPLOYMENT PIPELINE PLACEMENT: E2E tests belong in later pipeline stages. Fast
             unit tests go first for rapid feedback. This aligns with the existing pipeline
             where verification (Step 6) comes after implementation (Step 5).

          6. CONTRACT TESTING: Consumer-driven contract tests (CDC) can replace some E2E tests
             for API interactions. This is relevant for the E2E contract system — the contract
             defines the interface, not necessarily requiring full browser-based E2E.

          APPLICATION TO THIS FEATURE:
          - Section 5's risk-based lanes correctly implement pyramid principles
          - Blanket E2E enforcement would violate pyramid shape and slow pipeline
          - E2E should be reserved for user-facing flows, security boundaries, and state transitions
          - The E2E contract should support varying test depths, not just full browser E2E
        evidence:
