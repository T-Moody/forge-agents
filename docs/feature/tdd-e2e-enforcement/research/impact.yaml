          - "NewAgents/.github/agents/dispatch-patterns.md lines 108-140 (Pattern B: max 3 iterations)"
          - "NewAgents/.github/agents/knowledge-agent.agent.md lines 1-50 (store_memory + instruction updates)"
        relevance: "These agent-specific challenges must be addressed in the design. Traditional TDD/E2E patterns need adaptation for agent context."

