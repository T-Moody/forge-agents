      - id: "F-6"
        title: "Pipeline flow requires 3 new decision points and 1 new verification tier"
        category: "pipeline"
        detail: |
          CURRENT PIPELINE (10 steps):
          Step 0 (Setup) → Step 1 (Research ×4) → Step 1a (Gate) → Step 2 (Spec) →
          Step 3 (Design) → Step 3b (Design Review ×3) → Step 4 (Planning) → Step 4a (Gate) →
          Steps 5-6 (Impl+Verify Loop, max 3) → Step 6a (Runtime Smoke, bugfix only) →
          Step 7 (Code Review ×3) → Step 8 (Knowledge) → Step 9 (Auto-Commit)

          PROPOSED CHANGES:
          1. Step 0: ADD E2E contract discovery/validation. Check if target project has an
             E2E contract file. If missing and interactive mode, prompt user to create one.
             If missing and autonomous mode, skip E2E enforcement with documented reason.
          2. Step 4: ADD workflow lane assignment. Planner classifies each task into
             Low/Medium/High risk lane. This determines verification depth.
          3. Step 6: MODIFY verification to be lane-aware:
             - Low Risk tasks: Tier 1-2 only (existing behavior)
             - Medium Risk tasks: Tier 1-3 (existing behavior for Standard tasks)
             - High Risk tasks: Tier 1-4 + E2E verification (NEW)
          4. Step 6a/6b: EXPAND from bugfix-only to risk-conditional. High Risk tasks get
             full E2E verification including app spinup, E2E test execution, and adversarial
             testing. This is a significant new step, not just a gate modification.
          5. Step 7: ADD TDD compliance check. Adversarial reviewers verify that TDD
             red-green-refactor cycle was followed (already partially present in behavioral
             test validity checks, but needs strengthening).

          NEW LOOPS:
          - E2E retry loop: If E2E tests fail, route back to implementer with E2E failure
            evidence (analogous to existing verification retry loop)
          - E2E instance queuing: When multiple verifiers need E2E instances simultaneously,
            queue them with isolation guarantees (new concurrency pattern)
