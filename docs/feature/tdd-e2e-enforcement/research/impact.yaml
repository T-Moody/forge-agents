          many E2E scenarios.

          EXISTING MITIGATIONS:
          - output_snippet truncation to ≤500 chars per anvil_checks entry
          - Structured summarization in verification reports
          - Per-task dispatch (verifier handles one task at a time)

          NEW MITIGATIONS NEEDED:
          - E2E output summarization (truncate to key failures, not full trace)
          - Separate E2E evidence storage (file-based, not inline in YAML)
          - Reference-based E2E results (store full trace as file, reference path in report)
        evidence:
