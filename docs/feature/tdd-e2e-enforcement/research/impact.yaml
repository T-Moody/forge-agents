      - id: "F-10"
        title: "Risk classification matrix for all 10 sections of the initial request"
        category: "risk"
        detail: |
          Section 1 — Make TDD Mandatory
            Risk: 🟡 MEDIUM | Difficulty: MODERATE
            Rationale: TDD is already enforced in implementer. Changes strengthen existing
            patterns. Main risk: stricter enforcement may increase implementer failure rate
            and trigger more self-fix loops, slowing pipeline.

          Section 2 — E2E Testing as First-Class Citizen
            Risk: 🔴 HIGH | Difficulty: HIGH
            Rationale: Completely new capability. E2E contract is a new schema. Dynamic
            contract interpretation means agent must handle many app types. Interactive mode
            for E2E setup adds complexity. Skill reference system is novel.

          Section 3 — Live App Testing Architecture
            Risk: 🔴 HIGH | Difficulty: HIGH
            Rationale: Requires verifier to spin up and manage live app instances. Instance
            isolation is complex. Adversarial testing (developer trying to break it) requires
            creative test generation. Clear separation between implementer (no E2E) and
            verifier (runs E2E) must be enforced.

          Section 4 — Parallel Agent Safety
            Risk: 🔴 HIGH | Difficulty: HIGH
            Rationale: Concurrency control for E2E instances is the hardest technical challenge.
            File locks, port allocation, container isolation, queuing — each is non-trivial.
            Race conditions are the primary failure mode. Current system has no E2E concurrency.

          Section 5 — Risk-Based Workflow Lanes
            Risk: 🟡 MEDIUM | Difficulty: MODERATE
            Rationale: Extends existing risk classification. Planner already classifies
            🟢/🟡/🔴. Main change is making lanes explicit and routing them differently through
            the verification cascade. Orchestrator routing logic must expand.

          Section 6 — Subagent Context Governance
            Risk: 🟢 LOW | Difficulty: LOW
            Rationale: Already partially implemented. Relevant context pointers, targeted reads,
            context-efficient reading rules are in place. Section 6 reinforces existing rules.
            May need minor additions for max lines per read enforcement.

          Section 7 — Interactive Mode Requirements
            Risk: 🟡 MEDIUM | Difficulty: MODERATE
            Rationale: ask_questions already exists for orchestrator and spec agent. Extension
            to support E2E contract creation and ambiguity escalation is moderate work. The
            pattern of subagent requesting orchestrator to ask on their behalf is new but
            conceptually simple.

          Section 8 — Orchestrator Rules
            Risk: 🟢 LOW | Difficulty: LOW
            Rationale: Orchestrator already follows these rules. Section 8 reinforces existing
            constraints. No new implementation needed — this is policy affirmation.

          Section 9 — Copilot Best Practices Integration
            Risk: 🟢 LOW | Difficulty: LOW
            Rationale: Guidelines, not code changes. The knowledge agent already handles
            instruction updates. Section 9 is a documentation/convention update.

          Section 10 — Additional Enhancements
            Risk: 🟡 MEDIUM | Difficulty: MODERATE
            Rationale: Four sub-features, each moderate:
            A. Test Replay Logs — New storage format, moderate schema work
            B. Workflow Completion Gate — Expands existing evidence gates, moderate
            C. Agent Performance Guardrails — Hard timeouts already partially exist, moderate
            D. Deterministic Output Contracts — Already largely in place via schemas.md
