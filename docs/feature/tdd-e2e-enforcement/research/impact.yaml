        relevance: "External research validates risk-based approach and warns against over-testing with E2E. Designer should explicitly reference test pyramid principles when scoping E2E enforcement."

      - id: "F-14"
        title: "AI agent systems face unique TDD/E2E challenges not covered by traditional testing literature"
        category: "external-research"
        detail: |
          While traditional TDD and E2E testing literature applies broadly, AI agent systems
          (like this multi-agent pipeline) face unique challenges:

          1. NON-DETERMINISTIC OUTPUTS: LLM-based agents may produce different code for the
             same prompt. TDD tests written by agents may be brittle or over-fitted to specific
             implementations. The existing tdd_red_green tracking helps, but agents may write
             tests that trivially pass (known issue: adversarial reviewer already checks for
             suspicious TDD patterns where initial_run_failures = 0).

          2. CONTEXT WINDOW CONSTRAINTS: Unlike human developers who can maintain mental state
             across test writing and implementation, agents operate within bounded context
             windows. E2E test setup (contract parsing, environment configuration, instance
             management) consumes valuable context budget.

          3. TOOL-MEDIATED TESTING: Agents run tests via run_in_terminal, not interactively.
             E2E testing tools (Playwright, Selenium, Cypress) produce rich output (traces,
             screenshots) that must be summarized for agent consumption within output_snippet
             (≤500 chars) limitations.

          4. PARALLEL AGENT INTERFERENCE: Multiple agents running E2E tests simultaneously
             on the same machine risk port conflicts, shared state corruption, and file system
             races. Traditional CI/CD parallelism uses containers; this agent system runs
             within VS Code's Copilot runtime without container isolation.

          5. FEEDBACK LOOP AMPLIFICATION: In traditional CI/CD, a flaky E2E test causes one
             retry. In this agent system, E2E failure triggers: verifier NEEDS_REVISION →
             planner replan → implementer re-implement → verifier re-verify → E2E retest.
             A flaky E2E test can consume 3 full iteration cycles (the Pattern B max).

          6. SKILL REUSE ACROSS SESSIONS: The initial request mentions 'skills' for E2E setup
             that can be reused. This aligns with the knowledge agent's store_memory +
             instruction_updates pattern but requires a new 'skill' abstraction that doesn't
             exist in the current system.
        evidence:
