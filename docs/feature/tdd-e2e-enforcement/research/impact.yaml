          - "NewAgents/.github/agents/global-operating-rules.md §6 (context governance)"
          - "docs/feature/tdd-e2e-enforcement/initial-request.md Section 6 and 10A"
        relevance: "Context overflow in verifier dispatches is a real risk. Designer must define evidence summarization strategy for E2E output."

