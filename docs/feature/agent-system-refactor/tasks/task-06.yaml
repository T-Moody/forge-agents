task:
  id: "task-06"
  title: "Create reviewer.agent.md"
  description: >
    Create v2/.github/agents/reviewer.agent.md (~110 lines). The Reviewer performs
    adversarial multi-perspective code review. It is dispatched 2-3 times in parallel,
    each assigned a distinct perspective (security, architecture, correctness) by the
    orchestrator. Uses the standard 6-section body format (Role, Inputs, Workflow,
    Output Schema, Constraints, Anti-Drift Anchor).
    YAML frontmatter: name, description, tools (read_file, list_dir, grep_search,
    semantic_search, file_search, get_errors, get_changed_files, create_file), agents: [].
    Output schema: findings list with severity (blocker/critical/major/minor),
    description, affected file, recommendation. Plus verdict (approve/request-changes).
    R2 additions: audit implementer commands_executed[] against command allowlist,
    audit fetch_webpage URL trails for unexpected web requests.
  agent: "implementer"
  size: "Standard"
  risk: "🟢"
  depends_on: ["task-01"]
  acceptance_criteria:
    - id: "AC-2"
      text: "File does not exceed 150 lines (budget: 110)"
      test_method: "test"
    - id: "AC-5"
      text: "YAML frontmatter contains name, description, and tools fields"
      test_method: "inspection"
    - id: "AC-7"
      text: "YAML frontmatter has agents: [] (no subagent access)"
      test_method: "inspection"
    - id: "FR-9.1"
      text: "Workflow describes multi-perspective review dispatched by orchestrator (security, architecture, correctness)"
      test_method: "inspection"
    - id: "FR-9.2"
      text: "Output Schema defines findings with severity (blocker/critical/major/minor) and verdict (approve/request-changes)"
      test_method: "inspection"
    - id: "AC-22"
      text: "Output Schema includes completion contract (status/summary/output_paths)"
      test_method: "inspection"
    - id: "R2-audit"
      text: "Workflow or Constraints section includes audit of implementer commands_executed[] and fetch_webpage URL trails"
      test_method: "inspection"
  workflow_lane: "unit-only"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.component_design[agent='reviewer']"
      - "design-output.yaml#payload.decisions[id='D-3']"
      - "design-output.yaml#payload.schemas.review_verdict"
      - "design-output.yaml#payload.trust_boundary_model.tier_3_read_only_create"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-9']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-12']"
    files_to_modify:
      - path: "v2/.github/agents/reviewer.agent.md"
        risk: "🟢"
