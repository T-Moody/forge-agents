task:
  id: "task-10"
  title: "Create orchestrator.agent.md"
  description: >
    Create v2/.github/agents/orchestrator.agent.md (~150 lines). The Orchestrator is the
    Tier 1 Full Trust agent — the sole agent with dispatch, git, and terminal capabilities.
    This is the most complex agent and the security-critical center of the pipeline.

    Body sections (D-3 deviation accepted per AG-R3-A-2): Role, Pipeline Steps (8 steps
    with routing logic), DAG Dispatch Algorithm, Constraints, Anti-Drift Anchor.

    YAML frontmatter: name, description, tools (read_file, create_file,
    replace_string_in_file, list_dir, grep_search, file_search, run_in_terminal,
    get_terminal_output, vscode_askQuestions), agents (all 7 other agents:
    researcher, architect, planner, implementer, tester, reviewer, knowledge).

    Pipeline Steps section must document all 8 steps:
    (1) Setup — git baseline, feature dir, approval_mode, web_research_enabled, risk classification,
        initialize pipeline-log.yaml
    (2) Research — 2-4 parallel researchers, gate ≥2 DONE, skip for 🟢
    (3) Architecture — single architect, embedded design review for 🔴 (max 1 revision round)
    (4) Planning — single planner, interactive approval gate
    (5) Implementation — DAG-based parallel dispatch, ≤4 concurrent, file ownership conflict detection
    (6) Testing — static then dynamic, singleton for dynamic, max 3 fix cycles
    (7) Code Review — MANDATORY all risk levels, 2-3 reviewers, gate ≥2 approve + 0 blockers, max 2 rounds
    (8) Completion — knowledge agent, pre-commit validation, git add + commit

    DAG Dispatch Algorithm: read plan, find tasks with all deps satisfied, check file
    overlap, dispatch ≤4 non-overlapping ready tasks in parallel.

    CRITICAL KNOWN ISSUE (KI-1): Pre-commit validation at Step 8 MUST validate only
    Knowledge output paths (per trust_boundary_model), NOT the entire git diff. The
    trust_boundary_model in design-output.yaml is AUTHORITATIVE, not design.md.
    Allowlist: docs/feature/<slug>/evidence-bundle.yaml, knowledge-output.yaml,
    instruction-recommendations.md.

    Incremental pipeline-log.yaml (D-15): append dispatch entry after each agent
    completes (step, agent, started_at, completed_at, status, output_paths).

    Risk classification at Setup: 🟢 (simple), 🟡 (standard), 🔴 (complex) with
    scaling table for research depth, testing depth, and reviewer count.

    If file exceeds 150 lines, extract DAG dispatch to dag-dispatch.md per D-8 fallback.
  agent: "implementer"
  size: "Large"
  risk: "🔴"
  depends_on: ["task-01"]
  acceptance_criteria:
    - id: "AC-2"
      text: "File does not exceed 150 lines. If exceeded, DAG extracted to dag-dispatch.md per D-8 fallback."
      test_method: "test"
    - id: "AC-5"
      text: "YAML frontmatter contains name, description, and tools fields"
      test_method: "inspection"
    - id: "AC-6"
      text: "YAML frontmatter agents field lists all 7 other agents: researcher, architect, planner, implementer, tester, reviewer, knowledge"
      test_method: "inspection"
    - id: "AC-9"
      text: "Routing between steps uses YAML completion contracts only — no database queries in workflow"
      test_method: "inspection"
    - id: "AC-10"
      text: "Pipeline has exactly 8 named steps documented: Setup, Research, Architecture, Planning, Implementation, Testing, Code Review, Completion"
      test_method: "inspection"
    - id: "AC-11"
      text: "Code Review (Step 7) is documented as MANDATORY for all risk levels — cannot be skipped"
      test_method: "inspection"
    - id: "AC-13"
      text: "Implementation step dispatches tasks based on dependency satisfaction (DAG topological ordering), not fixed wave assignment"
      test_method: "inspection"
    - id: "AC-14"
      text: "DAG dispatch checks file ownership — no two parallel tasks modify the same file"
      test_method: "inspection"
    - id: "KI-1"
      text: "Pre-commit validation at Step 8 validates ONLY Knowledge output paths (evidence-bundle.yaml, knowledge-output.yaml, instruction-recommendations.md in docs/feature/<slug>/), NOT the entire git diff"
      test_method: "inspection"
    - id: "D-15"
      text: "Orchestrator appends to pipeline-log.yaml after each dispatch with: step, agent, started_at, completed_at, status, output_paths"
      test_method: "inspection"
    - id: "FR-3.5"
      text: "Setup step includes risk classification (🟢/🟡/🔴) that scales subsequent step depth"
      test_method: "inspection"
    - id: "AC-22"
      text: "Output documents use completion contract (status/summary/output_paths) for routing"
      test_method: "inspection"
    - id: "AC-8"
      text: "File contains zero occurrences of sqlite, sqlite3, verification-ledger, or sql-templates"
      test_method: "test"
  workflow_lane: "full-tdd-e2e"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.component_design[agent='orchestrator']"
      - "design-output.yaml#payload.decisions[id='D-5']"
      - "design-output.yaml#payload.decisions[id='D-6']"
      - "design-output.yaml#payload.decisions[id='D-8']"
      - "design-output.yaml#payload.decisions[id='D-11']"
      - "design-output.yaml#payload.decisions[id='D-14']"
      - "design-output.yaml#payload.decisions[id='D-15']"
      - "design-output.yaml#payload.pipeline_design"
      - "design-output.yaml#payload.trust_boundary_model"
      - "design-output.yaml#payload.state_management"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-1']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-3']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-11']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-14']"
    files_to_modify:
      - path: "v2/.github/agents/orchestrator.agent.md"
        risk: "🔴"
