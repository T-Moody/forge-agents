task:
  id: "task-01"
  title: "Create global-rules.md shared reference"
  description: >
    Create v2/.github/agents/global-rules.md (~100 lines) containing the cross-cutting
    rules that ALL 8 agents must follow. This is the sole shared reference document in
    the new system. Contents: (1) completion contract schema (status/summary/output_paths),
    (2) retry policy (transient errors 1 retry, deterministic errors fail immediately),
    (3) anti-hallucination rule (never claim verification without evidence),
    (4) feedback loop limits (implementation-testing: 3, code-review-fix: 2, design-review: 1),
    (5) output path convention (docs/feature/<slug>/ for all agent outputs),
    (6) risk classification definitions (🟢/🟡/🔴 with scaling table).
    This file must NOT contain § section references, SQL, or references to sqlite.
    The completion contract validation rule must specify: any status other than
    DONE/NEEDS_REVISION/ERROR is treated as ERROR (per D-4 EC-6 resolution).
  agent: "implementer"
  size: "Standard"
  risk: "🟢"
  depends_on: []
  acceptance_criteria:
    - id: "AC-4"
      text: "File is the only shared reference document (≤1 shared doc, excluding prompts)"
      test_method: "inspection"
    - id: "AC-8"
      text: "File contains zero occurrences of 'sqlite', 'sqlite3', 'verification-ledger', or 'sql-templates'"
      test_method: "test"
    - id: "AC-18"
      text: "File contains zero § cross-references to other files"
      test_method: "test"
    - id: "AC-22a"
      text: "Completion contract schema is defined with exactly 3 required fields: status, summary, output_paths"
      test_method: "inspection"
    - id: "AC-22b"
      text: "Completion contract validation rule states: any status other than DONE/NEEDS_REVISION/ERROR is treated as ERROR"
      test_method: "inspection"
    - id: "AC-1a"
      text: "File does not exceed 100 lines"
      test_method: "test"
  workflow_lane: "unit-only"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-9']"
      - "design-output.yaml#payload.decisions[id='D-12']"
      - "design-output.yaml#payload.schemas.completion_contract"
      - "design-output.yaml#payload.pipeline_design.feedback_loops"
    spec_requirements:
      - "spec-output.yaml#payload.common_requirements[id='CR-1']"
      - "spec-output.yaml#payload.common_requirements[id='CR-10']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-15']"
    files_to_modify:
      - path: "v2/.github/agents/global-rules.md"
        risk: "🟢"
