task:
  id: "task-01"
  title: "Update global-rules.md — Git Safety Rule + Plan Refinement Limit"
  description: >
    Modify v2/.github/agents/global-rules.md (currently 70 lines → estimated 80 lines).
    Two additions: (1) FR-5.3: Add a 'Git Operations' rule stating only the orchestrator
    may run git staging (add) and commit commands. All other agents MUST NOT run git add,
    git commit, git push, git reset, or any write-mode git operations. Permitted for
    non-orchestrator agents: git diff, git status (read-only).
    (2) PV C-3: Add a 'Plan Refinement' row to the Feedback Loop Limits table with
    max 1 iteration. Both additions are appended to existing sections — no structural
    changes to the document.
  agent: "implementer"
