task:
  id: "task-05"
  title: "Update planner.agent.md — Plan Summary + Approval Output"
  description: >
    Modify v2/.github/agents/planner.agent.md (currently 105 lines → estimated 116).
    Three change areas:
    (1) FR-2: Fix all 6 frontmatter tool names to flat camelCase.
    (2) FR-2.4: Add user-invocable: false to YAML frontmatter.
    (3) FR-4/D-3: Add a final workflow step that outputs plan_summary (task count,
    wave structure, key dependencies) in plan-output.yaml. In interactive mode,
    orchestrator reads plan_summary and presents Accept/Refine/Reject choice to user.
    In autonomous mode, planner returns DONE immediately. Note: per DR-2, no structured
    question tool exists — the orchestrator mediates the approval interaction.
    The planner's changes are additive to the existing workflow.
  agent: "implementer"
  size: "Standard"
  risk: "🟢"
  depends_on: ["task-01"]
  acceptance_criteria:
    - id: "AC-4-plan"
      text: "All tool names in planner YAML frontmatter use flat camelCase. Zero namespace/tool format instances"
      test_method: "inspection"
    - id: "AC-7-plan"
      text: "Planner has user-invocable: false in YAML frontmatter"
      test_method: "inspection"
    - id: "AC-10"
      text: "Planner workflow contains a final step that outputs plan_summary (task count, waves, key deps) for orchestrator consumption"
      test_method: "inspection"
    - id: "AC-27-plan"
      text: "Planner agent file remains under 150 lines after changes (estimated 116)"
      test_method: "inspection"
  workflow_lane: "unit-only"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
