      - "design-output.yaml#payload.decisions[id='D-2']"
      - "design-output.yaml#payload.decisions[id='D-3']"
      - "design-output.yaml#payload.deviation_records[id='DR-2']"
      - "design-output.yaml#payload.tool_name_corrections.planner"
      - "design-output.yaml#payload.file_inventory[path='v2/.github/agents/planner.agent.md']"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-4']"
