task:
  id: "task-04"
  title: "Update architect.agent.md — Clarification + Web Research Steps"
  description: >
    Modify v2/.github/agents/architect.agent.md (currently 130 lines → estimated 145).
    THIS IS THE TIGHTEST AGENT with only 5-line headroom (design D-6 note).
    Four change areas:
    (1) FR-2: Fix all 7 frontmatter tool names to flat camelCase.
    (2) FR-2.4: Add user-invocable: false to YAML frontmatter.
    (3) FR-3/D-3: Add a clarification step (Step 1.5) between 'Read Inputs' and
    'Analyze Codebase'. Assumptions-first flow: architect completes fully, documenting
    assumptions in assumptions_made[] output field. Includes clarifications_needed[]
    for remaining ambiguities. In autonomous mode, skip and document assumptions only.
    (4) FR-8: Add a 'Web Research' step (Step 2.5) between 'Analyze Codebase' and
    'Identify Requirements', gated by web_research_enabled=true. Capped at 3-5
    targeted lookups. Fetch tool name corrected from web/fetch to fetch.
    CRITICAL: If combined changes exceed 150 lines during implementation, extract
    FR-8 web research guidance to a reference document.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on: ["task-01"]
  acceptance_criteria:
    - id: "AC-4-arch"
      text: "All tool names in architect YAML frontmatter use flat camelCase. Zero namespace/tool format instances"
      test_method: "inspection"
    - id: "AC-7-arch"
      text: "Architect has user-invocable: false in YAML frontmatter"
      test_method: "inspection"
    - id: "AC-8"
      text: "Architect workflow contains a clarification step between Read Inputs and Analyze Codebase gated by approval_mode=interactive"
      test_method: "inspection"
    - id: "AC-19"
      text: "Architect workflow contains explicit Web Research step gated by web_research_enabled=true, positioned before Identify Requirements"
      test_method: "inspection"
    - id: "AC-20"
      text: "Architect fetch tool name is 'fetch' (not 'web/fetch') in YAML frontmatter"
      test_method: "inspection"
    - id: "AC-27-arch"
      text: "Architect agent file remains under 150 lines after all changes (estimated 145, 5-line headroom)"
      test_method: "inspection"
  workflow_lane: "unit-integration"
  e2e_required: false
  e2e_contract_path: null
