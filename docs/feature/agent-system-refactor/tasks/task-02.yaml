task:
  id: "task-02"
  title: "Create pipeline prompt files"
  description: >
    Create two prompt files that serve as entry points for the pipeline:
    (1) v2/.github/prompts/feature-workflow.prompt.md (~30 lines) — full 8-step pipeline
    entry point. References orchestrator agent, describes the pipeline trigger, and passes
    the feature slug to the orchestrator.
    (2) v2/.github/prompts/quick-fix.prompt.md (~25 lines) — simplified pipeline for
    trivial fixes using steps {1, 5, 6, 7, 8} (Setup, Implementation, Testing, Code Review,
    Completion). Skips Research (Step 2) and Architecture (Step 3). Code Review (Step 7)
    is MANDATORY per the immutable minimum step set principle (D-13).
    Both prompt files must explicitly enumerate their step sets so the orchestrator
    can enforce them. Neither file should contain § references or SQL.
  agent: "implementer"
  size: "Standard"
  risk: "🟢"
  depends_on: []
  acceptance_criteria:
    - id: "AC-20a"
      text: "Both files created in v2/.github/prompts/ directory (not modifying existing prompt files)"
      test_method: "inspection"
    - id: "D-13a"
      text: "quick-fix.prompt.md explicitly lists steps {1, 5, 6, 7, 8} — no other step set"
      test_method: "inspection"
    - id: "D-13b"
      text: "quick-fix.prompt.md includes Code Review (Step 7) — it is not skippable"
      test_method: "inspection"
    - id: "AC-18"
      text: "Neither file contains § cross-references"
      test_method: "test"
    - id: "AC-8"
      text: "Neither file references sqlite, sqlite3, verification-ledger, or sql-templates"
      test_method: "test"
  workflow_lane: "unit-only"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-13']"
      - "design-output.yaml#payload.decisions[id='D-5']"
      - "design-output.yaml#payload.file_inventory.new_files"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-1']"
      - "spec-output.yaml#payload.common_requirements[id='CR-7']"
    files_to_modify:
      - path: "v2/.github/prompts/feature-workflow.prompt.md"
        risk: "🟢"
      - path: "v2/.github/prompts/quick-fix.prompt.md"
        risk: "🟢"
