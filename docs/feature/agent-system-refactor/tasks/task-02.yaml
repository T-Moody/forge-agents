task:
  id: "task-02"
  title: "Update orchestrator.agent.md — Full Orchestrator Overhaul"
  description: >
    Modify v2/.github/agents/orchestrator.agent.md (currently 117 lines → estimated 142).
    This is the largest single-task change set with 11 modification items:
    (1) FR-2: Fix all 10 frontmatter tool names to flat camelCase (read/readFile→readFile, etc.).
    (2) FR-2.3: Add explicit runSubagent dispatch instruction in body text.
    (3) FR-1: Step 1 — add E2E skill directory scan (.github/skills/, .agents/skills/) +
    interactive setup prompt (Playwright/HTTP API/Skip/Custom) + autonomous warning.
    (4) FR-3/D-3: Step 3 — add architect clarification mediation (assumptions-first flow:
    read architect output, if interactive + clarifications_needed present, ask user,
    re-dispatch only if answers contradict assumptions).
    (5) FR-4/D-3: Step 4 — add planner approval gate (read plan_summary, present
    Accept/Refine/Reject choice in interactive mode).
    (6) D-10: Decompose Step 8 into sub-steps 8a-8e (knowledge → doc-updates →
    validation → staging → commit choice).
    (7) FR-7/D-10-8b: Doc update choice (interactive: Apply/Review/Skip).
    (8) D-9/D-10-8c: Pre-stage knowledge output path validation (allowlist only).
    (9) FR-5/D-5/D-10-8d: Two-source selective staging (implementation files from
    reports + pipeline artifacts via git add docs/feature/<slug>/).
    (10) FR-6/D-10-8e: Interactive Commit/Review/Unstage; autonomous stage-only.
    (11) Remove search/changes→changes, todo→todos corrections.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on: ["task-01"]
  acceptance_criteria:
    - id: "AC-1"
      text: "Orchestrator Step 1 contains skill directory scanning logic checking .github/skills/ and .agents/skills/ for SKILL.md files"
      test_method: "inspection"
    - id: "AC-2"
      text: "In interactive mode with no E2E skills, orchestrator presents multiple-choice question with at least 3 options (Playwright, HTTP API, Skip)"
      test_method: "inspection"
    - id: "AC-3"
      text: "In autonomous mode with no E2E skills, a warning is logged in pipeline-log.yaml. No interactive prompt occurs"
      test_method: "inspection"
    - id: "AC-4-orch"
      text: "All tool names in orchestrator YAML frontmatter use flat camelCase format. Zero instances of namespace/tool format remain"
      test_method: "inspection"
    - id: "AC-5"
      text: "Orchestrator tools: array contains 'agent' and agents: array lists all 7 worker agent names"
      test_method: "inspection"
    - id: "AC-6"
      text: "Orchestrator body contains explicit text about using runSubagent tool and referencing agents by exact name: values"
      test_method: "inspection"
    - id: "AC-14"
      text: "Orchestrator Step 8d stages files using selective pathspecs from implementation reports files_modified — not git add -A"
      test_method: "inspection"
    - id: "AC-15"
      text: "Orchestrator Step 8e does NOT contain unconditional git commit. Interactive mode offers Commit/Review/Unstage choice"
      test_method: "inspection"
    - id: "AC-16"
      text: "Autonomous mode: orchestrator stages but does not commit"
      test_method: "inspection"
    - id: "AC-17"
      text: "After knowledge agent in interactive mode (Step 8b), orchestrator presents Apply/Review/Skip choice for documentation updates"
      test_method: "inspection"
    - id: "AC-27-orch"
      text: "Orchestrator agent file remains under 150 lines after all changes (estimated 142)"
      test_method: "inspection"
