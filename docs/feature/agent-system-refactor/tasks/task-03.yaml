task:
  id: "task-03"
  title: "Update implementer.agent.md — Git Safety + TDD Refactor"
  description: >
    Modify v2/.github/agents/implementer.agent.md (currently 99 lines → estimated 115).
    Five change areas:
    (1) FR-2: Fix all 10 frontmatter tool names to flat camelCase.
    (2) FR-2.4: Add user-invocable: false to YAML frontmatter.
    (3) FR-5: Remove step 6 (git add -A) from workflow entirely. Remove 'git add'
    from command allowlist, keeping only 'git diff' and 'git status'.
    (4) FR-10: Change TDD cycle from RED-GREEN-REPORT to RED-GREEN-REFACTOR-REPORT.
    Add bounded REFACTOR step: only refactor files in task.files[], only extract
    duplicates with >=3 occurrences, only rename for clarity. REFACTOR re-runs tests;
    revert on failure.
    (5) FR-10: Add code quality principles to constraints: YAGNI, KISS, DRY, prefer
    functional patterns, avoid over-engineering, maintain lint compatibility, write
    minimal code to pass tests.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on: ["task-01"]
  acceptance_criteria:
    - id: "AC-4-impl"
      text: "All tool names in implementer YAML frontmatter use flat camelCase. Zero namespace/tool format instances"
      test_method: "inspection"
    - id: "AC-7-impl"
      text: "Implementer has user-invocable: false in YAML frontmatter"
      test_method: "inspection"
    - id: "AC-12"
      text: "Implementer workflow does NOT contain 'git add -A', 'git add .', or 'git commit'. Command allowlist permits only git diff and git status"
      test_method: "inspection"
    - id: "AC-24"
      text: "Implementer workflow includes REFACTOR step between GREEN and REPORT, bounded to task files[] only"
      test_method: "inspection"
    - id: "AC-25"
      text: "Implementer constraints lists: YAGNI, KISS, DRY, prefer functional patterns, avoid over-engineering, minimal code, lint compatibility"
      test_method: "inspection"
    - id: "AC-26"
      text: "REFACTOR step requires re-running tests and reverting if tests fail after refactoring"
      test_method: "inspection"
    - id: "AC-27-impl"
      text: "Implementer agent file remains under 150 lines after changes (estimated 115)"
      test_method: "inspection"
  workflow_lane: "unit-integration"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-1']"
      - "design-output.yaml#payload.decisions[id='D-2']"
      - "design-output.yaml#payload.tool_name_corrections.implementer"
      - "design-output.yaml#payload.file_inventory[path='v2/.github/agents/implementer.agent.md']"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-5']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-10']"
    files_to_modify:
      - path: "v2/.github/agents/implementer.agent.md"
        risk: "🟡"
