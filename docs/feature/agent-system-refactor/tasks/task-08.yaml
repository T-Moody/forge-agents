task:
  id: "task-08"
  title: "Update knowledge.agent.md — Doc-Update Mode + Memory Fix"
  description: >
    Modify v2/.github/agents/knowledge.agent.md (currently 107 lines → estimated 118).
    Four change areas:
    (1) FR-2: Fix all 7 frontmatter tool names to flat camelCase
    (read/readFile→readFile, search/listDirectory→listDirectory,
    search/textSearch→textSearch, search/codebase→codebase,
    search/fileSearch→fileSearch, edit/createFile→createFile).
    Remove vscode/memory from tools list entirely (D-7: VS Code memory tool is
    auto-injected by runtime, listing it is incorrect and misleading).
    (2) FR-2.4: Add user-invocable: false to YAML frontmatter.
    (3) D-7: Reword the memory/lessons step. Replace any reference to 'vscode/memory'
    tool with language about the runtime-provided memory mechanism. Keep the
    instruction to record pipeline lessons but remove the explicit tool invocation.
    (4) FR-7/D-10: Add doc-update mode. Knowledge agent receives 'Mode: doc-update'
    when dispatched at Step 8b. In doc-update mode, the agent updates README.md
    and other documentation to reflect implemented changes. CRITICAL constraint:
    in doc-update mode, knowledge agent MUST NOT modify any .agent.md file.
    AC-18 enforces this: 'Knowledge agent doc-update mode prohibits modifying
    .agent.md files'.
  agent: "implementer"
  size: "Standard"
  risk: "🟡"
  depends_on: ["task-02"]
  acceptance_criteria:
    - id: "AC-4-know"
      text: "All tool names in knowledge YAML frontmatter use flat camelCase. Zero namespace/tool format instances. vscode/memory removed entirely"
      test_method: "inspection"
    - id: "AC-7-know"
      text: "Knowledge has user-invocable: false in YAML frontmatter"
      test_method: "inspection"
    - id: "AC-18"
      text: "Knowledge agent doc-update mode contains explicit constraint: MUST NOT modify .agent.md files"
      test_method: "inspection"
    - id: "AC-D7-memory"
      text: "No reference to vscode/memory tool in body text. Memory/lessons step reworded to reference runtime-provided mechanism"
      test_method: "inspection"
    - id: "AC-line-know"
      text: "Knowledge agent file remains under 150 lines after changes (estimated 118, 32-line headroom)"
      test_method: "inspection"
  workflow_lane: "unit-integration"
  e2e_required: false
  e2e_contract_path: null
  relevant_context:
    design_sections:
      - "design-output.yaml#payload.decisions[id='D-2']"
      - "design-output.yaml#payload.decisions[id='D-7']"
      - "design-output.yaml#payload.decisions[id='D-10']"
      - "design-output.yaml#payload.tool_name_corrections.knowledge"
      - "design-output.yaml#payload.file_inventory[path='v2/.github/agents/knowledge.agent.md']"
    spec_requirements:
      - "spec-output.yaml#payload.functional_requirements[id='FR-2']"
      - "spec-output.yaml#payload.functional_requirements[id='FR-7']"
    files_to_modify:
      - path: "v2/.github/agents/knowledge.agent.md"
        risk: "🟡"
