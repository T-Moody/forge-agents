      Tier 2 (medium — implementer, tester): terminal with command allowlist, file ownership.
      Tier 3 (low — researcher, architect): read-only + fetch_webpage with logging.
    confidence: "High"
    outcome: "Trust violations caught in code review R1 (3 Major), all fixed in R2."

