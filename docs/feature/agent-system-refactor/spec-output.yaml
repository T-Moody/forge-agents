agent_output:
  agent: "spec"
  instance: "spec"
  step: "step-2"
  started_at: "2026-03-09T19:30:00Z"
  completed_at: "2026-03-09T21:00:00Z"
  schema_version: "1.0"
  run_id: "2026-03-09T18:00:00Z"

  # ================================================================
  # PUSHBACK LOG
  # ================================================================
  pushback_log:
    concerns_identified: 3
    mode: "interactive"
    concerns:
      - severity: "Major"
        title: "Tester 150-line budget risk from exploratory QA"
        description: >
          Improvement #9 (exploratory QA) is inspired by a ~500-line TourneyPal QA agent.
          Adding testing phases, context rotation, and parallel subagent patterns to the
          tester could exceed the 150-line agent budget. Recommendation: add a lightweight
          exploratory checklist to the tester agent body and extract detailed QA procedures
          into an optional SKILL.md file.
        recommendation: "Use skill extraction to keep tester under 150 lines"
        user_response: "Accept as known risk"
        user_freeform: null
        auto_resolved: false

      - severity: "Major"
        title: "E2E skill autodetection complexity"
        description: >
          Autodetecting whether a project is a UI app vs API vs CLI to recommend the right
          E2E testing skill is error-prone. Misidentification leads to wrong defaults.
          Recommendation: make E2E setup primarily user-driven via ask_questions with
          multiple-choice options, with optional heuristics as hints.
        recommendation: "Primarily user-driven via ask_questions; heuristics optional"
        user_response: "Accept as known risk"
        user_freeform: null
        auto_resolved: false

      - severity: "Minor"
        title: "Documentation update step could corrupt instruction files"
        description: >
          Improvement #7 has agents modifying copilot-instructions.md and agent files,
          risking bloat, staleness, and contradictions. Recommendation: keep strictly
          advisory — knowledge agent proposes changes, user reviews and applies.
        recommendation: "Advisory only with diff-preview; user applies changes"
        user_response: "Accept as known risk"
        user_freeform: null
        auto_resolved: false

  # ================================================================
  # PAYLOAD
  # ================================================================
  payload:
    feature_name: "Agent System Refactor — v2 Targeted Improvements (Run 3)"

    # ================================================================
    # ARCHITECTURAL DIRECTIONS EVALUATED
    # ================================================================
    directions:
      - id: "A"
        name: "Targeted In-Place Edits (Recommended)"
        summary: >
          Modify existing v2 agent files with surgical, bounded changes for each of the
          10 improvements. No new agent files. Stays within 150-line per-agent budgets by
          keeping additions minimal and extracting complex additions (E2E procedures,
          exploratory QA phases) into optional SKILL.md files. Lowest disruption, highest
          confidence.

      - id: "B"
        name: "Targeted Edits + Hooks Enforcement"
        summary: >
          Same as Direction A but additionally introduces .github/hooks/ with PreToolUse
          hooks for deterministic tool restriction enforcement and git-command blocking.
          Higher security guarantees but adds hook infrastructure complexity and requires
          hook scripts (Preview feature, behavior may change).

    # ================================================================
    # COMMON REQUIREMENTS
    # ================================================================
    common_requirements:
      - id: "CR-1"
        text: >
          Individual agent files MUST remain under 150 lines after all changes.
          Complex additions MUST be extracted to SKILL.md files or reference
          documents rather than bloating agent files.
        priority: "must"

      - id: "CR-2"
        text: >
          All tool names in YAML frontmatter MUST use the correct VS Code
          built-in tool identifiers (flat camelCase: readFile, createFile,
          editFiles, etc.) as documented in the VS Code Copilot reference.
        priority: "must"

      - id: "CR-3"
        text: >
          Changes MUST be targeted additions to the existing v2 agent files
          in v2/.github/agents/ and v2/.github/prompts/. No new agent files
          may be created. New SKILL.md files under .github/skills/ are permitted.
        priority: "must"

      - id: "CR-4"
        text: >
          Interactive-mode features (ask_questions, plan approval, clarifying
          questions) MUST gracefully degrade in autonomous mode — skip the
          interaction and proceed with sensible defaults.
        priority: "must"

      - id: "CR-5"
        text: >
          All changes MUST preserve the existing v2 pipeline structure (8 steps),
          completion-contract routing (DONE/NEEDS_REVISION/ERROR), and zero-SQLite
          architecture.
        priority: "must"

    # ================================================================
    # FUNCTIONAL REQUIREMENTS — 10 improvements
    # ================================================================
    functional_requirements:
      # --- FR-1: E2E Contract/Guidance ---
      - id: "FR-1"
        text: "E2E Testing Skill Setup Guidance"
        sub_requirements:
          - id: "FR-1.1"
            text: >
              The orchestrator MUST check for existing E2E testing skills at Step 1
              (Setup) by scanning standard skill directories (.github/skills/,
              .agents/skills/) for SKILL.md files with E2E-related names or
              descriptions.
          - id: "FR-1.2"
            text: >
              In interactive mode, if no E2E skills are found, the orchestrator
              MUST present a multiple-choice question asking the user to select
              an E2E setup option: (a) Playwright CLI skill (UI apps),
              (b) HTTP API testing skill (API apps), (c) Skip E2E setup,
              (d) Custom setup. The orchestrator MUST NOT silently skip E2E.
          - id: "FR-1.3"
            text: >
              In autonomous mode, if no E2E skills are found, the orchestrator
              MUST log a warning in pipeline-log.yaml noting that E2E skills are
              not configured and dynamic testing will be limited. It MUST NOT
              attempt automatic skill installation.
          - id: "FR-1.4"
            text: >
              The tester agent's dynamic mode MUST reference discovered skill
              files by path rather than hardcoded skill category names. If a
              skill directory exists, load it; if not, skip that test category
              and record it as skipped.

      # --- FR-2: Correct Subagent Tool Usage ---
      - id: "FR-2"
        text: "Fix All Tool Names to Match VS Code Built-in Identifiers"
        sub_requirements:
          - id: "FR-2.1"
            text: >
              ALL tool names in ALL 8 agent YAML frontmatter files MUST be
              corrected from the invalid namespace/tool format to the correct
              flat camelCase format. Complete mapping:
              read/readFile->readFile, edit/createFile->createFile,
              edit/editFiles->editFiles, search/listDirectory->listDirectory,
              search/textSearch->textSearch, search/fileSearch->fileSearch,
              search/codebase->codebase, execute/runInTerminal->runInTerminal,
              execute/getTerminalOutput->getTerminalOutput, web/fetch->fetch,
              read/problems->problems, search/changes->changes, todo->todos,
              vscode/memory->(remove; memory is a setting not a tool).
          - id: "FR-2.2"
            text: >
              The orchestrator MUST retain 'agent' in its tools list (confirmed
              valid as a tool set that enables subagent dispatch). The orchestrator
              MUST also retain its 'agents:' frontmatter array listing all 7
              worker agent names.
          - id: "FR-2.3"
            text: >
              The orchestrator's instruction body MUST explicitly instruct the
              AI to use the runSubagent tool to dispatch agents, referencing
              each agent by its exact 'name:' from YAML frontmatter.
          - id: "FR-2.4"
            text: >
              All worker agents (non-orchestrator) MUST set user-invocable: false
              in their YAML frontmatter to prevent them from appearing in the
              VS Code agents dropdown. Only the orchestrator should be
              user-invocable.

      # --- FR-3: Architect Clarifying Questions ---
      - id: "FR-3"
        text: "Architect Asks Clarifying Questions in Interactive Mode"
        sub_requirements:
          - id: "FR-3.1"
            text: >
              The architect agent MUST add a clarification step between
              'Read Inputs' and 'Analyze Codebase' in its workflow. When
              approval_mode is 'interactive' AND the initial request contains
              ambiguities, the architect MUST present up to 5 clarifying
              questions using the structured question tool.
          - id: "FR-3.2"
            text: >
              In autonomous mode, the architect MUST skip the clarification
              step and proceed with reasonable assumptions, documenting each
              assumption in the architecture-output.yaml.
          - id: "FR-3.3"
            text: >
              The architect MUST be granted the structured question tool
              in its tools: frontmatter array.

      # --- FR-4: Planner Accept/Refine ---
      - id: "FR-4"
        text: "Planner Presents Plan for User Approval in Interactive Mode"
        sub_requirements:
          - id: "FR-4.1"
            text: >
              The planner agent MUST add a final workflow step that, in
              interactive mode, presents a summary of the plan (task count,
              wave structure, key dependencies) and asks the user to choose:
              (a) Accept plan, (b) Refine specific tasks, (c) Reject and
              re-plan.
          - id: "FR-4.2"
            text: >
              If the user selects 'Refine', the planner MUST accept freeform
              input describing the refinement and apply it within a single
              re-planning iteration (consistent with global-rules.md limits).
          - id: "FR-4.3"
            text: >
              In autonomous mode, the planner MUST skip the approval step and
              return DONE immediately after producing the plan.
          - id: "FR-4.4"
            text: >
              The planner MUST be granted the structured question tool
              in its tools: frontmatter array.

      # --- FR-5: Git Safety ---
      - id: "FR-5"
        text: "Subagents Must Not Run Conflicting Git Commands"
        sub_requirements:
          - id: "FR-5.1"
            text: >
              The implementer agent MUST NOT run 'git add -A', 'git add .',
              'git add --all', or any git staging/commit commands. The
              'git add -A' step MUST be removed from the implementer workflow.
              Git diff and git status remain permitted for read-only inspection.
          - id: "FR-5.2"
            text: >
              The implementer's command allowlist MUST be updated to remove
              'git add' and replace it with 'git diff' and 'git status' only.
          - id: "FR-5.3"
            text: >
              global-rules.md MUST add a rule: 'Only the orchestrator may
              run git staging (add) and commit commands. All other agents MUST
              NOT run git add, git commit, git push, git reset, or any
              write-mode git operations.'
          - id: "FR-5.4"
            text: >
              The orchestrator MUST consolidate all git staging to Step 8
              (Completion), staging only files declared in implementation
              reports' files_modified lists — not 'git add -A'.

      # --- FR-6: No Autocommit ---
      - id: "FR-6"
        text: "Remove Automatic Git Commit at Pipeline End"
        sub_requirements:
          - id: "FR-6.1"
            text: >
              The orchestrator MUST NOT automatically run 'git commit' at Step 8.
              Instead, it MUST stage changed files (using selective git add with
              pathspecs from implementation reports) and present a summary.
          - id: "FR-6.2"
            text: >
              In interactive mode, the orchestrator MUST present a choice:
              (a) Commit now with generated message, (b) Review changes first
              (leave staged), (c) Unstage all (git reset).
          - id: "FR-6.3"
            text: >
              In autonomous mode, the orchestrator MUST stage files but MUST NOT
              commit — leaving changes staged for developer review.

      # --- FR-7: Optional Documentation Update ---
      - id: "FR-7"
        text: "Optional Step to Update Documentation Using Knowledge Findings"
        sub_requirements:
          - id: "FR-7.1"
            text: >
              After the knowledge agent completes, in interactive mode, the
              orchestrator MUST present a choice: (a) Apply documentation
              recommendations, (b) Review only (no changes), (c) Skip.
          - id: "FR-7.2"
            text: >
              If the user selects 'Apply', the orchestrator MUST re-dispatch
              the knowledge agent with a 'doc-update' mode. The knowledge agent
              reads instruction-recommendations.md, identifies instruction files,
              and proposes targeted edits as diffs for user approval.
          - id: "FR-7.3"
            text: >
              The knowledge agent MUST NOT modify .agent.md files in doc-update
              mode. Only copilot-instructions.md, .instructions.md, and AGENTS.md
              files are in scope.
          - id: "FR-7.4"
            text: >
              In autonomous mode, this step MUST be skipped entirely.

      # --- FR-8: Architect Web Research ---
      - id: "FR-8"
        text: "Architect Performs Explicit Web Research When Enabled"
        sub_requirements:
          - id: "FR-8.1"
            text: >
              The architect agent MUST add an explicit 'Web Research' workflow
              step (between 'Analyze Codebase' and 'Identify Requirements')
              that executes when web_research_enabled is true.
          - id: "FR-8.2"
            text: >
              During web research, the architect MUST look up current framework
              docs, library APIs, and architectural patterns relevant to design
              decisions (capped at 3-5 targeted lookups).
          - id: "FR-8.3"
            text: >
              The existing fetch gate constraint MUST be preserved. The tool
              name MUST be corrected from 'web/fetch' to 'fetch' (per FR-2).

      # --- FR-9: Tester Exploratory QA ---
      - id: "FR-9"
        text: "Tester Performs Exploratory QA Beyond Running Test Suites"
        sub_requirements:
          - id: "FR-9.1"
            text: >
              The tester's dynamic mode MUST include an 'exploratory QA' phase
              after automated test suites. The tester acts as a real developer:
              trying the feature, testing edge cases, attempting to break
              functionality, and verifying the fix/feature works.
          - id: "FR-9.2"
            text: >
              Exploratory QA MUST cover at minimum: (a) happy path verification,
              (b) edge case testing (empty/boundary inputs), (c) error handling
              (invalid inputs), (d) state mutation (modify data mid-workflow).
          - id: "FR-9.3"
            text: >
              The tester MUST use available testing skills (Playwright CLI,
              HTTP API) for exploratory testing when they exist. Without skills,
              exploratory QA uses terminal-based interaction.
          - id: "FR-9.4"
            text: >
              Exploratory findings MUST be recorded in the test report with
              category 'exploratory' and severity ratings. Critical findings
              cause a 'fail' verdict.
          - id: "FR-9.5"
            text: >
              Exploratory QA instructions MUST stay within the tester's 150-line
              budget. Detailed procedures SHOULD be extracted to an optional
              .github/skills/exploratory-qa/SKILL.md if needed.

      # --- FR-10: Implementer TDD Best Practices ---
      - id: "FR-10"
        text: "Implementer Follows TDD Code Quality Principles"
        sub_requirements:
          - id: "FR-10.1"
            text: >
              The implementer MUST add a REFACTOR step after GREEN, changing
              the cycle from RED-GREEN-REPORT to RED-GREEN-REFACTOR-REPORT.
              The REFACTOR step is bounded: only refactor files in task.files[],
              only extract duplicates with >=3 occurrences, only rename for
              clarity.
          - id: "FR-10.2"
            text: >
              The implementer MUST include these code quality principles in its
              constraints: YAGNI, KISS, DRY, prefer functional patterns,
              avoid over-engineering, maintain lint compatibility, write minimal
              code to pass tests.
          - id: "FR-10.3"
            text: >
              The REFACTOR step MUST re-run the test suite to confirm no
              regressions. If tests fail after refactoring, revert and proceed
              with pre-refactor code.

    # ================================================================
    # ACCEPTANCE CRITERIA
    # ================================================================
    acceptance_criteria:
      # FR-1: E2E Contract/Guidance
      - id: "AC-1"
        text: >
          Orchestrator Step 1 contains skill directory scanning logic that
          checks .github/skills/ and .agents/skills/ for SKILL.md files.
        test_method: "inspection"
      - id: "AC-2"
        text: >
          In interactive mode with no E2E skills, the orchestrator presents
          a multiple-choice question with at least 3 options (Playwright,
          HTTP API, Skip). Verified by reading orchestrator instruction text.
        test_method: "inspection"
      - id: "AC-3"
        text: >
          In autonomous mode with no E2E skills, a warning is logged.
          No interactive prompt occurs.
        test_method: "inspection"

      # FR-2: Correct Tool Names
      - id: "AC-4"
        text: >
          Every tool name in every agent YAML frontmatter matches the VS Code
          built-in tool reference (flat camelCase). Zero instances of
          namespace/tool format remain across all 8 files.
        test_method: "inspection"
      - id: "AC-5"
        text: >
          The orchestrator tools: array contains 'agent' and its agents: array
          lists all 7 worker agent names.
        test_method: "inspection"
      - id: "AC-6"
        text: >
          The orchestrator body contains explicit text about using runSubagent
          tool and referencing agents by exact name: values.
        test_method: "inspection"
      - id: "AC-7"
        text: >
          All 7 non-orchestrator agents have user-invocable: false in YAML
          frontmatter.
        test_method: "inspection"

      # FR-3: Architect Clarifying Questions
      - id: "AC-8"
        text: >
          Architect workflow contains a clarification step between 'Read Inputs'
          and 'Analyze Codebase' gated by approval_mode='interactive'.
        test_method: "inspection"
      - id: "AC-9"
        text: >
          Architect tools: frontmatter includes a structured question tool.
        test_method: "inspection"

      # FR-4: Planner Accept/Refine
      - id: "AC-10"
        text: >
          Planner workflow contains a final step with 3-option question
          (Accept/Refine/Reject) gated by approval_mode='interactive'.
        test_method: "inspection"
      - id: "AC-11"
        text: >
          Planner tools: frontmatter includes the structured question tool.
        test_method: "inspection"

      # FR-5: Git Safety
      - id: "AC-12"
        text: >
          Implementer workflow does NOT contain 'git add -A', 'git add .',
          or 'git commit'. Allowlist permits only git diff and git status.
        test_method: "inspection"
      - id: "AC-13"
        text: >
          global-rules.md contains a rule stating only the orchestrator may
          run git staging and commit commands.
        test_method: "inspection"
      - id: "AC-14"
        text: >
          Orchestrator Step 8 stages files using selective pathspecs from
          implementation reports — not git add -A.
        test_method: "inspection"

      # FR-6: No Autocommit
      - id: "AC-15"
        text: >
          Orchestrator Step 8 does NOT contain unconditional 'git commit'.
          Interactive mode offers Commit/Review/Unstage choice.
        test_method: "inspection"
      - id: "AC-16"
        text: >
          Autonomous mode: orchestrator stages but does not commit.
        test_method: "inspection"

      # FR-7: Optional Documentation Update
      - id: "AC-17"
        text: >
          After knowledge agent in interactive mode, orchestrator presents
          Apply/Review/Skip choice for documentation updates.
        test_method: "inspection"
      - id: "AC-18"
        text: >
          Knowledge agent constraints prohibit modifying .agent.md files
          in doc-update mode.
        test_method: "inspection"

      # FR-8: Architect Web Research
      - id: "AC-19"
        text: >
          Architect workflow contains explicit 'Web Research' step gated by
          web_research_enabled=true, before requirement identification.
        test_method: "inspection"
      - id: "AC-20"
        text: >
          Architect fetch tool name is 'fetch' (not 'web/fetch').
        test_method: "inspection"

      # FR-9: Tester Exploratory QA
      - id: "AC-21"
        text: >
          Tester dynamic mode contains 'Exploratory QA' phase after automated
          tests covering: happy path, edge cases, error handling, state mutation.
        test_method: "inspection"
      - id: "AC-22"
        text: >
          Exploratory findings recorded in test report under category
          'exploratory' with severity ratings.
        test_method: "inspection"
      - id: "AC-23"
        text: >
          Tester agent file remains under 150 lines after changes.
        test_method: "inspection"

      # FR-10: Implementer TDD Best Practices
      - id: "AC-24"
        text: >
          Implementer workflow includes REFACTOR step between GREEN and REPORT,
          bounded to task files[] only.
        test_method: "inspection"
      - id: "AC-25"
        text: >
          Implementer constraints section lists: YAGNI, KISS, DRY, prefer
          functional patterns, avoid over-engineering, minimal code, lint
          compatibility.
        test_method: "inspection"
      - id: "AC-26"
        text: >
          REFACTOR step requires re-running tests and reverting if they fail.
        test_method: "inspection"

      # Cross-cutting
      - id: "AC-27"
        text: >
          All 8 agent files remain under 150 lines each after all changes.
        test_method: "inspection"

    # ================================================================
    # EDGE CASES
    # ================================================================
    edge_cases:
      - id: "EC-1"
        text: >
          E2E skills directory exists but contains no SKILL.md files — treat
          as 'no skills found' and prompt/warn accordingly.
      - id: "EC-2"
        text: >
          User selects 'Refine' for plan approval but provides empty input —
          re-present the question rather than proceeding with no changes.
      - id: "EC-3"
        text: >
          Architect finds zero ambiguities in interactive mode — skip the
          clarification step silently and proceed.
      - id: "EC-4"
        text: >
          REFACTOR step causes test regressions — revert refactoring
          automatically and use pre-refactor code for REPORT.
      - id: "EC-5"
        text: >
          Parallel implementers both run git status simultaneously — safe
          (read-only) and must be permitted.
      - id: "EC-6"
        text: >
          Knowledge agent re-dispatched for doc-update but
          instruction-recommendations.md is empty — return DONE with
          'No documentation updates needed'.
      - id: "EC-7"
        text: >
          Tester exploratory QA finds critical bug but no Playwright skill
          exists — record finding with terminal-based evidence.

    # ================================================================
    # CONSTRAINTS
    # ================================================================
    constraints:
      - "Each agent file MUST remain under 150 lines after changes"
      - "Total system size SHOULD remain under 1,500 lines"
      - "No new .agent.md files — only modify existing v2 files"
      - "New SKILL.md files MAY be created under .github/skills/"
      - "Pipeline structure (8 steps) MUST NOT change"
      - "Completion-contract routing MUST NOT change"
      - "Zero SQLite dependency MUST be maintained"
      - "All tool names must use correct VS Code built-in identifiers"

completion:
  status: "DONE"
  summary: "Spec complete: 10 FRs, 27 ACs, 7 edge cases for v2 targeted improvements"
  severity: null
  findings_count: 0
  risk_level: null
  output_paths:
    - "spec-output.yaml"
    - "feature.md"
