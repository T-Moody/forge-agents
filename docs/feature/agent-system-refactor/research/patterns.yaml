      - id: "F-1"
        title: "VS Code Copilot Customization Ecosystem (March 2026) provides native agent orchestration primitives that supersede custom enforcement patterns"
        category: "pattern"
        detail: |
          VS Code (as of March 2026) provides a comprehensive set of native primitives for multi-agent
          orchestration that directly map to capabilities the current agent system implements via
          custom instruction text:

          1. Custom Agents (.agent.md): YAML frontmatter (name, description, tools, agents) + markdown
             body. Agents can list other agents in their frontmatter `agents` field to enable handoff
             delegation. The v2 system already uses this format.

          2. Handoffs: Native agent-to-agent delegation. One agent can hand off to another agent listed
             in its `agents` frontmatter field. The receiving agent gets context-isolated execution.
             This is the native equivalent of the orchestrator's dispatch-to-subagent pattern.

          3. Subagents: Context-isolated spawning tracked via SubagentStart/SubagentStop lifecycle events.
             Subagents inherit workspace access but receive partial conversation context.

          4. Agent Skills (SKILL.md): Modular capability packages with progressive 3-level loading
             (discovery → instructions → resources). Open standard via agentskills.io. Portable across
             VS Code, Copilot CLI, and coding agents.

          5. Hooks: Deterministic lifecycle automation via shell commands at 8 lifecycle points.
             Can enforce security policies, automate code quality, create audit trails, inject context,
             and control approvals — all via code rather than instruction text.

          6. Custom Instructions (.instructions.md): File-based with applyTo glob patterns for
             conditional loading. Always-on via copilot-instructions.md, AGENTS.md, CLAUDE.md.

          The key architectural insight: the current system uses ~6,400 lines of instruction text to
          encode enforcement rules (tool restrictions, anti-drift anchors, evidence gates) that VS Code
          now provides natively via hooks (PreToolUse deny/allow), subagent lifecycle tracking
          (SubagentStart/Stop), and agent-scoped tool restrictions (frontmatter `tools` field).
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — agent frontmatter fields: name, description, tools, agents"
          - "https://code.visualstudio.com/docs/copilot/customization/hooks — 8 lifecycle events, PreToolUse permissionDecision, agent-scoped hooks"
          - "https://code.visualstudio.com/docs/copilot/customization/agent-skills — SKILL.md format, progressive loading, agentskills.io standard"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-instructions — .instructions.md with applyTo, priority cascading"
          - "v2/.github/agents/orchestrator.agent.md — already uses YAML frontmatter format with tools/agents lists"
        relevance: |
          The v2 refactor should leverage these native primitives instead of reimplementing them in
          instruction text. Hooks can replace anti-drift anchors and evidence gates. Agent frontmatter
          tool restrictions can replace instruction-encoded tool access matrices. SKILL.md can package
          E2E testing capabilities. This reduces instruction volume while gaining deterministic enforcement.

      - id: "F-2"
        title: "AutoGen GraphFlow provides DAG-based multi-agent coordination with parallel fan-out, conditional branching, and message filtering"
        category: "pattern"
        detail: |
          AutoGen v0.7.5 (stable) provides GraphFlow — a directed graph execution engine for multi-agent
          workflows. Key capabilities discovered via web research:

          1. DiGraphBuilder: Fluent API for constructing execution DAGs. Supports sequential chains,
             parallel fan-outs (writer → [editor1, editor2] → reviewer), conditional branching
             (edge conditions based on agent message content), and loops with safe exit conditions.

          2. Message Filtering: Separates execution graph from message graph. MessageFilterAgent wraps
             agents with PerSourceFilter rules controlling which messages each agent receives.
             Example: final_reviewer only sees last message from each editor, not the full history.
             This prevents hallucination and controls context size.

          3. Activation Groups: Complex dependency patterns for cyclic graphs.
             - "all" activation: target waits for ALL edges in group to be satisfied (join pattern)
             - "any" activation: target executes on FIRST satisfied edge (race pattern)
             - Mixed groups: different urgency levels coexist (critical=all, optional=any)

          4. Automatic source/leaf detection: GraphFlow computes entry and exit points automatically.
             Execution starts at all source nodes and completes when no nodes remain to execute.

          5. Conditional loops: Edges with lambda conditions (e.g., "APPROVE" in message) enable
             review cycles with bounded iteration via MaxMessageTermination.

          The v2 orchestrator implements a simpler version: DAG dispatch with max 4 concurrent agents,
          dependency edges, but no message filtering or activation groups. GraphFlow's message
          filtering pattern is particularly relevant — it solves the context bloat problem where
          downstream agents receive irrelevant upstream context.
        evidence:
          - "https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/graph-flow.html — DiGraphBuilder, parallel fan-out, conditional branching, activation groups"
          - "AutoGen GraphFlow — MessageFilterAgent with PerSourceFilter(source, position='last', count=1)"
          - "AutoGen GraphFlow — activation_group='critical' with activation_condition='all' vs 'any'"
          - "v2/.github/agents/orchestrator.agent.md — DAG dispatch algorithm: dependency resolution, max 4 concurrent, wave execution"
        relevance: |
          The v2 orchestrator's dispatch algorithm is architecturally aligned with GraphFlow but lacks
          message filtering. Downstream agents (reviewer, knowledge) currently receive full pipeline
          context. Adding per-agent context filtering (equivalent to PerSourceFilter) would reduce
          token usage and improve agent focus. The activation group pattern ("all" vs "any") maps to
          wave execution join semantics.

      - id: "F-3"
        title: "VS Code Hooks enable deterministic enforcement via code — replacing instruction-based anti-drift anchors and evidence gates"
        category: "pattern"
        detail: |
          VS Code Agent Hooks (Preview, March 2026) provide 8 lifecycle events for deterministic
          automation. Key patterns discovered:

          PreToolUse Hook — Tool Access Control:
            - Receives tool_name, tool_input, tool_use_id via stdin JSON
            - Returns permissionDecision: "deny" | "allow" | "ask"
            - Can modify tool input via updatedInput field
            - When multiple hooks run, most restrictive decision wins
            - Example: Block destructive commands (rm -rf, DROP TABLE) regardless of agent prompt
            - THIS REPLACES: instruction-encoded tool access matrices, command allowlists in agent files

          PostToolUse Hook — Automated Quality Gates:
            - Receives tool_name, tool_input, tool_response
            - Can block further processing via decision: "block"
            - Can inject additionalContext into conversation
            - Example: Run formatters/linters after file edits, validate test coverage
            - THIS REPLACES: instruction-based "run tests after implementation" enforcement

          Stop Hook — Completion Gates:
            - Can prevent agent from stopping via decision: "block" with reason
            - stop_hook_active field prevents infinite loops
            - Example: "Run the test suite before finishing"
            - THIS REPLACES: instruction-based completion contract enforcement

          Agent-Scoped Hooks (via frontmatter):
            - hooks field in .agent.md YAML frontmatter
            - Only fire when that specific agent is active (or invoked as subagent)
            - Run in addition to workspace/user-level hooks
            - Enables per-agent enforcement without instruction text

          Hook File Locations:
            - .github/hooks/*.json — project-specific, team-shared
            - .claude/settings.json — workspace-level
            - ~/.claude/settings.json — personal, cross-workspace
            - Agent frontmatter hooks field — agent-scoped

          Cross-tool compatibility: VS Code reads Claude Code and Copilot CLI hook configs with
          automatic format conversion (snake_case → camelCase, lowerCamelCase → PascalCase).
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/hooks — 8 lifecycle events, PreToolUse deny/allow/ask, PostToolUse block, Stop block"
          - "Hooks documentation — agent-scoped hooks via YAML frontmatter, .github/hooks/*.json location"
          - "Hooks documentation — permissionDecision priority: deny > ask > allow (most restrictive wins)"
          - "v2/.github/agents/implementer.agent.md — command allowlist enforced via instruction text (lines 45-55)"
          - "v2/.github/agents/reviewer.agent.md — command allowlist audit enforced via instruction text"
          - "NewAgents/.github/agents/ — anti-drift anchors in every agent file, ~50-100 lines each"
        relevance: |
          Hooks provide the single highest-impact opportunity for reducing instruction volume in the v2
          system. The current anti-drift anchors (~50-100 lines per agent), tool access matrices,
          command allowlists, and evidence gate enforcement could all move to deterministic hook scripts
          that execute code rather than relying on LLM instruction following. A PreToolUse hook denying
          run_in_terminal for researcher agents is more reliable than instruction text saying "you must
          not use the terminal." Agent-scoped hooks in frontmatter keep enforcement co-located with
          agent definitions.

      - id: "F-4"
        title: "TourneyPal QA Agent demonstrates parallel subagent model with context rotation and 7-phase testing strategy"
        category: "pattern"
        detail: |
          The TourneyPal QA agent (tourneypal-qa.agent.md, ~500 lines) implements an autonomous QA
          exploration system with patterns directly transferable to the v2 tester agent:

          Parallel Subagent Model:
            - 4 concurrent subagents (A: event lifecycle, B: game templates/settings, C: UI exploration,
              D: mutation/stress testing)
            - Main agent acts as coordinator — monitors subagent completion, relaunches when one finishes
            - Each subagent has a focused domain, preventing context overload

          Context Rotation Pattern:
            - Subagents stop after ~20 workflow executions OR when log output becomes too large
            - On stop, subagent returns structured summary: workflows tested, bugs discovered,
              unexplored paths remaining
            - Main agent spawns fresh subagent to continue from where previous left off
            - This prevents context window exhaustion during long-running exploratory testing

          7 Testing Phases (Priority Order):
            Phase 1: Happy Path — core workflows end-to-end
            Phase 2: State Mutation — delete mid-event, edit during event, reload mid-transaction
            Phase 3: Edge Cases — empty inputs, max-length strings, duplicates, special characters
            Phase 4: Navigation Chaos — back button, F5 refresh, tab switching, deep link direct access
            Phase 5: Mobile & Tablet UI — viewport resizing (375px/768px), touch targets, scroll behavior
            Phase 6: Apple-Style UI Validation — visual design audit
            Phase 7: State Replay — reproduce bugs, verify fixes

          Coverage Tracking Infrastructure:
            - docs/qa/workflow-inventory.md — all discoverable workflows
            - docs/qa/feature-inventory.md — all features per module
            - docs/qa/testing-progress.md — per-workflow status matrix (untested/in-progress/passed/failed)
            - docs/backlog/bugs/ — bug reports with reproduction steps
            - docs/backlog/ux/ — UX friction points

          Playwright CLI Integration:
            - All UI interaction via playwright-cli commands (navigate, fill, click, inspect, screenshot)
            - Named sessions for isolation: playwright-cli -s=qa-subagent-A
            - Mobile viewport switching via playwright-cli commands
        evidence:
          - "X:\\programProjects\\TourneyPal\\.github\\agents\\tourneypal-qa.agent.md — 4 parallel subagents, 7 testing phases, context rotation"
          - "TourneyPal QA agent — workflow/feature inventory tracking in docs/qa/"
          - "TourneyPal QA agent — bug discovery pipeline: docs/backlog/bugs/ and docs/backlog/ux/"
          - "TourneyPal QA agent — stopping condition: all workflows discovered + mutation tests complete + no new bugs"
        relevance: |
          The v2 tester agent currently supports a simpler model: static evidence evaluation OR dynamic
          test execution with skill-based testing. The TourneyPal QA agent's patterns suggest
          enhancements: (1) parallel subagent model for concurrent testing domains, (2) context rotation
          to handle long-running test sessions, (3) structured testing phases for systematic coverage,
          (4) coverage tracking infrastructure for progress visibility. The 7-phase model is particularly
          valuable — it provides a tested ordering from most-likely-to-find-bugs (happy path regressions)
          to hardest-to-automate (state replay).

      - id: "F-5"
        title: "VS Code Agent Skills (SKILL.md) with progressive loading align with E2E testing capability packaging"
        category: "pattern"
        detail: |
          VS Code Agent Skills provide a packaging format for modular agent capabilities. Key patterns
          from the documentation:

          SKILL.md Format:
            - YAML frontmatter: name (required), description (required), user-invocable (bool),
              disable-model-invocation (bool)
            - Markdown body: detailed instructions for the agent
            - Resource references: file paths loaded on demand (Level 3)

          Progressive 3-Level Loading:
            Level 1 — Discovery: Only name + description loaded. Agent sees skill exists but no details.
                       Cost: ~50 tokens per skill. Enables efficient skill inventory scanning.
            Level 2 — Instructions: Full markdown body loaded when agent decides skill is relevant.
                       Cost: skill-dependent, typically 200-2000 tokens.
            Level 3 — Resources: Referenced files loaded on demand.
                       Cost: varies by resource size.

          Skill Directory Locations:
            - .github/skills/ — repository-scoped, team-shared
            - .claude/skills/ — Claude/Copilot CLI compatible
            - .agents/skills/ — generic agent skills
            - Recursive search within directories

          Open Standard (agentskills.io):
            - Portable across VS Code, Copilot CLI, and coding agents
            - Separation of concern: skills define WHAT capability, agent defines WHEN to use it
            - /create-skill command for AI-assisted skill generation

          Mapping to v2 E2E Testing:
            The v2 tester agent defines 5 skill types: playwright-ui, http-api, cli, integration-tests,
            live-qa. Each maps naturally to a SKILL.md file:
            - .github/skills/playwright-ui/SKILL.md — browser interaction procedures
            - .github/skills/http-api/SKILL.md — API endpoint testing procedures
            - .github/skills/cli/SKILL.md — command-line testing procedures
            - .github/skills/integration-tests/SKILL.md — cross-component test procedures
            - .github/skills/live-qa/SKILL.md — interactive QA exploration procedures

          Progressive loading means the tester only loads full skill instructions when it decides
          testing is needed for that domain — efficient context budget management.

          The e2e-contract.yaml's skill_discovery_path field aligns with this: it points to a directory
          where E2E testing skills are stored, and the tester discovers them at Level 1 then loads
          on demand.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/agent-skills — SKILL.md format, progressive 3-level loading, agentskills.io standard"
          - "v2/.github/agents/tester.agent.md — 5 skill types: playwright-ui, http-api, cli, integration-tests, live-qa"
          - "NewAgents/.github/agents/e2e-integration.md — skill_discovery_path field in e2e-contract.yaml schema"
          - "TourneyPal .github/skills/playwright-automation/SKILL.md — existing real-world skill file"
        relevance: |
          The v2 tester agent's skill-based testing model should adopt SKILL.md as the packaging format
          for E2E testing capabilities. This provides: (1) progressive loading for context efficiency,
          (2) portability across VS Code and CLI, (3) standard discovery mechanism, (4) separation of
          test procedures (SKILL.md) from test orchestration (tester.agent.md). The existing
          TourneyPal playwright-automation skill proves the pattern works in production.

      - id: "F-6"
        title: "Instruction file organization — VS Code native patterns for always-on, conditional, and agent-scoped instructions"
        category: "pattern"
        detail: |
          VS Code provides three categories of instruction files, each with distinct loading behavior:

          Always-On Instructions (loaded for every prompt):
            - .github/copilot-instructions.md — repository-level, team-shared
            - AGENTS.md — repository root or nested subfolder (experimental: subfolder AGENTS.md for
              granular context)
            - CLAUDE.md — Claude-format compatibility
            - Priority: personal > repository > organization
            - Best practice: keep short and self-contained, focus on non-obvious rules

          File-Based Instructions (conditionally loaded when matching files in context):
            - .github/instructions/*.instructions.md — recursive search in .github/instructions/
            - applyTo glob patterns in YAML frontmatter determine when instructions load
            - Example: applyTo: "**/*.test.ts" loads testing instructions only when test files active
            - Example: applyTo: "src/api/**" loads API conventions only for API code

          Agent-Scoped Instructions (loaded only for specific agent):
            - .agent.md files with markdown body — loaded when agent is active
            - Agent frontmatter can reference other files via the agents field
            - Nested AGENTS.md in subdirectories (experimental) for subfolder-level context

          VS Code Documentation Tips for Writing Effective Instructions:
            - Include reasoning behind rules (not just rules themselves)
            - Show code examples of correct patterns
            - Focus on non-obvious rules that the model would not infer from code alone
            - Use Markdown headers and sections for structure
            - Keep instructions self-contained — do not rely on cross-references to other files

          Mapping to v2 Agent System:
            - global-rules.md → copilot-instructions.md (always-on, repository-level)
            - Per-agent .agent.md files → already aligned with native format
            - Instruction-encoded patterns (TDD, evidence, naming) → .instructions.md with applyTo globs
              e.g., TDD instructions apply only when test files are in context

          Current v2 approach uses global-rules.md as shared reference and per-agent .agent.md files.
          This already aligns well with VS Code's model. The gap is that v2 does not use .instructions.md
          for file-type-specific rules — all rules are in agent files regardless of relevance.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-instructions — always-on (copilot-instructions.md), file-based (.instructions.md with applyTo), priority cascading"
          - "VS Code instructions docs — tips: include reasoning, show code examples, focus on non-obvious rules"
          - "v2/.github/agents/global-rules.md — shared rules loaded by all agents (completion contract, retry policy, anti-hallucination)"
          - "v2/.github/agents/ — 8 agent files each containing rules that could be split by applyTo scope"
        relevance: |
          The v2 system can reduce per-agent instruction volume by extracting file-type-specific rules
          into .instructions.md files with applyTo globs. For example: TDD rules that apply when
          test files are in context, API naming conventions that apply for API files, YAML schema rules
          that apply for output files. This keeps agent files focused on orchestration and behavior
          while conditional instructions provide context-appropriate guidance.

      - id: "F-7"
        title: "Martin Fowler TDD (Red-Green-Refactor) — v2 implementer omits explicit refactoring step by design"
        category: "pattern"
        detail: |
          Martin Fowler's TDD methodology (from martinfowler.com/bliki/TestDrivenDevelopment.html):

          Core Cycle: Red-Green-Refactor
            1. RED: Write a test that fails (test describes desired behavior)
            2. GREEN: Write the simplest code to make the test pass
            3. REFACTOR: Clean up the code while keeping tests green

          Key Insights from Fowler:
            - "Write a test list at the start — not to be slavishly followed but to guide the process"
            - "Pick tests that teach you something and drive to salient design points"
            - "The third step — refactoring — is the most commonly neglected"
            - Test-first forces interface-first thinking: you design the API before the implementation
            - Tests serve as documentation: they describe what the code should do

          v2 Implementer Comparison (implementer.agent.md):
            - Uses strict RED-GREEN-REPORT cycle (not Red-Green-Refactor)
            - RED: Write failing unit test for the change
            - GREEN: Write minimum code to pass
            - REPORT: Generate completion report with evidence
            - No explicit REFACTOR step

          Analysis of the Omission:
            The v2 implementer deliberately omits the refactoring step. This appears to be a pragmatic
            choice: LLM agents tend to over-refactor when given permission, introducing scope creep
            and unnecessary changes. The REPORT step replaces REFACTOR to bound agent behavior.

            However, Fowler's insight that "refactoring is the most commonly neglected" and also
            "where code quality happens" suggests a gap. Without refactoring, the v2 implementer
            produces code that passes tests but may accumulate technical debt (duplicate code,
            poor naming, missing abstractions).

            A middle ground: bounded refactoring with explicit scope constraints
            (e.g., "refactor only the files you modified, only extract duplicates > 3 occurrences").
        evidence:
          - "https://martinfowler.com/bliki/TestDrivenDevelopment.html — Red-Green-Refactor, test list, refactoring most commonly neglected"
          - "v2/.github/agents/implementer.agent.md — RED-GREEN-REPORT cycle, strict TDD enforcement"
          - "v2/.github/agents/implementer.agent.md — file ownership enforcement, NEEDS_REVISION for undeclared files"
        relevance: |
          The designer should consider whether the v2 implementer needs a bounded refactoring step.
          The current RED-GREEN-REPORT cycle produces working code but may accumulate debt. If
          refactoring is added, it must be strictly bounded (only modified files, explicit scope limits)
          to prevent the agent over-refactoring problem. The reviewer agent already catches code
          quality issues — the question is whether to catch them earlier via implementer refactoring
          or later via review feedback loops.

      - id: "F-8"
        title: "Git safety for parallel agent execution — file ownership exclusivity + selective staging pattern"
        category: "pattern"
        detail: |
          The v2 system addresses git safety for parallel agent execution through two mechanisms:

          File Ownership Exclusivity (planner.agent.md):
            - Planner assigns file ownership per task — no two tasks may modify the same file
            - Dependency edges inserted when ownership collision detected
            - This is enforced at planning time, preventing parallel conflicts by construction
            - If a file must be modified by multiple tasks, dependency edges serialize them

          Selective Git Staging (global-rules.md):
            - Agents stage only their owned files: git add <pathspec>
            - NEVER git add -A (stages everything, would include other agents' uncommitted changes)
            - git add -p available for interactive hunk staging (manual intervention only)

          Git Operation Serialization:
            - No concurrent git operations within a session
            - Orchestrator sequences git commits between wave boundaries

          Industry Context (from git-scm.com/docs/git-add):
            - git add supports pathspec patterns: git add src/feature/*.ts
            - git add --dry-run (-n) for previewing what would be staged
            - .gitignore respected in all cases

          Gap Analysis:
            The v2 system handles the common case (parallel agents modifying different files) well.
            The uncommon case (merge conflicts from structural changes like imports/exports) is
            not explicitly addressed. If Agent A adds an import to a shared module and Agent B
            does the same, the planner's file ownership would serialize them — but only if the
            planner identifies the shared module as a dependency of both tasks.
        evidence:
          - "v2/.github/agents/planner.agent.md — file ownership exclusivity, dependency edge insertion for collision avoidance"
          - "v2/.github/agents/global-rules.md — no concurrent git operations, selective git add"
          - "https://git-scm.com/docs/git-add — pathspec patterns, --dry-run, selective staging"
          - "v2/.github/agents/orchestrator.agent.md — wave execution with dependency resolution"
        relevance: |
          The file ownership exclusivity + selective staging pattern is sound for the common case.
          Downstream design should consider: (1) whether the planner consistently identifies shared
          files (imports, configs, package.json) as potential collision points, (2) whether a
          PreToolUse hook should validate that agents only modify their owned files (deterministic
          enforcement vs instruction-based), (3) whether git add --dry-run should be a mandatory
          pre-commit check.

      - id: "F-9"
        title: "E2E setup guidance — autodetection table and interactive onboarding from e2e-integration.md"
        category: "pattern"
        detail: |
          The NewAgents e2e-integration.md defines an E2E onboarding pattern with autodetection and
          interactive confirmation:

          App Type Autodetection Table:
            - package.json with "start" script → Node.js, port 3000, ready: HTTP 200
            - package.json with "dev" script → Node.js (Vite/Next), port 5173, ready: HTTP 200
            - *.csproj with <OutputType>Exe → .NET, port 5000, ready: HTTP 200
            - pyproject.toml or setup.py → Python, port 8000, ready: HTTP 200
            - go.mod → Go, port 8080, ready: HTTP 200
            - Defaults can be overridden in e2e-contract.yaml

          4-Step Interactive Setup Flow:
            Step 1 — Repo Scan: Scan workspace for project files, detect app type
            Step 2 — Skill Discovery: Search skill directories for existing E2E skills
            Step 3 — Contract Synthesis: Generate e2e-contract.yaml from detected config
            Step 4 — User Confirmation: Present detected config, ask user to confirm/modify

          Structured Command Format:
            - Commands expressed as structured objects, not raw shell strings
            - Example: { executable: "dotnet", args: ["run", "--project", "src/Web"], port: 5000 }
            - Prevents shell injection and enables cross-platform command construction

          DB Isolation Strategies:
            - per-instance-db: Each test session gets a fresh database (safest, slowest)
            - transaction-rollback: Wrap each test in a transaction, roll back after (fast, limited)
            - shared-with-locking: Shared DB with advisory locks (fastest, complex)

          Port Allocation Formula:
            - Base port + task index offset for parallel test isolation
            - Prevents port conflicts when multiple E2E sessions run simultaneously

          E2E Contract Schema (e2e-contract.yaml):
            - app_type, executable, start_command, port, ready_check
            - skill_discovery_path: where to find E2E testing skills
            - trust_level: how much of the contract content agents can trust
            - browser.tool: "playwright-cli" for browser automation
        evidence:
          - "NewAgents/.github/agents/e2e-integration.md — autodetection table, 4-step interactive setup, structured command format"
          - "NewAgents/.github/agents/e2e-integration.md — DB isolation strategies, port allocation formula"
          - "NewAgents/.github/agents/e2e-integration.md — e2e-contract.yaml schema with skill_discovery_path"
          - "v2/.github/agents/tester.agent.md — references skill-based testing but does not define onboarding flow"
        relevance: |
          The e2e-integration.md patterns provide a tested onboarding flow for E2E testing setup.
          The v2 tester agent references skill-based testing but lacks the autodetection and
          interactive setup flow. If the v2 system needs E2E capabilities, the autodetection table
          and 4-step setup flow from e2e-integration.md should be preserved — either as a SKILL.md
          or as a reference document linked from the tester agent.

      - id: "F-10"
        title: "AutoGen Swarm handoff pattern maps to VS Code native handoffs for agent-to-agent delegation"
        category: "pattern"
        detail: |
          AutoGen provides multiple multi-agent coordination models, each with a VS Code native
          equivalent:

          AutoGen SelectorGroupChat → VS Code Agent with agents list:
            - Centralized selector (LLM or custom function) picks next speaker
            - VS Code equivalent: orchestrator.agent.md with agents field listing available agents
            - Both use a central coordinator to determine which agent acts next

          AutoGen Swarm (OpenAI-style handoffs) → VS Code Handoffs:
            - Agents transfer control to other agents via tool calls
            - Context and conversation history passed to next agent
            - VS Code agents can hand off to agents listed in their frontmatter
            - Both enable decentralized agent-to-agent delegation

          AutoGen GraphFlow → v2 Orchestrator DAG Dispatch:
            - Directed graph defines execution order
            - Parallel fan-out with join semantics
            - Conditional branching based on agent output
            - v2 orchestrator uses similar DAG with dependency resolution and max 4 concurrent

          AutoGen Memory (cross-session) → VS Code Memory Tool:
            - Agents store and retrieve learnings across sessions
            - v2 knowledge agent uses memory tool for cross-session insights

          Key Difference — Message Filtering:
            AutoGen's MessageFilterAgent (PerSourceFilter with position/count) has no direct VS Code
            equivalent. VS Code subagents get partial context from the parent's conversation, but
            there is no declarative per-source message filtering.

            This is the most impactful gap: without message filtering, downstream agents (reviewer,
            knowledge) receive full pipeline context including irrelevant upstream messages. This
            wastes tokens and can cause hallucination.

          Key Difference — Activation Groups:
            AutoGen's activation groups ("all" vs "any" for multi-input joins) have no VS Code
            equivalent. The v2 orchestrator implements join semantics manually via wave boundaries
            and dependency tracking.
        evidence:
          - "https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/graph-flow.html — GraphFlow, DiGraphBuilder, message filtering, activation groups"
          - "https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/index.html — SelectorGroupChat, Swarm, GraphFlow, Magentic-One"
          - "v2/.github/agents/orchestrator.agent.md — DAG dispatch, max 4 concurrent, dependency resolution"
          - "v2/.github/agents/knowledge.agent.md — memory tool for cross-session learnings"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — agents field for handoffs"
        relevance: |
          The mapping between AutoGen patterns and VS Code natives validates the v2 architecture.
          Two gaps worth addressing: (1) message filtering — downstream agents should receive
          only relevant context, not full pipeline history, and (2) activation groups — the
          orchestrator's manual wave/dependency management could be formalized. The Swarm → Handoff
          mapping suggests the v2 system could support decentralized delegation where any agent
          can hand off to another (e.g., implementer hands off to tester directly) instead of
          routing everything through the orchestrator.

      - id: "F-11"
        title: "Playwright E2E setup follows npm init scaffolding pattern with VS Code extension integration"
        category: "pattern"
        detail: |
          Playwright provides a standardized E2E project setup pattern:

          Scaffold Command: npm init playwright@latest
            - Creates playwright.config.ts with default configuration
            - Creates tests/ directory with example spec files
            - Creates tests-examples/ with demo tests
            - Optionally adds GitHub Actions workflow
            - Installs browsers (Chromium, WebKit, Firefox)

          Configuration (playwright.config.ts):
            - testDir: test directory path
            - fullyParallel: parallel test execution (default: true)
            - workers: number of parallel workers
            - reporter: output format (html, list, json)
            - projects: browser configurations (Chromium, Firefox, WebKit, Mobile Chrome, Mobile Safari)
            - webServer: auto-start application before tests

          VS Code Integration:
            - Playwright Test for VS Code extension available
            - Run/debug tests from editor
            - Pick locators via browser inspector
            - Watch mode for iterative development

          CLI Commands:
            - npx playwright test — run all tests
            - npx playwright test --project=chromium — specific browser
            - npx playwright show-report — open HTML report
            - npx playwright codegen — record/generate tests

          Mapping to Agent System E2E:
            The e2e-integration.md's structured command format maps to playwright.config.ts's webServer
            field. The skill_discovery_path maps to the tests/ directory. The port allocation formula
            maps to playwright.config.ts's webServer.port. The agent system adds orchestration
            (contract, skills, autodetection) on top of Playwright's native scaffolding.
        evidence:
          - "https://playwright.dev/docs/intro — npm init playwright@latest scaffolding, playwright.config.ts, parallel execution"
          - "Playwright docs — webServer config for auto-starting application, project configurations for browsers"
          - "NewAgents/.github/agents/e2e-integration.md — structured command format, port allocation, skill discovery"
          - "v2/.github/agents/tester.agent.md — playwright-ui skill type for browser testing"
        relevance: |
          The v2 E2E setup should leverage Playwright's native scaffolding (npm init playwright@latest)
          rather than custom setup scripts. The e2e-contract.yaml bridges the gap between Playwright's
          config and the agent system's needs (autodetection, skill discovery, trust levels). A
          SKILL.md for playwright-ui could reference playwright.config.ts as a Level 3 resource.

      - id: "F-12"
        title: "v2 completion contract pattern (DONE/NEEDS_REVISION/ERROR) is simpler than industry alternatives and should be preserved"
        category: "pattern"
        detail: |
          The v2 system uses a 3-state completion contract defined in global-rules.md:

          DONE: Agent completed successfully. Includes summary and output paths.
          NEEDS_REVISION: Agent found issues requiring upstream rework. Includes revision details.
          ERROR: Agent encountered a fundamental failure. Includes error reason.

          Compared to industry alternatives:
            - AutoGen: Uses StopMessage + TaskResult with stop_reason. No typed revision mechanism.
            - LangGraph: Uses state graph transitions. Completion is implicit (reaching end node).
            - OpenAI Swarm: Uses agent transfer (handoff) for routing. No explicit completion state.
            - Anthropic: Uses tool_use / tool_result protocol. No agent-level completion contract.

          The v2 completion contract is uniquely suited for instruction-based agents because:
            1. It is text-based (not code-based), so LLM agents can reliably produce it
            2. NEEDS_REVISION creates a feedback loop without orchestrator logic changes
            3. The 3 states are exhaustive and mutually exclusive — no ambiguous states
            4. Bounded by global-rules.md iteration limits (impl-test: 3, code review: 2, design: 1)

          The v2 system eliminated the v1 system's additional states (BLOCKED, PARTIAL, DEFERRED)
          which caused ambiguous routing. This simplification aligns with Anthropic's guidance:
          "Keep your agent's interface simple: a few clear, well-documented tools."

          The bounded feedback loops (hard iteration limits) are critical — they prevent the
          infinite-revision problem seen in unbounded multi-agent systems.
        evidence:
          - "v2/.github/agents/global-rules.md — completion contract DONE/NEEDS_REVISION/ERROR, feedback loop limits"
          - "v2/.github/agents/orchestrator.agent.md — completion contract routing, max 4 concurrent dispatch"
          - "AutoGen GraphFlow — StopMessage + TaskResult, no typed revision"
          - "Anthropic Building Effective Agents (referenced in Run 2 findings) — simple interfaces, well-documented tools"
        relevance: |
          The completion contract is one of the v2 system's best patterns — it should be preserved
          unchanged in the refactored system. The 3-state model with bounded iteration limits is
          more robust than code-based alternatives for instruction-driven agents.

    summary: |
      Run 3 research focused on external patterns and VS Code ecosystem capabilities that inform
      the agent-system-refactor. Key findings:

      1. VS Code (March 2026) provides native primitives — hooks, handoffs, subagents, skills,
         instructions — that can replace custom enforcement patterns currently encoded in ~6,400 lines
         of instruction text. Hooks (F-3) are the highest-impact opportunity: PreToolUse deny/allow
         replaces instruction-based tool restrictions with deterministic code enforcement.

      2. AutoGen GraphFlow (F-2, F-10) validates the v2 orchestrator's DAG architecture but reveals
         a gap: message filtering. Downstream agents should receive only relevant context, not full
         pipeline history. VS Code does not yet have a native equivalent.

      3. The TourneyPal QA agent (F-4) demonstrates a production-tested parallel subagent model
         with context rotation and 7-phase testing strategy — directly applicable to the v2 tester.

      4. VS Code Agent Skills (F-5) with progressive 3-level loading provide the packaging format
         for E2E testing capabilities. The v2 tester's 5 skill types map naturally to SKILL.md files.

      5. Instruction file organization (F-6) should leverage VS Code's native .instructions.md with
         applyTo globs for file-type-specific rules, keeping agent files focused on orchestration.

      6. Martin Fowler TDD (F-7) confirms the v2 implementer's Red-Green cycle but highlights the
         omitted refactoring step as a deliberate trade-off (agents over-refactor when given permission).

      7. Git safety (F-8) via file ownership exclusivity + selective staging is sound. Could be
         strengthened with PreToolUse hook validation.

      8. E2E setup (F-9, F-11) patterns from e2e-integration.md and Playwright provide tested
         onboarding flows that the v2 tester should adopt.

      9. The v2 completion contract (F-12) is simpler and more robust than industry alternatives
         and should be preserved unchanged.

      Patterns worth preserving from v2: completion contract (F-12), file ownership exclusivity (F-8),
      skill-based testing model (F-5), DAG dispatch (F-2/F-10).

      Patterns to adopt from VS Code native: hooks for enforcement (F-3), SKILL.md for capabilities
      (F-5), .instructions.md for conditional rules (F-6), handoffs for delegation (F-10).

      Gaps to address: message filtering for downstream agents, bounded refactoring step, deterministic
      file ownership validation via hooks.

