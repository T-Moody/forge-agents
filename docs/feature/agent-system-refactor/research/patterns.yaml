      - url: "https://microsoft.github.io/autogen/stable/user-guide/core-user-guide/design-patterns/handoffs.html"
        topic: "AutoGen Handoffs pattern (from OpenAI Swarm)"
        key_findings: |
          Agents delegate tasks via special 'delegate tools.' Triage agent routes to specialized
          agents (Sales, Issues, Human). Full chat history passed with handoff. Each agent has
