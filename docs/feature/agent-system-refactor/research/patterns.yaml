        key_findings: |
          Central thesis: most successful implementations use simple, composable patterns, not complex frameworks.
          Five workflow patterns: prompt chaining, routing, parallelization, orchestrator-workers, evaluator-optimizer.
          Three core principles: maintain simplicity, prioritize transparency, carefully craft ACI.
          Key quote: 'start by using LLM APIs directly: many patterns can be implemented in a few lines of code.'
