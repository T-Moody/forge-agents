      - id: "F-2"
        title: "SQLite is the central state management dependency"
        category: "dependency"
        detail: |
          SQLite (via sqlite3 CLI) is the primary external tool dependency for pipeline state management.
          It serves 4 distinct purposes through verification-ledger.db:

          1. Evidence tracking (anvil_checks table) — Written by: Orchestrator, Implementer, Verifier, Adversarial Reviewer. 
             Used for evidence gate queries (EG-1 through EG-10).
          2. Pipeline telemetry (pipeline_telemetry table) — Written by: Orchestrator only (after each dispatch).
             Used by Knowledge Agent for post-mortem analysis.
          3. Artifact evaluations (artifact_evaluations table) — Written by: Implementer, Verifier, Adversarial Reviewer.
             Used by Knowledge Agent for quality analysis.
          4. Instruction updates (instruction_updates table) — Written by: Knowledge Agent only.
             Used for governed instruction update audit trail.

          SQL is always piped via stdin to avoid shell injection (sql-templates.md §0).
          WAL mode + busy_timeout=5000 set at Step 0 (global-operating-rules.md §3).
          SQLITE_BUSY retry: 3 attempts with exponential backoff (1s, 2s, 4s).

          5 agents directly write to SQLite: Orchestrator, Implementer, Verifier, Adversarial Reviewer, Knowledge Agent.
          The remaining 4 agents (Researcher, Spec, Designer, Planner) have NO SQLite dependency.

          sql-templates.md is the longest reference doc (~1070 lines across §0-§9) with:
            - §0: Sanitization requirements (sql_escape, stdin piping, quoting conventions)
            - §1: DDL (4 tables, indexes, constraints)
            - §1.1: Archive check query
            - §2, §2a: INSERT templates (anvil_checks, TDD, E2E)
            - §3: pipeline_telemetry INSERT
            - §4: artifact_evaluations INSERT
            - §5: instruction_updates INSERT
            - §6: Evidence gate queries (EG-1 through EG-10 + composites)
            - §7: Post-mortem analysis queries
            - §8: Instruction update audit queries
            - §9: Schema evolution strategy
        evidence:
          - "NewAgents/.github/agents/sql-templates.md lines 1-10 (header: consumers listed as Orchestrator, Implementer, Verifier, Adversarial Reviewer, Knowledge Agent)"
          - "NewAgents/.github/agents/sql-templates.md lines 78-200 (§1 DDL: 4 tables with CHECK constraints and indexes)"
          - "NewAgents/.github/agents/sql-templates.md lines 636-928 (§6 evidence gate queries EG-1 through EG-10)"
          - "NewAgents/.github/agents/global-operating-rules.md lines 54-68 (§3 SQLITE_BUSY handling)"
          - "NewAgents/.github/agents/tool-access-matrix.md line 14 (run_in_terminal column showing which agents get terminal access)"
        relevance: "The initial request explicitly mentions considering removal of SQLite. This finding maps exactly which agents and which operations would need replacement. 5 of 9 agents write SQL. The 10 evidence gates (EG-1 through EG-10) are the pipeline's verification backbone."

      - id: "F-3"
        title: "Evidence gate dependency chain (EG-1 through EG-10)"
        category: "dependency"
        detail: |
          Evidence gates are SQL queries that the orchestrator executes to make routing decisions.
          They form a critical dependency chain: agents INSERT check records → orchestrator SELECTs to verify → routing continues or halts.

          Evidence gate map (defined in sql-templates.md §6, consumed by orchestrator.agent.md):

          Verification gates (Step 6):
            - EG-1: Baseline exists — COUNT baseline records per task. Producer: Implementer/Verifier.
            - EG-10(unit-only): ≥2 passed checks (baseline-captured, tdd-compliance). Producer: Verifier.
            - EG-10(unit-integration): ≥3 passed checks (+behavioral-coverage). Producer: Verifier.
            - EG-10(full-tdd-e2e): ≥3 passed non-E2E checks. Producer: Verifier.
            - EG-10(e2e-additive): ≥1 e2e-test-execution passed. Producer: Verifier Tier 5. Gated on e2e_required=true.
            - EG-7: behavioral-coverage passed=1. BLOCKING for code tasks. Producer: Verifier.
            - EG-8: tdd-compliance passed=1. BLOCKING for code tasks. Producer: Verifier.
            - EG-9: e2e-test-execution passed=1 + sub-phase cross-check. BLOCKING when e2e_required=true. Producer: Verifier Tier 5.

          Review gates (Steps 3b, 7):
            - EG-3: 3 distinct reviewer instances submitted. Producer: Adversarial Reviewer (3 instances × 3 INSERTs each = 9 records).
            - EG-4: Zero blocker verdicts. Producer: Adversarial Reviewer.
            - EG-5: Each instance has 3 category records (security, architecture, correctness). Producer: Adversarial Reviewer.
            - EG-6: ≥2 of 3 reviewers fully approve (all 3 verdicts = approve). Producer: Adversarial Reviewer. Uses scope-qualified check_names.

          Gate evaluation order (Step 6): EG-1 → EG-10(lane) → EG-10(e2e-additive) → EG-7 → EG-8 → EG-9
          Gate evaluation (Steps 3b, 7): EG-3 → EG-5 → EG-4 → EG-6

          Check_name values that agents produce (critical for EG queries to work):
            Verifier: baseline-captured, tdd-compliance, behavioral-coverage, e2e-test-execution, e2e-suite-execution, e2e-exploratory, e2e-adversarial-composite, e2e-adversarial
            Adversarial Reviewer: review-{scope}-security, review-{scope}-architecture, review-{scope}-correctness (scope = design or code)
            Implementer: baseline-ide-diagnostics, baseline-build (baseline-phase records)
            Orchestrator: e2e-contract-found, e2e-contract-validation
        evidence:
          - "NewAgents/.github/agents/sql-templates.md lines 636-928 (§6 all EG queries with check_name values)"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 207-211 (Step 3b review gates), 296-300 (Step 6 verification gates), 340-344 (Step 7 code review gates)"
