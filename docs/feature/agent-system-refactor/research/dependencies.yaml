      # ===== ROUND 2 FINDINGS — DAG/WORKFLOW ORCHESTRATION DEEP RESEARCH =====

      - id: "F-14"
        title: "Apache Airflow — DAG orchestration patterns applicable to agent pipelines"
        category: "pattern"
        detail: |
          Apache Airflow (v3.1.7) is the most mature open-source DAG orchestration system.
          Key patterns extracted from documentation research:

          TASK/NODE DEFINITION:
            - Tasks defined as Python functions decorated with @task, or as Operator instances (BashOperator, PythonOperator, etc.)
            - Three task types: Operators (predefined templates), Sensors (wait for external events), TaskFlow (@task decorated functions)
            - Tasks have rich lifecycle states: none → scheduled → queued → running → success/failed/skipped/upstream_failed/up_for_retry

          DEPENDENCY DECLARATION:
            - Bitshift operators: first_task >> second_task >> [third_task, fourth_task]
            - Explicit methods: task.set_upstream() / task.set_downstream()
            - cross_downstream([op1, op2], [op3, op4]) for cross-product dependencies
            - chain(op1, op2, op3, op4) for linear chains, including pairwise list chains
            - Dependencies are declarative — the DAG engine resolves execution order

          PARALLEL EXECUTION:
            - Executor abstraction determines parallelism: LocalExecutor (in-process), CeleryExecutor (queued workers), KubernetesExecutor (containerized)
            - Multiple executors can run concurrently (since v2.10)
            - Tasks without direct dependencies run in parallel automatically
            - TaskGroups organize parallel tasks hierarchically
            - Per-task executor selection: @task(executor="LocalExecutor")

          STATE TRACKING:
            - PostgreSQL or MySQL metadata database (NOT SQLite in production) stores all DAG run, task instance, and event state
            - Each DAG Run has: data_interval, logical_date, start_date, end_date
            - Task Instances track: state, attempt count, execution dates, XCom results
            - XComs (cross-communications) pass data between tasks

          CONTROL FLOW:
            - Branching: @task.branch returns task_id to follow, others skip
            - Trigger Rules: all_success (default), all_failed, all_done, one_success, one_failed, none_failed, always — 12 total options
            - Depends On Past: task runs only if previous DAG run's same task succeeded
            - Setup/Teardown: create resource → use → destroy pattern

          APPLICABILITY TO AGENT SYSTEM:
            - The >> dependency operator pattern maps directly to our pipeline step ordering
            - Trigger Rules (especially all_done, none_failed) could replace evidence gates for simpler gate conditions
            - cross_downstream and chain patterns could express our wave-based parallelism
            - The Executor abstraction (local vs. remote) mirrors our runSubagent dispatch
            - Airflow's metadata DB dependency is analogous to our SQLite dependency — neither is removable in a full-featured system
        evidence:
          - "https://airflow.apache.org/docs/apache-airflow/stable/core-concepts/dags.html (DAG definition, task dependencies, >> operators, branching, trigger rules)"
          - "https://airflow.apache.org/docs/apache-airflow/stable/core-concepts/tasks.html (task states, relationships, timeouts, xcom)"
          - "https://airflow.apache.org/docs/apache-airflow/stable/core-concepts/executor/index.html (executor types: Local, Celery, Kubernetes, multiple concurrent)"
        relevance: "Airflow's declarative dependency model (>>) and trigger rules could inspire a simpler gate mechanism than SQL queries. However, Airflow itself requires a persistent database — confirming that DAG orchestration systems generally need persistent state storage."

      - id: "F-15"
        title: "Prefect — modern workflow orchestration with implicit dependencies and state hooks"
        category: "pattern"
        detail: |
          Prefect (v3) reimagines workflow orchestration with a code-first, Pythonic approach.
          Key patterns extracted from documentation research:

          TASK/NODE DEFINITION:
            - @flow decorator on entry-point function; @task decorator on steps
            - Tasks are just Python functions — any function can become a task
            - Flows can contain child flows (subflows), creating hierarchical execution
            - task.map(iterable) for fan-out parallel execution across items

          DEPENDENCY DECLARATION:
            - IMPLICIT: Dependencies inferred from Python function call graph — no explicit >> needed
            - If task B calls task A's return value, B depends on A automatically
            - No separate DAG definition file — the code IS the DAG
            - Fundamentally different from Airflow's explicit dependency declaration

          STATE MANAGEMENT:
            - Rich state machine: Scheduled, Late, AwaitingRetry, AwaitingConcurrencySlot, Pending, Running, Retrying, Paused, Suspended, Cancelling, Cancelled, Completed, Cached, RolledBack, Failed, TimedOut, Crashed (17 states)
            - States have both a name (visual) and type (orchestration logic)
            - State change hooks: callbacks on state transitions for custom logic
            - Return value determines final state: return Failed() explicitly marks failure
            - return_state=True allows conditional flow based on task terminal state

          PARALLEL EXECUTION:
            - task.submit() dispatches to a TaskRunner (ThreadPoolTaskRunner default, ProcessPoolTaskRunner for isolation)
            - task.map(items) fans out across items in parallel
            - Concurrency managed via work pools and concurrency slots

          ERROR HANDLING:
            - @flow(retries=3, retry_delay_seconds=10) and @task(retries=3, retry_delay_seconds=10)
            - timeout_seconds on both flows and tasks
            - Cache policies: INPUTS, TASK_SOURCE, RUN_ID — skip re-execution on cache hit

          APPLICABILITY TO AGENT SYSTEM:
            - Implicit dependency from call graph is relevant — our pipeline already has implicit linear step order
            - The rich state model (17 states) far exceeds our simple DONE/ERROR/NEEDS_REVISION
            - task.map() fan-out maps to our parallel researcher/reviewer dispatch
            - State change hooks could replace evidence gate pattern: register callbacks on agent completion instead of SQL polling
            - Cache policies could prevent re-running already-complete pipeline steps on retry
        evidence:
          - "https://docs.prefect.io/v3/get-started/quickstart (Prefect quickstart: @flow/@task decorators, dynamic DAG from code)"
          - "https://docs.prefect.io/v3/develop/write-flows (flow/task definition, child flows, submit, map, timeout, task_runner)"
          - "https://docs.prefect.io/v3/develop/write-tasks (task configuration: retries, cache, timeout, tags)"
          - "https://docs.prefect.io/v3/concepts/states (17 states, state types vs names, state transitions, return_state, hooks)"
        relevance: "Prefect's state change hooks are the most directly applicable pattern. Hooks (on_completion, on_failure callbacks) could entirely replace SQL evidence gates — the orchestrator would register hooks instead of polling SQLite."

      - id: "F-16"
        title: "Dagster — asset-centric orchestration with deterministic execution"
        category: "pattern"
        detail: |
          Dagster uses an asset-centric paradigm where pipelines produce named data assets.
          Key patterns extracted from documentation research:

          TASK/NODE DEFINITION:
            - @dg.asset decorator defines a single data asset (the output, not the operation)
            - @dg.multi_asset produces multiple named assets from one function
            - @dg.graph_asset composes multiple @dg.op operations into a single asset
            - Assets have: AssetKey, upstream dependencies, code_version, owners, metadata

          DEPENDENCY DECLARATION:
            - deps=[upstream_asset] in the @asset decorator for explicit dependency
            - Function parameter names match upstream asset names for implicit wiring
            - AssetIn(key_prefix=["prefix"]) for cross-location asset dependencies
            - Dependencies are between assets (data), not between operations (code)
            - This is an "asset graph" not a "task graph" — fundamentally different mental model

          DETERMINISTIC EXECUTION:
            - code_version tracks whether asset code changed since last materialization
            - Dagster only re-materializes assets whose code_version differs
            - Graph assets encapsulate multi-step operations as single deterministic unit

          RETRY/ERROR HANDLING:
            - RetryPolicy on @dg.op: max_retries, delay, backoff (EXPONENTIAL), jitter (PLUS_MINUS)
            - Retry is at the op level (inside an asset), not at the asset level

          CONCURRENCY MANAGEMENT:
            - Run queue limits: max_concurrent_runs at deployment level
            - Concurrency pools: cross-run limits on shared resources
            - Run executor limits: parallelism within a single run
            - Run tag limits: category-based throttling within a run
            - Can combine: pools + executor limits + run queue for layered control

          APPLICABILITY TO AGENT SYSTEM:
            - Thinking of pipeline outputs as ASSETS (research-output, spec-output, design-output) rather than task results simplifies the schema dependency model
            - Code versioning: track agent instruction versions to know when re-runs are needed
            - Concurrency pools map to our D-17 E2E concurrency limit
            - The asset graph approach could eliminate evidence gates — assets either exist (materialized) or don't
            - RetryPolicy with exponential backoff and jitter mirrors our SQLITE_BUSY retry pattern
        evidence:
          - "https://docs.dagster.io/guides/build/assets/defining-assets (asset decorators, code_version, AssetExecutionContext)"
          - "https://docs.dagster.io/guides/build/assets/defining-assets-with-asset-dependencies (deps=[...], function parameter wiring, cross-location assets)"
          - "https://docs.dagster.io/guides/operate/managing-concurrency (run queue limits, concurrency pools, run executor limits, tag limits)"
        relevance: "Dagster's asset-centric model is the most paradigm-shifting pattern. Instead of evidence gates querying whether agents completed, the orchestrator could check whether output assets (YAML files) exist and are valid. This could eliminate SQLite for evidence tracking while being more intuitive."

      - id: "F-17"
        title: "Temporal — durable execution engine with failure survival patterns"
        category: "pattern"
        detail: |
          Temporal provides durable, reliable workflow execution that survives infrastructure failures.
          Key patterns extracted from documentation research:

          WORKFLOW vs ACTIVITY SEPARATION:
            - Workflow: deterministic orchestration logic. MUST be deterministic (same inputs → same command sequence).
            - Activity: non-deterministic work units (API calls, file I/O, LLM calls). Can fail and retry.
            - Workflows orchestrate Activities — they never do I/O themselves.
            - This separation is the core architectural principle.

          DURABILITY MODEL:
            - Event History: every Command and Event is recorded persistently
            - Replay: on failure/restart, Workflow re-executes from scratch but Commands matched against existing Event History
            - If a Command was already executed (matching Event exists), result returned from history instead of re-executing
            - State Transitions are the unit of progress, each recorded in persistence store

          DETERMINISTIC CONSTRAINTS:
            - Workflow code must not use: local time, random numbers, mutable globals, non-deterministic I/O
            - Code changes that reorder Commands cause non-determinism errors on replay
            - Versioning (Patching API) allows safe evolution of running workflow definitions
            - Worker Versioning ties workers to specific code revisions

          RETRY AND TIMEOUT PATTERNS:
            - Activity Retry Policy (default): Initial Interval=1s, Backoff Coefficient=2.0, Max Interval=100×Initial, Max Attempts=∞, Non-Retryable Errors=[]
            - Workflows do NOT retry by default (retrying entire deterministic workflow is wasteful)
            - Three timeout types: Schedule-To-Start (queuing), Start-To-Close (execution), Schedule-To-Close (overall)
            - Heartbeat: long-running Activities ping the service to prove liveness
            - Non-retryable errors: explicitly marked errors that bypass retry policy (e.g., invalid input)

          APPLICABILITY TO AGENT SYSTEM:
            - The Workflow/Activity separation maps perfectly to our Orchestrator (workflow) / Agents (activities) split
            - Temporal's philosophy: orchestrator must be deterministic, workers can be non-deterministic — this is exactly our model
            - Replay from Event History is analogous to our pipeline restart capability (Step 0 archives + re-runs)
            - Non-retryable error concept maps to our error categorization (deterministic vs transient)
            - Heartbeat pattern: agents could heartbeat to indicate progress during long operations
            - KEY INSIGHT: Temporal proves persistent event log (Event History) is essential for durable execution — SQLite serves this purpose
        evidence:
          - "https://docs.temporal.io/workflows (Workflow overview: determinism requirement, Commands, Events)"
          - "https://docs.temporal.io/workflow-definition (deterministic constraints, versioning, patching)"
          - "https://docs.temporal.io/workflow-execution (Replay, Commands/Awaitables, status lifecycle, State Transitions)"
          - "https://docs.temporal.io/activities (Activity definition, idempotency, heartbeats)"
          - "https://docs.temporal.io/retry-policies (default retry: 1s initial, 2.0 backoff, non-retryable errors)"
          - "https://docs.temporal.io/encyclopedia/detecting-activity-failures (3 timeout types, heartbeat mechanism)"
        relevance: "Temporal validates our Orchestrator/Agent architecture. The Workflow=Orchestrator, Activity=Agent mapping is exact. Temporal also proves persistent state (Event History) is essential — but it does not have to be SQLite. A structured event log (YAML or JSONL) could serve the same purpose."

      - id: "F-18"
        title: "Netflix Conductor (Orkes) — JSON-defined workflow orchestration"
        category: "pattern"
        detail: |
          Netflix Conductor (now Orkes Conductor) is a workflow orchestration engine using JSON workflow definitions.
          Key patterns extracted from documentation research:

          TASK/NODE DEFINITION:
            - Three task types: System tasks (built-in HTTP, AI model calls), Operators (control flow: loops, switch, fork/join), Worker tasks (custom code)
            - Task definitions specify: input/output schemas, timeouts, retries — reusable across workflows
            - Workers are stateless, idempotent, and do not implement failure-handling logic (server handles retries)

          WORKFLOW DEFINITION:
            - JSON-based workflow definitions (not code — configuration-driven)
            - Schema: name, version, tasks[], inputParameters[], outputParameters{}, timeoutSeconds, timeoutPolicy, failureWorkflow
            - failureWorkflow: compensation workflow triggered on failure (saga pattern)
            - enforceSchema: validates input/output against defined schemas
            - rateLimitConfig: concurrency limits per rate limit key

          DEPENDENCY DECLARATION:
            - Tasks ordered sequentially in tasks[] array
            - Operators provide control flow: FORK/JOIN for parallelism, SWITCH for branching, DO_WHILE for loops
            - Task inputs reference outputs of previous tasks via JSONPath: ${taskName.output.field}
            - Data flow is explicit through input/output wiring, not implicit from code

          STATE MANAGEMENT:
            - Conductor server maintains execution state (RUNNING, COMPLETED, FAILED, TIMED_OUT, TERMINATED, PAUSED)
            - Each workflow execution tracked with unique ID and all task execution states
            - Status changes can trigger callbacks via workflowStatusListenerEnabled/Sink
            - maskedFields: fields to mask in execution data (security feature)

          APPLICABILITY TO AGENT SYSTEM:
            - JSON/YAML workflow definitions align with our .agent.md instruction model — both are configuration-driven
            - The failureWorkflow concept could replace manual error recovery: define a compensation workflow per failure mode
            - Schema enforcement (enforceSchema) mirrors our schemas.md producer/consumer validation
            - rateLimitConfig maps directly to our E2E concurrency D-17 limit
            - maskedFields is a security pattern we could adopt for sanitizing sensitive data in pipeline outputs
            - Worker statelessness matches our agent model — agents don't retain state between dispatches
        evidence:
          - "https://orkes.io/content/core-concepts (Conductor: workflows, tasks types, workers, execution model)"
          - "https://orkes.io/content/reference-docs/api/metadata/creating-workflow-definition (workflow JSON schema: tasks[], failureWorkflow, rateLimitConfig, enforceSchema)"
        relevance: "Conductor's configuration-driven workflow definition is closest to our current .agent.md approach. The failureWorkflow (compensation) pattern and rateLimitConfig are directly adoptable."

      - id: "F-19"
        title: "Cross-system comparison — patterns applicable to local agent orchestration"
        category: "pattern"
        detail: |
          Comparative analysis of all 5 systems against our agent orchestration requirements:

          DEPENDENCY DECLARATION APPROACHES:
            1. Explicit operators: Airflow (>>), code-level. Clear but verbose.
            2. Implicit from code: Prefect (function call graph). Most Pythonic, least boilerplate.
            3. Asset-based: Dagster (deps=[...]). Data-centric rather than task-centric.
            4. JSON array ordering: Conductor (tasks[]). Configuration-driven, language-agnostic.
            5. Deterministic replay: Temporal (Command sequence). Event-sourced, infrastructure-grade.
            Our system uses: Step numbers (0-9) + explicit dispatch patterns. Closest to Conductor's approach.

          PARALLEL EXECUTION MODELS:
            1. Airflow: Executor abstraction (Local/Celery/Kubernetes). Infrastructure-level.
            2. Prefect: task.submit()/task.map(). Code-level, automatic.
            3. Dagster: Concurrency pools + run executor limits. Multi-level.
            4. Conductor: FORK/JOIN operators. Explicit in workflow definition.
            5. Temporal: Child workflows + concurrent activity scheduling. Code-level.
            Our system uses: Pattern A (parallel dispatch) + Pattern B (iterative loop) + runSubagent parallelism. Closest to Conductor FORK/JOIN.

          STATE PERSISTENCE:
            1. Airflow: PostgreSQL/MySQL required.
            2. Prefect: Prefect Cloud or local SQLite/PostgreSQL.
            3. Dagster: PostgreSQL or SQLite for asset materialization.
            4. Conductor: Server-managed DB (Dynamo, PostgreSQL, etc.).
            5. Temporal: Custom persistence (Cassandra, MySQL, PostgreSQL).
            ALL 5 systems require persistent state storage. None operates purely on files.
            Our SQLite is the simplest option. Removing it entirely would be going against industry consensus.

          RETRY/ERROR HANDLING COMPARISON:
            1. Airflow: retries + trigger rules (12 options). Most flexible branching on failure.
            2. Prefect: retries + retry_delay_seconds + state hooks. Most Pythonic.
            3. Dagster: RetryPolicy (max_retries, delay, backoff, jitter) on ops. Most granular.
            4. Conductor: Server-managed retries on tasks. Least code.
            5. Temporal: Retry Policy (initial interval, backoff coefficient, max interval, max attempts, non-retryable errors). Most principled.
            Our system: 2 retry limit (global-operating-rules.md), 1 retry per agent (dispatch-patterns.md), SQLITE_BUSY 3-retry with exponential backoff.

          KEY PATTERNS TO ADOPT:
            1. Asset-based evidence (Dagster): Check if output YAML files exist instead of SQL queries
            2. State change hooks (Prefect): Register callbacks on agent completion instead of polling
            3. Compensation workflows (Conductor): Define automatic recovery flows for failure modes
            4. Workflow/Activity separation (Temporal): Formalize orchestrator-determinism constraint
            5. Trigger rules (Airflow): Replace complex EG queries with declarative success/failure rules
            6. Non-retryable errors (Temporal): Explicit classification of permanent vs transient failures

          WHAT SHOULD NOT BE ADOPTED:
            1. Heavy infrastructure (Airflow/Temporal servers, Conductor server) — our system runs locally
            2. Database-backed persistence (all 5 systems) — if removing SQLite, use YAML files not another DB
            3. Task queues/workers (all 5) — our agents are dispatched by runSubagent, not polling
        evidence:
          - "All URLs from F-14 through F-18 (cross-referenced comparative analysis)"
          - "NewAgents/.github/agents/dispatch-patterns.md (current Pattern A/B definitions)"
          - "NewAgents/.github/agents/global-operating-rules.md §1-§2 (current retry policy)"
        relevance: "All 5 mature workflow systems require persistent state. Most impactful adoptable patterns: (1) asset-based evidence gates (Dagster), (2) state hooks (Prefect), (3) Workflow/Activity separation (Temporal). These three could simplify the pipeline without requiring SQLite removal."

    summary: |
      Round 1 mapped the full dependency graph: 9 agents, 10 reference docs, 10 evidence gates (EG-1 through EG-10), 3 external tools (git, sqlite3, playwright-cli), and 5 alternative frameworks (CrewAI, AutoGen, LangGraph, GitHub Copilot, lightweight alternatives). Round 2 adds 6 findings (F-14 through F-19) from deep web research on 5 industry DAG/workflow orchestration systems.

      KEY ROUND 2 INSIGHT: All 5 mature orchestration systems (Airflow, Prefect, Dagster, Temporal, Conductor) require persistent state storage. None operates purely on files. This validates SQLite as architecturally sound — the question is not WHETHER to have persistent state but HOW to implement it.

      MOST APPLICABLE PATTERNS FROM ROUND 2:
      1. Dagster asset-centric model: Replace SQL evidence gates with file-existence checks on output YAML artifacts. Research/spec/design/implementation outputs already ARE assets.
      2. Prefect state change hooks: Replace polling-based evidence gates with event-driven completion callbacks.
      3. Temporal Workflow/Activity separation: Our Orchestrator=Workflow, Agents=Activities mapping is independently validated. Orchestrator-determinism is essential.
      4. Conductor failureWorkflow: Automatic compensation flows on pipeline failure.
      5. Airflow trigger rules: Declarative success/failure conditions instead of SQL aggregate queries.
      6. Temporal non-retryable errors: Formalize permanent vs transient failure distinction.

      RECOMMENDED DIRECTION: Keep lightweight state persistence (SQLite or structured YAML files), adopt asset-based evidence checking (Dagster pattern) to simplify the 10 evidence gates, add state hooks (Prefect pattern) for event-driven orchestration. Do NOT adopt heavy infrastructure from Airflow/Temporal/Conductor servers — our system runs locally in VS Code.

