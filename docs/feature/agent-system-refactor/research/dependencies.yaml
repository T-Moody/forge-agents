      - url: "https://docs.temporal.io/activities"
        topic: "Temporal activity definition and execution"
        key_findings: "Activities are non-deterministic work units (I/O, API calls). Must be idempotent. Workers execute activities. Heartbeat for long-running activities."
      - url: "https://docs.temporal.io/retry-policies"
        topic: "Temporal retry policy configuration"
        key_findings: "Default: 1s initial, 2.0 backoff, 100s max interval, unlimited attempts. Activities retry by default; Workflows do NOT. Non-retryable errors via ApplicationFailure."
      - url: "https://docs.temporal.io/encyclopedia/detecting-activity-failures"
        topic: "Temporal activity failure detection — timeouts and heartbeats"
        key_findings: "3 timeout types: Schedule-To-Start, Start-To-Close, Schedule-To-Close. Heartbeat for liveness. Heartbeat throttling. Cancellation delivered via heartbeat."
      - url: "https://orkes.io/content/core-concepts"
        topic: "Netflix Conductor (Orkes) core concepts"
        key_findings: "3 task types: System tasks (built-in), Operators (control flow), Worker tasks (custom). Workers are stateless and idempotent. JSON workflow definitions."
      - url: "https://orkes.io/content/reference-docs/api/metadata/creating-workflow-definition"
        topic: "Conductor workflow definition JSON schema"
        key_findings: "JSON schema with tasks[], timeoutPolicy (TIME_OUT_WF or ALERT_ONLY), failureWorkflow (compensation), rateLimitConfig, enforceSchema, maskedFields, versioning."

