      - id: "F-9"
        title: "Copilot-instructions.md as immutable global dependency"
        category: "dependency"
        detail: |
          .github/copilot-instructions.md is loaded automatically by VS Code Copilot for ALL agents.
          It contains 7 immutable rules that override all agent-specific instructions:
            1. Terminal-only testing (run_in_terminal with CLI commands)
            2. No file-redirect (never use >, >>, | tee)
            3. Retry policy (2 internal retries, never retry deterministic)
            4. Schema version (schema_version: "1.0" required)
            5. Anti-hallucination (INSERT before reporting)
            6. No runtime agent modification
            7. Bounded feedback loops (hard iteration limits)
            8. Output paths (within docs/feature/ or agent output dirs)
            9. SQL safety (stdin piping for SQL)

          Additionally, .github/instructions/pipeline-conventions.md provides path-specific instructions for the pipeline (feature directory structure, file naming patterns, risk classification, pipeline steps).

          These are immutable at runtime per global-operating-rules.md §9 — only modifiable via feature implementation PRs.
        evidence:
          - ".github/copilot-instructions.md lines 1-50 (all 9 rules)"
          - ".github/instructions/pipeline-conventions.md lines 1-50 (directory structure, naming, risk classification)"
          - "NewAgents/.github/agents/global-operating-rules.md §9 (Safety Constraint Filter — copilot-instructions.md is immutable at runtime)"
        relevance: "Any refactored system must preserve these global rules. The copilot-instructions.md cannot be changed by agents at runtime (SEC-5). The refactor must avoid breaking this safety invariant."

      - id: "F-10"
        title: "Alternatives to SQLite for pipeline state management (web research)"
        category: "dependency"
        detail: |
          Web research findings on how modern multi-agent frameworks handle state management:

          1. CrewAI (v0.100+): Uses unified Memory class backed by LanceDB (vector DB) stored under .crewai/memory/.
             - Hierarchical scopes for agent-level isolation
             - Composite scoring (semantic + recency + importance)
             - LLM-driven analysis for scope inference
             - No SQLite — evidence is ephemeral in-process state
             - Memory consolidation (dedup) handled automatically
             Tradeoff: Requires LLM calls for analysis; heavier than raw SQL.

          2. AutoGen (Microsoft, v0.7): Uses event-driven in-memory runtime (SingleThreadedAgentRuntime).
             - Message-based communication between agents
             - No persistent state by default — state lives in agent runtime
             - Supports distributed agents via GrpcWorkerAgentRuntime
             - No built-in evidence tracking or verification ledger concept
             Tradeoff: Designed for conversational agents, not deterministic pipelines.

          3. LangGraph: Graph-based state management with checkpointing.
             - State is a typed dict passed through graph nodes
             - Built-in persistence via checkpointers (PostgreSQL, SQLite, or in-memory)
             - Supports branching, conditional edges, and subgraphs
             - Closest to this system's DAG-based pipeline model
             Tradeoff: LangGraph still uses SQLite/PostgreSQL for persistence — not SQL-free.

          4. GitHub Copilot agents (native): Uses file-based state.
             - Agent definitions in .github/agents/*.agent.md
             - Custom instructions in .github/copilot-instructions.md
             - Path-specific instructions in .github/instructions/
             - No built-in state management — relies on file outputs and context window
             - runSubagent for dispatch; completion is implicit via conversation turn
             Tradeoff: Simplest model but no verification/evidence gate equivalent.

          Lightweight alternatives to SQLite for evidence tracking:
            a. YAML file-based ledger: Each evidence record as a YAML entry in a flat file. Query via grep/read_file instead of SQL.
               Pro: No external dependency. Con: No query capability, no indexes, concurrent write issues.
            b. JSON Lines (.jsonl) file: Append-only log of evidence records. Parse with jq or Python.
               Pro: Simple append model. Con: No transactional guarantees, no ad-hoc queries.
            c. In-context state only: Evidence gates checked by reading agent output YAML files directly.
               Pro: Zero infrastructure. Con: No cross-run persistence, no audit trail.
            d. Structured YAML files per step: One YAML file per gate result in the feature directory.
               Pro: Git-trackable, human-readable. Con: No aggregate queries across runs.
        evidence:
          - "https://docs.crewai.com/concepts/crews (CrewAI: sequential/hierarchical process, memory system, YAML config for agents)"
          - "https://docs.crewai.com/concepts/memory (CrewAI Memory: LanceDB backend, hierarchical scopes, composite scoring)"
          - "https://microsoft.github.io/autogen/stable/ (AutoGen: event-driven runtime, message-based communication, no built-in persistence)"
          - "https://microsoft.github.io/autogen/stable/user-guide/core-user-guide/quickstart.html (AutoGen Core: SingleThreadedAgentRuntime, RoutedAgent, message_handler)"
          - "https://docs.github.com/en/copilot/customizing-copilot/adding-custom-instructions-for-github-copilot (GitHub Copilot: copilot-instructions.md, instructions/, agents/, AGENTS.md)"
        relevance: "If SQLite is removed, the most viable replacement for this system is structured YAML files per step (option d) combined with in-context gate checking. This preserves human-readability and git-trackability while eliminating the sqlite3 CLI dependency. However, the aggregate query capability (e.g., Knowledge Agent post-mortem analysis spanning all tables) would need redesign."

      - id: "F-11"
        title: "Dependencies for proposed new agents (Test Runner, Instruction Optimizer)"
        category: "dependency"
        detail: |
          The initial request proposes two new agents. Their dependency requirements:

          Test Runner Agent:
            - Depends on: run_in_terminal (must start/stop applications, run test suites)
            - Depends on: playwright-cli or npx playwright test (E2E/browser testing)
            - Depends on: project-specific build/run commands (npm, dotnet, python, etc.)
            - Depends on: health check capability (curl/HTTP probes)
            - Depends on: process management (kill/taskkill for cleanup)
            - Would consume: implementation reports, e2e-contract.yaml, skill files
            - Would produce: test execution results, evidence records
            - Overlaps with: Current Verifier agent Tier 5 (E2E phases 1-5)
            - Key difference from Verifier: Verifier does static analysis + evidence gates; Test Runner would do dynamic execution only
            - New dependency: Application lifecycle management (start/stop/health check)

          Instruction Optimization Agent:
            - Depends on: read_file, replace_string_in_file (must read and modify instruction files)
            - Depends on: artifact_evaluations data (quality scores from pipeline runs)
            - Depends on: pipeline_telemetry data (performance metrics)
            - Depends on: instruction_updates table (audit trail)
            - Would consume: Knowledge Agent outputs, pipeline metrics, evaluation data
            - Would produce: Updated instruction files, change proposals
            - Overlaps with: Current Knowledge Agent responsibility 9 (governed instruction updates)
            - New dependency: Safety Constraint Filter (global-operating-rules.md §9) — the agent MUST be subject to the same immutable rules and protected phrase patterns
            - Security concern: This agent would need file write access to .github/instructions/ — currently restricted to Knowledge Agent only
        evidence:
          - "docs/feature/agent-system-refactor/initial-request.md (Test Runner and Instruction Optimization agent descriptions)"
          - "NewAgents/.github/agents/verifier.agent.md lines 274-283 (current Tier 5 E2E phases that overlap with proposed Test Runner)"
          - "NewAgents/.github/agents/knowledge-agent.agent.md lines 196-212 (governed instruction updates — overlap with proposed Instruction Optimizer)"
          - "NewAgents/.github/agents/global-operating-rules.md §9 (Safety Constraint Filter for instruction updates)"
        relevance: "The Test Runner agent separates concerns currently bundled in the Verifier (static analysis vs. dynamic execution). The Instruction Optimizer would extract a responsibility currently in the Knowledge Agent. Both additions require careful dependency wiring to avoid circular dependencies or privilege escalation."

      - id: "F-12"
        title: "Orchestrator line budget constraint"
        category: "risk"
