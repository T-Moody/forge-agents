      - id: "F-7"
        title: "Dispatch patterns and concurrency dependencies"
        category: "dependency"
        detail: |
          dispatch-patterns.md defines the concurrency model used by the orchestrator.

          Pattern A (Fully Parallel): Used at Steps 1, 3b, 5, 6, 7.
            - Concurrency cap: 4 agents per wave
            - Gate conditions vary: Research ≥2/4, Review ≥2/3 approve + 0 blockers, Impl/Verif all DONE
            - Retry: 1 per failed agent

          Pattern B (Iterative Loop): Used at Steps 5-6 (implementation-verification loop).
            - Max 3 iterations
            - Contains Pattern A sub-waves within each iteration

          E2E concurrency (D-17): Max 1 E2E-enabled task at a time (sequential queuing).
            - max_concurrent_instances field controls browser contexts per verifier, not cross-task concurrency
            - Defined in dispatch-patterns.md §E2E Concurrency, e2e-integration.md §8

          The orchestrator uses VS Code Copilot's runSubagent tool for dispatch. Multiple runSubagent calls in the same reasoning step execute in parallel (native Copilot runtime behavior). Sequential calls execute sequentially.

          This creates an implicit dependency on the Copilot runtime's parallel dispatch semantics.
        evidence:
          - "NewAgents/.github/agents/dispatch-patterns.md lines 1-80 (Pattern A definition, gate conditions, retry policy)"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 490-495 (concurrency rules, E2E D-17)"
          - "NewAgents/.github/agents/orchestrator.agent.md anti-drift anchor (parallel dispatch CRITICAL note)"
        relevance: "The dispatch model is tightly coupled to VS Code Copilot's runSubagent behavior. Any refactor targeting a different orchestration runtime must account for this implicit parallelism semantic."

