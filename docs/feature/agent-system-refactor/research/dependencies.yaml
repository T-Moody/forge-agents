    findings:
      - id: "F-1"
        title: "v2 tool identifiers are ALL wrong — do not match VS Code built-in tool names"
        category: "dependency"
        detail: |
          The v2 agent system uses a category/name format for tool identifiers in YAML frontmatter
          (e.g., read/readFile, edit/createFile, search/textSearch). These do NOT match the actual
          VS Code built-in tool identifiers. Web research from the VS Code docs cheat sheet
          (https://code.visualstudio.com/docs/copilot/reference/copilot-vscode-features) reveals the
          exact tool names used by VS Code Copilot agents.

          Complete mapping of v2 names → correct VS Code names:

          ORCHESTRATOR (v2/.github/agents/orchestrator.agent.md):
            read/readFile        → readFile
            edit/createFile      → createFile
            edit/editFiles       → editFiles
            search/listDirectory → listDirectory
            search/textSearch    → textSearch
            search/fileSearch    → fileSearch
            execute/runInTerminal → runInTerminal
            execute/getTerminalOutput → getTerminalOutput
            agent                → (not a tool — use 'agents' property in frontmatter)
            search/changes       → changes
            todo                 → todos

          RESEARCHER (v2/.github/agents/researcher.agent.md):
            search/codebase      → codebase
            web/fetch            → fetch

          IMPLEMENTER (v2/.github/agents/implementer.agent.md):
            read/problems        → problems

          TESTER (v2/.github/agents/tester.agent.md):
            read/problems        → problems

          REVIEWER (v2/.github/agents/reviewer.agent.md):
            search/codebase      → codebase
            read/problems        → problems
            search/changes       → changes

          KNOWLEDGE (v2/.github/agents/knowledge.agent.md):
            vscode/memory        → (unknown — memory may be a built-in feature, not a tool)

          ARCHITECT (v2/.github/agents/architect.agent.md):
            search/codebase      → codebase
            web/fetch            → fetch

          Additionally, the v2 orchestrator lists 'agent' as a tool. In VS Code, subagent dispatch
          is controlled by the 'agents' property in frontmatter (listing agent names), not a tool.
          The actual tool for subagent dispatch is 'runSubagent'.

          VS Code also provides tool SETS that group multiple tools:
            #edit       — modifications tools (createFile, editFiles, editNotebook, etc.)
            #search     — search tools (codebase, textSearch, fileSearch, listDirectory)
            #runCommands — terminal tools (runInTerminal, getTerminalOutput)
            #runTasks   — task tools
            #browser    — browser tools (experimental)
        evidence:
          - "https://code.visualstudio.com/docs/copilot/reference/copilot-vscode-features — Chat tools table listing: #readFile, #createFile, #editFiles, #listDirectory, #textSearch, #fileSearch, #runInTerminal, #getTerminalOutput, #changes, #codebase, #fetch, #problems, #usages, #todos, #runSubagent, #githubRepo"
          - "v2/.github/agents/orchestrator.agent.md lines 4-17 (tools section with incorrect names)"
          - "v2/.github/agents/researcher.agent.md lines 4-11 (tools section with incorrect names)"
          - "v2/.github/agents/implementer.agent.md lines 4-15 (tools section with incorrect names)"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — 'tools: A list of tool or tool set names that are available for this custom agent'"
        relevance: "CRITICAL — all 8 v2 agent files use incorrect tool identifiers. VS Code will silently ignore unrecognized tool names, meaning agents may have access to ALL tools or no specific restrictions. This is the highest-priority fix for the refactor."

      - id: "F-2"
        title: "VS Code agent frontmatter supports 'agents' property for subagent dispatch"
        category: "dependency"
        detail: |
          The VS Code custom agent docs (https://code.visualstudio.com/docs/copilot/customization/custom-agents)
          specify the 'agents' property in frontmatter:

          agents: A list of agent names that are available as subagents in this agent.
                  Use * to allow all agents, or an empty array [] to prevent any subagent use.
                  If you specify agents, ensure the agent tool is included in the tools property.

          The v2 orchestrator currently has:
            agents:
              - researcher
              - architect
              - planner
              - implementer
              - tester
              - reviewer
              - knowledge

          This is CORRECT in intent — it lists the subagents. However, the v2 orchestrator does NOT
          include 'runSubagent' in its tools list (it has 'agent' instead, which is not valid).

          Other v2 agents set 'agents: []' which is correct for preventing subagent dispatch.

          New frontmatter properties available (not used in v2):
            - model: AI model selection (string or priority array)
            - handoffs: workflow transitions between agents (label, agent, prompt, send, model)
            - user-invocable: hide from dropdown (default true)
            - disable-model-invocation: prevent auto-invocation as subagent (default false)
            - hooks: agent-scoped hook commands (Preview)
            - target: vscode or github-copilot
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — agents property, handoffs, model, user-invocable, disable-model-invocation"
          - "v2/.github/agents/orchestrator.agent.md lines 18-24 (agents list)"
          - "v2/.github/agents/researcher.agent.md line 12 (agents: [])"
        relevance: "The orchestrator's subagent list is correct but the tool for dispatch ('agent') needs to be 'runSubagent'. The handoffs feature is new and could enable a cleaner agent-to-agent transition model than the orchestrator's current manual routing."

      - id: "F-3"
        title: "Agent Skills (SKILL.md) — open standard for specialized agent capabilities"
        category: "dependency"
        detail: |
          Agent Skills are an open standard (agentskills.io) supported by VS Code, GitHub Copilot CLI,
          GitHub Copilot coding agent, Cursor, Goose, Roo Code, and others.

          Skills are folders containing a SKILL.md file with YAML frontmatter:
            ---
            name: skill-name        # Required, must match directory name
            description: ...        # Required, max 1024 chars
            argument-hint: ...      # Optional, shown in chat
            user-invocable: true    # Default true, controls /slash visibility
            disable-model-invocation: false  # Default false, controls auto-loading
            ---
            # Instructions body

          Storage locations:
            - .github/skills/<skill-name>/SKILL.md  (project skills)
            - .claude/skills/<skill-name>/SKILL.md   (Claude skills)
            - .agents/skills/<skill-name>/SKILL.md   (generic skills)
            - ~/.copilot/skills/                      (personal skills)
            - Configurable via chat.agentSkillsLocations setting

          Three-level progressive loading:
            Level 1 — Discovery: name + description always known (lightweight)
            Level 2 — Instructions: SKILL.md body loaded when task matches description
            Level 3 — Resources: additional files in skill directory loaded on-demand

          Skills can include scripts, examples, templates, and other resources alongside
          instructions. They are invocable as /slash-commands in chat and can be auto-loaded
          by the agent based on task relevance.

          The v2 tester agent references 'test skills' (playwright-ui, http-api, cli, integration-tests,
          live-qa) but these are NOT actual SKILL.md files — they are conceptual categories.
          Converting them to real Agent Skills would make them discoverable and portable.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/agent-skills — full SKILL.md spec, progressive loading, skill locations"
          - "https://agentskills.io/ — open standard, adopted by VS Code, Cursor, Goose, etc."
          - "v2/.github/agents/tester.agent.md lines 56-61 (Dynamic Testing Workflow step 3: 5 test skill categories)"
          - "NewAgents/.github/agents/e2e-integration.md §1.2 Step 2 (Copilot Skill Discovery scan locations)"
        relevance: "Agent Skills could replace the v2 tester's ad-hoc skill categories with real, discoverable, portable skill files. The open standard adoption by multiple tools makes this forward-compatible."

      - id: "F-4"
        title: "MCP (Model Context Protocol) — external tool integration for VS Code agents"
        category: "dependency"
        detail: |
          MCP is an open standard for connecting AI agents to external tools and services.
          VS Code supports MCP servers via .vscode/mcp.json configuration files.

          Key capabilities:
            - Tools: Functions that agents can invoke (e.g., database queries, API calls)
            - Resources: Data sources accessible as context (files, DB tables, API responses)
            - Prompts: Pre-configured prompts from servers for common tasks
            - MCP Apps: Interactive UI (forms, visualizations) rendered in chat

          Configuration (mcp.json):
            {
              "servers": {
                "github": { "type": "http", "url": "https://api.githubcopilot.com/mcp" },
                "playwright": { "command": "npx", "args": ["-y", "@microsoft/mcp-server-playwright"] }
              }
            }

          Notable MCP servers available:
            - Playwright MCP (@microsoft/mcp-server-playwright) — browser interaction
            - GitHub MCP — repo, issues, PRs
            - Custom servers — any tool can be wrapped as MCP

          Sandboxing (macOS/Linux only, NOT Windows):
            - sandboxEnabled: true restricts filesystem and network
            - Auto-approval when sandboxed
            - NOT available on Windows (the user's OS)

          Trust model:
            - First-start confirmation dialog
            - Per-tool approval or auto-approve
            - URL approval (pre-approval + post-approval)

          The v2 system does NOT use MCP at all. The existing tool access is through VS Code
          built-in tools only. MCP could replace or supplement the sqlite3 dependency
          (via a custom MCP server wrapping SQLite) or add external integrations.

          The Playwright MCP server is an ALTERNATIVE to playwright-cli for browser automation,
          offering a different interaction model (MCP tools vs CLI commands).
        evidence:
          - "https://modelcontextprotocol.io/introduction — MCP standard overview"
          - "https://code.visualstudio.com/docs/copilot/customization/mcp-servers — VS Code MCP integration, mcp.json, trust, sandboxing"
          - "v2/.github/agents/ — no mcp-servers property in any agent frontmatter, no mcp.json in workspace"
        relevance: "MCP provides a standardized way to add external tool capabilities without custom terminal commands. Could be used for database operations (replacing sqlite3 CLI piping), Playwright browser automation, or other integrations. However, sandboxing is NOT available on Windows."

      - id: "F-5"
        title: "Agent Hooks — lifecycle automation for security and quality enforcement"
        category: "dependency"
        detail: |
          VS Code Agent Hooks (Preview) enable deterministic shell command execution at agent
          lifecycle points. This is a NEW VS Code feature not used in v2.

          Eight hook events:
            SessionStart — new session begins
            UserPromptSubmit — user sends a prompt
            PreToolUse — before any tool invocation
            PostToolUse — after tool completes
            PreCompact — before context compaction
            SubagentStart — subagent spawned
            SubagentStop — subagent completes
            Stop — session ends

          Configuration locations:
            .github/hooks/*.json — workspace hooks
            .claude/settings.local.json — local workspace hooks
            Agent frontmatter 'hooks' property — agent-scoped (Preview)

          PreToolUse output can control tool execution:
            permissionDecision: "allow" | "deny" | "ask"
            updatedInput: modified tool parameters
            additionalContext: extra context for the model

          Stop hook can PREVENT agent from stopping:
            decision: "block"
            reason: "Run the test suite before finishing"

          Potential uses for the agent pipeline:
            1. PreToolUse hook to enforce tool access restrictions (replacing instruction-based enforcement)
            2. PostToolUse hook to auto-format code after edits
            3. SubagentStart/Stop hooks for pipeline logging (replacing manual logging)
            4. Stop hook to enforce self-verification checklists
            5. SessionStart hook to inject pipeline context

          Current v2 enforcement model relies on LLM instruction-following for tool restrictions
          (tool-access-matrix.md §11: "Compliance depends on LLM instruction-following").
          Hooks could provide deterministic enforcement instead.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/hooks — 8 hook events, PreToolUse permission control, Stop hook blocking"
          - "NewAgents/.github/agents/tool-access-matrix.md §11 (enforcement relies on LLM instruction-following — accepted risk)"
          - "v2/.github/agents/ — no hooks property in any agent frontmatter, no .github/hooks/ directory"
        relevance: "Hooks could solve the fundamental enforcement weakness identified in tool-access-matrix.md §11. PreToolUse hooks could deterministically deny unauthorized tool usage, replacing the probabilistic instruction-following approach. This is the most impactful new VS Code feature for the agent system."

      - id: "F-6"
        title: "Playwright dependency — npx playwright test vs playwright-cli vs Playwright MCP"
        category: "dependency"
        detail: |
          Three distinct Playwright integration paths exist, each with different characteristics:

          1. npx playwright test (standard Playwright Test):
             - Official E2E test framework from Microsoft
             - Runs test scripts (.spec.ts files) via CLI
             - Commands: test, install, codegen, show-report, show-trace, clear-cache
             - Supports parallel execution, retries, sharding, multiple browsers
             - Config via playwright.config.ts
             - Best for: automated test suites with pre-written test files

          2. playwright-cli (@playwright/cli):
             - Separate tool for interactive browser automation
             - Named session support (-s=session-name)
             - Step-by-step commands: open, goto, click, fill, screenshot, snapshot, close
             - Used in NewAgents/e2e-integration.md for verifier Tier 5
             - Installed globally: npm install -g @playwright/cli@latest
             - Best for: AI agent interactive browser exploration

          3. Playwright MCP (@microsoft/mcp-server-playwright):
             - MCP server providing browser tools to agents
             - Integrated through mcp.json, not CLI
             - Provides browser_navigate, browser_click, browser_type, browser_screenshot tools
             - Auto-discovered by VS Code
             - Best for: VS Code agent integration (newest path)

          The v2 tester agent refers to 'playwright-ui' as a skill category but does not
          specify which Playwright integration to use. The existing NewAgents system uses
          playwright-cli (path 2) as the primary path.

          The refactor needs to decide: keep playwright-cli, switch to Playwright MCP, or
          support both. Playwright MCP is more native to VS Code's tool model but less
          established. playwright-cli has proven track record in this repo.
        evidence:
          - "https://playwright.dev/docs/intro — Playwright Test framework (npx playwright test)"
          - "https://playwright.dev/docs/test-cli — CLI commands: test, install, codegen, show-report, show-trace"
          - "https://code.visualstudio.com/docs/copilot/customization/mcp-servers — Playwright MCP quickstart example"
          - "NewAgents/.github/agents/e2e-integration.md lines 104-118 (playwright-cli setup, named sessions)"
          - "NewAgents/.github/agents/tool-access-matrix.md §8.2 pattern 2 (^playwright-cli .+ allowlist)"
          - "Repository memory: playwright-cli installed globally, .playwright/cli.config.json at repo root"
        relevance: "The E2E testing capability depends on choosing the right Playwright integration path. The three options have different trade-offs for agent usability, security, and maintenance."

      - id: "F-7"
        title: "Memory tools — VS Code built-in persistent memory for agents"
        category: "dependency"
        detail: |
          VS Code provides a built-in memory feature for agents:
            - Setting: github.copilot.chat.tools.memory.enabled
            - Command: Chat: Show Memory Files
            - Agents can save and recall persistent notes across conversations
            - Memory files organized under /memories/ with three scopes:
              /memories/ — user memory (persistent across workspaces)
              /memories/session/ — session memory (current conversation only)
              /memories/repo/ — repository-scoped facts

          The v2 knowledge agent lists 'vscode/memory' as a tool name. The actual tool name
          is likely just 'memory' (based on the current runtime's tool list) or it may be
          accessed through a specific tool identifier.

          The existing NewAgents system (tool-access-matrix.md) grants memory access to:
            - Orchestrator (✅)
            - Knowledge Agent (✅)
            - All other agents (❌)

          Memory operations available:
            - view: read file or list directory
            - create: create new memory file
            - str_replace: update memory content
            - insert: add text at line number
            - delete: remove file/directory
            - rename: move/rename (within same scope)

          /memories/repo/ only supports 'create' (repository memory stored via Copilot).
          Repo memory entries are JSON: {subject, fact, citations, reason, category}.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/reference/copilot-vscode-features — Planning section: Memory feature with github.copilot.chat.tools.memory.enabled"
          - "v2/.github/agents/knowledge.agent.md line 8 (tools: vscode/memory — incorrect name)"
          - "NewAgents/.github/agents/tool-access-matrix.md line 23 (memory tool: Orch ✅, Know ✅, others ❌)"
          - "Current runtime tool list: memory tool with view/create/str_replace/insert/delete/rename operations"
        relevance: "The memory tool name in v2 (vscode/memory) is incorrect. The memory system provides cross-conversation persistence that the knowledge agent needs for storing pipeline learnings."

      - id: "F-8"
        title: "vscode_askQuestions tool — structured question prompts for interactive mode"
        category: "dependency"
        detail: |
          The VS Code Copilot runtime provides a tool for asking users structured questions
          with multiple-choice options. Based on the current runtime tool list, this tool:
            - Accepts an array of questions with headers and prompts
            - Supports fixed-choice options (with optional descriptions)
            - Supports multiSelect for multiple selections
            - Supports allowFreeformInput for custom answers
            - Each question has a unique header for answer mapping

          The v2 system does NOT reference this tool at all. The v2 orchestrator asks
          'approval_mode' and 'web_research_enabled' at Step 1 (Setup) but does not specify
          HOW to ask — it implies free-text chat interaction.

          The older NewAgents system uses 'ask_questions' tool for:
            - Orchestrator: startup questions (approval mode, web research)
            - Spec: pushback concern questioning (accept/modify/dismiss per concern)
            - Planner: clarifying questions in fast-track mode

          The tool enables deterministic structured input collection, which is important for:
            1. Pipeline startup configuration (interactive vs autonomous)
            2. Gate approval (proceed/abort decisions)
            3. Spec pushback (per-concern structured responses)
            4. Plan approval (accept/modify implementation plan)

          Using structured questions instead of free-text reduces ambiguity in user responses
          and enables reliable parsing of choices.
        evidence:
          - "Current VS Code runtime: vscode_askQuestions tool with questions array, options, multiSelect, allowFreeformInput"
          - "NewAgents/.github/agents/tool-access-matrix.md line 24 (ask_questions: Orch ✅, Spec 🔒, Plan 🔒)"
          - "v2/.github/agents/orchestrator.agent.md lines 36-39 (Step 1: ask approval_mode, web_research_enabled — no tool specified)"
        relevance: "The ask_questions/vscode_askQuestions tool should be added to the refactored orchestrator for structured interactive mode. Without it, the orchestrator relies on free-text parsing for critical pipeline decisions."

      - id: "F-9"
        title: "Handoffs — new VS Code feature for agent workflow transitions"
        category: "dependency"
        detail: |
          VS Code now supports 'handoffs' in agent frontmatter for guided workflow transitions.

          Handoff properties:
            handoffs:
              - label: "Start Implementation"    # Button text
                agent: implementation             # Target agent
                prompt: "Implement the plan..."   # Pre-filled prompt
                send: false                       # Auto-submit (default false)
                model: "GPT-5.2 (copilot)"       # Optional model override

          When a chat response completes, handoff buttons appear as interactive suggestions.
          Selecting a handoff switches to the target agent with the prompt pre-filled (and
          optionally auto-submitted if send: true).

          This is directly relevant to the pipeline's step-to-step transitions:
            Step 1 (Setup) → Step 2 (Research): handoff to researcher
            Step 3 (Architecture) → Step 4 (Planning): handoff to planner
            Step 4 (Planning) → Step 5 (Implementation): handoff to implementer
            etc.

          In interactive mode, handoffs could replace the orchestrator's approval gates with
          user-visible transition buttons, making the pipeline flow visible and controllable.

          The v2 system does NOT use handoffs — it relies entirely on the orchestrator's
          manual dispatch routing via completion contract parsing.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — handoffs section with label, agent, prompt, send, model properties"
          - "v2/.github/agents/orchestrator.agent.md — no handoffs in frontmatter"
        relevance: "Handoffs could improve the interactive mode UX by giving users visible pipeline progression buttons. However, they are most useful for simple linear workflows — the orchestrator's DAG-based dispatch with parallel agents is more complex than linear handoffs support."

      - id: "F-10"
        title: "v2 vs NewAgents dependency complexity comparison"
        category: "dependency"
        detail: |
          Quantitative comparison of external dependency footprint:

          v2 system (clean-slate rebuild):
            - Agent files: 8 (.agent.md)
            - Reference docs: 1 (global-rules.md)
            - Prompt files: 2 (feature-workflow, quick-fix)
            - Total files: 11
            - Total lines: ~1,004
            - External tools: git only (no sqlite3, no playwright-cli)
            - Cross-file references: minimal (only global-rules.md)
            - Tool identifiers: 36 total across all agents (ALL using wrong format)

          NewAgents system:
            - Agent files: 9 (.agent.md)
            - Reference docs: 10 (schemas, global-rules, sql-templates, tool-access-matrix, dispatch-patterns, review-perspectives, severity-taxonomy, evaluation-schema, e2e-integration, context7-integration)
            - Prompt files: 12
            - Total files: 31
            - Total lines: ~6,400+
            - External tools: git, sqlite3, playwright-cli, curl (conditional)
            - Cross-file references: ~100+ section refs (§ notation)
            - Tool identifiers: ~80+ using CORRECT names

          Key difference: v2 eliminated SQLite dependency entirely but uses wrong tool names.
          NewAgents has correct tool names but massive cross-reference complexity.

          The refactor should combine: v2's simplicity + NewAgents' correct tool naming +
          new VS Code features (hooks, skills, handoffs).
        evidence:
          - "v2/.github/ — 11 files across agents/ and prompts/"
          - "NewAgents/.github/ — 31 files across agents/ and prompts/"
          - "Repository memory: v2 = 1,004 lines, 67% of 1,500 budget"
          - "Repository memory: clean-slate rebuild achieved 84.4% reduction"
        relevance: "The dependency analysis reveals two opposite extremes — v2 is too simple (wrong tool names, no enforcement mechanism) while NewAgents is too complex (100+ cross-references). The optimal refactor lies between them."

      - id: "F-11"
        title: "VS Code platform features NOT used by either system"
        category: "dependency"
        detail: |
          Several VS Code platform features are available but unused by both v2 and NewAgents:

          1. Agent Hooks (Preview) — deterministic lifecycle automation
             Could enforce: tool restrictions (PreToolUse deny), auto-formatting (PostToolUse),
             pipeline logging (SubagentStart/Stop), self-verification (Stop hook)

          2. Agent Skills (SKILL.md) — portable specialized capabilities
             Could replace: tester skill categories, E2E skill definitions, review checklists

          3. Handoffs — guided agent transitions
             Could improve: interactive mode gate approvals, pipeline step visibility

          4. Tool Sets — grouped tool references
             Could simplify: agent frontmatter (use #search instead of listing 4 search tools)

          5. Chat Customizations Editor (Preview) — centralized UI for all customizations
             Could help: managing agents, skills, instructions, hooks in one place

          6. Agent Plugins (Preview) — bundled customization packages
             Could enable: distributing the pipeline system as an installable plugin

          7. Model selection per agent — different AI models for different roles
             Could optimize: fast model for researchers, capable model for architect/reviewer

          8. Organization-level agents — shared across repos
             Could enable: pipeline agents defined once, reused across repositories

          9. /create-agent, /create-skill, /create-hook — AI-assisted generation
             Could help: bootstrapping new agent definitions

          10. Terminal sandboxing — restrict file/network access for commands
              NOT available on Windows (user's OS). Only macOS/Linux.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/hooks — hooks documentation"
          - "https://code.visualstudio.com/docs/copilot/customization/agent-skills — skills documentation"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — handoffs, model, plugins, organization agents"
          - "https://code.visualstudio.com/docs/copilot/agents/agent-tools — tool sets, terminal sandboxing"
        relevance: "These features represent the gap between what the v2 system uses and what VS Code actually offers. Hooks (#1) is the highest-value addition for security enforcement. Skills (#2) is the highest-value addition for E2E testing."

    summary: |
      The v2 agent system has a CRITICAL dependency issue: all 36 tool identifiers across
      8 agent files use an incorrect category/name format (e.g., read/readFile instead of readFile).
      VS Code silently ignores unrecognized tool names, meaning tool restrictions may not be
      enforced at all. Beyond this, the system depends on git as the only external CLI tool
      (sqlite3 was intentionally removed). The system does NOT use several powerful VS Code
      platform features: Agent Hooks (for deterministic tool enforcement), Agent Skills (for
      portable E2E testing capabilities), Handoffs (for interactive pipeline transitions),
      MCP (for external tool integration), or structured question tools (for reliable
      interactive mode). The NewAgents system has correct tool names and richer capabilities
      but suffers from excessive cross-file reference complexity (100+ section refs). The
      optimal refactor should fix tool identifiers, adopt Hooks for security enforcement,
      adopt Skills for E2E, and keep v2's structural simplicity.
