          **Value:** MEDIUM-HIGH — gives the user control over task granularity before
          expensive implementation begins. Prevents the common failure mode of "plan was
          wrong, all implementation wasted."

          **Dependencies:** Depends on F-2 (correct tool names). Synergistic with F-3
          (architect questions) — together they create a coherent interactive review loop
          at Steps 3-4.
        evidence:
