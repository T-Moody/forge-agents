          - "v2/.github/agents/orchestrator.agent.md line 64 — 'Interactive mode: present plan to user'"
          - "docs/feature/agent-system-refactor/initial-request.md line 386 — user: 'planner should ask multiple choice'"
        relevance: "Prevents wasted implementation cycles. The user explicitly requested this as a missing interactive feature."

      # ============================================================
      # F-5: No Git Commands from Subagents (Improvement #5)
      # ============================================================
      - id: "F-5"
        title: "Git command restriction for subagents — HIGH impact safety fix"
        category: "risk"
        detail: |
          **Current state:** The implementer agent explicitly has `git add -A` in its
          workflow step 6 (implementer.agent.md line 44) and in its command allowlist
          (line 83: git diff, git add, git status). The orchestrator also runs
          `git add -A && git commit` at Step 8 (line 93).

          **The problem:** When multiple implementers run in parallel (the DAG dispatch
          algorithm allows up to 4 concurrent implementers per orchestrator.agent.md line 72),
          each running `git add -A` will stage ALL files in the working tree — including
          files modified by other parallel implementers. This creates several risks:
          1. Race condition: implementer A stages implementer B's half-written files
          2. Ownership violation: the tester verifies file ownership against task.files[],
             but git add -A bypasses this by staging everything
          3. Merge conflicts: if two implementers both git-add the same file area

          Per git-scm.com docs: `git add -A` "Update[s] the index not only where the
          working tree has a file matching <pathspec> but also where the index already has
          an entry. This adds, modifies, and removes index entries to match the working
          tree." This confirms it stages ALL changes.

          **Impact of restricting git commands:**
          - Affects implementer.agent.md (remove git add -A from workflow and allowlist)
          - Affects orchestrator.agent.md (consolidate all git operations to Step 8 only)
          - The implementer should NEVER run git commands — only the orchestrator owns git.

          **Risk assessment:**
          - MEDIUM implementation risk — removing git add from the implementer changes its
            workflow. The implementer currently relies on staging to "checkpoint" work.
          - HIGH safety value — parallel implementers with git add -A is a race condition
            waiting to happen. The current DAG algorithm's file-overlap check prevents
            parallel edits to the SAME file, but git add -A bypasses this by staging ALL files.

          **Value:** HIGH — prevents data corruption in parallel implementation waves.

          **Dependencies:** Interacts with F-6 (no autocommit). Together they consolidate
          all git operations to the orchestrator.
        evidence:
          - "v2/.github/agents/implementer.agent.md line 44 — 'Run git add -A to stage all modified files'"
          - "v2/.github/agents/implementer.agent.md line 83 — 'git diff, git add, git status' in command allowlist"
          - "v2/.github/agents/orchestrator.agent.md line 72 — 'Max 4 concurrent implementers'"
          - "v2/.github/agents/orchestrator.agent.md line 93 — 'git add -A && git commit'"
          - "https://git-scm.com/docs/git-add — git add -A updates entire working tree index"
        relevance: "Prevents race conditions in parallel dispatch. The orchestrator's DAG algorithm ensures file-level isolation, but git add -A breaks this isolation at the index level."

      # ============================================================
      # F-6: No Autocommit at Pipeline End (Improvement #6)
      # ============================================================
      - id: "F-6"
        title: "Remove autocommit — low-risk, high-trust improvement"
        category: "risk"
        detail: |
          **Current state:** The orchestrator runs `git add -A && git commit -m "feat(<slug>):
          <summary>"` at Step 8 (Completion). This commits everything automatically with
          no developer review.

          **Impact of removing autocommit:**
          - Affects orchestrator.agent.md Step 8 only — remove the git commit command.
          - Replace with: present a summary of changed files to the user, optionally run
            `git diff --stat` to show what would be committed, then let the dev decide.
          - In interactive mode: ask "Commit now? / Review first? / Abort?"
          - In autonomous mode: still stage files but skip commit, leaving changes staged
            for the developer to review.

          **Risk assessment:**
          - VERY LOW risk — this is a removal of behavior, not addition. Removing an
            autocommit cannot break anything.
          - Modern AI coding systems (GitHub Copilot coding agent, SWE-agent, OpenHands)
            either create PRs for review or leave changes uncommitted. Auto-committing
            to a local branch without review is an anti-pattern because:
            1. Failed pipeline runs commit broken code
            2. The developer loses the opportunity to squash/amend
            3. Knowledge agent may have committed files the developer doesn't want

          **Value:** HIGH — gives developers control over their git history. The user
          explicitly requested this: "Devs might want to look at the changed code first."

          **Dependencies:** Synergistic with F-5 (no git from subagents). Together they
          create a clean separation: subagents never touch git, orchestrator only stages
          (not commits), developer owns the final commit decision.
        evidence:
          - "v2/.github/agents/orchestrator.agent.md line 93 — 'git add -A && git commit'"
          - "docs/feature/agent-system-refactor/initial-request.md line 388 — user: 'Devs might want to look at the changed code first'"
          - "https://docs.github.com/en/copilot/concepts/agents/coding-agent/about-custom-agents — GitHub Copilot coding agent creates PRs for review, not direct commits"
        relevance: "Aligns with industry practice. GitHub's own coding agent creates pull requests rather than auto-committing. Direct commits bypass all human review."

      # ============================================================
      # F-7: Optional Documentation Update Step (Improvement #7)
      # ============================================================
      - id: "F-7"
        title: "Optional documentation update step — medium-value, needs careful scoping"
        category: "structure"
        detail: |
          **Current state:** The knowledge agent (knowledge.agent.md) produces
          `instruction-recommendations.md` with suggestions for improving agent instructions,
          but these are never acted upon. The recommendations sit in the feature directory
          and require manual human review.

          **Impact of adding a documentation update step:**
          - Affects orchestrator.agent.md — add optional Step 8b after knowledge agent
            completes, gated by interactive prompt: "Apply documentation updates? (yes/no)"
          - Would need a new agent capability or reuse of knowledge agent to:
            1. Read copilot-instructions.md and .agent.md files
            2. Compare against knowledge findings
            3. Propose targeted updates (remove stale info, add new conventions)
          - The GitHub Copilot custom instructions system
            (`.github/copilot-instructions.md`) is the primary target for updates.

          **Risk assessment:**
          - MEDIUM risk — modifying instruction files is inherently dangerous:
            1. Bloat: agents could add too much, making instructions exceed useful size
            2. Staleness: automated additions may become incorrect over time
            3. Conflicting instructions: new additions may contradict existing ones
            4. Scope creep: the documentation agent might modify .agent.md files (which
               global-rules.md explicitly forbids for the knowledge agent)
          - Mitigation: make this STRICTLY optional, interactive-mode only, with user
            approval of each proposed change. Use diff-preview before applying.

          **Value:** MEDIUM — useful for long-running projects where instructions accumulate
          cruft. Less valuable for one-off features.

          **Dependencies:** Depends on knowledge agent completing first (already the case
          in current pipeline flow). Independent of other improvements.
        evidence:
          - "v2/.github/agents/knowledge.agent.md lines 37-40 — produces instruction-recommendations.md but it is never acted upon"
          - "v2/.github/agents/knowledge.agent.md line 98 — 'MUST NOT modify agent definition files'"
          - "docs/feature/agent-system-refactor/initial-request.md line 389 — user: 'optional step that updates documentation'"
          - "https://docs.github.com/en/copilot/concepts/agents/coding-agent/about-custom-agents — custom agents need clear, focused instructions; bloated instructions reduce quality"
        relevance: "Addresses instruction drift over time. Must be carefully scoped to prevent the documentation updater from becoming a source of instruction corruption."

      # ============================================================
      # F-8: Design Agent Web Research (Improvement #8)
      # ============================================================
      - id: "F-8"
        title: "Architect web research enablement — low-risk, already partially wired"
        category: "structure"
        detail: |
          **Current state:** The architect agent already has `web/fetch` in its tools list
          (architect.agent.md line 10) and a `web_research_enabled` input parameter
          (line 24). It also has the constraint: "Only use fetch when web_research_enabled
          is explicitly true" (line 123). So the MECHANISM exists but:
          1. The tool name is wrong (web/fetch should be fetch)
          2. There is no workflow step that explicitly says "do web research"
          3. The architect's 8-step workflow has no research phase

          **Impact of enabling architect web research:**
          - Affects architect.agent.md — add a workflow step (e.g., Step 2.5 between
            "Analyze Codebase" and "Identify Requirements") for web research on the tech
            stack when web_research_enabled is true.
          - The architect should research: framework versions, library best practices,
            architectural patterns relevant to the design decisions.

          **Risk assessment:**
          - LOW risk — the wiring already exists. Just need to:
            1. Fix the tool name (part of F-2)
            2. Add an explicit research step to the workflow
          - Minor risk: architect spending too much time on web research instead of
            producing output. Mitigation: cap research at 2-3 targeted lookups.

          **Value:** MEDIUM-HIGH — ensures design decisions are based on current framework
          capabilities, not outdated internal knowledge. Especially valuable for projects
          using rapidly evolving frameworks (React, .NET, etc.).

          **Dependencies:** Depends on F-2 (correct tool names) to actually make fetch work.
        evidence:
          - "v2/.github/agents/architect.agent.md line 10 — web/fetch already listed (but wrong name)"
          - "v2/.github/agents/architect.agent.md line 24 — web_research_enabled parameter already exists"
          - "v2/.github/agents/architect.agent.md line 123 — fetch gate constraint already exists"
          - "v2/.github/agents/architect.agent.md lines 33-42 — 8-step workflow has no explicit research step"
          - "https://martinfowler.com/bliki/TestDrivenDevelopment.html — Fowler emphasizes understanding interface before implementation; web research supports this for modern frameworks"
        relevance: "Low effort change with high knowledge-quality payoff. The architect is the decision bottleneck — better-informed decisions reduce downstream rework."

      # ============================================================
      # F-9: Tester Exploratory QA (Improvement #9)
      # ============================================================
      - id: "F-9"
        title: "Exploratory QA for tester — HIGH-value but HIGHEST-risk change"
        category: "risk"
        detail: |
          **Current state:** The tester's dynamic mode (tester.agent.md lines 50-70) has
          5 test categories including live-qa, described as "Exploratory checks: verify
          endpoints respond, simulate user interactions, validate UI flows." However, this
          is ONE line of description — far from the sophisticated exploratory QA the user
          envisions.

          The user references a TourneyPal QA agent that has:
          - 4 parallel subagent model for QA exploration
          - 7 testing phases (Happy Path, State Mutation, Edge Cases, Navigation Chaos,
            Mobile/Tablet, UI Validation, State Replay)
          - Playwright CLI skill integration
          - Autonomous bug discovery with backlog generation

          **Impact of adding exploratory QA:**
          - Affects tester.agent.md significantly — the dynamic mode workflow needs
            expansion from 6 steps to potentially 10+ steps.
          - May need: subagent access (currently agents: []), which would be a major
            architectural change, OR the tester runs all QA phases sequentially.
          - Needs a testing strategy beyond "run existing tests": the tester should act
            like a real developer trying to break the feature.

          **Risk assessment:**
          - HIGH risk — this is the most complex single change:
            1. Scope creep: exploratory QA can consume unlimited time/resources
            2. Context window exhaustion: running 7 testing phases in one agent dispatch
               will likely exceed context limits
            3. Non-deterministic: exploratory testing by nature produces variable results,
               which conflicts with the pipeline's deterministic goals
            4. Singleton constraint: tester is already SINGLETON for dynamic mode (one at
               a time). Adding 7 phases makes it a massive bottleneck.
          - Mitigation: implement as optional exploratory mode (separate from dynamic),
            time-boxed per phase, with structured output for each finding.
          - The Playwright component testing docs show the framework supports not just
            running test suites but also component-level interaction and assertion — this
            could be leveraged for exploratory checks.

          **Value:** HIGH — E2E test suites catch regression but miss novel bugs. Exploratory
          QA mimics real developer behavior: "does the feature actually work the way I
          expect?" This is the gap between automated tests and user acceptance.

          **Dependencies:** Strong dependency on F-1 (E2E skill setup) — exploratory QA
          needs an app running and browser tools configured. Also benefits from F-2 (correct
          tool names) and F-8 (architect web research for understanding what to test).
        evidence:
          - "v2/.github/agents/tester.agent.md lines 58-65 — live-qa is a single line, not a full exploratory workflow"
          - "v2/.github/agents/tester.agent.md line 14 — 'agents: []' — tester cannot dispatch subagents"
          - "docs/feature/agent-system-refactor/initial-request.md lines 389-395 — user wants QA like TourneyPal QA agent"
          - "https://playwright.dev/docs/test-components — Playwright supports component-level testing with mount/unmount, enabling exploratory interaction patterns"
          - "https://docs.github.com/en/copilot — GitHub Copilot supports agent skills for specialized tasks"
        relevance: "Addresses the fundamental gap between 'tests pass' and 'feature works.' The tester currently only validates existing tests — it cannot discover NEW bugs."

      # ============================================================
      # F-10: Implementer TDD Best Practices (Improvement #10)
      # ============================================================
      - id: "F-10"
        title: "Implementer TDD best practices — low-risk additive improvement"
        category: "pattern"
        detail: |
          **Current state:** The implementer mentions YAGNI once (line 40: "Write the
          minimum code to make tests pass (YAGNI)") and "minimal code" in the anti-drift
          anchor (line 99). However, it does NOT mention: KISS, DRY, functional programming
          preference, lint compatibility, or avoiding over-engineering.

          Martin Fowler's TDD description emphasizes that the THIRD step (Refactor) is
          "a key part of the process, otherwise we just end up with a messy aggregation of
          code fragments." The v2 implementer has RED and GREEN but NO explicit refactor
          step.

          **Impact of adding TDD best practices:**
          - Affects implementer.agent.md — add principles to constraints section and
            (critically) add a REFACTOR step to the workflow between GREEN and "Fix if needed":
            - Step 4.5: REFACTOR — Apply YAGNI, KISS, DRY. Remove duplication. Ensure
              tests still pass after refactoring.
          - The user's old implementer had these principles explicitly listed. They were
            lost in the v2 rebuild.

          **Risk assessment:**
          - VERY LOW risk — this is additive text in one file. No structural changes.
          - Minor risk: AI agents may over-interpret "DRY" and create premature abstractions
            (helpers, utilities) that actually violate YAGNI. Mitigation: explicitly state
            "DRY within the current task scope only — do not create abstractions for
            hypothetical future reuse."
          - The implementer's anti-drift anchor already says "minimal code" but lacks teeth —
            AI models tend to over-generate code. Explicit principles provide stronger
            guardrails.

          **Value:** MEDIUM — aligns with established TDD practice (Fowler's Red-Green-
          Refactor). The missing REFACTOR step is a real gap: without it, implementations
          accumulate technical debt even when tests pass.

          **Dependencies:** None — fully independent change.
        evidence:
          - "v2/.github/agents/implementer.agent.md line 40 — YAGNI mentioned once, no KISS/DRY/refactor"
          - "v2/.github/agents/implementer.agent.md lines 36-46 — RED-GREEN workflow with NO refactor step"
          - "https://martinfowler.com/bliki/TestDrivenDevelopment.html — 'The most common way to screw up TDD is neglecting the third step. Refactoring the code to keep it clean is a key part of the process.'"
          - "docs/feature/agent-system-refactor/initial-request.md lines 395-403 — user's old implementer had YAGNI, KISS, DRY, minimal code"
        relevance: "Addresses code quality gap in AI-generated code. AI models are known to over-generate; explicit principles counteract this tendency."

