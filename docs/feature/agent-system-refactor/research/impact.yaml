      - id: "F-19"
        title: "LangGraph: explicit graph-based orchestration in ~20 lines"
        category: "comparative"
        detail: |
          LangGraph defines workflows as explicit directed graphs with typed state:
            class State(TypedDict):
                text: str
            graph = StateGraph(State)
            graph.add_node("node_a", node_a)
            graph.add_node("node_b", node_b)
            graph.add_edge(START, "node_a")
            graph.add_edge("node_a", "node_b")
            compiled = graph.compile()
            result = compiled.invoke({"text": ""})
          That is a complete workflow — ~10 lines for the graph definition.

          Core benefits (from LangGraph repo):
            - Durable execution (persists through failures, resumes from checkpoints)
            - Human-in-the-loop (inspect/modify state at any point)
            - Comprehensive memory (short-term + long-term)
            - State persistence via checkpointing
          Inspired by Google's Pregel graph processing system.
          25.9k GitHub stars, 36.5k dependents. Production-proven.

          COMPARISON WITH OUR SYSTEM:
            LangGraph workflow (9 nodes + edges): ~40 lines of graph definition
            Our orchestrator Steps 0-9: ~358 lines of natural language instructions
            LangGraph state: TypedDict with automatic checkpointing
            Our state: SQLite DDL + INSERT/SELECT across 5 agents
            LangGraph error handling: checkpoint-and-resume built into runtime
            Our error handling: 143-line global-operating-rules.md + manual retry

          LangGraph's explicit graph model directly maps to our pipeline:
            START → research → spec → design → review → plan → implement → verify → review → knowledge → END
          This is literally a directed graph — we express it in ~6,400 lines of prose.
        evidence:
          - "https://github.com/langchain-ai/langgraph — README, 25.9k stars"
          - "LangGraph StateGraph API: add_node, add_edge, compile, invoke"
          - "NewAgents/.github/agents/orchestrator.agent.md — Steps 0-9 = sequential graph"
        relevance: "LangGraph proves that graph-based orchestration can be expressed in ~40 lines of code. Our equivalent takes 358 lines of natural language because we lack a graph runtime. The initial request proposed DAG-based execution — LangGraph is the reference implementation for that pattern."

