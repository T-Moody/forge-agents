      # F-1: E2E Contract/Guidance for Skill Setup (Improvement #1)
      # ============================================================
      - id: "F-1"
        title: "E2E skill setup guidance — high-value, moderate-risk change affecting orchestrator and tester"
        category: "risk"
        detail: |
          **Current state:** The v2 tester agent (tester.agent.md) references Playwright UI
          skills and live-qa in its dynamic testing workflow (lines 58-65), but there is ZERO
          guidance on how E2E skills get set up. The orchestrator has no step for E2E
          contract detection or skill bootstrapping. If skill files don't exist, the tester
          simply skips those categories — silently losing coverage.

          **Impact of adding E2E contract/guidance:**
          - Affects: orchestrator.agent.md (Step 1 or new pre-Step-6 check), tester.agent.md
            (skill discovery), possibly a new reference document (e2e-setup.md or similar)
          - The user wants autodetection of existing skills OR interactive setup prompt.
            This requires the orchestrator to scan for skill files (e.g., .e2e/skills/,
            .github/skills/) and present a multiple-choice question in interactive mode.
          - For UI apps: default to Playwright CLI skill. For APIs: suggest auth-based
            testing with Azure Key Vault integration for secrets.

          **Risk assessment:**
          - LOW risk if implemented as an optional interactive prompt at Step 1 with graceful
            skip when skills not found.
          - MEDIUM risk if autodetection logic is too complex or makes wrong assumptions
            about the project type (e.g., misidentifying a CLI tool as a web app).
          - The Playwright docs (https://playwright.dev/docs/intro) confirm that setup
            requires `npm init playwright@latest` plus browser binary downloads. An agent
            cannot silently do this — user approval is essential.

          **Value:** HIGH — this is the #1 user pain point. Without it, E2E testing is
          dead-letter code in the tester agent.

          **Dependencies:** None — can be implemented independently. However, it enhances
          improvement #9 (exploratory QA) by ensuring skill infrastructure exists.
        evidence:
          - "v2/.github/agents/tester.agent.md lines 58-65 — skill categories listed but no setup mechanism"
          - "v2/.github/agents/orchestrator.agent.md lines 35-43 — Step 1 Setup has no E2E detection"
          - "https://playwright.dev/docs/intro — Playwright requires explicit installation: npm init playwright@latest plus browser binaries"
          - "docs/feature/agent-system-refactor/initial-request.md lines 380-383 — user requirement: autodetect or ask"
        relevance: "Downstream agents (tester, implementer for E2E tests) cannot function without skill infrastructure. This is a prerequisite for improvement #9."

      # ============================================================
      # F-2: Correct Subagent Tool Usage (Improvement #2)
      # ============================================================
      - id: "F-2"
        title: "Subagent tool naming fix — CRITICAL impact, blocks entire dispatch mechanism"
        category: "risk"
        detail: |
          **Current state:** The architecture researcher (F-1 in architecture.yaml) already
          found that ALL tool names in v2 are wrong — slash-format names like
          `read/readFile`, `execute/runInTerminal` do not exist in VS Code. Additionally,
          the orchestrator references agents by name in its `agents:` frontmatter but the
          instruction text never mentions the `runSubagent` tool by name.

          **Impact of fixing subagent tool usage:**
          - Affects ALL 8 agent files plus global-rules.md (tool name corrections)
          - The orchestrator must explicitly use the `runSubagent` tool to dispatch agents
            and reference them by their exact `name:` from YAML frontmatter
          - Per GitHub Copilot custom agents docs: agents are defined in
            `.github/agents/CUSTOM-AGENT-NAME.md` and the `agents:` frontmatter array must
            list agent names that match existing agent file names

          **Risk assessment:**
          - HIGH impact but LOW implementation risk — this is a straightforward find-and-replace
            across all files, guided by the definitive tool catalog from VS Code docs.
          - NOT fixing this is the highest-risk option: with wrong tool names, VS Code
            silently ignores ALL restrictions, meaning every agent gets all tools (confirmed
            by VS Code docs: "If a given tool is not available, it is ignored").
          - The 3-tier trust model (T1/T2/T3) is completely unenforced until this is fixed.

          **Value:** CRITICAL — this is not optional. Without this fix, the security model
          is paper-only. The architecture research already identified this as v2's most
          critical gap.

          **Dependencies:** Must be done FIRST — all other improvements build on correct
          tool naming.
        evidence:
          - "v2/.github/agents/orchestrator.agent.md lines 4-14 — all tool names invalid (slash format)"
          - "v2/.github/agents/researcher.agent.md lines 4-10 — web/fetch does not exist"
          - "docs/feature/agent-system-refactor/research/architecture.yaml F-1, F-2 — definitive tool name catalog"
          - "https://docs.github.com/en/copilot/concepts/agents/coding-agent/about-custom-agents — agent profiles use agents: frontmatter to list available subagents"
        relevance: "This is the foundation fix. All trust-tier enforcement, tool restrictions, and security boundaries depend on correct tool names. Must be Wave 1."

      # ============================================================
      # F-3: Architect Clarifying Questions (Improvement #3)
      # ============================================================
      - id: "F-3"
        title: "Architect clarifying questions — low-risk, high-value UX improvement"
        category: "pattern"
        detail: |
          **Current state:** The v2 architect agent (architect.agent.md) has no mechanism
          for asking clarifying questions. It receives inputs and produces output in a single
          pass. The old system had a spec agent with ask_questions for pushback in
          interactive mode — this capability was lost in the v2 merge of spec+design into
          architect.

          **Impact of adding clarifying questions:**
          - Affects architect.agent.md only — add a workflow step between "Read Inputs" and
            "Analyze Codebase" where the architect surfaces ambiguities.
          - Requires adding an interactive gate: "If approval_mode is interactive AND
            ambiguities detected, present multiple-choice questions to user."
          - The architect already has the `web/fetch` tool listed (though the name is wrong)
            but does NOT have any user-interaction tool.

          **Risk assessment:**
          - LOW risk — this is an additive change to one file. No other agents are affected.
          - Minor risk: if the architect asks too many questions, it slows the pipeline.
            Mitigation: cap at 3-5 clarifying questions per dispatch.
          - The architect must gracefully skip questions in autonomous mode.

          **Value:** HIGH — ambiguous requirements are the #1 cause of wasted implementation
          cycles. Catching ambiguity at design time (Step 3) prevents expensive rework at
          Steps 5-7.

          **Dependencies:** Depends on F-2 (correct tool names) to ensure proper tool access.
        evidence:
          - "v2/.github/agents/architect.agent.md — no ask_questions or user-interaction mechanism"
          - "docs/feature/agent-system-refactor/initial-request.md line 385 — user: 'Our architect should do this now'"
          - "v2/.github/agents/architect.agent.md lines 33-42 — workflow steps have no clarification step"
        relevance: "Reduces rework in downstream steps. Combined with improvement #4 (planner questions), creates a coherent interactive feedback loop."

      # ============================================================
      # F-4: Planner Accept/Refine Questions (Improvement #4)
      # ============================================================
      - id: "F-4"
        title: "Planner accept/refine questions — low-risk, synergistic with architect questions"
