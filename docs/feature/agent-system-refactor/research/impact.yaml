            4. MODIFY: sql-templates.md (new INSERT templates, new evidence gate queries)
            5. MODIFY: tool-access-matrix.md (new row in master matrix)
            6. MODIFY: dispatch-patterns.md (new dispatch pattern)
            7. MODIFY: global-operating-rules.md (if new error handling needed)
            8. MODIFY: verifier.agent.md (adjust to NOT run tests, only evaluate evidence)
          Minimum 8 files changed to add ONE new agent — this is the cost of the current architecture.
          The highly coupled reference document system means any agent addition has O(6+) file impact.
        evidence:
          - "NewAgents/.github/agents/tool-access-matrix.md — master matrix must include every agent"
          - "NewAgents/.github/agents/schemas.md — every agent output needs a schema"
          - "NewAgents/.github/agents/orchestrator.agent.md — dispatch logic for every step"
        relevance: "Demonstrates the coupling cost. The initial request asks for 2 new agents (Test Runner + Instruction Optimizer), which would require ~12-16 file modifications just for infrastructure setup."

      - id: "F-8"
        title: "Blast radius: DAG-based execution replaces wave model across 5 files"
        category: "blast-radius"
        detail: |
          Replacing the wave-based execution model with DAG-based execution would impact:
            1. MAJOR REWRITE: orchestrator.agent.md — Steps 5-6 loop logic, wave dispatch, all Pattern B
            2. MAJOR REWRITE: planner.agent.md — wave assignment algorithm, dependency declarations
            3. MODIFY: dispatch-patterns.md — Pattern A/B definitions replaced with DAG patterns
            4. MODIFY: schemas.md — plan-output and task-schema would need dependency graph fields
            5. MODIFY: global-operating-rules.md — feedback loop limits may change
          The planner currently assigns tasks to waves (wave_1, wave_2, etc.) based on manual 
          dependency analysis. A DAG model would require tasks to declare explicit dependencies
          and the orchestrator to compute safe parallel execution sets dynamically.
          This is a structural change to the core execution model, not just a config change.
        evidence:
          - "NewAgents/.github/agents/planner.agent.md — wave assignment logic"
          - "NewAgents/.github/agents/orchestrator.agent.md — Steps 5-6 wave dispatch"
          - "NewAgents/.github/agents/dispatch-patterns.md — Pattern A (parallel) + Pattern B (iterative)"
        relevance: "DAG execution was explicitly requested in the initial request. The blast radius is moderate (5 files) but the changes are deep rewrites of core orchestration logic, not simple edits."

      - id: "F-9"
        title: "Blast radius: Simplifying agent file structure impacts 19/19 files"
        category: "blast-radius"
        detail: |
          The initial request calls for simplified, consistent agent structure. Current agents lack
          consistency in their internal organization:
            - Some have Responsibility Inventories (knowledge-agent), others don't
            - Self-verification checklists vary in length (4-15 items)
            - Tool access is in separate file (tool-access-matrix.md) requiring cross-reference
            - Schema definitions are in separate file (schemas.md) requiring cross-reference
            - SQL templates are in separate file requiring cross-reference
          Simplifying would likely mean:
            a) Inlining tool access into each agent (eliminates tool-access-matrix.md)
            b) Co-locating output schemas with producing agents (shrinks schemas.md)
            c) Standardizing internal structure (role, inputs, outputs, workflow, rules)
            d) Reducing cross-reference chains (agent → sql-templates → schemas → evaluation-schema)
          This touches every single file in the system — it is effectively a full rewrite.
        evidence:
          - "NewAgents/.github/agents/knowledge-agent.agent.md — has Responsibility Inventory table"
          - "NewAgents/.github/agents/researcher.agent.md — no Responsibility Inventory"
          - "NewAgents/.github/agents/tool-access-matrix.md — centralized tool access for all 9 agents"
        relevance: "Agent file simplification is universally disruptive but has the highest simplification payoff. The initial request explicitly grants authority for full rewrite."

      - id: "F-10"
        title: "GitHub Copilot .agent.md format is simpler than current system assumes"
        category: "risk"
        detail: |
          Web research confirms the actual GitHub Copilot custom agent format:
            - File: .agent.md in .github/agents/ directory
            - YAML frontmatter: name, description, tools (list), agents (subagent list), model,
              user-invocable, disable-model-invocation, handoffs (for workflow transitions)
            - Body: Markdown instructions (freeform)
            - Tools: reference VS Code tool names or MCP server tools
            - Subagents: orchestration via 'agents' field + handoffs
            - VS Code also supports .md files in .claude/agents/ folder for Claude format
          The current system uses .agent.md files correctly but the body content is far more
          complex than typical custom agents. Most examples show <100 lines of instructions.
          The current system packs 188-386 lines of detailed workflow, schema references,
          SQL template references, self-verification checklists, and anti-drift anchors into
          each agent — far beyond the typical use case.
          Key capability gap: VS Code custom agents support a 'tools' YAML field to restrict
          available tools. The current system uses tool-access-matrix.md as a manual reference
          instead of leveraging the native tools restriction. The 'handoffs' feature could
          replace some orchestrator dispatch logic.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — official docs"
          - "YAML frontmatter fields: name, description, tools, agents, model, handoffs"
          - "NewAgents/.github/agents/*.agent.md — no 'tools' field in YAML frontmatter currently"
        relevance: "The current system doesn't use native VS Code tool restrictions or handoff patterns. Leveraging these platform features could eliminate the manual tool-access-matrix.md and simplify orchestrator dispatch."

      - id: "F-11"
        title: "Cross-reference fragility is the #1 source of Critical review findings"
        category: "risk"
        detail: |
          Repository memory confirms: Cross-file section references (§numbers, EG thresholds,
          check_names) are the top source of Critical findings in code review.
          Specific instances:
            - agent-pipeline-improvements: Critical C-1 — orchestrator §11→§1.1 broken cross-reference
            - agent-pipeline-improvements: Critical S-1 — fast-track 🔴 risk bypass
            - tdd-e2e-enforcement: Critical — EG-10 phantom check_names never produced by any agent
            - tdd-e2e-enforcement: Critical — overbroad allowlist patterns
          The current architecture maximizes cross-references by design:
            - 9 agent files reference sql-templates.md by section number
            - 9 agent files reference schemas.md by schema number
            - orchestrator references dispatch-patterns.md, e2e-integration.md
            - Evidence gates (EG-1 to EG-10) cross-reference check_names produced by specific agents
          Each cross-reference is a potential breakage point when any file is modified.
        evidence:
          - "Repository memory: 'Cross-file section refs are top Critical finding source'"
          - "docs/feature/agent-pipeline-improvements/evidence-bundle.md — 2 Critical cross-ref issues"
          - "docs/feature/tdd-e2e-enforcement/evidence-bundle.md — Critical phantom check_names"
        relevance: "The cross-reference architecture is a structural weakness. Reducing cross-file references (by inlining or co-locating) would eliminate the most common class of Critical findings."

      - id: "F-12"
        title: "Known issues accumulate across runs without resolution"
        category: "technical-debt"
