      - id: "F-2"
        title: "SQLite permeates 7 of 9 agents and 7 of 10 reference docs"
        category: "dependency-coupling"
        detail: |
          SQLite (verification-ledger.db) is referenced by the following agents:
            WRITERS: orchestrator (DDL + telemetry INSERT), implementer (baseline + self-check INSERT),
            verifier (cascade INSERT), adversarial-reviewer (3x category INSERT + evaluation INSERT),
            knowledge-agent (SELECT all tables + instruction_updates INSERT)
            READERS: orchestrator (evidence gate SELECT queries)
            NOT involved: researcher, spec, designer, planner (4 of 9 agents are SQLite-free)
          Reference docs with SQLite content:
            - sql-templates.md: 936 lines (ENTIRELY about SQLite)
            - schemas.md: SQLite DDL section
            - global-operating-rules.md: §3 SQLITE_BUSY handling
            - evaluation-schema.md: INSERT template references
            - dispatch-patterns.md: evidence gate references
            - e2e-integration.md: WAL mode reference
            - tool-access-matrix.md: run_in_terminal scope restricted to SQLite
          Blast radius of removing SQLite: 5 agent files + 7 reference docs = 12 of 19 files modified.
          The sql-templates.md file (936 lines) would be entirely eliminated.
          The evaluation-schema.md file (84 lines) would need complete rewrite.
          Evidence gates (EG-1 through EG-10) in orchestrator would need replacement mechanism.
        evidence:
          - "grep_search for 'sqlite|verification-ledger|sql-templates' across NewAgents/.github/agents/ — 50+ matches"
