          - "docs/feature/behavioral-correctness-enforcement/evidence-bundle.md — 8 tasks, 29 checks, 0 failures"
          - "docs/feature/tdd-e2e-enforcement/evidence-bundle.md — 16 tasks, 142 checks, 2 cosmetic failures"
