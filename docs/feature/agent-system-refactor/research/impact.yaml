      - id: "F-6"
        title: "schemas.md at 1,422 lines is a maintenance bottleneck and context-pressure source"
        category: "complexity"
        detail: |
          schemas.md defines 14 schema types with full field tables, constraints, and examples.
          At 1,422 lines it is the single largest file in the system (22% of total).
          Every agent that produces output must conform to schemas defined here.
          Changes to schemas.md ripple to all agents that produce or consume that schema.
          The Producer/Consumer Dependency Table shows deep coupling:
            - spec-output consumed by 4 agents (Designer, Planner, Implementer, Verifier)
            - design-output consumed by 3 agents (Planner, Implementer, Adversarial Reviewer)
            - plan-output consumed by 3 agents (Orchestrator, Implementer, Verifier)
          The GitHub blog article confirms typed schemas are essential for multi-agent reliability.
          However, 1,422 lines of schema definitions for a 9-agent system suggests the schemas
          may be more complex than necessary. Each agent must load/reference this massive file.
        evidence:
          - "NewAgents/.github/agents/schemas.md — 1,422 lines"
          - "schemas.md Producer/Consumer Dependency Table — 14 schemas, complex dependency graph"
          - "GitHub blog: 'Typed schemas are table stakes in multi-agent workflows'"
        relevance: "The schema system is foundational but oversized. A refactor could simplify by co-locating schemas with their producing agents or reducing the number of distinct schema types."

      - id: "F-7"
        title: "Blast radius: Adding a Test Runner agent impacts 6+ files"
        category: "blast-radius"
        detail: |
          The initial request proposes a Test Runner agent. Adding it would require:
