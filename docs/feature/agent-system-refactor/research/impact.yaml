            agent-pipeline-improvements: 1 known issue (Minor)
              - pushback_log schema not formally defined
          Total: ~15 known issues accumulated, 4 Major outstanding.
          The pipeline has no mechanism for addressing known issues from prior runs.
          Each new run focuses on its own feature and carries forward unresolved debt.
        evidence:
          - "docs/feature/behavioral-correctness-enforcement/evidence-bundle.md — 10 Known Issues"
          - "docs/feature/tdd-e2e-enforcement/evidence-bundle.md — 4 Known Issues"
          - "docs/feature/agent-pipeline-improvements/evidence-bundle.md — 1 Known Issue"
        relevance: "Technical debt from the agent system's own development. A refactor is an opportunity to reset — but also risks introducing new Known Issues."

      - id: "F-13"
        title: "What is working well and should be preserved"
        category: "pattern"
        detail: |
          Despite complexity concerns, several patterns have proven their value:
            1. TYPED YAML CONTRACTS: Zero routing failures across 5 pipeline runs. The completion
               contract pattern (DONE/NEEDS_REVISION/ERROR) is reliable and clean.
            2. ADVERSARIAL CODE REVIEW: Caught 6+ Critical issues across runs. 3-perspective model
               is effective (security, architecture, correctness lenses).
            3. PARALLEL RESEARCHER DISPATCH: 4x parallel research consistently produces comprehensive
               coverage. All runs achieved ≥2/4 researcher completion (gate threshold).
            4. TDD CYCLE: Implementer RED-GREEN-VERIFY is enforced and working.
            5. APPROVAL MODE: Interactive vs autonomous mode with ask_questions provides user control.
            6. RISK CLASSIFICATION: 🟢/🟡/🔴 risk levels enable proportionate verification.
            7. GIT BASELINE TAGS: Enable clean rollback via pipeline-baseline-{run_id}.
            8. EVIDENCE BUNDLES: Knowledge agent produces comprehensive pipeline summaries.
        evidence:
          - "5 pipeline runs with 0 functional failures"
          - "6+ Critical issues caught by adversarial review across runs"
          - "Zero routing failures across all completion contracts"
        relevance: "These are the patterns to preserve or enhance in any refactor. The core workflow (research→spec→design→review→plan→implement→verify→review→knowledge) works. The overhead infrastructure around it is what needs simplification."

      - id: "F-14"
        title: "What appears over-engineered relative to value delivered"
        category: "risk"
        detail: |
          Honest assessment of components whose complexity exceeds their demonstrated value:
            1. SQLite EVIDENCE GATES (936-line sql-templates.md): The evidence gate queries (EG-1 to EG-10)
               have never blocked a pipeline — all runs passed all gates. The gates exist as a safety
               net that has never caught a real problem. The phantom check_name Critical finding shows
               the gates themselves are error-prone. Cost: 936 lines of SQL templates + SQLITE_BUSY
               handling + sanitization rules consumed by 5 agents.
            2. ARTIFACT EVALUATIONS (evaluation-schema.md): Agents rate upstream artifacts (1-10 scores).
               This data feeds the knowledge agent's analysis but there is no evidence it has driven
               any improvement decision. Cost: 84 lines + SQL INSERT in every consuming agent.
            3. 14 DISTINCT SCHEMA TYPES (1,422-line schemas.md): Many schemas share the common header.
               The completion-contract is useful; the per-agent payload schemas add overhead without
               clear routing value beyond what the completion contract provides.
            4. INSTRUCTION UPDATES AUDIT TRAIL: The knowledge agent tracks changes to .github/instructions/
               via SQL. This has never been used to block or audit an inappropriate change.
            5. E2E INTEGRATION (671-line e2e-integration.md): Comprehensive E2E testing framework
               that has not been exercised by any actual pipeline run on a real codebase.
            6. CONTEXT7 INTEGRATION: 29-line reference doc for a library doc lookup tool. Could be
               a one-line mention in relevant agents instead of a separate file.
        evidence:
          - "All evidence bundles show 0 evidence gate failures across 5 runs"
          - "tdd-e2e-enforcement Critical — phantom check_names in gates shows gates are error-prone"
          - "No evidence of artifact evaluations driving improvement decisions"
          - "e2e-integration.md at 671 lines — no actual E2E run evidence in any pipeline"
        relevance: "The user said 'Do not assume what I have currently is the best. AI tends to be too optimistic.' This finding directly addresses that instruction. The safety infrastructure (evidence gates, artifact evaluations, instruction audit) adds complexity without demonstrated failure-catching value."

      - id: "F-15"
        title: "VS Code handoffs and native tool restrictions are unused platform capabilities"
        category: "opportunity"
        detail: |
          VS Code custom agents support these features that the current system does NOT use:
            1. TOOLS YAML FIELD: Agents can declare allowed tools in YAML frontmatter. The current
               system uses tool-access-matrix.md (105 lines) as a manual reference document that
               agents are instructed to follow — but VS Code can enforce this natively.
            2. HANDOFFS: Agents can define handoff buttons that transition to other agents with
               pre-filled prompts. This could replace some orchestrator dispatch logic.
            3. AGENT SKILLS: Reusable capability packages (open standard at agentskills.io) that
               work across VS Code, GitHub Copilot CLI, and coding agent.
            4. HOOKS: Lifecycle automation (e.g., run formatters after file edits, enforce policies
               before command execution) that could replace some manual verification steps.
            5. SUBAGENTS: `agents` field in frontmatter declares available subagents. Combined with
               `user-invocable: false` and `disable-model-invocation: true`, this enables controlled
               orchestration hierarchies.
          The current system reinvents these capabilities in ~6,400 lines of manual instructions
          rather than leveraging the VS Code platform.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — handoffs, tools"
          - "https://code.visualstudio.com/docs/copilot/copilot-customization — hooks, skills, MCP"
          - "NewAgents/.github/agents/*.agent.md — no 'tools' field in any YAML frontmatter"
        relevance: "The biggest simplification opportunity. Using native VS Code features for tool restriction, workflow transitions, and lifecycle automation could reduce the instruction surface dramatically."

      - id: "F-16"
        title: "GitHub blog aligns with current principles but warns against overconstruction"
        category: "pattern"
        detail: |
          The GitHub engineering blog article 'Multi-agent workflows often fail' (Feb 2026) provides
          three core principles:
            1. Typed schemas for inter-agent communication (CURRENT SYSTEM HAS THIS)
            2. Action schemas defining explicit allowed actions (CURRENT SYSTEM HAS THIS)
            3. MCP enforcement turning patterns into contracts (CURRENT SYSTEM PARTIALLY HAS THIS)
          The article's key design principles:
            - 'Design for failure first' — current system does this well
            - 'Validate every agent boundary' — current system over-does this (14 schemas, 10 evidence gates)
            - 'Constrain actions before adding more agents' — current system violates this (9 agents, growing)
            - 'Log intermediate state' — current system does this via SQLite
            - 'Treat agents like distributed systems, not chat flows' — current system follows this
          The article notably emphasizes SIMPLICITY and CONSTRAINT. It does NOT advocate for
          14 schema types, 936 lines of SQL templates, or 10 evidence gates. It advocates for
          typed schemas, constrained actions, and enforcement — achievable with far less infrastructure.
        evidence:
          - "https://github.blog/engineering/multi-agent-workflows-often-fail-heres-how-to-engineer-ones-that-dont/"
          - "Article quotes: 'treat schema violations like contract failures: retry, repair, or escalate'"
          - "Article quotes: 'Constrain actions before adding more agents'"
        relevance: "The article the original system was based on supports simplification. The current system took the principles to an extreme. The refactor should return to the article's spirit: minimal typed contracts and constrained actions."

      # === ROUND 2: COMPARATIVE FRAMEWORK ANALYSIS (F-17 through F-29) ===

      - id: "F-17"
        title: "CrewAI agent definition: 3 required fields vs our 188-386 lines per agent"
        category: "comparative"
        detail: |
          CrewAI defines agents with exactly 3 required fields: role, goal, backstory.
          YAML configuration (recommended approach):
            researcher:
              role: "{topic} Senior Data Researcher"
              goal: "Uncover cutting-edge developments in {topic}"
              backstory: "You're a seasoned researcher..."
          That is the ENTIRE agent definition — 5 lines of YAML.
          Optional fields: llm, tools, max_iter, max_rpm, memory, allow_delegation,
          respect_context_window, reasoning, max_reasoning_attempts, knowledge_sources.
          Tasks are separate objects with description + expected_output + agent assignment.
          Crews compose agents + tasks with a process type (sequential or hierarchical).
          Flows provide orchestration via @start(), @listen(), @router() decorators with
          typed Pydantic state management.

          COMPARISON WITH OUR SYSTEM:
            CrewAI researcher agent: ~5 lines YAML + ~3 lines task YAML = ~8 lines total
            Our researcher agent: 188 lines (24x larger)
            CrewAI full crew (3 agents + 3 tasks + flow): ~60-80 lines total
            Our 9-agent system: 6,416 lines (80-107x larger)

          Key differences:
            - CrewAI separates WHAT (role/goal) from HOW (framework handles execution)
            - Our system embeds the entire HOW in each agent's instructions
            - CrewAI uses code (Python) for orchestration; we use natural language instructions
            - CrewAI has built-in guardrails (function-based + LLM-based) as task attributes
            - Our system uses 936-line sql-templates.md + evidence gates for verification
        evidence:
          - "https://docs.crewai.com/en/concepts/agents — Agent definition: role, goal, backstory (3 fields)"
          - "https://docs.crewai.com/en/concepts/tasks — Tasks: description, expected_output, agent"
          - "https://docs.crewai.com/en/concepts/flows — @start/@listen/@router decorators for orchestration"
          - "NewAgents/.github/agents/researcher.agent.md — 188 lines for our comparable agent"
        relevance: "Demonstrates a 24x-107x size differential between framework-native agent definitions and our natural-language instruction approach. The question is whether the extra 180 lines per agent produce proportionally better behavior."

      - id: "F-18"
        title: "AutoGen: 10-line agents with built-in team orchestration patterns"
        category: "comparative"
        detail: |
          AutoGen (v0.7+) defines agents in ~10 lines of Python:
