      - id: "F-29"
        title: "Error handling: framework patterns vs our 143-line global rules + 936-line SQL"
        category: "comparative"
        detail: |
          Error handling patterns across frameworks:

          CREWAI:
            - guardrail_max_retries on tasks (default: 3)
            - Exception handling in guardrail functions
            - Agent max_retry_limit (default: 2)
            - Context window auto-summarization (respect_context_window)
            Total error handling config: ~3-4 parameters per task/agent

          AUTOGEN:
            - CancellationToken for abort
            - ExternalTermination for stop
            - Team reset/resume for recovery
            - Built-in retry via team loop
            Total: termination conditions cover error cases implicitly

          LANGGRAPH:
            - Checkpoint-and-resume: automatic recovery from failures
            - Conditional edges for error routing
            - Node-level exception handling
            Total: error handling is part of graph topology

          OUR SYSTEM:
            - global-operating-rules.md: 143 lines (retry policy, SQLITE_BUSY, etc.)
            - sql-templates.md: 936 lines (evidence tracking for error conditions)
            - Each agent: 5-15 error-handling rules in self-verification checklists
            - Bounded feedback loops: max iteration limits
            - Completion contract: DONE/NEEDS_REVISION/ERROR status
            Total: ~200+ lines of error-handling instructions + 936 lines SQL

          KEY INSIGHT: Frameworks handle errors in the RUNTIME. We handle errors in
          INSTRUCTIONS because we have no runtime. This is the fundamental cost of
          building a multi-agent system in natural language — error handling that a
          runtime provides for free must be specified manually.

          PRAGMATIC SIMPLIFICATION:
            - Keep completion contracts (proven effective)
            - Keep bounded feedback loops (security requirement per D-14)
            - Remove SQLITE_BUSY handling (remove SQLite)
            - Remove evidence gate SQL error handling (remove evidence gates)
            - Use file-based artifacts for error state instead of SQL
            Potential reduction: ~1,000 lines eliminated
