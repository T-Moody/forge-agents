      - id: "F-22"
        title: "Anthropic's 'Building Effective Agents': simplicity is the explicit recommendation"
        category: "comparative"
        detail: |
          Anthropic's engineering guide (Dec 2024) identifies 5 workflow patterns and 1 agent pattern:
            1. Prompt chaining: sequential steps with gates
            2. Routing: classify input → specialized handler
            3. Parallelization: sectioning (parallel subtasks) + voting (multiple attempts)
            4. Orchestrator-workers: central LLM breaks down tasks, delegates to workers
            5. Evaluator-optimizer: generate + evaluate in loop
            6. Agents: LLM with tools in autonomous loop

          KEY QUOTES (direct from Anthropic):
            - "The most successful implementations weren't using complex frameworks or
              specialized libraries. Instead, they were building with simple, composable patterns."
            - "We recommend finding the simplest solution possible, and only increasing
              complexity when needed."
            - "We suggest that developers start by using LLM APIs directly: many patterns
              can be implemented in a few lines of code."
            - "Maintain simplicity in your agent's design."
            - "We actually spent more time optimizing our tools than the overall prompt."

          Our pipeline maps to Anthropic's patterns:
            - Steps 1-4 (research→design): Prompt chaining + Parallelization (sectioning)
            - Step 5 (planning): Routing (risk classification → pipeline selection)
            - Steps 5-6 (wave execution): Orchestrator-workers
            - Step 7 (adversarial review): Evaluator-optimizer / Parallelization (voting)
            - Overall: Deterministic workflow, NOT an autonomous agent

          Anthropic's assessment of what we're doing: "Workflows offer predictability
          and consistency for well-defined tasks." Our pipeline IS a workflow — but we've
          built it with the complexity budget of an autonomous agent system.
        evidence:
          - "https://www.anthropic.com/engineering/building-effective-agents — full article"
          - "Quote: 'simplest solution possible, only increasing complexity when needed'"
          - "Quote: 'many patterns can be implemented in a few lines of code'"
          - "5 workflow patterns + 1 agent pattern taxonomy"
        relevance: "Anthropic — the company that built Claude, the LLM powering our agents — explicitly recommends simplicity. Our 6,400-line system for a deterministic workflow contradicts the recommendation from the model provider itself. This is the most authoritative external signal that simplification is warranted."

      - id: "F-23"
        title: "Instruction length research: 'Lost in the Middle' effect impacts agent quality"
        category: "comparative"
        detail: |
          Academic research on LLM instruction/context length:

          1. 'Lost in the Middle' (Liu et al., TACL 2023, arXiv:2307.03172):
             - Performance degrades significantly when relevant information is in the
               middle of long contexts, even for explicitly long-context models
             - Performance is highest when relevant info is at beginning or end
             - This is a U-shaped attention curve: start and end are privileged
             - IMPLICATION: In a 386-line verifier.agent.md, instructions in the
               middle ~150 lines are the least likely to be followed

          2. 'Long-context LLMs Struggle with Long In-context Learning' (Li et al., 2024, arXiv:2404.02060):
             - LLMs perform well on simpler tasks with shorter demonstrations
             - Performance degrades with more complex tasks and longer input
             - Bias toward labels/content presented later in sequence
             - 'A gap in their ability to process long, context-rich sequences'
             - IMPLICATION: Our 1,422-line schemas.md injected as context creates
               a comprehension burden. Agents may not reliably follow schema 12
               of 14 when all 14 are in one file.

          3. 'Instruction-Following Evaluation' (Zhou et al., Google, 2023, arXiv:2311.07911):
             - IFEval benchmark: verifiable instructions like 'write in >400 words'
             - Models struggle with multiple simultaneous constraints
             - IMPLICATION: Each agent in our system has 10-20 rules to follow
               simultaneously. Instruction-following degrades with rule count.

          PRACTICAL IMPLICATIONS FOR OUR SYSTEM:
            - The 'Lost in the Middle' effect means our anti-drift anchors at the END
              of agent files are well-placed (end position = high attention)
            - But the bulk of workflow instructions in the middle are vulnerable
            - Each cross-reference ('see schemas.md §5') requires the LLM to hold
              two large documents in working memory simultaneously
            - CrewAI's 5-line agent definitions avoid this entirely: less instruction
              = more reliable instruction following

          ESTIMATED DEGRADATION CURVE:
            - <50 lines of instructions: ~95%+ instruction-following rate
            - 50-150 lines: ~85-90% (standard agent definition range)
            - 150-400 lines: ~70-85% (our agent files fall here)
            - 400+ lines with cross-references: ~60-75% (our orchestrator + schemas)
            These are estimates based on the research trends, not exact measurements.
        evidence:
          - "arXiv:2307.03172 — 'Lost in the Middle: How Language Models Use Long Contexts' (TACL 2023)"
          - "arXiv:2404.02060 — 'Long-context LLMs Struggle with Long In-context Learning' (2024)"
          - "arXiv:2311.07911 — 'Instruction-Following Evaluation for Large Language Models' (2023)"
          - "NewAgents/.github/agents/ — agent files range 188-386 lines"
        relevance: "This is the research basis for why shorter instructions may produce BETTER agent behavior. Our anti-drift anchors exist precisely because we've observed drift — the research explains why. Reducing agent files from 200-400 lines to 50-100 lines could improve instruction-following reliability by 10-25%."

