      - id: "F-2"
        title: "Orchestrator-centric hub-and-spoke architecture with 10-step linear pipeline"
        category: "structure"
        detail: |
          The architecture follows a hub-and-spoke pattern where the orchestrator is the
          sole coordinator. All agents are dispatched by and report back to the orchestrator.
          No agent communicates directly with another agent.

          Pipeline steps (defined in orchestrator.agent.md):
            Step 0: Setup & Initialization (SQLite DDL, git hygiene, run_id generation)
            Step 1: Research (4× parallel — Pattern A, gate: ≥2/4 complete)
            Step 1a: Approval Gate — Post-Research (interactive only)
            Step 2: Specification (sequential — single spec agent)
            Step 3: Design (sequential — single designer)
            Step 3b: Design Review (3× parallel adversarial reviewers — Pattern A)
            Step 4: Planning (sequential — single planner)
            Step 4a: Approval Gate — Post-Planning (interactive only)
            Steps 5-6: Implementation + Verification Loop (Pattern B — max 3 iterations)
            Step 6a: Runtime Smoke Test (mandatory for bugfix features)
            Step 7: Code Review (3× parallel adversarial reviewers — Pattern A)
            Step 8: Knowledge Capture (non-blocking)
            Step 8b: Evidence Bundle (orchestrator produces summary)
            Step 9: Commit (git add, commit)

          The orchestrator has 5 core responsibilities:
            1. Dispatch routing (read completion contracts → determine next step)
            2. Approval gate management (ask_questions in interactive mode)
            3. Error categorization and retry (transient: retry once, deterministic: escalate)
            4. Evidence gate verification (SQL queries on verification-ledger.db)
            5. Pipeline initialization (Step 0: SQLite schema, git baseline)

          Dispatch uses VS Code Copilot's runSubagent API. Multiple runSubagent calls in
          the same reasoning step execute in parallel (native Copilot runtime behavior).

          Two dispatch patterns defined in dispatch-patterns.md:
            Pattern A (Fully Parallel): Fan-out to N agents, wait all, evaluate gate. Concurrency cap: 4.
            Pattern B (Sequential with Replan): Implement→Verify→Replan cycle, max 3 iterations.
        evidence:
          - "NewAgents/.github/agents/orchestrator.agent.md lines 85-400 (Steps 0-9)"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 15-35 (5 core responsibilities)"
          - "NewAgents/.github/agents/dispatch-patterns.md (Pattern A and Pattern B definitions)"
          - "NewAgents/.github/agents/orchestrator.agent.md anti-drift anchor (parallel dispatch via runSubagent)"
        relevance: "The hub-and-spoke model is simple and proven but makes the orchestrator a bottleneck. Every inter-agent communication passes through it. This is unlike decentralized architectures (AutoGen Swarm, LangGraph conditional edges) where agents can hand off directly."

      - id: "F-3"
        title: "SQLite verification-ledger.db serves as the central state persistence layer"
        category: "structure"
        detail: |
          The system uses a single SQLite database (verification-ledger.db) with 4 tables:
            1. anvil_checks — Verification evidence records (written by 5 agents: Orchestrator,
               Implementer, Verifier, Adversarial Reviewer, Knowledge Agent)
            2. pipeline_telemetry — Execution tracking (written by Orchestrator only)
            3. artifact_evaluations — Quality feedback (written by Implementer, Verifier, Adversarial Reviewer)
            4. instruction_updates — Governed instruction change audit (written by Knowledge Agent only)

          Evidence gates (EG-1 through EG-10) are SQL SELECT queries that the orchestrator
          executes to make routing decisions. They form a formal proof chain: no step can
          claim completion without database evidence. This is the anti-hallucination mechanism.

          SQLite-specific infrastructure:
            - WAL mode + busy_timeout=5000 (set at Step 0)
            - SQLITE_BUSY retry: 3 attempts with exponential backoff (1s, 2s, 4s)
            - sql_escape() sanitization for all free-text values
            - stdin piping for all SQL execution (injection prevention)
            - Run_id mismatch detection → archive to .db.archive with filesystem-safe timestamp

          5 of 9 agents write to SQLite. The remaining 4 (Researcher, Spec, Designer, Planner)
          have no SQLite dependency. sql-templates.md (936 lines) defines all SQL operations.

          This is unique among agent systems — no other researched framework uses SQLite for
          pipeline evidence tracking. SWE-Agent uses JSON trajectories, OpenHands uses event
          streams, MetaGPT uses file artifacts, AutoGen uses in-memory messages, LangGraph
          uses typed dict state (with optional SQLite/PostgreSQL checkpointing).
        evidence:
          - "NewAgents/.github/agents/sql-templates.md lines 1-10 (header listing all consumers)"
          - "NewAgents/.github/agents/sql-templates.md lines 78-200 (§1 DDL: 4 tables)"
          - "NewAgents/.github/agents/sql-templates.md lines 636-928 (§6 evidence gate queries)"
          - "NewAgents/.github/agents/global-operating-rules.md lines 54-68 (§3 SQLITE_BUSY handling)"
          - "NewAgents/.github/agents/orchestrator.agent.md lines 90-130 (Step 0 SQLite initialization)"
        relevance: "SQLite permeates 12 of 19 system files. The initial request explicitly asks to consider removing it. Removing SQLite would eliminate ~1,100 lines (sql-templates.md + evaluation-schema.md) but requires replacing 10 evidence gates that are the pipeline's verification backbone."

