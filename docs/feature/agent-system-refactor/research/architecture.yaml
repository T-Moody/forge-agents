agent_output:
  agent: "researcher"
  instance: "researcher-architecture"
  step: "step-1"
  started_at: "2026-03-09T18:01:00Z"
  completed_at: "2026-03-09T18:45:00Z"
  schema_version: "1.0"
  payload:
    focus: "architecture"
    findings:
      - id: "F-1"
        title: "v2 uses fabricated tool identifiers not recognized by VS Code"
        category: "structure"
        detail: |
          The v2 agent files use tool names like read/readFile, edit/createFile,
          edit/editFiles, search/listDirectory, search/textSearch, search/codebase,
          search/fileSearch, execute/runInTerminal, execute/getTerminalOutput,
          read/problems, search/changes, web/fetch, vscode/memory, and agent.

          According to the VS Code documentation (fetched 2026-03-09), the actual built-in
          tool identifiers are flat names without namespace prefixes:
          readFile, createFile, editFiles, listDirectory, textSearch, codebase,
          fileSearch, runInTerminal, getTerminalOutput, problems, changes, fetch,
          runSubagent, usages, githubRepo, testFailure, extensions, todos,
          createDirectory, editNotebook, runCell, getNotebookSummary, selection,
          terminalLastCommand, terminalSelection, searchResults, VSCodeAPI,
          runVscodeCommand, installExtension, openSimpleBrowser, new, newWorkspace,
          newJupyterNotebook, getProjectSetupInfo, runTests, createAndRunTask,
          getTaskOutput, runTask.

          Tool sets (groups of tools) use these names: edit, search, runCommands,
          runNotebooks, runTasks, browser.

          The v2 system's read/readFile format is entirely fabricated. VS Code will silently
          ignore unrecognized tool names, meaning agents may be running with no tool
          restrictions at all or with broken restrictions that provide a false sense of security.
        evidence:
          - "v2/.github/agents/orchestrator.agent.md lines 4-16 — YAML frontmatter tools list uses read/readFile, edit/createFile, etc."
          - "v2/.github/agents/researcher.agent.md lines 4-11 — tools: [read/readFile, search/textSearch, web/fetch, etc.]"
          - "v2/.github/agents/implementer.agent.md lines 4-15 — tools: [execute/runInTerminal, read/problems, etc.]"
          - "https://code.visualstudio.com/docs/copilot/reference/copilot-vscode-features — Chat tools table lists flat names: #readFile, #createFile, #editFiles, #listDirectory, #textSearch, #codebase, #fileSearch, #fetch, #runInTerminal, #getTerminalOutput, #problems, #changes, #runSubagent, #usages"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — 'tools: A list of tool or tool set names that are available for this custom agent. Can include built-in tools, tool sets, MCP tools, or tools contributed by extensions.'"
        relevance: "CRITICAL — All tool restrictions in all 8 v2 agents are non-functional. The trust model (T1/T2/T3) relies on tool whitelists that VS Code cannot enforce with the current fabricated identifiers."

      - id: "F-2"
        title: "Subagent invocation tool identifier mismatch"
        category: "structure"
        detail: |
          The v2 orchestrator lists 'agent' in its tools array and the NewAgents orchestrator
          references 'agent/runSubagent'. The VS Code documentation shows two valid forms:
          - 'runSubagent' as the specific tool name
          - 'agent' as a tool set name (appears in prompt file examples)

          The agents frontmatter property controls WHICH agents can be used as subagents.
          The runSubagent tool (or agent tool set) enables the ABILITY to invoke subagents.
          Both are needed:
          - tools: ['runSubagent'] or tools: ['agent'] — enables subagent capability
          - agents: ['researcher', 'planner', ...] — restricts which agents can be called

          The v2 orchestrator has agents: listing all agent names, which is correct for
          the restriction. The tool name 'agent' appears valid per the prompt file examples
          in the subagents documentation.

          Subagents are synchronous by default — the main agent waits for each to complete.
          VS Code CAN run multiple subagents in parallel if they are all initiated in the
          same reasoning step. This aligns with the NewAgents orchestrator's parallel
          dispatch patterns.
        evidence:
          - "v2/.github/agents/orchestrator.agent.md line 14 — tools list includes 'agent'"
          - "NewAgents/.github/agents/orchestrator.agent.md — references 'agent/runSubagent'"
          - "https://code.visualstudio.com/docs/copilot/reference/copilot-vscode-features — '#runSubagent: Run a task in an isolated subagent context'"
          - "https://code.visualstudio.com/docs/copilot/agents/subagents — 'VS Code can spawn multiple subagents in parallel. When you request parallel analysis, VS Code runs those subagents concurrently and waits for all results.'"
          - "https://code.visualstudio.com/docs/copilot/agents/subagents — Invoke a subagent in a prompt file section shows: tools: ['agent', 'read', 'search', 'edit']"
        relevance: "The orchestrator's core function is subagent dispatch. The 'agent' tool set name appears valid per docs, but should be verified. The NewAgents format 'agent/runSubagent' is definitely incorrect."

      - id: "F-3"
        title: "VS Code custom agent frontmatter supports properties not used by v2"
        category: "structure"
        detail: |
          The VS Code custom agents documentation (fetched 2026-03-09) defines these
          frontmatter properties for .agent.md files:

          STANDARD PROPERTIES:
          - name: Agent name (string)
          - description: Brief description, shown as placeholder text (string)
          - tools: List of tool/tool set names (array of strings)
          - agents: List of allowed subagent names, or '*' for all, or [] for none (array)
          - model: AI model name or prioritized array of model names (string or array)
          - user-invocable: Boolean, controls visibility in dropdown (default true)
          - disable-model-invocation: Boolean, prevents subagent invocation (default false)
          - argument-hint: Hint text shown in chat input
          - target: Environment target (vscode or github-copilot)
          - handoffs: List of suggested next actions to transition between agents
          - hooks (Preview): Optional hook commands scoped to this agent
          - mcp-servers: MCP server configs for github-copilot target

          HANDOFF PROPERTIES:
          - handoffs.label: Button display text
          - handoffs.agent: Target agent identifier
          - handoffs.prompt: Prompt to send
          - handoffs.send: Auto-submit boolean (default false)
          - handoffs.model: Optional model override

          The v2 system uses only: name, description, tools, agents. It does not use:
          - model (could optimize cost by using faster models for simple agents)
          - user-invocable: false (worker agents should not be user-invocable)
          - handoffs (could replace some orchestrator routing with declarative handoffs)
          - hooks (could enforce security policies deterministically)
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — Custom agent file structure Header section lists all frontmatter fields"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — Handoffs section describes label, agent, prompt, send, model properties"
          - "https://code.visualstudio.com/docs/copilot/agents/subagents — 'user-invocable: false to create agents that are only accessible as subagents'"
          - "v2/.github/agents/*.agent.md — All agent files use only name, description, tools, agents"
        relevance: "Missing user-invocable:false means all worker agents appear in the user dropdown, creating confusion. Missing model specification means all agents use the same model regardless of task complexity. Handoffs could simplify sequential step routing."

      - id: "F-4"
        title: "Coordinator-and-Worker pattern from VS Code docs matches v2 intent"
        category: "pattern"
        detail: |
          The VS Code subagents documentation (fetched 2026-03-09) describes a
          Coordinator and Worker orchestration pattern with concrete examples:

          - A single coordinator agent manages overall task and delegates to subagents
          - Worker agents have tailored tool sets (planners get read-only, implementers get edit)
          - Workers set user-invocable: false
          - Workers can specify faster/cheaper models via the model property
          - The coordinator instructions describe the workflow steps

          The VS Code documentation example achieves the coordinator pattern in
          approximately 30-40 lines per agent. The v2 system's 100-140 lines per agent
          is 3-4x this.

          The VS Code docs also show a Multi-Perspective Code Review pattern using parallel
          subagents with different review focus areas — directly matching v2's reviewer
          dispatch pattern. The key difference: the VS Code example achieves this with a
          single orchestrator prompt using inline perspective descriptions, not separate
          agent files per perspective.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/agents/subagents — Orchestration patterns: Coordinator and worker pattern with Planner, Plan Architect, Implementer, Reviewer agents"
          - "https://code.visualstudio.com/docs/copilot/agents/subagents — Multi-perspective code review: 'Run each perspective as a parallel subagent so findings are independent and unbiased'"
          - "v2/.github/agents/ — 9 files totaling approximately 1004 lines"
        relevance: "The v2 system's complexity may be counterproductive for simple cases. VS Code's native patterns suggest a lighter approach. However, the v2 system adds deterministic pipeline semantics (gates, retries, DAG scheduling) that go beyond simple delegation."

      - id: "F-5"
        title: "NewAgents system uses 18 files with heavy cross-references vs v2's 11 files"
        category: "structure"
        detail: |
          The NewAgents/.github/agents/ directory contains 18 files:
          - 8+ agent files: orchestrator, designer, spec, implementer, planner, researcher,
            adversarial-reviewer, knowledge-agent, verifier
          - 10 reference docs: global-operating-rules.md, schemas.md, sql-templates.md,
            tool-access-matrix.md, dispatch-patterns.md, review-perspectives.md,
            severity-taxonomy.md, evaluation-schema.md, context7-integration.md,
            e2e-integration.md

          The NewAgents orchestrator alone is 539 lines (hitting its 550-line budget).
          It uses extensive cross-file section references to sql-templates.md,
          global-operating-rules.md, dispatch-patterns.md, and e2e-integration.md.

          The v2 system reduced this to 11 files (8 agents + global-rules.md + 2 prompts),
          approximately 1004 total lines, with zero cross-file section references.

          Key architectural differences:
          - NewAgents: SQLite-backed verification ledger, 6 evidence gates with SQL queries
          - v2: Zero SQLite, completion contracts only (DONE/NEEDS_REVISION/ERROR)
          - NewAgents: Separate spec and designer agents
          - v2: Combined architect agent (spec + design)
          - NewAgents: Complex verifier agent with 5 tiers
          - v2: Tester agent with 2 modes (static/dynamic)
        evidence:
          - "NewAgents/.github/agents/ — 18 files listed via list_dir"
          - "v2/.github/agents/ — 9 files (8 agents + global-rules.md)"
          - "v2/.github/prompts/ — 2 files (feature-workflow.prompt.md, quick-fix.prompt.md)"
          - "NewAgents/.github/agents/orchestrator.agent.md — 539 lines with cross-file section references"
          - "v2/.github/agents/orchestrator.agent.md — approximately 140 lines, no cross-file section references"
        relevance: "The v2 simplification successfully reduced complexity. The trade-off is loss of deterministic evidence gates. The refactor should evaluate whether completion-contract routing is sufficient or if some structured verification is needed."

      - id: "F-6"
        title: "VS Code supports Hooks, Skills, and Plugins as modular capabilities"
        category: "pattern"
        detail: |
          The VS Code customization overview (fetched 2026-03-09) describes three
          modular capability systems beyond custom agents:

          1. AGENT SKILLS (agentskills.io open standard):
             - Folders containing instructions, scripts, and resources
             - Loaded on-demand based on the task
             - Work across VS Code, GitHub Copilot CLI, and GitHub Copilot coding agent
             - Created via /create-skill command
             - Invoked as slash commands

          2. HOOKS (Preview):
             - Execute custom shell commands at lifecycle points during agent sessions
             - Deterministic enforcement (not LLM-dependent)
             - Can enforce security policies, run formatters/linters, create audit trails
             - Can be scoped to specific agents via agent frontmatter

          3. AGENT PLUGINS (Preview):
             - Pre-packaged bundles of customizations from marketplaces
             - Can include slash commands, skills, agents, hooks, and MCP servers

          Neither v2 nor NewAgents uses any of these. The v2 system implements ad-hoc
          versions:
          - Skills -> hardcoded workflow steps in agent body text
          - Hooks -> anti-drift anchors and self-verification checklists (LLM-dependent)
          - Plugins -> the reference docs (global-rules.md, etc.)

          Hooks are particularly relevant: they could replace the pattern of relying on
          LLM compliance for security rules (file ownership, output path restrictions)
          with deterministic shell-command enforcement.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/copilot-customization — Agent Skills section describes open standard loaded on-demand"
          - "https://code.visualstudio.com/docs/copilot/copilot-customization — Hooks section: 'execute custom shell commands at key lifecycle points, enforce security policies by blocking dangerous commands'"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — hooks (Preview): 'Optional hook commands scoped to this agent'"
          - "v2/.github/agents/ — No hooks, no skills, no plugins used"
        relevance: "Hooks could provide deterministic enforcement of tool restrictions and output path rules that currently rely on LLM instruction-following. Skills could modularize the testing workflow. This is the highest-leverage platform feature the refactor should adopt."

      - id: "F-7"
        title: "AutoGen framework validates multi-agent architectural patterns"
        category: "pattern"
        detail: |
          Microsoft's AutoGen framework (fetched 2026-03-09, v0.7.5 stable) provides
          three tiers of multi-agent capability:

          1. AutoGen Studio — No-code UI for prototyping agent workflows
          2. AgentChat — Programming framework for conversational single/multi-agent apps
          3. Core — Event-driven framework for scalable multi-agent systems with:
             - Deterministic and dynamic agentic workflows for business processes
             - Distributed agents for multi-language applications

          Key architectural patterns validated by AutoGen:
          - Event-driven messaging: Agents communicate via typed messages
          - Typed completion contracts: Similar to v2's DONE/NEEDS_REVISION/ERROR
          - Deterministic workflows: Supported alongside dynamic agentic workflows
          - Tool isolation: Each agent has its own tool set (MCP integration via McpWorkbench)
          - Code execution sandboxing: DockerCommandLineCodeExecutor for safety

          The v2 system mirrors several AutoGen patterns (typed contracts, tool isolation,
          deterministic workflows) but uses the filesystem instead of message passing.
          This is appropriate for VS Code Copilot which operates through file reads/writes.
        evidence:
          - "https://microsoft.github.io/autogen/stable/ — AutoGen 0.7.5: 'A framework for building AI agents and applications'"
          - "https://microsoft.github.io/autogen/stable/ — Core: 'event-driven programming framework for building scalable multi-agent AI systems'"
          - "https://microsoft.github.io/autogen/stable/ — Extensions include McpWorkbench for MCP servers, DockerCommandLineCodeExecutor"
          - "v2/.github/agents/orchestrator.agent.md — Uses DONE/NEEDS_REVISION/ERROR contract routing, DAG dispatch"
        relevance: "Validates that the v2 architectural patterns are aligned with industry-standard multi-agent frameworks. The gap is that v2 implements these patterns in free-text instructions rather than leveraging platform-level enforcement."

      - id: "F-8"
        title: "v2 prompt files correctly use the agent property for orchestrator binding"
        category: "structure"
        detail: |
          The v2 prompt files (feature-workflow.prompt.md, quick-fix.prompt.md) use
          agent: orchestrator in their frontmatter. This is correct per VS Code
          documentation — the agent property in prompt files binds the prompt to a
          specific custom agent when invoked.

          The prompt files also use {{USER_FEATURE}} template variables for user input.
          They define step sequences and startup questions inline.

          The custom agents documentation shows tool list priority:
          1. Tools specified in the prompt file (if any)
          2. Tools from the referenced custom agent
          3. Default tools for the selected agent

          The v2 prompt files do not specify tools, so the orchestrator's tool list applies.
          This is correct behavior.
        evidence:
          - "v2/.github/prompts/feature-workflow.prompt.md — 'agent: orchestrator' in frontmatter"
          - "v2/.github/prompts/quick-fix.prompt.md — 'agent: orchestrator' in frontmatter"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-agents — Tool list priority section"
        relevance: "Confirms v2 prompt file structure is sound. The prompt-to-agent binding pattern is a good architectural choice for multiple pipeline entry points."

      - id: "F-9"
        title: "VS Code instruction system supports automatic rule injection"
        category: "structure"
        detail: |
          The VS Code custom instructions system (fetched 2026-03-09) supports multiple
          instruction sources with a defined priority order:

          1. Personal instructions (user-level, highest priority)
          2. Repository instructions (.github/copilot-instructions.md or AGENTS.md)
          3. Organization instructions (lowest priority)

          Additional sources:
          - AGENTS.md files in workspace root (always-on, auto-detected)
          - Nested AGENTS.md files in subfolders (experimental)
          - CLAUDE.md files for Claude Code compatibility
          - .instructions.md files with applyTo glob patterns
          - Organization-level instructions shared across repos

          The repository already has a .github/copilot-instructions.md with global rules.
          The v2 system uses a separate global-rules.md within the agents folder.

          Best practice gap: The v2 global-rules.md is referenced with Markdown links in
          agent body text. It would be more robust as an .instructions.md file with
          applyTo: '**' that applies automatically to all requests, rather than relying
          on each agent to manually read it.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-instructions — Always-on instructions: .github/copilot-instructions.md, AGENTS.md"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-instructions — Instruction priority: Personal > Repository > Organization"
          - "https://code.visualstudio.com/docs/copilot/customization/custom-instructions — .instructions.md with applyTo glob patterns"
          - ".github/copilot-instructions.md — Exists at repo root with global pipeline rules"
          - "v2/.github/agents/global-rules.md — Separate shared doc within agents folder"
        relevance: "Moving global rules to a platform-native instruction mechanism would ensure they are automatically applied without relying on agents to read them. Addresses the risk that agents skip rules they never read."

      - id: "F-10"
        title: "v2 agent body instructions are verbose relative to platform guidance"
        category: "pattern"
        detail: |
          VS Code's guidance on custom instructions and agent files emphasizes:
          - Keep your instructions short and self-contained
          - Each instruction should be a single, simple statement
          - Focus on non-obvious rules
          - Include the reasoning behind rules
          - Show preferred and avoided patterns with concrete code examples

          The v2 agent files average 100-140 lines of body text with detailed workflow
          steps, output schemas, and constraint lists. While this provides determinism,
          it conflicts with the platform's recommendation for concise instructions.

          The VS Code TDD example achieves a coordinator pattern in approximately 10 lines.
          The v2 orchestrator uses approximately 140 lines for the same concept.

          A hybrid approach could work: keep agent body text concise (core role and
          constraints) and extract detailed schemas, workflows, and output formats to
          .instructions.md files or agent Skills that are loaded on-demand.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/customization/custom-instructions — Tips: 'Keep your instructions short and self-contained... Focus on non-obvious rules'"
          - "https://code.visualstudio.com/docs/copilot/agents/subagents — TDD example achieves full coordinator in approximately 10 lines"
          - "v2/.github/agents/orchestrator.agent.md — approximately 140 lines of body text"
          - "v2/.github/agents/implementer.agent.md — approximately 130 lines with detailed workflow"
        relevance: "Extracting schemas and workflows to platform-native mechanisms (instructions files, skills) would align with best practices while preserving determinism. Agent bodies should focus on role identity, key constraints, and anti-drift anchors."

      - id: "F-11"
        title: "Autopilot mode and terminal sandboxing are new platform capabilities"
        category: "pattern"
        detail: |
          VS Code now offers three permission levels (fetched 2026-03-09):
          1. Default Approvals — Standard approval dialogs
          2. Bypass Approvals — Auto-approves all tool calls
          3. Autopilot (Preview) — Auto-approves, auto-retries, auto-responds to
             questions, and continues autonomously until task is complete

          Autopilot is relevant to the pipeline's autonomous approval_mode. When a user
          selects autonomous mode, the platform handles approval bypasses natively.

          Terminal sandboxing (Preview, macOS/Linux only) provides:
          - File system access control (allowWrite, denyWrite, denyRead)
          - Network access control (allowedDomains)
          - Could replace the v2 trust model's T2 command allowlists with deterministic
            platform-level enforcement

          However, terminal sandboxing is NOT available on Windows, which is the user's OS.
        evidence:
          - "https://code.visualstudio.com/docs/copilot/agents/agent-tools — Permission levels: Default Approvals, Bypass Approvals, Autopilot (Preview)"
          - "https://code.visualstudio.com/docs/copilot/agents/agent-tools — Autopilot: 'auto-approve all tools, automatically retries on errors, auto-responds to questions'"
          - "https://code.visualstudio.com/docs/copilot/agents/agent-tools — Terminal sandboxing: 'Preview, only supported on macOS and Linux. On Windows, the sandbox settings have no effect.'"
        relevance: "Autopilot could simplify the orchestrator's approval gate logic for autonomous mode. Terminal sandboxing would be ideal for trust enforcement but is unavailable on Windows. The refactor should design for cross-platform compatibility."

    summary: |
      The v2 multi-agent system is architecturally sound in its coordinator-worker pattern,
      DAG-based task scheduling, and completion-contract routing. These patterns are validated
      by both VS Code's official documentation and industry frameworks like AutoGen.

      However, the v2 system has a CRITICAL gap: all tool identifiers in agent frontmatter
      use a fabricated namespace/tool format (e.g., read/readFile, execute/runInTerminal) that
      VS Code does not recognize. The correct format uses flat names (readFile, runInTerminal,
      fetch, runSubagent). This means the trust model's tool restrictions are entirely
      non-functional — VS Code silently ignores unrecognized tool names.

      The refactor should prioritize:
      1. Fix all tool identifiers to use VS Code's actual built-in tool names
      2. Set user-invocable: false on worker agents (all except orchestrator)
      3. Adopt Hooks (Preview) for deterministic security policy enforcement
      4. Consider Agent Skills for modular test workflows
      5. Move global rules to copilot-instructions.md for automatic inclusion
      6. Extract output schemas to .instructions.md files to keep agent bodies concise
      7. Add model specifications for cost optimization on simple agents

