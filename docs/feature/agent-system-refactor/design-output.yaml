          design_changes:
            ["schemas.completion_contract: validation_rule", "edge_cases EC-6"]
        - finding_id: "SS-C-2"
          source: "security-sentinel"
          title: "Quick-fix prompt step set undefined"
          resolution: "Added D-13: quick-fix steps {1,5,6,7,8}. Code Review mandatory per immutable minimum step set."
