  started_at: "2026-03-09T21:05:00Z"
  completed_at: "2026-03-09T23:50:00Z"
  schema_version: "1.0"
  run_id: "2026-03-09T18:00:00Z"
  revision_round: 2

  payload:
    architecture: >
      Hybrid targeted modifications (Direction C) across 9 v2 files implementing
      10 improvements. Critical fixes (tool names, git safety, TDD, exploratory QA)
      applied inline per agent; shared git safety rule extracted to global-rules.md.
      No new agent files created. All agents remain under 150-line budgets (architect
      is tightest at ~145/150 with 5-line headroom — verified line counts). Interactive
      questioning uses orchestrator-mediated assumptions-first pattern since VS Code
      subagents cannot directly prompt users. Step 8 decomposed into 5 explicit
      sub-steps (8a-8e). Git staging uses two-source strategy: implementation files
      from reports + pipeline artifacts from docs/feature/<slug>/.

    decisions:
      - id: "D-1"
        title: "Direction C — Hybrid inline + shared extraction"
        context: >
          Three directions evaluated for implementing 10 improvements to v2. Spec
          recommended Direction A (Targeted). User dispatch recommended Direction C
          (Hybrid). Need approach that stays within 150-line budgets.
        alternatives:
          - id: "alt-A"
            label: "Direction A — Targeted In-Place Edits"
            description: "Modify each agent file individually. No extraction."
            pros:
              - "Minimal cross-file coupling"
              - "Each file self-contained"
              - "Lowest coordination risk"
            cons:
              - "Git safety rule duplicated across implementer + orchestrator + global-rules"
              - "No shared pattern for interactive questioning"
          - id: "alt-B"
            label: "Direction B — Targeted + Hooks Enforcement"
            description: "Same as A plus .github/hooks/ with PreToolUse hooks for deterministic enforcement."
            pros:
              - "Deterministic security enforcement"
              - "PreToolUse hook can block git commands from subagents"
            cons:
              - "Hooks are Preview feature — behavior may change"
              - "Windows hook script portability concerns"
              - "Exceeds spec scope (no new infrastructure files)"
          - id: "alt-C"
            label: "Direction C — Hybrid inline + shared extraction"
            description: "Critical fixes inline per agent. Git safety rule extracted to global-rules.md."
            pros:
              - "Single source of truth for git safety"
              - "Agents stay lean — shared concerns centralized"
              - "Minimal diff over Direction A (only 1 rule moves)"
            cons:
              - "global-rules.md grows slightly (~8 lines)"
        selected: "alt-C"
        rationale: >
          Direction C places the git safety rule in global-rules.md (single source of
          truth) while keeping all other changes inline. Practical difference from A is
          minimal. Direction B adds Preview-feature infrastructure that exceeds scope.
        confidence: "High"
        confidence_definition: "All alternatives evaluated with clear tradeoffs. Low reversal cost — C differs from A by only ~8 lines in global-rules.md."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-2"
        title: "Individual flat camelCase tool names (not tool sets)"
        context: >
          All v2 tool names use invalid namespace/tool format which VS Code silently
          ignores. VS Code supports individual names (readFile) and tool sets (edit,
          search). Need to choose approach for corrected frontmatter.
        alternatives:
          - id: "alt-individual"
            label: "Individual tool names"
            description: "List each tool by exact camelCase name."
            pros:
              - "Fine-grained access control per agent"
              - "Trust model enforced at individual tool level"
              - "Matches spec FR-2.1 individual mappings"
              - "Easier to audit"
            cons:
              - "Slightly more verbose frontmatter"
          - id: "alt-sets"
            label: "Tool sets"
            description: "Use tool set names: edit, search, runCommands."
            pros:
              - "More concise"
              - "Matches some VS Code examples"
            cons:
              - "Coarser control — 'edit' grants createFile AND editFiles AND createDirectory"
              - "Trust tier boundaries blurred"
              - "Cannot restrict researcher to read-only-plus-createFile"
        selected: "alt-individual"
        rationale: >
          The v2 trust model (T1/T2/T3) requires fine-grained restrictions. Tool sets
          are too coarse. Individual names preserve security intent while using correct
          VS Code identifiers.
        confidence: "High"
        confidence_definition: "Tool names verified against official VS Code cheat sheet (fetched 2026-03-09). Zero ambiguity."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-3"
        title: "Orchestrator-mediated interactive questioning"
        context: >
          FR-3/FR-4 require architect and planner to ask users clarifying questions.
          VS Code subagents run in isolated context and cannot directly prompt users.
        alternatives:
          - id: "alt-embedded"
            label: "Embed questioning in subagent"
            description: "Architect/planner directly prompt the user."
            pros:
              - "Matches spec literally (FR-3.1, FR-4.1)"
            cons:
              - "VS Code subagents cannot prompt users"
              - "No built-in structured question tool exists"
          - id: "alt-orchestrator-mediated"
            label: "Orchestrator mediates all user interaction"
            description: "Architect outputs clarifications_needed in YAML; orchestrator reads and presents to user."
            pros:
              - "Aligns with VS Code platform model"
              - "Subagents remain purely functional"
              - "Pattern validated by VS Code coordinator-worker docs"
            cons:
              - "Adds ~8 lines to orchestrator"
              - "Differs from spec literal wording"
          - id: "alt-needs-revision"
            label: "NEEDS_REVISION loop"
            description: "Architect returns NEEDS_REVISION with questions. Orchestrator re-dispatches."
            pros:
              - "Uses existing completion contract"
            cons:
              - "Full re-dispatch wastes tokens"
              - "Re-dispatch resets context window"
        selected: "alt-orchestrator-mediated"
        rationale: >
          VS Code subagents cannot prompt users directly. Orchestrator-mediated pattern
          is the only approach that works within the platform. Uses assumptions-first
          flow (Option B, per PV C-1): (1) Orchestrator dispatches architect with all
          inputs. (2) Architect completes FULLY, documenting assumptions in
          assumptions_made[] output field. (3) Architect includes clarifications_needed[]
          for remaining ambiguities. (4) Orchestrator reads output; if interactive mode
          AND clarifications_needed present, presents questions to user via ask_questions.
          (5) If user answers contradict assumptions, orchestrator re-dispatches architect
          with original inputs + clarification_responses parameter; architect resumes at
          Step 2 with clarifications resolved. (6) If answers are compatible, proceed
          with existing architecture. Same pattern for planner: planner outputs
          plan_summary + clarifications_needed; orchestrator mediates approval gate.
          Re-dispatch only when answers invalidate assumptions (low probability,
          acceptable token cost). Satisfies INTENT of FR-3/FR-4.
        confidence: "High"
        confidence_definition: "VS Code subagent model verified via official docs (fetched 2026-03-09). Assumptions-first flow is strictly more efficient than two-phase dispatch — avoids wasted first dispatch. Re-dispatch only on contradiction."
        risk_classification: "🟡"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-4"
        title: "Keep 'agent' tool set in orchestrator frontmatter"
        context: >
          Orchestrator needs to dispatch subagents. VS Code has both 'agent' (tool set)
          and 'runSubagent' (individual tool).
        alternatives:
          - id: "alt-agent-set"
            label: "Keep 'agent' tool set"
            description: "Use 'agent' in tools: array."
            pros:
              - "Already used correctly in v2"
              - "Matches VS Code official examples"
            cons:
              - "Less explicit than runSubagent"
          - id: "alt-runSubagent"
            label: "Use 'runSubagent' individual tool"
            description: "Replace 'agent' with 'runSubagent'."
            pros:
              - "Explicit naming"
            cons:
              - "Official examples use 'agent', not 'runSubagent'"
        selected: "alt-agent-set"
        rationale: >
          VS Code docs state 'ensure the runSubagent or agent tool is included' and
          official examples use 'agent'. Already correct in v2. Body text will instruct
          runSubagent usage per FR-2.3.
        confidence: "High"
        confidence_definition: "Both confirmed valid by docs. Official examples consistently use 'agent'. Zero risk."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-5"
        title: "Git staging consolidated to orchestrator with selective pathspecs"
        context: >
          FR-5 removes git add from implementer. FR-6 removes autocommit. Need
          replacement git workflow for orchestrator Step 8.
        alternatives:
          - id: "alt-selective"
            label: "Selective pathspec staging from implementation reports"
            description: "Orchestrator reads files_modified from reports, constructs git add with explicit paths."
            pros:
              - "Only modified files staged"
              - "Audit trail matches file ownership"
              - "No race conditions"
            cons:
              - "Requires parsing implementation reports"
          - id: "alt-git-add-all"
            label: "Keep git add -A but only in orchestrator"
            description: "Move git add -A to orchestrator Step 8."
            pros:
              - "Simple"
            cons:
              - "Stages untracked files not related to feature"
              - "User concern about staging unintended files"
        selected: "alt-selective"
        rationale: >
          Two-source selective staging (revised per AG C-2): Source 1 — implementation
          code from reports' files_modified lists via explicit git add pathspecs. Source
          2 — pipeline artifacts via git add docs/feature/<slug>/ (covers knowledge,
          tester, reviewer, planner, researcher outputs that are NOT in implementation
          reports). This ensures all pipeline artifacts are staged without git add -A.
          Pre-stage knowledge validation (renamed from 'pre-commit' per AG C-2
          terminology fix) checks knowledge output_paths BEFORE staging in sub-step 8c,
          not before commit. Tester file ownership audit provides safety net for
          implementation files.
        confidence: "High"
        confidence_definition: "Implementation reports contain files_modified. Pipeline artifacts all live under docs/feature/<slug>/. Two-source strategy covers both without git add -A. Pre-stage validation correctly scoped."
        risk_classification: "🟡"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-6"
        title: "Exploratory QA inline with optional SKILL.md extension"
        context: >
          FR-9 adds exploratory QA to tester dynamic mode. TourneyPal QA agent is ~500
          lines. Tester has 150-line budget at 129 lines (verified). Note: architect
          (130 lines verified) is the actual tightest agent post-changes (~145, 5
          headroom per AG A-2) — see Failure & Recovery for extraction fallback.
        alternatives:
          - id: "alt-inline"
            label: "Inline 4-category checklist"
            description: "Add compact exploratory QA covering happy path, edge cases, error handling, state mutation."
            pros:
              - "Self-contained"
              - "Tester stays at ~143 lines"
            cons:
              - "Less detailed than full QA model"
          - id: "alt-skill"
            label: "Extract to .github/skills/exploratory-qa/SKILL.md"
            description: "Separate skill file with detailed procedures."
            pros:
              - "Rich procedures without budget impact"
              - "Progressive loading"
            cons:
              - "Creates a new file"
              - "Dependency on skill existence"
          - id: "alt-hybrid"
            label: "Inline minimum + optional SKILL.md for detailed procedures"
            description: "Tester has inline checklist. Detailed procedures can use discovered skills."
            pros:
              - "Works with or without skill files"
              - "Inline always available as fallback"
            cons:
              - "Slightly more complex"
        selected: "alt-hybrid"
        rationale: >
          Hybrid keeps tester functional without skills (4-category inline checklist)
          while allowing richer QA when skills exist. Tester reaches ~143 lines (8
          headroom — comfortable). Architect at ~145 (5 headroom) is the true budget
          bottleneck (AG A-2) — its web research step (FR-8) or clarification step (FR-3)
          should be extracted to a reference doc if budget becomes tight during
          implementation. Detailed procedures can be a SKILL.md later without tester modification.
        confidence: "Medium"
        confidence_definition: "Inline approach proven. Skill integration relies on VS Code progressive loading (documented but untested in this system). Medium reversal cost."
        risk_classification: "🟡"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-7"
        title: "Remove vscode/memory — memory is a VS Code setting, not a tool"
        context: >
          Knowledge agent lists vscode/memory in tools. Research confirms no built-in
          'memory' tool exists. Memory controlled by github.copilot.chat.tools.memory.enabled.
        alternatives:
          - id: "alt-remove"
            label: "Remove from tools, keep usage in body text"
            description: "Remove from frontmatter. Reword workflow step to reference memory as VS Code feature."
            pros:
              - "Correct tool list"
              - "Body text still guides agent to persist learnings"
            cons:
              - "Minor wording change"
          - id: "alt-remove-entirely"
            label: "Remove from tools and body text"
            description: "Eliminate all memory references."
            pros:
              - "Simplest change"
            cons:
              - "Knowledge agent loses memory guidance"
        selected: "alt-remove"
        rationale: >
          Memory works when enabled regardless of tools list. Keeping workflow step
          (reworded) ensures knowledge agent still persists learnings. Removes invalid
          tool name from frontmatter.
        confidence: "High"
        confidence_definition: "VS Code cheat sheet confirmed: memory is a setting, not a tool. No ambiguity."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-8"
        title: "E2E skill discovery — user-driven with skill scan context"
        context: >
          FR-1 requires E2E skill setup guidance. Spec pushback noted autodetecting
          project type is error-prone.
        alternatives:
          - id: "alt-user-driven"
            label: "User-driven with skill scan context"
            description: "Orchestrator scans skill dirs, presents findings, asks user to choose."
            pros:
              - "User controls setup"
              - "Scan provides helpful context"
              - "Handles empty skills gracefully"
            cons:
              - "Requires user input in interactive mode"
          - id: "alt-autodetect"
            label: "Autodetection with user confirmation"
            description: "Scan project files to guess type, suggest setup."
            pros:
              - "Less manual effort"
            cons:
              - "Error-prone (spec pushback concern)"
              - "Complex heuristics add line budget pressure"
        selected: "alt-user-driven"
        rationale: >
          Spec pushback recommended user-driven. Orchestrator scans directories for
          context then lets user decide. In autonomous mode, found skills are used;
          if none found, warning logged per FR-1.3.
        confidence: "High"
        confidence_definition: "Spec pushback recommended this. User accepted. Skill paths verified against VS Code docs."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-9"
        title: "Pre-commit validation scoped to knowledge output paths only"
        context: >
          Prior design review (R2/R3) identified Major finding: orchestrator Step 8
          pre-commit validation scope was inconsistent. This design redesigns Step 8.
        alternatives:
          - id: "alt-knowledge-only"
            label: "Validate knowledge output paths only"
            description: "Pre-commit checks knowledge agent output paths. Implementation files not subject to path validation."
            pros:
              - "Correct scoping — implementation files owned by implementers"
              - "Resolves prior Major finding"
              - "Consistent with trust model"
            cons:
              - "Less protective against knowledge agent errors"
          - id: "alt-full-diff"
            label: "Validate entire diff against file inventory"
            description: "Check all staged files against plan-output.yaml file inventory."
            pros:
              - "Catches unexpected modifications"
            cons:
              - "Prior review found this rejects legitimate implementation files"
              - "Over-broad validation causes false positives"
        selected: "alt-knowledge-only"
        rationale: >
          Resolves Major finding from R2/R3 reviews. Implementation files validated by
          tester file ownership audit (Step 5-6). Orchestrator Step 8 validation applies
          only to knowledge output paths: evidence-bundle.yaml, knowledge-output.yaml,
          instruction-recommendations.md. Consistent with trust model.
        confidence: "High"
        confidence_definition: "Directly resolves documented Major finding. Scope matches trust model. Clear precedent."
        risk_classification: "🟡"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-10"
        title: "Step 8 decomposed into 5 explicit sub-steps (8a-8e)"
        context: >
          AG A-1 identified that Step 8 expands to 6+ branching sub-workflows with
          risk of implementer misordering (e.g., staging before validation, committing
          before doc-update completes). Current Step 8 is ~8 lines; new Step 8 will
          be ~20+ lines with multiple conditional branches.
        alternatives:
          - id: "alt-monolithic"
            label: "Keep Step 8 as single step with inline branching"
            description: "All actions in one numbered step with conditional branches."
            pros:
              - "Fewer pipeline steps"
            cons:
              - "Cognitive density makes misordering likely"
              - "No clear sequence for implementer to follow"
              - "AG A-1 Major finding explicitly requests decomposition"
          - id: "alt-decomposed"
            label: "Decompose into 5 explicit sub-steps 8a-8e"
            description: >
              8a: Knowledge Extraction — dispatch knowledge agent (non-blocking on error).
              8b: Doc Updates — interactive only: present Apply/Review/Skip choice; if Apply,
              re-dispatch knowledge in doc-update mode.
              8c: Knowledge Output Validation — validate knowledge output_paths against
              allowlist (evidence-bundle.yaml, knowledge-output.yaml, instruction-recommendations.md).
              Reject unexpected files.
              8d: Selective Staging — two-source: (1) git add <paths from implementation reports
              files_modified>, (2) git add docs/feature/<slug>/ for pipeline artifacts.
              8e: Commit/Review Choice — interactive: present Commit/Review/Unstage 3-way;
              autonomous: stage only, no commit.
            pros:
              - "Clear sequence prevents misordering"
              - "Each sub-step has single responsibility"
              - "Conditional branches isolated to their sub-step (8b, 8e)"
              - "Implementer can verify each sub-step independently"
            cons:
              - "More detailed orchestrator instructions (~3 additional lines)"
        selected: "alt-decomposed"
        rationale: >
          Explicit sub-steps prevent implementer misordering errors. Each sub-step
          has single responsibility and clear sequencing: knowledge → doc-updates →
          validation → staging → commit choice. Conditional branches (interactive vs
          autonomous) are isolated to sub-steps 8b and 8e. Addresses AG A-1 Major.
        confidence: "High"
        confidence_definition: "Direct decomposition of existing actions into clear sequence. No new functionality added. Zero reversal cost — sub-steps can be re-merged trivially."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

      - id: "D-11"
        title: "Reject disable-model-invocation for worker agents — would break pipeline"
        context: >
          SS S-1 suggested adding disable-model-invocation: true to all worker agents
          to prevent bypassing orchestrator trust model. Web research on VS Code custom
          agents documentation (fetched 2026-03-09) reveals this property has a different
          effect than intended.
        alternatives:
          - id: "alt-add-disable"
            label: "Add disable-model-invocation: true to all workers"
            description: "Set the property on all 7 non-orchestrator agents."
            pros:
              - "Maximum lockdown against autonomous model invocations"
            cons:
              - "BREAKS PIPELINE: VS Code docs define this as 'prevents the agent from being invoked as a subagent by other agents'"
              - "Orchestrator would be unable to dispatch workers via runSubagent"
              - "The deprecated 'infer' property docs confirm: 'disable-model-invocation: true to prevent subagent invocation while keeping it in the picker'"
              - "Would require fundamentally different dispatch model"
          - id: "alt-user-invocable-only"
            label: "Rely on user-invocable: false (already in FR-2.4)"
            description: "Workers hidden from dropdown but remain dispatchable as subagents."
            pros:
              - "Pipeline works — orchestrator dispatches workers via runSubagent"
              - "Workers hidden from user dropdown — no direct user invocation"
              - "Trust model enforced three ways: user-invocable:false, agents:[], tools: arrays"
            cons:
              - "AI model could theoretically try autonomous invocation (mitigated by agents:[] on workers)"
        selected: "alt-user-invocable-only"
        rationale: >
          VS Code custom agents docs (fetched 2026-03-09) explicitly define
          disable-model-invocation as: 'Optional boolean flag to prevent the agent from
          being invoked as a subagent by other agents (default is false).' The deprecated
          infer property docs confirm: 'disable-model-invocation: true to prevent subagent
          invocation while keeping it in the picker.' Adding this to worker agents would
          PREVENT the orchestrator from dispatching them as subagents — breaking the
          entire pipeline. The trust model is already enforced: (1) user-invocable: false
          hides workers from dropdown, (2) workers have agents: [] preventing them from
          dispatching other agents, (3) tools: arrays restrict capabilities per trust tier.
        confidence: "High"
        confidence_definition: "VS Code docs verified 2026-03-09. Property definition unambiguous. Adding it would break orchestrator dispatch — zero uncertainty."
        risk_classification: "🟢"
        date: "2026-03-09"
        decided_by: "designer"

    deviation_records:
      - id: "DR-1"
        spec_requirement: "FR-3.3, AC-9"
        deviation: >
          Spec requires 'structured question tool in tools: frontmatter.' No such tool
          exists in VS Code. Design uses orchestrator-mediated interaction instead.
        rationale: >
          VS Code subagents run in isolated contexts and cannot prompt users. No built-in
          structured question tool in VS Code tool catalog (verified via official cheat
          sheet). Orchestrator-mediated pattern satisfies INTENT of FR-3.

      - id: "DR-2"
        spec_requirement: "FR-4.4, AC-11"
        deviation: >
          Same as DR-1 — spec requires structured question tool for planner. No such
          tool exists. Design uses orchestrator-mediated plan approval instead.
        rationale: >
          Same platform constraint as DR-1. Planner outputs plan_summary, orchestrator
          handles interactive approval gate. Intent fully preserved.

