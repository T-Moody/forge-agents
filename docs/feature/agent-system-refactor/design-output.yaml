    # ==================================================================
    # ARCHITECTURE DECISIONS (D-1 through D-12 preserved, D-13–D-15 added in R2)
    # ==================================================================
    decisions:
      # ------------------------------------------------------------------
      - id: "D-1"
        title: "System Directory Structure — staging directory with promotion"
        context: >
          CR-7 requires a fresh directory (not modifying existing NewAgents/, .github/, or Forge/).
          VS Code discovers agents in .github/agents/ at workspace root. The new system must
          eventually be at .github/agents/ but cannot be built there incrementally alongside
          the existing system.
        alternatives:
          - id: "alt-1"
            label: "Staging directory v2/ with promotion"
            description: >
              Create new files in v2/.github/agents/ during implementation. After verification,
              archive old .github/agents/ and copy v2/.github/agents/ to .github/agents/.
            pros:
              - "Satisfies CR-7 (fresh directory)"
              - "Side-by-side comparison possible during review"
              - "No disruption to existing system until validated"
              - "Clean git history — old system archived, new system appears"
            cons:
              - "Extra promotion step at end"
              - "VS Code can't discover agents in v2/ during development"
          - id: "alt-2"
            label: "Direct replacement in .github/agents/"
            description: >
              Archive existing .github/agents/ to .github/agents-archive/, write new files
              directly to .github/agents/.
            pros:
              - "VS Code discovers agents immediately"
              - "No promotion step needed"
            cons:
              - "Violates CR-7 (modifies existing .github/ directory)"
              - "Archive breaks git history on those files"
              - "Risk of partial state during implementation"
          - id: "alt-3"
            label: "New top-level directory as permanent home"
            description: >
              Create in Pipeline/.github/agents/ and configure VS Code to look there.
            pros:
              - "Completely separate from existing system"
            cons:
              - "VS Code doesn't support custom agent directory paths"
              - "Would never be discovered by VS Code natively"
        selected: "alt-1"
        rationale: >
          Staging in v2/ satisfies CR-7 (fresh directory) while maintaining a clean path to
          promotion at .github/agents/ where VS Code discovers agents. Side-by-side comparison
          enables thorough review before the switch. The promotion step is trivial (copy + archive).
        confidence: "High"
        confidence_definition: >
          VS Code agent discovery path is documented. The staging+promotion pattern is standard
          software release practice. Low reversal cost — just don't promote.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-2"
        title: "Agent Inventory — 8 agents via strategic merges"
        context: >
          The initial request proposed 11 agents (9 current + Test Runner + Instruction Optimizer).
          Spec pushback identified this as contradicting the simplification goal. Research shows
          MetaGPT uses ~4 roles, CrewAI uses 3-5 agents, AutoGen groups are typically 2-4 agents.
          The question is which merges maximize simplification without losing proven capabilities.
        alternatives:
          - id: "alt-1"
            label: "8 agents with 3 strategic merges"
            description: >
              Merge Spec+Designer→Architect, Verifier+TestRunner→Tester,
              Knowledge+InstructionOptimizer→Knowledge. Keep all other roles.
            pros:
              - "Reduces 11→8 agents (27% reduction)"
              - "Eliminates 2 pipeline handoffs (Spec→Designer, Verifier→TestRunner)"
              - "Each merge combines tightly coupled responsibilities"
              - "MetaGPT precedent: single Architect role handles both spec and design"
              - "All proven patterns preserved (adversarial review, parallel research, TDD)"
            cons:
              - "Architect agent has dual responsibility (requirements + design)"
              - "Tester agent has dual mode (dynamic execution + static evaluation)"
          - id: "alt-2"
            label: "5 agents (aggressive merges)"
            description: >
              Merge further: Researcher+Architect→Analyst, Planner+Implementer→Builder,
              Tester+Reviewer→Evaluator. Only Orchestrator, Analyst, Builder, Evaluator, Knowledge.
            pros:
              - "Maximum simplification (5 agents)"
              - "Closer to MetaGPT's 4-role model"
            cons:
              - "Builder agent has conflicting responsibilities (planning vs coding)"
              - "Evaluator agent would test AND review — conflicting modes"
              - "Loses parallel researcher dispatch capability"
              - "Forces more complex individual agent instructions"
          - id: "alt-3"
            label: "Keep 9 current agents, add 2 new"
            description: >
              Keep existing 9 agents, add Test Runner and Instruction Optimizer separately.
            pros:
              - "No merge risk"
              - "Each agent has single clear responsibility"
            cons:
              - "11 agents contradicts simplification goal"
              - "More pipeline steps needed"
              - "More dispatches, higher token cost"
              - "Spec pushback identified this as contradictory"
        selected: "alt-1"
        rationale: >
          8 agents with 3 strategic merges is the sweet spot: reduces agent count by 27%,
          eliminates 2 pipeline handoffs, and each merge pairs tightly coupled responsibilities
          (spec needs design context, testing needs execution access, knowledge needs optimization
          data). The 5-agent model (alt-2) over-merges and creates agents with conflicting duties.
          The 11-agent model (alt-3) was explicitly rejected in spec pushback as contradicting
          the simplification goal.
        confidence: "High"
        confidence_definition: >
          MetaGPT validates the Architect merge (single role for spec+design). The Tester merge
          follows the natural split between who writes code and who validates it. All
          merges were accepted by the user in spec pushback.
        risk_classification: "🟡"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-3"
        title: "Agent File Format — YAML frontmatter with concise markdown body"
        context: >
          CR-6 requires GitHub Copilot .agent.md format. CR-4 requires native tools field.
          CR-3 requires ≤150 lines per agent. Research shows CrewAI agents are 5-8 lines,
          AutoGen agents are ~10 lines. The body structure must be consistent, concise, and
          self-contained (no external schema references).
        alternatives:
          - id: "alt-1"
            label: "Structured 6-section body: Role, Inputs, Workflow, Output, Constraints, Anti-drift"
            description: >
              Each agent body has exactly 6 sections. Role (1 paragraph), Inputs (bullet list),
              Workflow (5-10 numbered steps), Output Schema (inline YAML example),
              Constraints (bullet list), Anti-drift anchor (1 paragraph).
            pros:
              - "Consistent structure across all agents"
              - "Self-contained — output schema co-located (eliminates schemas.md)"
              - "Compact but complete"
              - "Anti-drift preserved from proven pattern"
            cons:
              - "6 sections may be tight for Orchestrator's routing logic"
          - id: "alt-2"
            label: "Minimal 3-section body: Role, Steps, Output"
            description: >
              Bare minimum agent definition. Role description, numbered workflow steps,
              and output format.
            pros:
              - "Maximum brevity (closer to CrewAI's 5-line agents)"
              - "Less instruction dilution risk"
            cons:
              - "No explicit constraints section"
              - "No anti-drift (risky for longer conversations)"
              - "Missing input specification"
          - id: "alt-3"
            label: "Freeform body with no structure"
            description: >
              Let each agent define its body however makes sense.
            pros:
              - "Maximum flexibility"
            cons:
              - "Inconsistency across agents"
              - "Harder to verify completeness"
              - "No standard place for output schema"
        selected: "alt-1"
        rationale: >
          The 6-section structure provides consistency and completeness while staying within
          150 lines. Co-locating the output schema eliminates the need for schemas.md
          (1,422 lines removed). The anti-drift anchor is retained because research shows
          it prevents behavioral drift in instruction-based agents — this is more important
          when agents have shorter instructions (less context reinforcement).
        confidence: "High"
        confidence_definition: >
          The body structure is based on the VS Code custom agent documentation format.
          Co-located schemas follow the spec requirement FR-15.2. The anti-drift pattern
          is proven across 5 pipeline runs.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-4"
        title: "State Management — YAML file-based evidence, zero SQLite"
        context: >
          CR-5 prohibits SQLite. Research shows evidence gates (EG-1 through EG-10) have never
          blocked a pipeline across 5 runs. No other agent framework uses SQLite for evidence
          tracking. The completion contract pattern already provides routing signals. The question
          is how to replace the evidence and audit trail functions of SQLite.
        alternatives:
          - id: "alt-1"
            label: "Completion-contract routing + file-existence evidence + incremental logging"
            description: >
              Orchestrator routes by reading completion blocks from YAML output files.
              Evidence = file existence in feature directory. R2: Orchestrator maintains
              pipeline-log.yaml incrementally after each dispatch. Knowledge agent produces
              enriched evidence-bundle.yaml at successful completion.
            pros:
              - "Zero external dependencies"
              - "Git-trackable (all evidence in version control)"
              - "Human-readable (YAML files, not SQL queries)"
              - "Industry-aligned (MetaGPT, SWE-Agent, OpenHands all use file artifacts)"
              - "Eliminates ~1,100 lines (sql-templates.md + evaluation-schema.md + SQLITE_BUSY)"
              - "Completion contracts are already proven across 5 runs"
            cons:
              - "No aggregate queries across runs"
              - "No transactional guarantees on concurrent writes (mitigated: file ownership prevents conflicts)"
          - id: "alt-2"
            label: "JSONL append-only log"
            description: >
              Single .jsonl file per feature with append-only evidence records.
            pros:
              - "Single file to read for full audit trail"
              - "Simple append model"
            cons:
              - "Concurrent append conflicts possible"
              - "No structured querying"
              - "Not human-readable without tooling"
          - id: "alt-3"
            label: "Lightweight SQLite with reduced surface"
            description: >
              Keep SQLite but reduce to 1 table and 2-3 evidence gates only.
            pros:
              - "Preserves queryability"
              - "Reduced complexity vs current 936 lines"
            cons:
              - "Violates CR-5 (no SQLite)"
              - "Still requires SQLITE_BUSY handling"
              - "Still requires sql_escape() sanitization"
              - "Still unique among agent frameworks"
        selected: "alt-1"
        rationale: >
          Completion-contract routing is already the primary routing mechanism — making it the
          sole mechanism eliminates the redundant SQL evidence layer. File existence as evidence
          is the pattern used by MetaGPT, SWE-Agent, and the GitHub Copilot agent ecosystem.
          Evidence gates have never caught an issue in 5 runs (impact research F-14),
          confirming the SQL layer adds complexity without demonstrated value. R2: The
          orchestrator maintains pipeline-log.yaml incrementally after each dispatch (D-15),
          providing an audit trail even for failed pipelines. The Knowledge agent's
          evidence-bundle.yaml enriches the pipeline log at successful completion.
        confidence: "High"
        confidence_definition: >
          5 pipeline runs with zero evidence gate blocks prove routing reliability without SQL.
          Every industry framework uses file/message-based state, not SQL. The completion
          contract pattern is already proven in this system.
        risk_classification: "🟡"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-5"
        title: "Pipeline Structure — 8 steps with risk-based scaling"
        context: >
          The current system has 10+ steps. The initial request proposed 12 steps. Spec pushback
          consolidated to 8. Research shows MetaGPT uses ~5, SWE-Agent uses 1. The question is
          whether 8 steps is the right balance between quality assurance and simplicity.
        alternatives:
          - id: "alt-1"
            label: "8 steps: Setup, Research, Architecture, Planning, Implementation, Testing, Code Review, Completion"
            description: >
              Consolidates current 10+ into 8 by merging Spec+Design→Architecture,
              Verification into Testing, Knowledge+Optimization+Commit into Completion.
              Risk-based scaling: 🟢 skips Research, 🔴 adds embedded design review.
            pros:
              - "20% fewer steps than current system"
              - "Every step has clear deliverables"
              - "Risk-based scaling reduces overhead for simple features"
              - "Code Review remains mandatory (proven value: 6+ Critical catches)"
            cons:
              - "Still 3-4x more steps than SWE-Agent or OpenHands"
          - id: "alt-2"
            label: "5 steps: Setup, Plan, Build, Review, Ship"
            description: >
              More aggressive merge. Plan combines research+architecture+planning.
              Build combines implementation+testing. Review does code review.
              Ship does knowledge+commit.
            pros:
              - "Closer to MetaGPT's step count"
              - "Fewer handoffs"
            cons:
              - "Plan agent has 3 distinct responsibilities (research, design, plan)"
              - "Build agent has 2 conflicting modes (implement vs test)"
              - "Loses parallel research capability"
              - "Loses separation of implementation and testing (spec FR-7, FR-8)"
          - id: "alt-3"
            label: "Single-agent loop (SWE-Agent model)"
            description: >
              One agent with tool access handles everything in an iterative loop.
            pros:
              - "Maximum simplicity"
              - "SWE-Agent SOTA on SWE-bench with this approach"
            cons:
              - "Loses multi-perspective review (proven value)"
              - "Loses parallel research (proven value)"
              - "No separation of concerns"
              - "Doesn't match user's explicit multi-agent request"
        selected: "alt-1"
        rationale: >
          8 steps preserves all proven high-value patterns (parallel research, adversarial review,
          TDD implementation, separate testing) while consolidating 10+ steps by merging
          tightly coupled phases. Alt-2 over-merges and creates agents with conflicting
          responsibilities. Alt-3 is inappropriate for the user's explicit multi-agent
          architecture request. Risk-based scaling (🟢 skips Research, 🔴 adds design review)
          ensures simple features aren't burdened by full pipeline overhead.
        confidence: "High"
        confidence_definition: >
          The 8-step structure maps 1:1 to the spec's FR-1.1. All merges pair tightly coupled
          responsibilities. The risk-based scaling model is proven across prior pipeline runs.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-6"
        title: "DAG Task Execution — dependency-driven dispatch with file ownership validation"
        context: >
          CR-5 requires DAG-based task execution. The current system uses planner-assigned waves.
          Research shows DAG scheduling is standard in CI/CD (GitHub Actions, Airflow, Dagster).
          The question is how the orchestrator resolves parallel groups from the planner's DAG.
        alternatives:
          - id: "alt-1"
            label: "Orchestrator computes topological levels with file ownership check"
            description: >
              Planner declares per-task dependencies (depends_on) and file ownership (files).
              Orchestrator at dispatch time: (1) finds tasks with all dependencies satisfied,
              (2) groups them by checking file overlap, (3) defers overlapping tasks to next
              round, (4) dispatches up to 4 non-overlapping ready tasks in parallel.
            pros:
              - "Maximum parallelism computed dynamically"
              - "File ownership validated at dispatch time (runtime safety)"
              - "Standard topological-sort approach (GitHub Actions needs:)"
              - "Planner focuses on dependencies, orchestrator handles scheduling"
            cons:
              - "Orchestrator must implement DAG resolution logic (~20 lines of reasoning)"
          - id: "alt-2"
            label: "Planner pre-computes waves (current approach)"
            description: >
              Planner assigns tasks to waves at plan time, orchestrator dispatches waves sequentially.
            pros:
              - "Simpler orchestrator (just dispatch wave N)"
              - "Proven pattern across 5 pipeline runs"
            cons:
              - "Less flexible — wave assignment is static"
              - "Planner must manually check file overlap"
              - "No dynamic re-scheduling on partial completion"
              - "Doesn't satisfy CR-5 (DAG-based, not wave-based)"
          - id: "alt-3"
            label: "Fully dynamic LLM-based scheduling"
            description: >
              Orchestrator uses LLM reasoning to determine execution order dynamically.
            pros:
              - "Maximum flexibility"
            cons:
              - "Non-deterministic scheduling"
              - "Higher token cost per decision"
              - "Harder to debug execution order issues"
        selected: "alt-1"
        rationale: >
          Dynamic topological-level dispatch is the standard DAG execution pattern used by GitHub
          Actions, Airflow, and AutoGen GraphFlow. It provides maximum parallelism while ensuring
          correctness through file ownership validation. The planner declares WHAT (dependencies
          and files), the orchestrator handles WHEN (scheduling). This separation of concerns is
          cleaner than the current planner-wave model and satisfies CR-5.
        confidence: "High"
        confidence_definition: >
          DAG topological-sort scheduling is algorithmically proven and used by every major
          CI/CD system. The file ownership check adds ~5 lines of orchestrator reasoning.
          Low reversal cost — fallback to wave model requires only orchestrator change.
        parallel_failure_semantics: >
          When one task in a parallel group fails (NEEDS_REVISION/ERROR), completed tasks
          in the same group are preserved. Only the failed task is re-dispatched (up to
          max_cycles). The orchestrator does NOT roll back successful parallel peers.
        risk_classification: "🟡"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-7"
        title: "Tester Agent — dual-mode design with singleton constraint"
        context: >
          The spec merges Verifier + Test Runner into Tester (FR-2.3). The Tester must handle
          BOTH dynamic test execution (starting apps, running E2E tests) and static evidence
          evaluation (reading implementation reports, verifying TDD compliance). These modes
          have different concurrency requirements: dynamic execution is singleton (one app
          instance at a time), static evaluation can parallelize.
        alternatives:
          - id: "alt-1"
            label: "Single Tester agent with mode parameter"
            description: >
              One tester.agent.md file. Orchestrator passes mode (dynamic/static) as dispatch
              parameter. Dynamic mode: starts app, runs tests, stops app. Static mode: reads
              reports, verifies compliance. Singleton constraint applies to dynamic mode only.
            pros:
              - "Single agent file (≤150 lines)"
              - "Orchestrator controls execution mode"
              - "Clean separation via dispatch parameter, not separate agent files"
            cons:
              - "Agent must handle two distinct workflows in one file"
          - id: "alt-2"
            label: "Two separate agents: TestRunner + Verifier"
            description: >
              Keep them separate. TestRunner handles dynamic execution, Verifier handles
              static evaluation.
            pros:
              - "Single responsibility per agent"
              - "Cleaner code"
            cons:
              - "9 agents instead of 8 (contradicts spec direction)"
              - "Extra pipeline handoff"
              - "Spec explicitly chose to merge these (FR-2.3)"
          - id: "alt-3"
            label: "Single Tester, always sequential"
            description: >
              Tester does static evaluation first, then dynamic testing, always in one dispatch.
            pros:
              - "Simplest orchestrator logic"
            cons:
              - "Forces sequential execution even when parallel would be safe"
              - "Single dispatch may be long-running"
        selected: "alt-1"
        rationale: >
          A single Tester agent with mode parameter satisfies the spec merge requirement
          (FR-2.3) while preserving the distinct execution models. The orchestrator dispatches
          the Tester in two phases: first static evaluation (can check TDD compliance quickly),
          then dynamic execution (start app, run tests). This matches the natural workflow —
          verify the basics before spinning up the full application.
        confidence: "Medium"
        confidence_definition: >
          The dual-mode pattern is common (CrewAI tasks have different expected_output types).
          The mode parameter approach is standard. However, fitting both workflows into ≤150
          lines is untested — if it doesn't fit, splitting into two agents (alt-2) is the
          fallback. This would increase the agent count to 9.
        split_trigger: >
          Split Tester into two agents if: (a) tester.agent.md exceeds 140 lines, OR
          (b) >20 lines are duplicated across static and dynamic workflow sections.
          This is a concrete, measurable trigger — not a subjective judgment call.
        risk_classification: "🟡"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-8"
        title: "Line Budget Strategy — hard caps with strict budgets"
        context: >
          CR-2 requires ≤1,500 total lines. CR-3 requires ≤150 per agent. NFR-3 requires ≤150
          per shared reference doc. Current system is 6,416 lines (4.3x over target). Industry
          comparison: CrewAI 5-8 lines/agent, AutoGen ~10 lines/agent (research patterns F-17, F-18).
        alternatives:
          - id: "alt-1"
            label: "Hard 150-line cap per agent, 100-line global-rules, ~1,200-line target"
            description: >
              Set per-agent hard cap at 150 lines (matching CR-3). Allocate specific budgets:
              Orchestrator: 150, Architect: 140, Tester: 140, Planner: 130, Implementer: 130,
              Researcher: 100, Reviewer: 110, Knowledge: 100. global-rules.md: 100.
              Total target: ~1,200 lines with ~300 line margin.
            pros:
              - "Well within 1,500 ceiling (80% utilization)"
              - "Margin absorbs implementation variance"
              - "Hard cap prevents any agent from bloating"
              - "Orchestrator gets full 150 (most complex agent)"
            cons:
              - "Orchestrator at 150 lines for full DAG+routing logic is tight"
          - id: "alt-2"
            label: "No per-agent budget, only total cap"
            description: >
              Allow agents to be any size as long as total stays under 1,500.
            pros:
              - "Flexibility for complex agents (orchestrator could be 300+)"
            cons:
              - "Violates CR-3 (≤150 per agent)"
              - "Risk of complexity creep in individual agents"
          - id: "alt-3"
            label: "Aggressive 80-line cap per agent"
            description: >
              Target 80 lines per agent. Total ~750 lines.
            pros:
              - "Closer to industry norms"
              - "Forces extreme conciseness"
            cons:
              - "May be too tight for Orchestrator routing logic"
              - "Output schemas may not fit inline"
              - "Constraint adds implementation risk"
        selected: "alt-1"
        rationale: >
          The 150-line hard cap per agent satisfies CR-3 while being achievable. The
          per-agent allocations reflect complexity: Orchestrator, Architect, and Tester have
          the most responsibilities (150/140/140) while simpler agents get less (100 lines).
          The ~1,200 target provides 300-line margin below the 1,500 ceiling, absorbing
          implementation variance without risking the hard cap.
        confidence: "High"
        confidence_definition: >
          The 150-line cap is directly from the spec. Budget allocations are based on counting
          the sections each agent needs (Role ~5, Inputs ~10, Workflow ~50-70, Output ~20,
          Constraints ~15, YAML frontmatter ~15 = ~115-135 lines). Margin confirmed by math.
        orchestrator_fallback: >
          If orchestrator.agent.md exceeds 150 lines during implementation, extract DAG
          dispatch algorithm to dag-dispatch.md (~50 lines) as 2nd shared reference doc
          (within NFR-3's ≤2 shared doc allowance). Referenced by filename only (no §).
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-9"
        title: "Shared Reference Documents — single global-rules.md, everything else inlined"
        context: >
          The current system has 10 reference documents totaling 3,882 lines. FR-15 requires
          at most 2 shared docs at ≤150 lines each. FR-15.2 requires schemas co-located in
          agents. The question is what goes in the shared doc vs what's inlined.
        alternatives:
          - id: "alt-1"
            label: "One shared doc: global-rules.md (~100 lines)"
            description: >
              global-rules.md contains ONLY cross-cutting concerns that ALL agents must follow:
              (1) completion contract schema, (2) retry policy, (3) anti-hallucination rule,
              (4) feedback loop limits, (5) output path convention, (6) risk classification
              definitions. Everything else (schemas, tool access, dispatch patterns) is inlined
              in the relevant agent or enforced by YAML frontmatter.
            pros:
              - "Eliminates 9 of 10 reference documents (~3,782 lines removed)"
              - "Cross-cutting concerns centralized (DRY for 8 agents)"
              - "~100 lines is well within the 150-line NFR-3 cap"
              - "No section references needed — document is small enough to read fully"
            cons:
              - "Completion contract schema is duplicated in each agent's output section"
          - id: "alt-2"
            label: "Two shared docs: global-rules.md + conventions.md"
            description: >
              global-rules.md for pipeline rules, conventions.md for project-specific
              coding standards.
            pros:
              - "Separates pipeline rules from coding conventions"
              - "conventions.md available for users to customize per project"
            cons:
              - "Two docs adds maintenance surface"
              - "Project conventions could go in copilot-instructions.md instead"
          - id: "alt-3"
            label: "Zero shared docs — everything inlined"
            description: >
              Inline all rules into each agent. No shared reference documents.
            pros:
              - "Zero cross-file dependencies"
              - "Each agent is fully self-contained"
            cons:
              - "Completion contract schema repeated 8 times"
              - "Retry policy repeated 8 times"
              - "Line budget consumed by duplicated content"
              - "Changes require updating all 8 files"
        selected: "alt-1"
        rationale: >
          One global-rules.md containing only universal cross-cutting concerns provides the right
          balance: DRY for the 6-8 rules all agents must follow, while eliminating 9 reference
          documents (3,782 lines). No section references are needed because the document is
          short enough (~100 lines) to be read in full — eliminating the cross-file reference
          fragility that was the #1 critical finding source. Project-specific conventions
          remain in copilot-instructions.md where GitHub intended them.
        confidence: "High"
        confidence_definition: >
          The 6 items identified for global-rules.md are genuinely cross-cutting (all agents
          need them). Everything else (schemas, tool access, dispatch patterns) is either
          co-located in agents or enforced by YAML frontmatter. This pattern eliminates
          the architecture's structural weakness (cross-file §references).
          R2 acknowledgment: The completion contract (3 fields: status, summary, output_paths)
          is intentionally minimal — 0 schema changes over 5 runs validates stability. If a
          schema change is needed, updating 9 files (~5 min each) is acceptable given the
          elimination of cross-file §reference fragility.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-10"
        title: "Web Research Integration — parameter-based toggle with per-agent tool inclusion"
        context: >
          FR-13 requires web research as a permanent capability for development runs. The
          orchestrator asks about web research at Setup. The question is how agents know
          whether web research is enabled and how to control it.
        alternatives:
          - id: "alt-1"
            label: "fetch_webpage in tools list + instruction-level toggle"
            description: >
              Include fetch_webpage in the tools list of Researcher, Architect, and Implementer
              agents. The orchestrator passes web_research_enabled parameter when dispatching.
              Agent instructions say: 'Use fetch_webpage when web_research is enabled and you
              need current information about the tech stack.'
            pros:
              - "Platform-level tool availability (fetch_webpage is always reachable)"
              - "Instruction-level control on when to use it"
              - "Simple implementation — no conditional tool loading"
            cons:
              - "Agents could use fetch_webpage even when disabled (instruction-enforced only)"
          - id: "alt-2"
            label: "Separate agent variants with/without fetch_webpage"
            description: >
              Create researcher.agent.md and researcher-offline.agent.md. Orchestrator
              dispatches the appropriate variant.
            pros:
              - "Tool restriction is platform-enforced"
            cons:
              - "Doubles the number of agent files for affected agents"
              - "16 agent files instead of 8"
              - "Violates AC-3 (exactly 8 .agent.md files)"
          - id: "alt-3"
            label: "MCP server for web research with dynamic enable/disable"
            description: >
              Run fetch_webpage through an MCP server that can be toggled.
            pros:
              - "True runtime toggle"
            cons:
              - "Adds MCP server dependency"
              - "Over-engineering for a simple toggle"
              - "MCP configuration complexity"
        selected: "alt-1"
        rationale: >
          Including fetch_webpage in tools lists with instruction-level toggle is the simplest
          approach that satisfies all requirements. The web_research_enabled parameter propagated
          from orchestrator gives agents explicit context. While the toggle is instruction-enforced
          (not platform-enforced), this is acceptable: fetch_webpage in VS Code requires user
          approval per invocation in interactive mode, providing a secondary control layer.
        confidence: "Medium"
        confidence_definition: >
          The instruction-level toggle is proven in the current system (fetch_webpage is
          gated by approval_mode). The risk is that agents use fetch_webpage when disabled —
          mitigated by VS Code's per-invocation approval prompt and the instruction being
          clear. If needed, alt-2 provides a platform-enforced fallback.
        autonomous_mode_residual_risk: >
          In autonomous mode, VS Code does NOT prompt for fetch_webpage approval — the
          instruction-level toggle is the sole guard. Accepted residual risk: agent may
          fetch despite disabled flag. Mitigations: (1) agents MUST log all fetch_webpage
          URLs in their output, (2) Reviewer audits URL trail, (3) Knowledge agent flags
          unexpected fetches in evidence bundle.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-11"
        title: "Orchestrator Routing — completion-contract-only with file-existence gates"
        context: >
          The current orchestrator routes via completion contracts (primary) AND SQL evidence
          gates (secondary). D-4 removes SQL. The question is how to verify step completion
          beyond just reading the completion contract.
        alternatives:
          - id: "alt-1"
            label: "Completion contract + file existence check"
            description: >
              Orchestrator reads agent output YAML, checks completion.status, AND verifies
              expected output files exist (list_dir on feature directory). Example: after
              Research step, verify research/*.yaml files exist. After Implementation,
              verify implementation-reports/task-{id}.yaml exists for each task.
              R2: For critical gates (Research ≥2 gate, Code Review ≥2 gate), orchestrator
              also validates YAML is parseable (read_file + check for completion: block)
              before trusting the status value.
            pros:
              - "Dual verification: contract claims + tangible evidence"
              - "File existence is the industry-standard evidence model"
              - "No SQL, no external tools needed"
              - "Human-verifiable (look at the directory)"
            cons:
              - "Can't verify file content quality without reading them"
          - id: "alt-2"
            label: "Completion contract only (trust agent output)"
            description: >
              Orchestrator reads completion.status and routes immediately. No secondary checks.
            pros:
              - "Simplest possible routing"
              - "Fastest execution"
            cons:
              - "No evidence verification — trusts agent claims"
              - "Loses anti-hallucination guarantee"
          - id: "alt-3"
            label: "Completion contract + YAML content validation"
            description: >
              Orchestrator reads output YAML, validates required fields exist, checks for
              structural completeness.
            pros:
              - "Deeper validation than file existence"
            cons:
              - "Orchestrator becomes a validator (scope creep)"
              - "Increases orchestrator complexity significantly"
              - "Overlaps with Tester/Reviewer responsibilities"
        selected: "alt-1"
        rationale: >
          Completion contract + file existence check provides a lightweight anti-hallucination
          mechanism without the complexity of SQL evidence gates. This preserves the spirit
          of the current system's evidence-first principle (evidence exists before claims)
          while using the simplest possible verification: does the file exist? This is how
          MetaGPT, Dagster (asset existence), and GitHub Actions (artifact existence) all
          handle completion verification.
        confidence: "High"
        confidence_definition: >
          File existence checking is trivial to implement (list_dir) and impossible for an
          agent to fake (VS Code file system is ground truth). The dual check (contract +
          file) provides the same anti-hallucination guarantee as the current SQL approach
          with zero infrastructure.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-12"
        title: "Cross-File Reference Elimination — co-location and inlining"
        context: >
          Cross-file section references (§N notation) are the #1 source of Critical review
          findings (research architecture F-15, patterns F-12). The current system has dozens
          of §references across 19 files. AC-18 requires zero §references in the new system.
        alternatives:
          - id: "alt-1"
            label: "Co-locate schemas + inline rules, link global-rules.md by filename only"
            description: >
              Each agent defines its own output schema inline (in Output Schema section).
              Tool access enforced by YAML frontmatter tools field (no external matrix).
              The only cross-file reference is a link to global-rules.md (e.g.,
              'See global-rules.md for completion contract format and retry policy') — never
              by section number, only by document name.
            pros:
              - "Zero § references (satisfies AC-18)"
              - "No section renumbering risk"
              - "Each agent is nearly self-contained"
              - "One cross-file reference (filename only, not §section)"
            cons:
              - "Output schema structure duplicated across agents (mitigated: each agent's schema is different anyway)"
              - "Completion contract repeated in each agent's output section"
          - id: "alt-2"
            label: "Zero cross-file references (everything inlined)"
            description: >
              Eliminate even the reference to global-rules.md. Inline completion contract
              format and retry policy in each agent.
            pros:
              - "Truly zero cross-file dependencies"
            cons:
              - "~20 lines of universal rules repeated 8 times = 160 extra lines"
              - "Changes require updating 8 files simultaneously"
              - "Eats into the 1,500-line budget"
          - id: "alt-3"
            label: "Named anchors instead of §numbers"
            description: >
              Keep cross-file references but use named anchors instead of §numbers.
            pros:
              - "More stable than §numbers"
            cons:
              - "Markdown named anchors don't survive formatting changes"
              - "Still a cross-file dependency"
              - "Adds complexity without eliminating the root problem"
        selected: "alt-1"
        rationale: >
          Co-locating schemas in agents and using YAML frontmatter for tools eliminates ALL
          the high-fragility cross-references (schemas.md, tool-access-matrix.md, sql-templates.md).
          The only remaining cross-file reference is to global-rules.md by filename (not section),
          which is stable because the document is short enough to never need §numbering.
          This directly addresses the system's #1 structural weakness.
        confidence: "High"
        confidence_definition: >
          The fragile § references are documented as the top Critical finding source across
          multiple pipeline runs. Eliminating them removes a proven failure mode. The current
          system already uses completion contracts — co-locating the schema is a formatting
          change, not a behavioral change.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      # R2 NEW DECISIONS (D-13 through D-15)
      # ------------------------------------------------------------------
      - id: "D-13"
        title: "Quick-Fix Step Set — {Setup, Implementation, Testing, Code Review, Completion}"
        context: >
          SS-C-2 flagged that the quick-fix prompt file (quick-fix.prompt.md) lacked a defined
          step set. Without explicit steps, the quick-fix path could bypass mandatory Code
          Review (Step 7), violating the immutable minimum step set.
        alternatives:
          - id: "alt-1"
            label: "Steps {1, 5, 6, 7, 8} — skip Research and Architecture"
            description: >
              Quick-fix uses the full pipeline minus Research (Step 2) and Architecture
              (Step 3). Code Review (Step 7) remains mandatory.
            pros:
              - "Preserves Code Review (proven value: 6+ Critical catches)"
              - "Still runs Testing (Step 6) for dynamic validation"
              - "Immutable minimum step set {1, 7, 8} included"
              - "Clear, enumerable step set"
            cons:
              - "Still 5 steps for a 'quick' fix"
          - id: "alt-2"
            label: "Steps {1, 5, 8} — minimal path"
            description: >
              Only Setup, Implementation, and Completion. No testing, no review.
            pros:
              - "Fastest possible path (3 steps)"
            cons:
              - "Bypasses Code Review — violates immutable minimum step set"
              - "No testing — regressions undetected"
              - "Security risk: unreviewed code committed"
        selected: "alt-1"
        rationale: >
          The quick-fix step set {1, 5, 6, 7, 8} preserves all quality gates while skipping
          Research and Architecture (unnecessary for trivial fixes). Code Review (Step 7) is
          mandatory per the immutable minimum step set principle. The prompt file MUST declare
          these steps explicitly so the orchestrator enforces them.
        confidence: "High"
        confidence_definition: >
          The immutable minimum step set is an established security principle. Skipping
          Research+Architecture for trivial fixes is a proven pattern (current 🟢 scaling).
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-14"
        title: "Trust Boundary Model — 3-tier trust with data flow transitions"
        context: >
          SS-A-1 flagged the absence of an explicit trust boundary analysis. The 8-agent
          system has agents with different privilege levels (orchestrator has run_in_terminal,
          researcher has fetch_webpage, knowledge writes post-review). Trust boundaries
          must be explicit to reason about security properties.
        alternatives:
          - id: "alt-1"
            label: "3-tier trust model: Full, Standard, Read-Only"
            description: >
              Tier 1 (Full Trust): Orchestrator — run_in_terminal, git, agent dispatch.
              Tier 2 (Standard Trust): Implementer, Tester — run_in_terminal + file write,
              but scoped to declared files (implementer) or test execution (tester).
              Tier 3 (Read-Only + Create): Researcher, Architect, Planner, Reviewer,
              Knowledge — read_file, create_file only. No terminal, no edits to existing.
            pros:
              - "Clear privilege escalation boundaries"
              - "Tier 3 agents cannot modify existing code"
              - "Principle of least privilege"
            cons:
              - "Enforced by instruction, not platform"
          - id: "alt-2"
            label: "No explicit tiers — trust all agents equally"
            description: >
              All agents have the same trust level; rely on YAML frontmatter tools list only.
            pros:
              - "Simple mental model"
            cons:
              - "Cannot reason about privilege escalation"
              - "No defense-in-depth"
              - "Loses security analysis capability"
        selected: "alt-1"
        rationale: >
          Explicit trust tiers enable security reasoning about the pipeline. Tier 1 (orchestrator)
          is the only agent that can dispatch others and run git commands. Tier 2 agents can
          execute code but are scoped. Tier 3 agents are read-only + create, making them safe
          for parallel dispatch. While enforcement is instruction-level + YAML frontmatter
          (not sandboxed), the trust model documents expected behavior and enables reviewers
          to flag violations.
        confidence: "Medium"
        confidence_definition: >
          Trust tiers are instruction-enforced, not platform-sandboxed. A misbehaving agent
          could ignore its tier. Mitigated by: (1) YAML frontmatter tool restrictions,
          (2) Code Review auditing tool usage, (3) pre-commit validation for Knowledge.
        risk_classification: "🟡"
        date: "2026-03-08"
        decided_by: "designer"

      # ------------------------------------------------------------------
      - id: "D-15"
        title: "Incremental Pipeline Logging — orchestrator-maintained pipeline-log.yaml"
        context: >
          PV-C-2 flagged that the evidence bundle is only produced on success (Step 8),
          meaning failed pipelines lose their audit trail. The orchestrator needs to log
          incrementally so that even crashed/failed pipelines have a record.
        alternatives:
          - id: "alt-1"
            label: "Orchestrator appends to pipeline-log.yaml after each dispatch"
            description: >
              After every agent dispatch completes (DONE, NEEDS_REVISION, or ERROR), the
              orchestrator appends an entry to docs/feature/<slug>/pipeline-log.yaml with:
              step, agent, started_at, completed_at, status, output_paths. Knowledge agent
              reads this log at Step 8 to produce the enriched evidence-bundle.yaml.
            pros:
              - "Audit trail available even if pipeline crashes mid-run"
              - "Knowledge agent has structured input instead of scanning directories"
              - "Incremental — no data loss on failure"
              - "Human-readable YAML format"
            cons:
              - "Orchestrator has one more file write per dispatch (~5 lines of reasoning)"
          - id: "alt-2"
            label: "Each agent appends to a shared log"
            description: >
              Agents themselves append to the pipeline log.
            pros:
              - "Distributed responsibility"
            cons:
              - "Concurrent write conflicts"
              - "Agents would need write access to shared file"
              - "Orchestrator already knows timing — agents don't"
        selected: "alt-1"
        rationale: >
          The orchestrator is the natural owner of dispatch metadata (timing, status, routing
          decisions). Appending to pipeline-log.yaml after each dispatch is trivial (~5 lines
          of append) and provides crash-resilient audit. Knowledge agent then reads this log
          at Step 8 to produce the enriched evidence-bundle.yaml with additional analysis
          (lessons learned, recommendations). This separates raw logging (orchestrator) from
          analysis (Knowledge).
        confidence: "High"
        confidence_definition: >
          Append-only logging is a standard pattern. The orchestrator already tracks this
          information for routing — writing it to a file is trivial. Low reversal cost.
        risk_classification: "🟢"
        date: "2026-03-08"
        decided_by: "designer"

    # ==================================================================
    # DEVIATION RECORDS
    # ==================================================================
    deviation_records: []
    # No deviations from spec. The design faithfully implements Direction C as specified.

    # ==================================================================
    # TRUST BOUNDARY MODEL (R2 — addresses SS-A-1)
    # ==================================================================
    trust_boundary_model:
      tier_1_full_trust:
        agents: ["orchestrator"]
        capabilities:
          - "run_in_terminal (git commands, baseline tags)"
          - "Agent dispatch (agents: field in frontmatter)"
          - "File creation and editing (create_file, replace_string_in_file)"
          - "User interaction (vscode_askQuestions)"
          - "Pipeline-log.yaml incremental writes"
        boundary_notes: >
          Orchestrator is the sole agent with dispatch and git capabilities. All
          routing decisions flow through orchestrator. Pre-commit: orchestrator
          validates git diff against Knowledge output allowlist before committing.
      tier_2_standard_trust:
        agents: ["implementer", "tester"]
        capabilities:
          - "run_in_terminal (scoped: implementer=build+test, tester=test execution)"
          - "File creation and editing (scoped to declared file ownership)"
          - "get_errors for compile-time diagnostics"
        boundary_notes: >
          Implementer: MUST only modify files declared in task.files[]. Logs all
          terminal commands in implementation_report.commands_executed[]. Tester:
          singleton for dynamic mode. Terminal usage limited to test execution commands.
        implementer_command_allowlist: >
          Implementer terminal commands are instruction-scoped. Expected patterns:
          dotnet build, dotnet test, npm run build, npm test, cargo build, cargo test,
          go build, go test, pytest, git diff. Reviewer audits implementation_report
          .commands_executed[] against this allowlist. Unexpected commands = Major finding.
      tier_3_read_only_create:
        agents: ["researcher", "architect", "planner", "reviewer", "knowledge"]
        capabilities:
          - "read_file, list_dir, grep_search, semantic_search, file_search"
          - "create_file (new files only — cannot edit existing files)"
          - "fetch_webpage (Researcher, Architect only, when enabled)"
          - "memory tool (Knowledge only)"
          - "get_errors, get_changed_files (Reviewer only)"
        boundary_notes: >
          Tier 3 agents cannot modify existing code. They create new output files only.
          Knowledge agent writes to docs/feature/<slug>/ only — pre-commit validation
          by orchestrator enforces this. Reviewer has get_changed_files for diff analysis.
      data_flow_transitions:
        - from: "Tier 1 (Orchestrator)"
          to: "Tier 3 (Researcher)"
          data: "feature slug, web_research_enabled flag, focus area"
          trust_boundary: "Orchestrator→Agent dispatch parameter. No untrusted data."
        - from: "Tier 3 (Researcher)"
          to: "Tier 3 (Architect)"
          data: "research/*.yaml output files"
          trust_boundary: "File-based handoff. Architect reads research YAML created by Researcher."
        - from: "Tier 3 (Architect)"
          to: "Tier 3 (Planner)"
          data: "architecture-output.yaml"
          trust_boundary: "File-based handoff. Single file, structured YAML."
        - from: "Tier 3 (Planner)"
          to: "Tier 2 (Implementer)"
          data: "plan-output.yaml task definitions with file ownership"
          trust_boundary: "Tier escalation (3→2). Implementer gains terminal access but is scoped to declared files."
        - from: "Tier 2 (Implementer)"
          to: "Tier 2 (Tester)"
          data: "implementation-reports/task-*.yaml, modified source files"
          trust_boundary: "Same tier. Tester executes tests on implementer's output."
        - from: "Tier 2 (Tester)"
          to: "Tier 3 (Reviewer)"
          data: "test-report.yaml, git diff"
          trust_boundary: "Tier de-escalation (2→3). Reviewer is read-only."
        - from: "Tier 3 (Knowledge)"
          to: "Tier 1 (Orchestrator)"
          data: "evidence-bundle.yaml, knowledge-output.yaml"
          trust_boundary: "Pre-commit gate: orchestrator validates Knowledge output paths against allowlist before git commit."
      accepted_residual_risks:
        - risk: "Instruction-level enforcement"
          description: "Trust tiers are enforced by agent instructions and YAML frontmatter, not sandboxed."
          mitigation: "YAML frontmatter tools field is platform-enforced. Instructions are the secondary layer."
        - risk: "fetch_webpage in autonomous mode"
          description: "No VS Code approval prompt in autonomous mode. Instruction-level toggle is sole guard."
          mitigation: "Agents log URLs. Reviewer audits. Knowledge flags unexpected fetches."
        - risk: "Knowledge post-review writes"
          description: "Knowledge agent writes files after Code Review (Step 7), bypassing review for its own output."
          mitigation: "Pre-commit: orchestrator validates git diff matches Knowledge output_path_allowlist."

    # ==================================================================
    # FILE INVENTORY
    # ==================================================================
    file_inventory:
      target_directory: "v2/.github/agents/"
      promotion_target: ".github/agents/"

      new_files:
        - path: "v2/.github/agents/orchestrator.agent.md"
          action: "CREATE"
          line_estimate: 150
          description: "Pipeline coordinator — DAG dispatch, routing, approval gates"

        - path: "v2/.github/agents/researcher.agent.md"
          action: "CREATE"
          line_estimate: 100
          description: "Parallel web + codebase research with configurable fetch_webpage"

        - path: "v2/.github/agents/architect.agent.md"
          action: "CREATE"
          line_estimate: 140
          description: "Combined spec + design — requirements, architecture, decisions"

        - path: "v2/.github/agents/planner.agent.md"
          action: "CREATE"
          line_estimate: 130
          description: "DAG task decomposition with file ownership declarations"

        - path: "v2/.github/agents/implementer.agent.md"
          action: "CREATE"
          line_estimate: 130
          description: "TDD implementation — RED-GREEN cycle, unit tests only"

        - path: "v2/.github/agents/tester.agent.md"
          action: "CREATE"
          line_estimate: 140
          description: "Dynamic test execution + static evidence evaluation"

        - path: "v2/.github/agents/reviewer.agent.md"
