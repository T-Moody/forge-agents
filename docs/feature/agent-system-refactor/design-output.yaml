    # ==================================================================
    # PIPELINE DESIGN
    # ==================================================================
    pipeline_design:
      total_steps: 8
      steps:
        - step: 1
          name: "Setup"
          agent: "orchestrator"
          description: >
            Orchestrator creates feature directory (docs/feature/<slug>/), creates git
            baseline tag, asks approval_mode and web_research_enabled (interactive mode),
            classifies feature risk (🟢/🟡/🔴). R2: Initializes pipeline-log.yaml with
            run metadata (run_id, feature_slug, risk, approval_mode, started_at).
          outputs:
            - "docs/feature/<slug>/initial-request.md (if not existing)"
            - "docs/feature/<slug>/pipeline-log.yaml (initialized)"
          routing: "Always → Step 2 (or Step 3 if 🟢)"
          dispatches: 0

        - step: 2
          name: "Research"
          agent: "researcher (2-4 parallel instances)"
          description: >
            Orchestrator dispatches 2-4 Researcher instances, each assigned a focus area
            (architecture, impact, dependencies, patterns). Gate: ≥2 complete with DONE.
            Skipped for 🟢 simple features.
          outputs:
            - "docs/feature/<slug>/research/architecture.yaml"
            - "docs/feature/<slug>/research/impact.yaml"
            - "docs/feature/<slug>/research/dependencies.yaml"
            - "docs/feature/<slug>/research/patterns.yaml"
          routing: "Gate pass → Step 3 | 🟢 → skip to Step 3"
          dispatches: "2-4"
          gate: "≥2 of N researchers return status: DONE"
          gate_policy: >
            The ≥2 absolute gate is intentional, not parametric. It ensures minimum research
            diversity regardless of N. The orchestrator validates YAML parseability before
            counting a research output toward the gate.
          risk_scaling:
            green: "SKIP"
            yellow: "2-3 researchers"
            red: "4 researchers"
          approval_gate: "Interactive: approval after research"

        - step: 3
          name: "Architecture"
          agent: "architect (single instance)"
          description: >
            Architect reads research outputs + initial-request.md. Produces combined
            architecture-output.yaml with requirements, acceptance criteria, architectural
            decisions, and technical design. For 🔴 features, orchestrator dispatches
            2-3 Reviewers for embedded design review before proceeding.
          naming_convention: >
            Output file is architecture-output.yaml (not design-output.yaml). This avoids
            confusion with the pipeline's own design artifacts and reflects the merged
            Spec+Designer → Architect agent identity.
          outputs:
            - "docs/feature/<slug>/architecture-output.yaml"
            - "docs/feature/<slug>/architecture.md"
          routing: "DONE → Step 4 | 🔴 → embedded review → Step 4"
          failure_routing: >
            If embedded design review (🔴 only) returns request-changes: Orchestrator
            re-dispatches Architect with review findings. Max 1 revision round for
            embedded design review. If 2nd round still fails → pipeline status ERROR
            with summary 'Design review failed after 1 revision round'.
          conditional_research: >
            For 🟢 features (Step 2 skipped), Architect receives no research/*.yaml.
            Architect gracefully handles missing research by using initial-request.md +
            codebase analysis (grep_search, semantic_search) as sole inputs.
          dispatches: "1 (+ 2-3 reviewers for 🔴)"
          risk_scaling:
            green: "architect only"
            yellow: "architect only"
            red: "architect + 2-3 reviewers"

        - step: 4
          name: "Planning"
          agent: "planner (single instance)"
          description: >
            Planner reads architecture output. Produces plan-output.yaml with DAG task
            graph including per-task id, description, depends_on, files, risk_level.
            Interactive: approval gate after planning.
          outputs:
            - "docs/feature/<slug>/plan-output.yaml"
          routing: "DONE → Step 5"
          dispatches: 1
          approval_gate: "Interactive: approval after planning"

        - step: 5
          name: "Implementation"
          agent: "implementer (parallel, DAG-ordered)"
          description: >
            Orchestrator reads plan DAG, computes ready tasks (all deps satisfied, no
            file overlap with concurrent tasks), dispatches ≤4 in parallel. Each implementer
            follows RED-GREEN TDD. Repeats until all tasks complete. Max 3 fix cycles per
            task on NEEDS_REVISION.
          outputs:
            - "docs/feature/<slug>/implementation-reports/task-<id>.yaml (per task)"
          routing: "All tasks DONE → Step 6 | NEEDS_REVISION → re-dispatch task"
          dispatches: "Variable (depends on task count, max 4 per group)"
          max_cycles: 3

        - step: 6
          name: "Testing"
          agent: "tester (singleton for dynamic, parallel for static)"
          description: >
            Phase 1 (static): Tester reads implementation reports, verifies TDD compliance,
            checks test pass counts. R2: Audits implementer commands_executed[] against
            command allowlist. Phase 2 (dynamic, if needed): Tester starts app, runs
            integration/E2E/API tests, stops app. Failure routes back to Step 5.
          outputs:
            - "docs/feature/<slug>/test-report.yaml"
          routing: "DONE → Step 7 | NEEDS_REVISION → Step 5 (max 3 total cycles)"
          dispatches: "1-2 (static + dynamic)"
          risk_scaling:
            green: "Static only (unit test verification)"
            yellow: "Static + integration tests"
            red: "Static + full dynamic (integration, E2E, API, live)"

        - step: 7
          name: "Code Review"
          agent: "reviewer (2-3 parallel instances)"
          description: >
            MANDATORY for all risk levels. Orchestrator dispatches 2-3 Reviewers, each
            assigned a perspective (security, architecture, correctness). Gate: ≥2 approve
            + 0 blockers. Failure routes back to Step 5 with findings. Max 2 review rounds.
            R2: Reviewers audit implementer commands_executed[] and fetch_webpage URL trails.
            Orchestrator validates review verdict YAML is parseable before counting toward gate.
          outputs:
            - "docs/feature/<slug>/review-verdicts/<perspective>.yaml (per reviewer)"
            - "docs/feature/<slug>/review-findings/<perspective>.md (per reviewer)"
          routing: "Gate pass → Step 8 | Gate fail → Step 5 (max 2 rounds)"
          dispatches: "2-3"
          gate: "≥2 of N approve AND 0 blocker findings"
          mandatory: true
          max_rounds: 2

        - step: 8
          name: "Completion"
          agent: "knowledge (single instance) + orchestrator"
          description: >
            Knowledge agent: reads pipeline-log.yaml, produces evidence-bundle.yaml
            (dispatch log, timing, findings), knowledge-output.yaml (lessons learned),
            instruction-recommendations.md (proposed improvements for human review).
            R2: Orchestrator pre-commit validation: validates git diff only contains
            files in Knowledge output_path_allowlist + feature directory. Then git add + commit.
          outputs:
            - "docs/feature/<slug>/evidence-bundle.yaml"
            - "docs/feature/<slug>/knowledge-output.yaml"
            - "docs/feature/<slug>/instruction-recommendations.md"
          routing: "Terminal step"
          dispatches: 1

      dispatch_estimates:
        green: "~6-8 dispatches"
        yellow: "~12-15 dispatches"
        red: "~20-25 dispatches"

      feedback_loops:
        - name: "Implementation-Testing"
          path: "Step 5 → Step 6 → Step 5"
          max_iterations: 3
          trigger: "Tester returns NEEDS_REVISION"
          counter_reset: "Cycle counter resets to 0 at start of each Code Review round"

        - name: "Code Review Fix"
          path: "Step 7 → Step 5 → Step 6 → Step 7"
          max_iterations: 2
          trigger: "Code Review gate fails (blockers present or <2 approvals)"
          counter_reset: "Implementation-Testing counter resets to 0 at start of each Code Review round"

        - name: "Design Review (🔴 only)"
          path: "Step 3 → Reviewers → Step 3"
          max_iterations: 1
          trigger: "Embedded design review returns request-changes (🔴 features only)"
          failure_action: "Pipeline status ERROR after 1 revision round"

    # ==================================================================
    # STATE MANAGEMENT
    # ==================================================================
    state_management:
      approach: "YAML file-based evidence with completion-contract routing"
      database: "none"
      external_dependencies: "git only (project-specific tools as needed)"

      naming_convention: >
        Output files use agent-name-output.yaml pattern: architecture-output.yaml (not
        design-output.yaml), plan-output.yaml, test-report.yaml. This avoids confusion
        with the pipeline's own design/spec artifacts from the development process.

      routing_mechanism:
        description: >
          Orchestrator reads the completion block from agent output YAML files. The
          status field (DONE/NEEDS_REVISION/ERROR) is the sole routing signal. File
          existence in the feature directory serves as secondary evidence.
        example: |
          # Orchestrator reads test-report.yaml:
          completion:
            status: "DONE"          # → proceed to Step 7
            summary: "All tests pass: 12 unit, 3 integration, 1 E2E"
            output_paths: ["test-report.yaml"]

      evidence_model:
        description: >
          Evidence = file existence in docs/feature/<slug>/. The orchestrator verifies
          step completion by checking that expected output files exist using list_dir.
        evidence_checks:
          - step: "Research"
            check: "research/*.yaml files exist (≥2)"
          - step: "Architecture"
            check: "architecture-output.yaml exists"
          - step: "Planning"
            check: "plan-output.yaml exists"
          - step: "Implementation"
            check: "implementation-reports/task-{id}.yaml exists for each task"
          - step: "Testing"
            check: "test-report.yaml exists"
          - step: "Code Review"
            check: "review-verdicts/*.yaml files exist (≥2)"

      audit_trail:
        description: >
          R2: Two-layer audit trail. Layer 1 (incremental): Orchestrator appends to
          pipeline-log.yaml after each dispatch — survives pipeline crashes. Layer 2
          (enriched): Knowledge agent produces evidence-bundle.yaml at completion,
          reading pipeline-log.yaml and adding analysis (lessons, recommendations).
        pipeline_log_schema: |
          # pipeline-log.yaml — appended by orchestrator after each dispatch
          run_id: "<ISO8601>"
          feature_slug: "<slug>"
          risk: "🟢" | "🟡" | "🔴"
          approval_mode: "interactive" | "autonomous"
          started_at: "<ISO8601>"
          dispatches:
            - step: <N>
              agent: "<agent-name>"
              instance: "<instance-id>"
              started_at: "<ISO8601>"
              completed_at: "<ISO8601>"
              status: "DONE" | "NEEDS_REVISION" | "ERROR"
              output_paths: ["..."]

      what_this_eliminates:
        - "sql-templates.md (936 lines) — entirely eliminated"
        - "evaluation-schema.md (84 lines) — subsumed into Tester"
        - "SQLITE_BUSY handling in global rules — eliminated"
        - "Evidence gate queries (EG-1 through EG-10) — replaced by file existence"
        - "sql_escape() sanitization rules — eliminated"
        - "run_in_terminal for sqlite3 piping — eliminated"
        - "verification-ledger.db — eliminated"

    # ==================================================================
    # SCHEMAS
    # ==================================================================
    schemas:
      approach: >
        Each agent defines its own output schema inline in its .agent.md file
        (Output Schema section). The completion contract is defined once in
        global-rules.md and referenced by all agents.

      completion_contract:
        description: "Universal completion block appended to every agent output"
        schema: |
          completion:
            status: "DONE" | "NEEDS_REVISION" | "ERROR"
            summary: "≤200 characters describing the outcome"
            output_paths:
              - "relative/path/to/output.yaml"
        validation_rule: >
          Any status value other than DONE, NEEDS_REVISION, or ERROR is treated as ERROR
          by the orchestrator. This prevents undefined behavior from malformed YAML values.

      agent_output_wrapper:
        description: "Common wrapper for all agent outputs"
        schema: |
          agent_output:
            agent: "<agent-name>"
            started_at: "<ISO8601>"
            completed_at: "<ISO8601>"
            payload:
              # Agent-specific content
          completion:
            status: "DONE"
            summary: "..."
            output_paths: [...]

      task_schema:
        description: "Planner task definition with DAG dependencies"
        schema: |
          tasks:
            - id: "<task-id>"
              description: "<what to implement>"
              depends_on: []                    # list of task IDs
              files:                            # file ownership declaration
                - "path/to/file.ext"
              risk: "🟢" | "🟡" | "🔴"

      implementation_report:
        description: "Per-task report from implementer"
        schema: |
          task_id: "<task-id>"
          files_modified: ["path/file.ext"]
          files_requested: []              # R2: if NEEDS_REVISION for more files
          tests_written: ["path/test.ext"]
          test_results:
            passed: <N>
            failed: <N>
          tdd_compliance: true | false
          commands_executed:               # R2: terminal command audit trail
            - "dotnet test ..."
            - "dotnet build ..."

      test_report:
        description: "Tester output with per-category results"
        schema: |
          test_categories:
            unit_tests: { passed: N, failed: N }
            integration_tests: { passed: N, failed: N, skipped: N }
            e2e_tests: { passed: N, failed: N, skipped: N }
          tdd_verification:
            compliant_tasks: N
            non_compliant_tasks: N
          command_allowlist_audit:          # R2: audit implementer commands
            violations: []
            clean: true | false
          verdict: "pass" | "fail"

      review_verdict:
        description: "Per-reviewer output with findings and verdict"
        schema: |
          perspective: "security" | "architecture" | "correctness"
          findings:
            - severity: "blocker" | "critical" | "major" | "minor"
              description: "<finding description>"
              file: "<affected file>"
              recommendation: "<fix suggestion>"
          verdict: "approve" | "request-changes"

    # ==================================================================
    # INDUSTRY TRACEABILITY
    # ==================================================================
    industry_traceability:
      - decision: "D-2 (8 agents)"
        source: "MetaGPT — 4 role model (Product Manager, Architect, Project Manager, Engineer)"
        citation: "architecture.yaml F-7"
      - decision: "D-4 (YAML state, no SQLite)"
        source: "SWE-Agent (JSON trajectories), MetaGPT (file artifacts), AutoGen (messages)"
        citation: "architecture.yaml F-16, patterns.yaml F-6"
      - decision: "D-5 (8-step pipeline)"
        source: "MetaGPT ~5 steps, Anthropic 'simplest solution possible'"
        citation: "architecture.yaml F-7, F-13"
      - decision: "D-6 (DAG execution)"
        source: "GitHub Actions needs:, Airflow DAG, AutoGen GraphFlow, AgentForge"
        citation: "architecture.yaml F-10, F-8, dependencies.yaml F-14, patterns.yaml F-19"
      - decision: "D-8 (line budget)"
        source: "GitHub '2 pages', CrewAI 5-8 lines/agent, AutoGen ~10 lines/agent"
        citation: "architecture.yaml F-12, impact.yaml F-17, F-18"
      - decision: "D-9 (minimal shared docs)"
        source: "Anthropic 'simple, composable patterns', GitHub 'Instructions ≤2 pages'"
        citation: "architecture.yaml F-13, patterns.yaml F-16"
      - decision: "D-11 (completion-contract routing)"
        source: "AutoGen (structured messages), LangGraph (node returns), MetaGPT (returns)"
        citation: "architecture.yaml F-18, patterns.yaml F-2"
      - decision: "D-12 (no cross-file §references)"
