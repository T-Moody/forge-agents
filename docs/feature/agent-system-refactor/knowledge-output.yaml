agent_output:
  agent: "knowledge-agent"
  instance: "knowledge-agent"
  step: "step-8"
  started_at: "2026-03-08T22:10:00Z"
  completed_at: "2026-03-08T22:45:00Z"
  schema_version: "1.0"
  payload:
    knowledge_updates:
      - type: "convention"
        key: "clean-slate-over-incremental"
        value: >
          When an agent system has undergone 5+ improvement iterations that all added complexity,
          a clean-slate rebuild in a new directory is more effective than incremental refactoring.
          This feature reduced 6,416 lines to 1,004 (85% reduction) by starting from constraints
          (1,500 total / 150 per agent) rather than from existing code. Incremental approaches
          had failed to simplify because they preserved assumptions from prior complexity.
        stored_via: "store_memory"

      - type: "convention"
        key: "line-budget-as-design-constraint"
        value: >
          Hard line budgets (1,500 total, 150 per agent) are effective architectural constraints.
          They force single-responsibility design and prevent scope creep. Final system used 67%
          of budget (1,004/1,500), with headroom for growth. Individual agents ranged 28–99 lines.
          The orchestrator — historically the most complex agent — fit in 89 lines by using
          completion-contract-only routing instead of database queries.
        stored_via: "store_memory"

      - type: "pattern"
        key: "completion-contract-routing"
        value: >
          Routing solely on completion contract status (DONE/NEEDS_REVISION/ERROR) eliminates
          the need for SQLite state tracking, evidence gates, and sql-templates documents.
          The v2 system uses YAML files as the sole state mechanism. This removed ~3,000 lines
          of database infrastructure from the prior system.
        stored_via: "store_memory"

      - type: "lesson"
        key: "design-review-rounds-correlate-with-complexity"
        value: >
          This feature required 3 design review rounds (most in pipeline history). The clean-slate
          nature meant reviewers couldn't rely on existing patterns — every decision needed first-
          principles justification. R1 found 13 Major findings, R2 resolved all but surfaced 1 new
          Major (pre-commit scope), R3 accepted the residual. Trust boundary analysis (D-14) was
          the most impactful R1 addition — it structured all security decisions.
        stored_via: "store_memory"

      - type: "lesson"
        key: "code-review-catches-trust-boundary-violations"
        value: >
          Code review R1 found 10 Major findings. The 3 most critical were trust boundary
          violations: implementer had fetch_webpage (S-1), tester lacked command allowlist (S-2),
          architect lacked web_research gate (S-3). All 3 were specification-level requirements
          that the implementer missed. Code review is essential for catching trust model
          deviations that verification (AC-based checking) does not cover.
        stored_via: "store_memory"

      - type: "convention"
        key: "vs-code-native-tool-restrictions"
        value: >
          Using VS Code native YAML frontmatter 'tools' field for tool access control replaces
          the need for a separate tool-access-matrix.md document. This is platform-enforced
          rather than instruction-enforced, making it more reliable. However, conditional
          capabilities (like fetch_webpage requiring web_research_enabled) still need instruction-
          level gates since frontmatter is static.
        stored_via: "store_memory"

      - type: "pattern"
        key: "merged-agent-reduces-handoff-overhead"
        value: >
          Merging Spec + Designer into a single Architect agent eliminated an entire pipeline
          step and reduced handoff artifacts. The prior system had spec-output.yaml→design-
          output.yaml with significant duplication. The merged Architect produces a single
          architecture-output.yaml. Similarly, merging Verifier + TestRunner simplifies
          the testing phase. Agent count: 9→8.
        stored_via: "store_memory"

      - type: "lesson"
        key: "research-is-pipeline-bottleneck"
        value: >
          Research (Step 1) consumed ~4.4 hours — 44% of total pipeline time. The architecture-
          recovery dispatch was unplanned (mid-session insertion after initial researchers
          completed). For future clean-slate features, include an explicit architecture-recovery
          research task in the initial research plan rather than discovering the need mid-pipeline.
        stored_via: "store_memory"

      - type: "command"
        key: "v2-system-location"
        value: >
          The v2 agent system lives in v2/.github/agents/ (8 agent files + 1 shared doc) and
          v2/.github/prompts/ (2 prompt files). Total: 11 files, 1,004 lines. The v2/ directory
          is isolated from the existing system.
        stored_via: "store_memory"

      - type: "lesson"
        key: "duplicate-telemetry-entries"
        value: >
          Pipeline telemetry had ~8 duplicate entries (wave-2 tasks logged twice, wave-4
          task-10 logged twice). This inflates dispatch counts. The Knowledge agent should
          deduplicate by (step, instance) when computing metrics. Root cause likely: orchestrator
          logged before and after verification for the same dispatch.
        stored_via: "store_memory"

      - type: "convention"
        key: "quick-fix-pipeline-step-set"
        value: >
          Quick-fix pipeline uses steps {1, 5, 6, 7, 8} (Setup, Implementation, Testing, Code
          Review, Completion). Code Review (Step 7) is MANDATORY per immutable minimum step set.
          For 🟢-risk single fixes, the orchestrator generates minimal plan-output.yaml and
          tasks/task-01.yaml inline, replacing the Planner step.
        stored_via: "store_memory"

    decision_log_entries:
      - id: "DL-001"
        title: "Direction C selected: Clean-Slate Rebuild"
        rationale: >
          5 prior improvement runs all added complexity (6,416 lines). Incremental simplification
          (Direction B) preserves structural assumptions. Clean-slate with hard constraints
          (1,500/150 line budgets) breaks the complexity spiral. Direction A (single agent) loses
          proven multi-perspective review value.
        confidence: "High"

      - id: "DL-002"
        title: "Merge Spec + Designer into Architect"
        rationale: >
          Spec and Designer had significant output duplication. Single Architect agent produces
          requirements, acceptance criteria, directions analysis, and technical decisions in one
          pass. Reduces pipeline steps from 10→8 and eliminates handoff artifacts.
        confidence: "High"

      - id: "DL-003"
        title: "Zero SQLite — YAML-only evidence"
        rationale: >
          SQLite infrastructure (sql-templates, evidence gates, verification ledger, WAL mode
          handling) consumed ~3,000 lines. YAML completion contracts provide sufficient state
          management. Orchestrator reads YAML files for routing decisions. Eliminates entire
          database dependency.
        confidence: "High"

      - id: "DL-004"
        title: "3-tier trust boundary model (D-14)"
        rationale: >
          Added in design R2 after security-sentinel identified missing trust analysis. Tier 1
          (high trust): orchestrator, reviewer, knowledge. Tier 2 (medium): implementer, tester.
          Tier 3 (low): researcher, architect. Command allowlists for Tier 2 agents.
        confidence: "High"

      - id: "DL-005"
        title: "pipeline-log.yaml for incremental audit trail (D-15)"
        rationale: >
          Failed pipelines previously lost audit trail since evidence bundle was success-only.
          Incremental pipeline-log.yaml captures every dispatch regardless of outcome. Replaces
          SQLite pipeline_telemetry for the v2 system.
        confidence: "Medium"

      - id: "DL-006"
        title: "Design approved after 3 review rounds"
        rationale: >
          R1: 13 Major findings (all resolved). R2: 2/3 approve, 1 Major residual (pre-commit
          scope wording). R3: 2/3 approve, same residual. Trust model has correct intent.
          Residual captured as KI-1 for implementer. Proceeding justified: architectural
          correctness confirmed, wording issue is non-structural.
        confidence: "High"

      - id: "DL-007"
        title: "Code review R1 fixes applied, R2 all approve"
        rationale: >
          10 Major findings in R1. 8 fixes applied across 7 files. Most impactful: trust boundary
          enforcement (fetch_webpage removed from implementer, command allowlist added to tester,
          web_research gate added to architect). R2: 3/3 approve. Residual advisories are non-
          blocking.
        confidence: "High"

