          score: 9

    instruction_recommendations:
      - target: "v2/.github/agents/orchestrator.agent.md"
        change_type: "enhancement"
        summary: >
          Define pipeline-log.yaml schema inline or in global-rules.md. Currently referenced
          but format unspecified. Required fields: step, agent, started_at, completed_at,
          status, output_paths.
        priority: "Medium"

      - target: "v2/.github/agents/orchestrator.agent.md"
        change_type: "fix"
        summary: >
          Fix 🟢 routing: Step 2 currently routes 🟢 risk to Step 4 (Planning) skipping Step 3
          (Architecture). But Planner requires architecture-output.yaml. Either route 🟢 through
          Architecture or make architecture-output.yaml optional for Planner.
        priority: "Low"

      - target: "v2/.github/agents/tester.agent.md"
        change_type: "enhancement"
        summary: >
          Add commands_executed[] field to Tester output schema for audit trail parity with
          Implementer. Tester uses run_in_terminal but doesn't log commands in its schema.
        priority: "Low"

      - target: "v2/.github/agents/reviewer.agent.md"
        change_type: "enhancement"
        summary: >
          Add guidance for round-2+ reviews: reference R1 findings, verify fixes, flag
          regressions. Currently the reviewer has no awareness of multi-round context.
        priority: "Low"

