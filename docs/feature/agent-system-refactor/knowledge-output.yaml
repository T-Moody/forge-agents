agent_output:
  agent: "knowledge-agent"
  instance: "knowledge-agent"
  step: "step-8"
  started_at: "2026-03-09T20:00:00Z"
  completed_at: "2026-03-09T20:45:00Z"
  schema_version: "1.0"
  run_id: "2026-03-09T18:00:00Z"
  payload:
    knowledge_updates:
      - type: "convention"
        key: "flat-camelcase-tool-names"
        value: >
          VS Code agent YAML frontmatter requires flat camelCase tool names (readFile, createFile,
          editFiles, listDirectory, textSearch, fileSearch, codebase, runInTerminal, getTerminalOutput,
          problems, changes, todos, fetch). The namespace/tool format (read/readFile, edit/createFile)
          is silently ignored — tools are NOT restricted. All 47 tool references across 8 agents
          verified against official VS Code cheat sheet. This was the most impactful single fix
          in Run 3.
        stored_via: "store_memory"

      - type: "convention"
        key: "user-invocable-false-for-workers"
        value: >
          All worker (non-orchestrator) agents MUST set user-invocable: false in YAML frontmatter
          to prevent appearing in the VS Code agents dropdown. Only the orchestrator should be
          user-invocable. Do NOT use disable-model-invocation: true — VS Code docs confirm this
          prevents subagent dispatch by other agents, breaking the pipeline.
        stored_via: "store_memory"

      - type: "pattern"
        key: "orchestrator-mediated-interaction"
        value: >
          VS Code subagents cannot directly prompt users. For interactive questioning (architect
          clarifications, planner approval), use the orchestrator-mediated pattern: (1) subagent
          completes fully with assumptions_made[] + clarifications_needed[] in output, (2) orchestrator
          reads output and presents questions to user, (3) re-dispatch only if answers contradict
          assumptions. This assumptions-first flow avoids wasted two-phase dispatches.
        stored_via: "store_memory"

      - type: "pattern"
        key: "two-source-selective-staging"
        value: >
          Git staging in the orchestrator uses two sources: (1) implementation files from reports'
          files_modified lists via explicit git add pathspecs, (2) pipeline artifacts via git add
          docs/feature/<slug>/ glob. This avoids git add -A while ensuring both code and pipeline
          outputs are staged. Pre-stage validation checks knowledge output_paths only.
        stored_via: "store_memory"

      - type: "lesson"
        key: "audit-pattern-alignment"
        value: >
          Tester and reviewer audit patterns must exactly mirror the implementer's command allowlist.
          In Run 3, the tester/reviewer checked narrower patterns (dotnet build|test) than the
          implementer allows (dotnet build|test|run). Three commands would generate false-positive
          violations: dotnet run, npm test, python -m pytest. Align all three sources.
        stored_via: "store_memory"

      - type: "lesson"
        key: "bootstrap-git-safety-paradox"
        value: >
          When implementing a git safety rule that restricts non-orchestrator agents from running
          git add, the implementing agent itself violates the rule during the same pipeline run.
          This is a bootstrap problem. Future self-improvement runs should have the orchestrator
          handle all staging from the first task after the rule is established.
        stored_via: "store_memory"

      - type: "lesson"
        key: "global-rules-md-detected-as-agent"
        value: >
          Any .md file in .github/agents/ is auto-detected by VS Code as a custom agent.
          global-rules.md (shared rules document) lacks YAML frontmatter and appears as an
          unintended agent in the dropdown. Add minimal frontmatter with user-invocable: false
          and tools: [] to suppress this.
        stored_via: "store_memory"

      - type: "convention"
        key: "line-budgets-validated-post-improvement"
        value: >
          After Run 3 improvements (10 changes across 9 files), all agents remain under the
          150-line budget. Total: 982 lines. Tightest: architect at 139 (11 headroom).
          Most comfortable: global-rules at 77 (73 headroom). The 150-line budget survived
          adding E2E guidance, interactive questioning, TDD refactoring, exploratory QA, and
          git safety — proving the budget has sufficient headroom for incremental improvements.
        stored_via: "store_memory"

      - type: "lesson"
        key: "code-review-first-attempt-approve"
        value: >
          Run 3 achieved 3/3 code review approve on the first round — a first for this feature.
          Run 2 required 2 code review rounds (10 Majors in R1). Key factors: (1) tool names
          verified against official docs before implementation, (2) design R2 resolved all
          Majors before implementation started, (3) trust boundaries already correct from Run 2.
        stored_via: "store_memory"

      - type: "convention"
        key: "step-8-decomposition-pattern"
        value: >
          Complex orchestrator steps should be decomposed into lettered sub-steps (8a-8e) with
          single responsibility each. Step 8 decomposition: 8a Knowledge Extraction, 8b Doc
          Updates, 8c Knowledge Validation, 8d Selective Staging, 8e Commit/Review Choice.
          Interactive/autonomous branching isolated to sub-steps 8b and 8e only.
        stored_via: "store_memory"

    decision_log_entries:
      - id: "DL-008"
        title: "Direction C — Hybrid inline + shared extraction"
        rationale: >
          Git safety rule extracted to global-rules.md (single source of truth), all other
          changes inline per agent. Minimal diff over Direction A. Direction B (hooks) adds
          Preview-feature infrastructure exceeding scope.
        confidence: "High"

      - id: "DL-009"
        title: "Individual flat camelCase tool names"
        rationale: >
          V2 trust model requires fine-grained per-agent restrictions. Tool sets (edit, search)
          are too coarse — 'edit' grants createFile AND editFiles AND createDirectory. Individual
          names preserve trust tier boundaries.
        confidence: "High"

      - id: "DL-010"
        title: "Orchestrator-mediated interactive questioning (D-3)"
        rationale: >
          VS Code subagents cannot prompt users directly. Assumptions-first flow: subagent
          completes fully with assumptions_made[] + clarifications_needed[], orchestrator mediates.
          Re-dispatch only if answers contradict assumptions.
        confidence: "High"

      - id: "DL-011"
        title: "Keep 'agent' tool set in orchestrator (D-4)"
        rationale: >
          VS Code official examples use 'agent' (tool set) for subagent dispatch. Already
          correct in v2. Body text instructs runSubagent usage.
        confidence: "High"

      - id: "DL-012"
        title: "Selective staging from implementation reports (D-5)"
        rationale: >
          Two-source strategy: (1) git add <paths from files_modified>, (2) git add
          docs/feature/<slug>/ for pipeline artifacts. Avoids git add -A while ensuring
          nothing is missed.
        confidence: "High"

      - id: "DL-013"
        title: "Exploratory QA inline with optional SKILL.md (D-6)"
        rationale: >
          Hybrid: 4-category inline checklist (happy path, edge cases, error handling, state
          mutation) in tester body. Skills loaded when available. Tester at 132 lines (18
          headroom). Architect at 139 is true budget bottleneck.
        confidence: "Medium"

      - id: "DL-014"
        title: "Remove vscode/memory — memory is a setting (D-7)"
        rationale: >
          No built-in 'memory' tool exists. Memory controlled by VS Code setting
          github.copilot.chat.tools.memory.enabled. Removed from frontmatter, reworded
          workflow step.
        confidence: "High"

      - id: "DL-015"
        title: "E2E skill discovery — user-driven (D-8)"
        rationale: >
          Spec pushback recommended user-driven over autodetect. Orchestrator scans skill dirs
          for context, presents options to user. Autonomous mode uses found skills or logs warning.
        confidence: "High"

      - id: "DL-016"
        title: "Pre-stage validation scoped to knowledge only (D-9)"
        rationale: >
          Implementation files validated by tester file ownership audit. Orchestrator Step 8c
          validates only knowledge output_paths (evidence-bundle, knowledge-output,
          instruction-recommendations).
        confidence: "High"

      - id: "DL-017"
        title: "Step 8 decomposed 8a-8e (D-10)"
        rationale: >
          Prevents implementer misordering. Each sub-step has single responsibility.
          Interactive/autonomous branching isolated to 8b and 8e.
        confidence: "High"

      - id: "DL-018"
        title: "Reject disable-model-invocation for workers (D-11)"
        rationale: >
          VS Code docs define this as 'prevents the agent from being invoked as a subagent.'
          Adding it would break orchestrator dispatch. Trust enforced via user-invocable:false
          + agents:[] + tools: arrays.
        confidence: "High"

